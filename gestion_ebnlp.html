<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Maestro - EBN Lucila Palacios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --naranja: #f39c12; --gris: #f4f7f6; --exito: #27ae60; --rojo: #b22222; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; font-size: 13px; }
        header { background: var(--azul); color: white; padding: 20px 15px; text-align: center; border-bottom: 4px solid var(--naranja); }
        .escudo { width: 85px; height: 85px; border-radius: 50%; background: white; padding: 3px; border: 3px solid var(--naranja); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        nav { background: var(--celeste); display: flex; justify-content: space-around; padding: 12px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        nav button { background: none; border: 1px solid white; color: white; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 11px; white-space: nowrap; margin: 0 5px; }
        nav button.active { background: var(--naranja); border-color: var(--naranja); font-weight: bold; }
        .container { max-width: 850px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 5px solid var(--azul); }
        .seccion { display: none; }
        .seccion.active { display: block; }
        input, select, button, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f8f9fa; color: var(--azul); text-align: center; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: #eef2f3; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #dee2e6; }
        .badge { padding: 3px 8px; border-radius: 10px; color: white; font-weight: bold; font-size: 9px; }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" class="escudo">
    <h1 style="margin:5px 0 0; font-size: 1.3rem;">E.B.N. "LUCILA PALACIOS"</h1>
    <p style="margin:0; opacity: 0.9;">Gestión Escolar Integral - 2026</p>
</header>

<nav id="navbar">
    <button onclick="ver('inicio')" id="nav-ini" class="active">🏠 MONITOR</button>
    <button onclick="ver('nomina')" id="nav-nom">👥 NÓMINA</button>
    <button onclick="ver('pedagogico')" id="nav-ped">📚 PEDAGÓGICO</button>
    <button onclick="ver('bienes')" id="nav-bie">🏫 BIENES</button>
    <button onclick="generarReporte()" style="color:var(--naranja); border-color:var(--naranja);">📄 REPORTE PDF</button>
</nav>

<div class="container" id="reporte-maestro">

    <div id="inicio" class="seccion active">
        <div class="card" style="border-top-color: var(--naranja);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>📅 <span id="fechaHoy"></span></b>
                <span id="labelGrupo" class="badge" style="background:var(--naranja); padding:6px 12px; font-size:12px;">Cargando...</span>
            </div>
            <p style="margin-top:15px; font-weight:bold; color:var(--celeste);">Asistencia de Estudiantes (Hoy):</p>
            <div id="estudiantesHoy"></div>
            <button onclick="registrarAlumno()" style="background:var(--exito); color:white; font-weight:bold;">➕ INSCRIBIR ALUMNO</button>
        </div>
    </div>

    <div id="nomina" class="seccion">
        <div class="card">
            <h3 style="margin-top:0; color:var(--azul);">📋 Nómina de Personal</h3>
            <div class="stat-grid" id="statsNomina"></div>
            <div style="background:#f0f7ff; padding:12px; border-radius:10px; border:1px solid #cfe2ff;">
                <label><b>Nuevo Ingreso:</b></label>
                <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:5px;">
                    <input type="text" id="n_nombre" placeholder="Nombre y Apellido">
                    <select id="n_cargo">
                        <option value="Docente">Docente</option>
                        <option value="Obrero">Obrero</option>
                        <option value="Vigilante">Vigilante</option>
                        <option value="Cocinera">Cocinera</option>
                        <option value="Administrativo">Administrativo</option>
                    </select>
                    <button onclick="altaPersonal()" style="background:var(--exito); color:white;">AÑADIR</button>
                </div>
            </div>
            <table>
                <thead><tr><th>Nombre</th><th>Función</th><th>Acción</th></tr></thead>
                <tbody id="tablaNomina"></tbody>
            </table>
        </div>
    </div>

    <div id="pedagogico" class="seccion">
        <div class="card">
            <h3 style="color:var(--azul);">📚 Planificación y Proyectos</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div style="background:#fff9f0; padding:10px; border-radius:10px;">
                    <label><b>P.A. #1 (Trimestre):</b></label>
                    <input type="text" id="pa1_n" placeholder="Título" onchange="guardar()">
                    <input type="date" id="pa1_f" onchange="guardar()">
                </div>
                <div style="background:#f0f4ff; padding:10px; border-radius:10px;">
                    <label><b>P.A. #2 (Trimestre):</b></label>
                    <input type="text" id="pa2_n" placeholder="Título" onchange="guardar()">
                    <input type="date" id="pa2_f" onchange="guardar()">
                </div>
            </div>
            <label style="display:block; margin-top:15px;"><b>Planificación Semanal:</b></label>
            <textarea id="plan_s" placeholder="Describa las actividades de la semana..." onchange="guardar()"></textarea>
        </div>
    </div>

    <div id="bienes" class="seccion">
        <div class="card">
            <h3 style="color:var(--azul);">🏫 Inventario de Bienes</h3>
            <div style="display:grid; grid-template-columns:2fr 1fr 1fr; gap:5px; margin-bottom:15px;">
                <input type="text" id="b_nom" placeholder="Descripción del Bien">
                <input type="number" id="b_cant" placeholder="Cant.">
                <button onclick="altaBien()" style="background:var(--celeste); color:white;">REGISTRAR</button>
            </div>
            <table>
                <thead><tr><th>Descripción</th><th>Cant.</th><th>Estado</th><th>Acción</th></tr></thead>
                <tbody id="tablaBienes"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let db = JSON.parse(localStorage.getItem('ebn_v15_final')) || {
        personal: [], bienes: [], alumnos: [], asistencias: {}, pa1:{}, pa2:{}, plan:""
    };
    let hoy = new Date().toISOString().split('T')[0];

    function ver(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + id.substring(0,3)).classList.add('active');
    }

    // --- LÓGICA PERSONAL ---
    function altaPersonal() {
        const n = document.getElementById('n_nombre').value.toUpperCase();
        const c = document.getElementById('n_cargo').value;
        if(n) { db.personal.push({id:Date.now(), n, c}); actualizarTodo(); }
    }
    function bajaPersonal(id) { if(confirm("¿Dar baja?")) { db.personal = db.personal.filter(p=>p.id!==id); actualizarTodo(); } }

    // --- LÓGICA ESTUDIANTES ---
    function registrarAlumno() {
        const n = prompt("Nombre:");
        const g = prompt("Género (M/F):").toUpperCase();
        if(n && g) { db.alumnos.push({id:Date.now(), n, g}); actualizarTodo(); }
    }
    function marcarAsis(id) {
        if(!db.asistencias[hoy]) db.asistencias[hoy] = {};
        db.asistencias[hoy][id] = !db.asistencias[hoy][id];
        actualizarTodo();
    }

    // --- LÓGICA BIENES ---
    function altaBien() {
        const n = document.getElementById('b_nom').value.toUpperCase();
        const c = document.getElementById('b_cant').value;
        if(n && c) { db.bienes.push({id:Date.now(), n, c, e:'ACTIVO'}); actualizarTodo(); }
    }
    function desincBien(id) {
        const m = prompt("Motivo:");
        if(m) { db.bienes = db.bienes.map(b=>b.id===id?{...b, e:'DESINC: '+m}:b); actualizarTodo(); }
    }

    function actualizarTodo() {
        // Nómina y Stats
        const tN = document.getElementById('tablaNomina'); tN.innerHTML = "";
        let c = {Docente:0, Obrero:0, Vigilante:0, Cocinera:0, Administrativo:0};
        db.personal.sort((a,b)=>a.n.localeCompare(b.n)).forEach(p => {
            c[p.c]++;
            tN.innerHTML += `<tr><td>${p.n}</td><td>${p.c}</td><td style="text-align:center;"><button onclick="bajaPersonal(${p.id})" style="background:var(--rojo); color:white; border:none; padding:3px 6px; border-radius:4px;">Baja</button></td></tr>`;
        });
        const sN = document.getElementById('statsNomina'); sN.innerHTML = "";
        for(let x in c) { sN.innerHTML += `<div class="stat-box">${x}s<br><b>${c[x]}</b></div>`; }

        // Estudiantes
        const eH = document.getElementById('estudiantesHoy'); eH.innerHTML = "";
        db.alumnos.sort((a,b)=>a.n.localeCompare(b.n)).forEach(a => {
            const isP = db.asistencias[hoy] && db.asistencias[hoy][a.id];
            eH.innerHTML += `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee;">
                <span><b>${a.n}</b> (${a.g})</span>
                <button onclick="marcarAsis(${a.id})" style="width:40px; background:${isP?'var(--exito)':'#ccc'}; color:white; border:none; border-radius:5px;">${isP?'P':'F'}</button>
            </div>`;
        });

        // Bienes
        const tB = document.getElementById('tablaBienes'); tB.innerHTML = "";
        db.bienes.forEach(b => {
            const esA = b.e === 'ACTIVO';
            tB.innerHTML += `<tr><td>${b.n}</td><td>${b.c}</td><td><span class="badge" style="background:${esA?'var(--exito)':'var(--rojo)'}">${b.e}</span></td>
            <td>${esA?`<button onclick="desincBien(${b.id})" style="font-size:9px;">Desinc.</button>`:'-'}</td></tr>`;
        });

        guardar();
    }

    function guardar() {
        db.plan = document.getElementById('plan_s').value;
        db.pa1 = {n: document.getElementById('pa1_n').value, f: document.getElementById('pa1_f').value};
        db.pa2 = {n: document.getElementById('pa2_n').value, f: document.getElementById('pa2_f').value};
        localStorage.setItem('ebn_v15_final', JSON.stringify(db));
    }

    function init() {
        document.getElementById('fechaHoy').innerText = hoy;
        const ref = new Date("2024-01-01");
        const diff = Math.floor((new Date() - ref) / (1000*60*60*24));
        document.getElementById('labelGrupo').innerText = (diff % 2 !== 0) ? "VIGILANCIA: GRUPO B" : "VIGILANCIA: GRUPO A";
        
        document.getElementById('plan_s').value = db.plan;
        document.getElementById('pa1_n').value = db.pa1.n || '';
        document.getElementById('pa1_f').value = db.pa1.f || '';
        document.getElementById('pa2_n').value = db.pa2.n || '';
        document.getElementById('pa2_f').value = db.pa2.f || '';
        actualizarTodo();
    }

    function generarReporte() {
        document.getElementById('navbar').style.display = 'none';
        document.querySelectorAll('.seccion').forEach(s => s.classList.add('active'));
        const opt = { margin: 8, filename: 'Reporte_General_EBNLP.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(document.body).save().then(() => { location.reload(); });
    }

    init();
</script>
</body>
</html>
