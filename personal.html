<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP - Control de Asistencia</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 50px; }
        
        /* HEADER Y LOGO */
        header { background: var(--azul); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }
        .logo-circulo { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--naranja); }
        .logo-circulo img { width: 85%; height: auto; }

        /* VISUALIZACIÓN DE RETRASOS (ESTADÍSTICAS) */
        .resumen { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .caja { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .caja-retraso { border: 2px solid var(--rojo); background: #fff8f8; }
        .num-retraso { font-size: 28px; font-weight: bold; color: var(--rojo); }

        /* TABLA Y RESALTADO DE RETRASO */
        .tabla-contenedor { background: white; margin: 10px; padding: 10px; border-radius: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--azul); color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }

        /* ESTILO ESPECÍFICO PARA EL RETRASO */
        .fila-retraso { background-color: #ffdada !important; color: #b71c1c; font-weight: bold; }
        .tag-retraso { background: var(--rojo); color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; }

        .form-card { background: white; margin: 10px; padding: 20px; border-radius: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-guardar { width: 100%; padding: 15px; background: var(--verde); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-circulo">
        <img src="https://i.ibb.co/XSbL8w4/logo-oficial-ebnlp.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/167/167707.png'">
    </div>
    <h3 style="margin:0;">E.B.N. "LUCILA PALACIOS"</h3>
</header>

<div class="resumen">
    <div class="caja">
        <div style="font-size:12px; color:#666;">ASISTENCIA</div>
        <div id="valAsis" style="font-size:28px; font-weight:bold; color:var(--azul);">0%</div>
    </div>
    <div class="caja caja-retraso">
        <div style="font-size:12px; color:var(--rojo); font-weight:bold;">RETARDOS HOY</div>
        <div id="valRet" class="num-retraso">0</div>
    </div>
</div>

<div class="form-card">
    <label>Personal:</label>
    <select id="selPers" onchange="verInfo()"><option value="">-- Seleccione --</option></select>
    
    <div style="display:flex; gap:10px;">
        <input type="text" id="infoC" placeholder="Cargo" readonly>
        <input type="text" id="infoT" placeholder="Turno" readonly>
    </div>

    <label><b>HORA MANUAL (HH:MM):</b></label>
    <input type="time" id="horaIn">

    <button class="btn-guardar" onclick="guardar()">REGISTRAR EN PLANILLA</button>
</div>

<div class="tabla-contenedor">
    <table id="tabla">
        <thead>
            <tr><th>NOMBRE</th><th>HORA</th><th>ESTATUS</th></tr>
        </thead>
        <tbody id="lista"></tbody>
    </table>
</div>

<script>
    // FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const hoy = new Date().toLocaleDateString('en-CA');

    // LÓGICA DE RETRASO
    function esRetraso(cargo, turno, hora) {
        const [h, m] = hora.split(':').map(Number);
        const t = h * 60 + m;
        if (turno === "MAÑANA") {
            if ((cargo === "Docente" || cargo === "Cocinera") && t > 420) return "RETRASO"; // 7:00
            if ((cargo === "Obrero" || cargo === "Administrativo") && t > 405) return "RETRASO"; // 6:45
        } else {
            if (cargo === "Docente" && t > 720) return "RETRASO"; // 12:00
            if (cargo === "Obrero" && t > 690) return "RETRASO"; // 11:30
        }
        return "ASISTENCIA";
    }

    let nomina = [];
    db.collection("nomina_institucional").onSnapshot(snap => {
        const sel = document.getElementById('selPers');
        sel.innerHTML = '<option value="">-- Seleccione --</option>';
        nomina = [];
        snap.forEach(doc => {
            nomina.push(doc.data());
            sel.innerHTML += `<option value="${doc.data().n}">${doc.data().n}</option>`;
        });
    });

    function verInfo() {
        const p = nomina.find(x => x.n === document.getElementById('selPers').value);
        if(p) { document.getElementById('infoC').value = p.c; document.getElementById('infoT').value = p.t; }
    }

    async function guardar() {
        const n = document.getElementById('selPers').value;
        const h = document.getElementById('horaIn').value;
        const c = document.getElementById('infoC').value;
        const t = document.getElementById('infoT').value;
        if(!n || !h) return alert("Ingrese Nombre y Hora");

        const est = esRetraso(c, t, h);
        await db.collection("asistencia_ebnlp_final").add({ n, h, e: est, f: hoy, ts: Date.now() });
        alert("REGISTRADO COMO: " + est);
    }

    db.collection("asistencia_ebnlp_final").where("f","==",hoy).orderBy("ts","desc").onSnapshot(snap => {
        const lista = document.getElementById('lista');
        let r = 0, p = 0;
        lista.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            const esR = d.e === "RETRASO";
            if(esR) r++; else p++;
            
            lista.innerHTML += `
                <tr class="${esR ? 'fila-retraso' : ''}">
                    <td>${d.n}</td>
                    <td>${d.h}</td>
                    <td>${esR ? '<span class="tag-retraso">RETRASO</span>' : 'PRESENTE'}</td>
                </tr>`;
        });
        document.getElementById('valRet').innerText = r;
        document.getElementById('valAsis').innerText = nomina.length > 0 ? Math.round(((p+r)/nomina.length)*100) + "%" : "0%";
    });
</script>
</body>
</html>
