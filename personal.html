<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MAESTRO EBNLP 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: var(--azul); border-bottom: 2px solid var(--naranja); padding-bottom: 5px; font-size: 14px; text-transform: uppercase; }
        
        /* AUDITORÍA Y ALERTAS */
        .visor-auditoria { background: #fff3e0; border-left: 5px solid var(--naranja); padding: 12px; margin: 10px 0; display: none; border-radius: 5px; font-size: 13px; }
        .alerta-critica { color: var(--rojo); font-weight: bold; display: block; margin-top: 5px; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        /* TABLAS Y ESTADÍSTICAS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: white; padding: 10px; border-radius: 8px; text-align: center; border-top: 4px solid var(--azul); }
        .stat-box p { font-size: 22px; font-weight: bold; margin: 5px 0; color: var(--azul); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: var(--azul); color: white; padding: 8px; border: 1px solid #ddd; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }

        /* BOTONES */
        select, input { width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; text-align: center; display: block; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }
        .btn-rojo { background: var(--rojo); }
        .btn-pdf { background: #E74C3C; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-size:18px;">E.B.N. "LUCILA PALACIOS"</h2>
    <p style="margin:2px 0 0; font-size:11px; opacity:0.9;">Control de Auditoría y Personal 2026</p>
</header>

<div class="card stats-grid">
    <div class="stat-box"><h4>% ASISTENCIA</h4><p id="pTotal">0%</p></div>
    <div class="stat-box"><h4>RETRASOS HOY</h4><p id="rTotal" style="color:var(--rojo);">0</p></div>
</div>

<div class="card">
    <h3>📝 Registro de Novedades y Auditoría</h3>
    <label>Seleccionar Trabajador:</label>
    <select id="sPersona" onchange="verificarAuditoria(this.value)"></select>

    <div id="visor" class="visor-auditoria">
        <div id="infoAuditoria"></div>
    </div>

    <label>Estatus de hoy:</label>
    <select id="sEstatus">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="INASISTENCIA">INASISTENCIA ❌ (Máx 3)</option>
        <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝 (Máx 3)</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
        <option value="VACACIONES">VACACIONES 🌴</option>
    </select>

    <label>Hora de Entrada:</label>
    <input type="time" id="hEntrada">
    
    <button class="btn btn-verde" onclick="guardar()">GUARDAR REGISTRO</button>
</div>

<div class="card">
    <h3>📋 Reporte Diario</h3>
    <table id="tHoy">
        <thead><tr><th>Nombre</th><th>Estatus</th><th>Hora</th><th>Cargo</th></tr></thead>
        <tbody id="bHoy"></tbody>
    </table>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
        <button class="btn btn-pdf" onclick="pdf('hoy')">PDF DIARIO</button>
        <button class="btn btn-pdf" style="background:#943126" onclick="pdf('mes')">PDF MENSUAL</button>
    </div>
</div>

<div class="card">
    <button class="btn btn-azul" onclick="document.getElementById('pAdmin').classList.toggle('hidden')">⚙️ GESTIÓN Y LIMPIEZA</button>
    <div id="pAdmin" class="hidden" style="margin-top:10px; border-top:1px solid #ddd; padding-top:10px;">
        
        <h4>+ Alta / - Baja</h4>
        <input type="text" id="nN" placeholder="Nombre Completo">
        <select id="nC"><option value="Docente">Docente</option><option value="Obrero">Obrero</option><option value="Administrativo">Administrativo</option><option value="Vigilante">Vigilante</option></select>
        <button class="btn btn-verde" onclick="alta()">DAR DE ALTA</button>
        
        <label>Baja de Personal:</label>
        <select id="sBaja"></select>
        <button class="btn btn-rojo" onclick="baja()">ELIMINAR DEFINITIVO</button>

        <hr>
        <h4 style="color:var(--rojo);">⚠️ Área Crítica</h4>
        <button class="btn btn-rojo" style="opacity:0.7;" onclick="limpiarLista()">LIMPIAR TODO EL HISTORIAL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const hoy = new Date().toISOString().split('T')[0];
    let nomina = [];

    // CARGA DE DATOS
    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sPersona'), sB = document.getElementById('sBaja');
        sP.innerHTML = sB.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            const d = doc.data(); d.id = doc.id; nomina.push(d);
            const opt = `<option value="${d.n}">${d.n}</option>`;
            sP.innerHTML += opt; sB.innerHTML += opt;
        });
        actualizarUI();
    });

    // LÓGICA DE AUDITORÍA (FALTAS Y PERMISOS)
    async function verificarAuditoria(n) {
        if(!n) { document.getElementById('visor').style.display='none'; return; }
        const visor = document.getElementById('visor'); visor.style.display='block';
        const hace30 = Date.now() - (30*24*60*60*1000);
        
        const snap = await db.collection("asistencia_ebnlp_final").where("n","==",n).where("ts",">=",hace30).get();
        let f=0, p=0;
        snap.forEach(doc => {
            if(doc.data().e === "INASISTENCIA") f++;
            if(doc.data().e === "PERMISO PERSONAL") p++;
        });

        let html = `<b>Resumen 30 días:</b><br>❌ Inasistencias: ${f}/3<br>📝 Permisos: ${p}/3`;
        if(f>=3 || p>=3) html += `<span class="alerta-critica">⚠️ ALERTA: HA ALCANZADO EL LÍMITE PERMITIDO.</span>`;
        document.getElementById('infoAuditoria').innerHTML = html;
    }

    async function guardar() {
        const n = document.getElementById('sPersona').value, h = document.getElementById('hEntrada').value, e = document.getElementById('sEstatus').value;
        const p = nomina.find(x => x.n === n);
        if(!n) return;
        await db.collection("asistencia_ebnlp_final").add({ n, c:p.c, h:h||"--", e, f:hoy, ts:Date.now(), mes:hoy.substring(0,7) });
        alert("✅ Registro exitoso");
    }

    // BOTÓN DE LIMPIEZA (FUNCIÓN DE BORRADO MASIVO)
    async function limpiarLista() {
        if(!confirm("¿ESTÁ SEGURO? Se borrarán todos los registros de asistencia de forma permanente.")) return;
        const snap = await db.collection("asistencia_ebnlp_final").get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        alert("Historial vaciado correctamente.");
    }

    function actualizarUI() {
        db.collection("asistencia_ebnlp_final").where("f","==",hoy).onSnapshot(snap => {
            const bHoy = document.getElementById('bHoy');
            let r=0, p=0; bHoy.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data(); 
                if(d.e==="ASISTENCIA") p++;
                bHoy.innerHTML += `<tr><td>${d.n}</td><td>${d.e}</td><td>${d.h}</td><td>${d.c}</td></tr>`;
            });
            document.getElementById('pTotal').innerText = nomina.length > 0 ? Math.round((p/nomina.length)*100)+"%" : "0%";
        });
    }

    async function alta() {
        const n = document.getElementById('nN').value.toUpperCase().trim(), c = document.getElementById('nC').value;
        if(n) await db.collection("nomina_institucional").add({ n, c, t:"MAÑANA", g:"A" });
        document.getElementById('nN').value = "";
    }

    async function baja() {
        const n = document.getElementById('sBaja').value;
        const p = nomina.find(x => x.n === n);
        if(p && confirm(`¿Retirar a ${n} de nómina?`)) await db.collection("nomina_institucional").doc(p.id).delete();
    }

    async function pdf(tipo) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("E.B.N. LUCILA PALACIOS - REPORTE", 105, 15, { align: "center" });
        const data = [];
        const snap = await db.collection("asistencia_ebnlp_final").get();
        snap.forEach(d => { if(tipo==='hoy'?d.data().f===hoy:true) data.push([d.data().n, d.data().f, d.data().e, d.data().c]); });
        doc.autoTable({ head: [['Nombre', 'Fecha', 'Estatus', 'Cargo']], body: data, startY: 25 });
        doc.save(`Reporte_${tipo}.pdf`);
    }
</script>
</body>
</html>
