<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EBNLP 2026 - MODO OFFLINE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: var(--azul); border-bottom: 2px solid var(--naranja); padding-bottom: 5px; font-size: 14px; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: white; padding: 10px; border-radius: 8px; text-align: center; border-top: 4px solid var(--azul); }
        .stat-box p { font-size: 22px; font-weight: bold; margin: 5px 0; color: var(--azul); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: var(--azul); color: white; padding: 8px; border: 1px solid #ddd; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        .visor-auditoria { background: #fff3e0; border-left: 5px solid var(--naranja); padding: 10px; margin: 10px 0; display: none; border-radius: 5px; font-size: 12px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; text-align: center; display: block; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }
        .btn-rojo { background: var(--rojo); }
        .btn-pdf { background: #e74c3c; }
        .hidden { display: none; }
        input[type="date"] { border: 2px solid var(--naranja); font-weight: bold; background: #fffbe6; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-size:18px;">E.B.N. "LUCILA PALACIOS"</h2>
    <p style="margin:2px 0 0; font-size:11px; opacity:0.9;">Control de Asistencia Protegido (2026)</p>
</header>

<div class="card stats-grid">
    <div class="stat-box"><h4>ASISTENCIA HOY</h4><p id="pTotal">0%</p></div>
    <div class="stat-box"><h4>RETRASOS</h4><p id="rTotal" style="color:var(--rojo);">0</p></div>
</div>

<div class="card">
    <h3>📝 Registro de Marcaje</h3>
    
    <label style="font-size: 11px; font-weight: bold;">FECHA DE REGISTRO (Verificar si no hay internet):</label>
    <input type="date" id="fManual">

    <label style="margin-top:10px; display:block;">Trabajador:</label>
    <select id="sPersona" onchange="auditar(this.value)"></select>
    
    <div id="visor" class="visor-auditoria"><div id="infoAuditoria"></div></div>
    
    <label style="margin-top:10px; display:block;">Estatus:</label>
    <select id="sEstatus">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="INASISTENCIA">INASISTENCIA ❌</option>
        <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
        <option value="VACACIONES">VACACIONES 🌴</option>
    </select>
    
    <label style="margin-top:10px; display:block;">Hora:</label>
    <input type="time" id="hEntrada">
    
    <button class="btn btn-verde" onclick="guardar()">GUARDAR REGISTRO</button>
</div>

<div class="card">
    <h3>📋 Lista Visual de Hoy</h3>
    <button class="btn btn-azul" style="background:#5d6d7e; margin-bottom:10px;" onclick="limpiarListaVisual()">LIMPIAR PANTALLA (VISTA)</button>
    <table id="tHoy">
        <thead><tr><th>Nombre</th><th>Estatus</th><th>Hora</th><th>Cargo</th></tr></thead>
        <tbody id="bHoy"></tbody>
    </table>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top:10px;">
        <button class="btn btn-pdf" onclick="exportarPDF('hoy')">PDF DIARIO</button>
        <button class="btn btn-pdf" style="background:#943126" onclick="exportarPDF('mes')">PDF MENSUAL</button>
    </div>
</div>

<div class="card">
    <button class="btn btn-azul" onclick="document.getElementById('pAdmin').classList.toggle('hidden')">⚙️ GESTIÓN DE NÓMINA</button>
    <div id="pAdmin" class="hidden">
        <input type="text" id="nN" placeholder="Nombre Completo">
        <select id="nC"><option value="Docente">Docente</option><option value="Obrero">Obrero</option><option value="Administrativo">Administrativo</option><option value="Vigilante">Vigilante</option></select>
        <button class="btn btn-verde" onclick="alta()">ALTA TRABAJADOR</button>
        <hr>
        <select id="sBaja"></select>
        <button class="btn btn-rojo" onclick="baja()">BAJA TRABAJADOR</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ACTIVAR PERSISTENCIA (Sigue funcionando sin internet)
    db.enablePersistence().catch(err => console.error("Error persistencia:", err.code));

    // Inicializar fecha de hoy en el calendario manual
    const hoyInput = new Date().toISOString().split('T')[0];
    document.getElementById('fManual').value = hoyInput;

    let nomina = [];
    let bloqueado = false;

    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sPersona'), sB = document.getElementById('sBaja');
        sP.innerHTML = sB.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            const d = doc.data(); d.id = doc.id; nomina.push(d);
            const opt = `<option value="${d.n}">${d.n}</option>`;
            sP.innerHTML += opt; sB.innerHTML += opt;
        });
        if(!bloqueado) actualizarUI();
    });

    async function auditar(n) {
        if(!n) { document.getElementById('visor').style.display='none'; return; }
        const visor = document.getElementById('visor'); visor.style.display='block';
        const hace30 = Date.now() - (30*24*60*60*1000);
        const snap = await db.collection("asistencia_ebnlp_final").where("n","==",n).where("ts",">=",hace30).get();
        let f=0, p=0;
        snap.forEach(doc => { if(doc.data().e === "INASISTENCIA") f++; if(doc.data().e === "PERMISO PERSONAL") p++; });
        document.getElementById('infoAuditoria').innerHTML = `30 días: <b>${f}/3 Faltas</b> | <b>${p}/3 Permisos</b>`;
    }

    async function guardar() {
        const n = document.getElementById('sPersona').value, h = document.getElementById('hEntrada').value, e = document.getElementById('sEstatus').value;
        const fRegistro = document.getElementById('fManual').value; // Toma la fecha del input manual
        const p = nomina.find(x => x.n === n);
        if(!n || !fRegistro) return alert("Falta nombre o fecha");
        
        bloqueado = false;
        await db.collection("asistencia_ebnlp_final").add({ 
            n, c:p.c, h:h||"--", e, f:fRegistro, ts:Date.now(), mes:fRegistro.substring(0,7) 
        });
        alert("Registro guardado (Incluso si no hay internet)");
    }

    function limpiarListaVisual() {
        if(confirm("¿Limpiar pantalla? (No borra la base de datos)")) {
            document.getElementById('bHoy').innerHTML = "";
            bloqueado = true;
        }
    }

    function actualizarUI() {
        const fBusqueda = document.getElementById('fManual').value;
        db.collection("asistencia_ebnlp_final").where("f","==",fBusqueda).onSnapshot(snap => {
            if(bloqueado) return;
            const bHoy = document.getElementById('bHoy');
            let r=0, p=0; bHoy.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                if(d.e==="ASISTENCIA") p++;
                bHoy.innerHTML += `<tr><td>${d.n}</td><td>${d.e}</td><td>${d.h}</td><td>${d.c}</td></tr>`;
            });
            document.getElementById('pTotal').innerText = nomina.length > 0 ? Math.round((p/nomina.length)*100)+"%" : "0%";
        });
    }

    async function exportarPDF(tipo) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const fPDF = document.getElementById('fManual').value;
        doc.text("E.B.N. LUCILA PALACIOS - REPORTE", 105, 15, { align: "center" });
        const data = [];
        const query = (tipo==='hoy') ? db.collection("asistencia_ebnlp_final").where("f","==",fPDF) : db.collection("asistencia_ebnlp_final").where("mes","==",fPDF.substring(0,7));
        const snap = await query.get();
        snap.forEach(d => data.push([d.data().n, d.data().f, d.data().e, d.data().c]));
        doc.autoTable({ head: [['Nombre', 'Fecha', 'Estatus', 'Cargo']], body: data, startY: 25 });
        doc.save(`EBNLP_${tipo}_${fPDF}.pdf`);
    }

    // Funciones básicas de alta/baja (se mantienen)
    async function alta() {
        const n = document.getElementById('nN').value.toUpperCase().trim(), c = document.getElementById('nC').value;
        if(n) await db.collection("nomina_institucional").add({ n, c, t:"MAÑANA", g:"A" });
        document.getElementById('nN').value = "";
    }
    async function baja() {
        const n = document.getElementById('sBaja').value;
        const p = nomina.find(x => x.n === n);
        if(p && confirm(`¿Eliminar a ${n}?`)) await db.collection("nomina_institucional").doc(p.id).delete();
    }
</script>
</body>
</html>
