<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP - SISTEMA MAESTRO 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 40px; color: #333; }
        
        /* 1. CABECERA CON LOGO VECTORIAL (NUNCA FALLA) */
        header { background: var(--azul); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }
        .logo-box { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--naranja); overflow: hidden; }
        
        /* 2. ESTADÍSTICAS */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid var(--azul); }
        .stat-card p { font-size: 24px; font-weight: bold; margin: 5px 0; }

        /* 3. DISGREGACIÓN Y VIGILANCIA */
        .info-box { background: white; margin: 0 15px 15px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cargo-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 13px; }
        .vigi-tag { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 10px; border: 1px solid #ddd; }
        .activa { background: #fff3e0; color: #e67e22; border: 2px solid var(--naranja); }

        /* 4. FORMULARIO */
        .card { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        label { font-size: 11px; font-weight: bold; color: var(--azul); display: block; margin-top: 10px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 5. TABLA Y RETRASOS (REFORZADO) */
        .retraso-fila { background-color: #ffcdd2 !important; color: #b71c1c !important; font-weight: bold; }
        .badge-r { background: var(--rojo); color: white; padding: 3px 6px; border-radius: 4px; font-size: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th { background: var(--azul); color: white; padding: 12px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <svg viewBox="0 0 100 100" width="60" height="60">
            <circle cx="50" cy="50" r="45" fill="#0c234a" />
            <path d="M30 70 L50 30 L70 70" stroke="white" stroke-width="5" fill="none"/>
            <text x="50" y="85" font-size="12" fill="white" text-anchor="middle" font-family="Arial">EBNLP</text>
        </svg>
    </div>
    <h2 style="margin:0;">E.B.N. "LUCILA PALACIOS"</h2>
    <p style="margin:0; font-size:11px; opacity:0.8;">Control de Personal v2026.1</p>
</header>

<div class="stats">
    <div class="stat-card"><h4>Asistencia %</h4><p id="txtPor">0%</p></div>
    <div class="stat-card"><h4>Retrasos</h4><p id="txtRet" style="color:var(--rojo);">0</p></div>
</div>

<div class="info-box">
    <strong>📊 DISGREGACIÓN DE CARGOS:</strong>
    <div id="listaCargos" style="margin-top:10px;"></div>
    <div id="vA" class="vigi-tag">GRUPO A: Osmil, Daher, Pedro, Moises</div>
    <div id="vB" class="vigi-tag">GRUPO B: Cesar, Juan, Guillermo, Darwin, Joseyver</div>
</div>

<div class="card">
    <label>Trabajador:</label>
    <select id="selNom" onchange="actualizarDato()"><option value="">Cargando nómina...</option></select>
    
    <div style="display:flex; gap:10px">
        <input type="text" id="resCargo" placeholder="Cargo" readonly style="background:#f0f0f0">
        <input type="text" id="resTurno" placeholder="Turno" readonly style="background:#f0f0f0">
    </div>

    <label><b>HORA DE ENTRADA (MANUAL):</b></label>
    <input type="time" id="hManual">

    <label>Estatus:</label>
    <select id="eAdmin">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="VACACIONES">VACACIONES 🌴</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
        <option value="PERMISO">PERMISO 📝</option>
        <option value="FALTA">INASISTENCIA ❌</option>
    </select>

    <button class="btn" style="background:var(--verde)" onclick="guardar()">REGISTRAR MARCAJE</button>
</div>

<div class="card">
    <button class="btn" style="background:var(--azul); font-size:11px;" onclick="document.getElementById('admin').classList.toggle('hidden')">⚙️ INGRESOS / EGRESOS</button>
    <div id="admin" class="hidden" style="margin-top:15px; border-top:1px solid #eee;">
        <label>Nombre:</label> <input type="text" id="newN">
        <label>Cargo:</label>
        <select id="newC">
            <option value="Docente">Docente</option><option value="Obrero">Obrero</option>
            <option value="Administrativo">Administrativo</option><option value="Cocinera">Cocinera</option>
            <option value="Vigilante">Vigilante</option>
        </select>
        <label>Turno:</label>
        <select id="newT"><option value="MAÑANA">Mañana</option><option value="TARDE">Tarde</option></select>
        <button class="btn" style="background:var(--azul)" onclick="dbAccion('ADD')">Dar de Alta</button>
        <hr>
        <label>Eliminar de Nómina:</label>
        <select id="delN"></select>
        <button class="btn" style="background:var(--rojo)" onclick="dbAccion('DEL')">Dar de Baja</button>
    </div>
</div>

<div class="card" style="overflow-x:auto">
    <button class="btn" style="background:#546e7a" onclick="exportar()">📥 EXPORTAR EXCEL</button>
    <table id="tablaExcel">
        <thead><tr><th>NOMBRE</th><th>HORA</th><th>ESTATUS</th><th>CARGO</th></tr></thead>
        <tbody id="cuerpo">
            <tr><td colspan="4">Conectando con la base de datos...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // 1. CONFIGURACIÓN FIREBASE (Tus credenciales)
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Obtener fecha hoy en formato estable YYYY-MM-DD
    const d = new Date();
    const hoy = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');

    // 2. LÓGICA DE RETRASOS
    function esRetraso(cargo, turno, hora) {
        const [h, m] = hora.split(':').map(Number);
        const min = h * 60 + m;
        if (turno === "MAÑANA") {
            if ((cargo === "Docente" || cargo === "Cocinera") && min > 420) return "RETRASO"; // 7:00
            if ((cargo === "Obrero" || cargo === "Administrativo") && min > 405) return "RETRASO"; // 6:45
        } else {
            if (cargo === "Docente" && min > 720) return "RETRASO"; // 12:00
            if (cargo === "Obrero" && min > 690) return "RETRASO"; // 11:30
        }
        return "ASISTENCIA";
    }

    // 3. CARGA DE NÓMINA
    let nominaLocal = [];
    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nominaLocal = [];
        const sel = document.getElementById('selNom'), del = document.getElementById('delN');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        del.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            const data = doc.data(); data.id = doc.id;
            nominaLocal.push(data);
            const opt = `<option value="${data.n}">${data.n}</option>`;
            sel.innerHTML += opt; del.innerHTML += opt;
        });
        actualizarUI();
    });

    function actualizarDato() {
        const p = nominaLocal.find(x => x.n === document.getElementById('selNom').value);
        if(p) { document.getElementById('resCargo').value = p.c; document.getElementById('resTurno').value = p.t; }
    }

    async function dbAccion(tipo) {
        if(tipo === 'ADD') {
            const n = document.getElementById('newN').value.toUpperCase();
            if(!n) return alert("Escriba el nombre");
            await db.collection("nomina_institucional").add({n, c: document.getElementById('newC').value, t: document.getElementById('newT').value});
            document.getElementById('newN').value = "";
        } else {
            const p = nominaLocal.find(x => x.n === document.getElementById('delN').value);
            if(p && confirm("¿Eliminar?")) await db.collection("nomina_institucional").doc(p.id).delete();
        }
    }

    // 4. GUARDAR REGISTRO
    async function guardar() {
        const n = document.getElementById('selNom').value, h = document.getElementById('hManual').value;
        const c = document.getElementById('resCargo').value, t = document.getElementById('resTurno').value;
        let e = document.getElementById('eAdmin').value;

        if(!n || !h) return alert("Complete Nombre y Hora");
        if(e === "ASISTENCIA") e = esRetraso(c, t, h);

        await db.collection("asistencia_ebnlp_final").add({ n, c, t, h, e, f: hoy, ts: Date.now() });
        alert("Guardado: " + e);
    }

    // 5. ACTUALIZAR TABLA Y ESTADÍSTICAS EN TIEMPO REAL
    function actualizarUI() {
        db.collection("asistencia_ebnlp_final").where("f", "==", hoy).orderBy("ts", "desc").onSnapshot(snap => {
            const cuerpo = document.getElementById('cuerpo');
            const res = { Docente:0, Obrero:0, Administrativo:0, Cocinera:0, Vigilante:0 };
            let rCant = 0, pCant = 0;
            cuerpo.innerHTML = "";

            if(snap.empty) { cuerpo.innerHTML = '<tr><td colspan="4">Sin registros el día de hoy</td></tr>'; }

            snap.forEach(doc => {
                const d = doc.data();
                const r = d.e === "RETRASO";
                if(r) rCant++;
                if(d.e === "ASISTENCIA" || r) { pCant++; res[d.c]++; }

                cuerpo.innerHTML += `
                    <tr class="${r ? 'retraso-fila' : ''}">
                        <td>${d.n}</td>
                        <td>${d.h}</td>
                        <td>${r ? '<span class="badge-r">RETRASO</span>' : d.e}</td>
                        <td>${d.c}</td>
                    </tr>`;
            });

            // Disgregación
            let disgHTML = "";
            ["Docente", "Obrero", "Administrativo", "Cocinera", "Vigilante"].forEach(cargo => {
                const tot = nominaLocal.filter(x => x.c === cargo).length;
                disgHTML += `<div class="cargo-row"><span>${cargo}s:</span> <b>${res[cargo]}/${tot}</b></div>`;
            });
            document.getElementById('listaCargos').innerHTML = disgHTML;

            // Vigilancia (Cambio cada 24h)
            const diff = Math.floor((new Date() - new Date("2026-03-02")) / 86400000);
            const turno = (diff % 2 === 0) ? "A" : "B";
            document.getElementById('vA').className = (turno === "A") ? "vigi-tag activa" : "vigi-tag";
            document.getElementById('vB').className = (turno === "B") ? "vigi-tag activa" : "vigi-tag";

            document.getElementById('txtRet').innerText = rCant;
            document.getElementById('txtPor').innerText = nominaLocal.length > 0 ? Math.round((pCant/nominaLocal.length)*100)+"%" : "0%";
        });
    }

    function exportar() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tablaExcel')), `Reporte_${hoy}.xlsx`); }
</script>
</body>
</html>
