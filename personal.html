<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EBNLP 2026 - Control Maestro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 15px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* ESTADISTICAS */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #fff; padding: 15px; border-radius: 8px; text-align: center; border-top: 4px solid var(--azul); }
        .stat-box h4 { margin: 0; font-size: 12px; color: #666; }
        .stat-box p { margin: 5px 0 0; font-size: 22px; font-weight: bold; color: var(--azul); }

        /* TABLAS */
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th { background: var(--azul); color: white; padding: 8px; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        .fila-retraso { background-color: #ffcdd2 !important; color: #b71c1c; font-weight: bold; }
        .badge-retraso { background: var(--rojo); color: white; padding: 2px 5px; border-radius: 4px; font-size: 10px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">E.B.N. "LUCILA PALACIOS"</h2>
    <p style="margin:5px 0 0; font-size:12px;">Reporte Estadístico Mensual y Diario</p>
</header>

<div class="card grid-stats">
    <div class="stat-box">
        <h4>ASISTENCIA TOTAL HOY</h4>
        <p id="totalPorcentaje">0%</p>
    </div>
    <div class="stat-box">
        <h4>TOTAL RETRASOS</h4>
        <p id="totalRetrasos" style="color:var(--rojo);">0</p>
    </div>
</div>

<div class="card">
    <h3 style="margin-top:0; color:var(--azul); font-size:16px;">📊 Estadística Mensual del Personal</h3>
    <table id="tablaMensual">
        <thead>
            <tr>
                <th>Cargo</th>
                <th>Asistencias</th>
                <th>Retrasos</th>
                <th>Faltas</th>
                <th>% Mensual</th>
            </tr>
        </thead>
        <tbody id="cuerpoMensual">
            </tbody>
    </table>
</div>

<div class="card">
    <label style="font-weight:bold; font-size:12px;">Registrar Entrada:</label>
    <select id="selNom" style="width:100%; padding:10px; margin-top:5px;"></select>
    <input type="time" id="hIn" style="width:100%; padding:10px; margin-top:10px; box-sizing:border-box;">
    <button class="btn btn-verde" onclick="guardar()">GUARDAR ASISTENCIA</button>
</div>

<div class="card">
    <h3 style="margin-top:0; color:var(--azul); font-size:16px;">📋 Lista de Hoy</h3>
    <table id="tablaDiaria">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Hora</th>
                <th>Estatus</th>
                <th>Cargo</th>
            </tr>
        </thead>
        <tbody id="cuerpoDiario"></tbody>
    </table>
    <button class="btn btn-azul" onclick="descargar()">EXPORTAR REPORTE EXCEL</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const hoy = new Date().toISOString().split('T')[0];
    const mesActual = new Date().getMonth() + 1;

    let nomina = [];

    // 1. CARGAR NÓMINA Y LIMPIAR SELECT
    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        const sel = document.getElementById('selNom');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            nomina.push(doc.data());
            sel.innerHTML += `<option value="${doc.data().n}">${doc.data().n}</option>`;
        });
        obtenerEstadisticaMensual();
    });

    // 2. REPORTE DIARIO: SE LIMPIA EL CUERPO ANTES DE LLENAR PARA EVITAR REPETIDOS
    db.collection("asistencia_ebnlp_final").where("f", "==", hoy).onSnapshot(snap => {
        const cuerpo = document.getElementById('cuerpoDiario');
        cuerpo.innerHTML = ""; // <--- AQUÍ SE CORRIGE EL ERROR DE REPETIDOS
        
        let rTotal = 0;
        let pTotal = 0;

        snap.forEach(doc => {
            const d = doc.data();
            const esR = d.e === "RETRASO";
            if(esR) rTotal++;
            pTotal++;

            cuerpo.innerHTML += `
                <tr class="${esR ? 'fila-retraso' : ''}">
                    <td>${d.n}</td>
                    <td>${d.h}</td>
                    <td>${esR ? '<span class="badge-retraso">RETRASO</span>' : d.e}</td>
                    <td>${d.c}</td>
                </tr>`;
        });

        document.getElementById('totalRetrasos').innerText = rTotal;
        const porcHoy = nomina.length > 0 ? Math.round((pTotal / nomina.length) * 100) : 0;
        document.getElementById('totalPorcentaje').innerText = porcHoy + "%";
    });

    // 3. ESTADÍSTICA MENSUAL DISGREGADA
    async function obtenerEstadisticaMensual() {
        // En un sistema real, aquí filtrarías por mes. Para este ejemplo, procesamos la colección.
        const snap = await db.collection("asistencia_ebnlp_final").get();
        const stats = {
            Docente: { a:0, r:0, f:0 },
            Obrero: { a:0, r:0, f:0 },
            Administrativo: { a:0, r:0, f:0 },
            Cocinera: { a:0, r:0, f:0 },
            Vigilante: { a:0, r:0, f:0 }
        };

        snap.forEach(doc => {
            const d = doc.data();
            if(stats[d.c]) {
                if(d.e === "RETRASO") stats[d.c].r++;
                else if(d.e === "ASISTENCIA") stats[d.c].a++;
                else stats[d.c].f++;
            }
        });

        const cuerpoM = document.getElementById('cuerpoMensual');
        cuerpoM.innerHTML = "";
        
        for (const cargo in stats) {
            const totalCargo = nomina.filter(x => x.c === cargo).length;
            const asistencias = stats[cargo].a + stats[cargo].r;
            // Cálculo simple de porcentaje mensual basado en la proporción de asistencias
            const porcM = asistencias > 0 ? Math.round((asistencias / (asistencias + stats[cargo].f)) * 100) : 0;

            cuerpoM.innerHTML += `
                <tr>
                    <td>${cargo}s</td>
                    <td>${stats[cargo].a}</td>
                    <td style="color:red">${stats[cargo].r}</td>
                    <td>${stats[cargo].f}</td>
                    <td style="font-weight:bold">${porcM}%</td>
                </tr>`;
        }
    }

    async function guardar() {
        const n = document.getElementById('selNom').value;
        const h = document.getElementById('hIn').value;
        const p = nomina.find(x => x.n === n);
        if(!n || !h) return alert("Seleccione nombre y hora");

        // Lógica de retraso automática
        let e = "ASISTENCIA";
        const hFull = parseInt(h.replace(":",""));
        if(p.t === "MAÑANA" && hFull > 700) e = "RETRASO";
        if(p.t === "TARDE" && hFull > 1200) e = "RETRASO";

        await db.collection("asistencia_ebnlp_final").add({
            n: n, c: p.c, t: p.t, h: h, e: e, f: hoy, ts: Date.now()
        });
        alert("Guardado");
    }

    function descargar() {
        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tablaDiaria')), `Asistencia_${hoy}.xlsx`);
    }
</script>
</body>
</html>
