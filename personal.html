<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA LUCILA PALACIOS - V9.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --verde: #1d6f42; --rojo: #850000; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 5px; border-bottom: 4px solid var(--naranja); }
        
        .dashboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; background: #fff; }
        .dash-card { border: 1px solid #ddd; padding: 5px; border-radius: 4px; text-align: center; border-bottom: 3px solid var(--azul); }
        .dash-card h4 { margin: 0; font-size: 0.6rem; color: #666; }
        .dash-card .valor { font-size: 1rem; font-weight: bold; color: var(--azul); }

        .tabs { display: flex; gap: 2px; padding: 5px; background: #fff; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; border-radius: 4px; font-weight: bold; background: #eee; cursor: pointer; font-size: 0.65rem; }
        .tab-btn.active { background: var(--naranja); color: white; }

        .controles { display: flex; gap: 10px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .controles input, .controles select { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; }

        .cargo-section { margin: 10px; background: white; border-radius: 8px; border: 1px solid #ccc; overflow: hidden; }
        .cargo-title { background: var(--azul); color: white; padding: 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; }
        
        /* Ajuste para que el contenido inicie oculto */
        .cargo-content { display: none; padding: 10px; }
        .cargo-content.open { display: block; }

        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }
        .ficha { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-size: 0.75rem; }
        
        .btn-check { width: 100%; padding: 6px; margin: 2px 0; border: none; border-radius: 4px; cursor: pointer; font-size: 0.65rem; font-weight: bold; }
        .btn-asis { background: #d4edda; color: #155724; }
        .btn-ret { background: #fff3cd; color: #856404; }

        .sub-t { background: var(--naranja); color: white; padding: 10px; margin: 10px; border-radius: 5px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }
        .table-wrap { overflow-x: auto; background: white; border-radius: 8px; margin: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        th { background: #444; color: white; padding: 8px; border: 1px solid #555; }
        td { padding: 8px; border: 1px solid #eee; text-align: center; }
        
        /* Estilo para las filas de TOTAL */
        .fila-total { background: #eef2f7; font-weight: bold; color: #000; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header><h4>SISTEMA CONTROL - LUCILA PALACIOS</h4></header>

<div class="dashboard">
    <div class="dash-card"><h4>DOC</h4><div id="dDoc" class="valor">0</div></div>
    <div class="dash-card"><h4>OBR</h4><div id="dObr" class="valor">0</div></div>
    <div class="dash-card"><h4>ADM</h4><div id="dAdm" class="valor">0</div></div>
    <div class="dash-card"><h4>CNAE</h4><div id="dCnae" class="valor">0</div></div>
    <div class="dash-card"><h4>VIG</h4><div id="dVig" class="valor">0</div></div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="verTab('tabEscuela', this)">ESCUELA</button>
    <button class="tab-btn" onclick="verTab('tabVigilancia', this)">VIGILANCIA</button>
    <button class="tab-btn" onclick="verTab('tabEstadistica', this)">ESTADÍSTICA</button>
    <button class="tab-btn" onclick="verTab('tabNomina', this)">NÓMINA</button>
</div>

<div id="tabEscuela" class="tab-content">
    <div class="controles">
        <input type="date" id="fechaEscuela" onchange="actualizarTodo()">
        <select id="turnoEscuela" onchange="actualizarTodo()">
            <option value="MAÑANA">MAÑANA</option>
            <option value="TARDE">TARDE</option>
        </select>
    </div>
    <div id="contEscuela"></div>
    <div class="sub-t">LISTA DIARIA - ESTATUS Y OBSERVACIONES</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Nombre</th><th>Estatus</th><th>Entrada/Salida</th><th>Obs</th></tr></thead>
            <tbody id="resumenEscuela"></tbody>
        </table>
    </div>
</div>

<div id="tabEstadistica" class="tab-content hidden">
    <div class="controles">
        <input type="month" id="mesReporte" style="flex:2">
        <button onclick="generarEstadistica()" style="background:var(--azul); color:white; border:none; padding:10px; border-radius:5px; flex:1;">CALCULAR</button>
        <button onclick="exportarExcel()" style="background:var(--verde); color:white; border:none; padding:10px; border-radius:5px; flex:1;">EXCEL</button>
    </div>

    <div class="sub-t">PROMEDIO REAL DISGREGADO (POR GÉNERO Y TOTAL)</div>
    <div class="table-wrap">
        <table id="tablaPromedio">
            <thead><tr><th>CARGO</th><th>GEN</th><th>NÓM</th><th>ASIS</th><th>PROM REAL</th><th>% EFEC</th></tr></thead>
            <tbody id="bodyPromedio"></tbody>
        </table>
    </div>
</div>

<script>
    // Configuración Firebase (Usando la tuya)
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nomina = [];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        snap.forEach(doc => { let d = doc.data(); d.id = doc.id; nomina.push(d); });
        actualizarTodo();
    });

    async function actualizarTodo() {
        const f = document.getElementById('fechaEscuela').value || new Date().toISOString().split('T')[0];
        const t = document.getElementById('turnoEscuela').value;
        dibujarSeccion("contEscuela", ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)"], f, "resumenEscuela", null, t);
    }

    async function dibujarSeccion(id, cargos, f, resId, g, t) {
        const snap = await db.collection("asistencia_ebnlp_final").where("f", "==", f).get();
        const marcados = {}; snap.forEach(d => marcados[d.data().n] = d.data());
        
        const cont = document.getElementById(id); cont.innerHTML = "";

        cargos.forEach(cargo => {
            let list = nomina.filter(p => p.c === cargo);
            let sec = document.createElement('div'); sec.className = "cargo-section";
            
            // Título con función para abrir/cerrar
            sec.innerHTML = `
                <div class="cargo-title" onclick="toggleAcordeon(this)">
                    <span>${cargo.toUpperCase()} (${list.length})</span> <span>▼</span>
                </div>`;
            
            let contentDiv = document.createElement('div'); 
            contentDiv.className = "cargo-content"; // Inicia oculto por CSS
            
            let grid = document.createElement('div'); 
            grid.className = "grid-fichas";
            
            list.forEach(p => {
                let m = marcados[p.n];
                let fch = document.createElement('div'); fch.className = "ficha";
                if(!m) {
                    fch.innerHTML = `<b>${p.n}</b><br><button class="btn-check btn-asis" onclick="registrar('${p.n}','ASISTENCIA','${f}','${t}')">MARCAR</button>`;
                } else {
                    fch.innerHTML = `<b>${p.n}</b><br><b style="color:green">✓ ${m.e}</b>`;
                }
                grid.appendChild(fch);
            });
            
            contentDiv.appendChild(grid);
            sec.appendChild(contentDiv);
            cont.appendChild(sec);
        });
    }

    // Función corregida para el desplegable
    function toggleAcordeon(elemento) {
        const contenido = elemento.nextElementSibling;
        contenido.classList.toggle('open');
    }

    async function generarEstadistica() {
        const mes = document.getElementById('mesReporte').value;
        if(!mes) return;
        const snap = await db.collection("asistencia_ebnlp_final").where("mes", "==", mes).get();
        const asistencias = snap.docs.map(d => d.data());

        const bProm = document.getElementById('bodyPromedio'); bProm.innerHTML = "";

        ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)", "Vigilante"].forEach(cargo => {
            let cargoNomina = nomina.filter(p => p.c === cargo);
            let totalNomCargo = 0;
            let totalAsisCargo = 0;
            let totalPromCargo = 0;

            ["F", "M"].forEach(gen => {
                let nFiltro = cargoNomina.filter(p => p.gender === gen);
                if(nFiltro.length > 0) {
                    let asis = asistencias.filter(a => a.c === cargo && a.gender === gen && (a.e === "ASISTENCIA" || a.e === "RETRASO")).length;
                    let prom = (asis / 20); // Suponiendo 20 días hábiles
                    
                    bProm.innerHTML += `
                        <tr>
                            <td>${cargo}</td><td>${gen}</td><td>${nFiltro.length}</td>
                            <td>${asis}</td><td>${prom.toFixed(2)}</td>
                            <td>${((prom/nFiltro.length)*100).toFixed(1)}%</td>
                        </tr>`;
                    
                    totalNomCargo += nFiltro.length;
                    totalAsisCargo += asis;
                    totalPromCargo += prom;
                }
            });

            // FILA DE TOTAL POR CARGO (Como en la foto)
            if(totalNomCargo > 0) {
                bProm.innerHTML += `
                    <tr class="fila-total">
                        <td>TOTAL ${cargo.toUpperCase()}</td><td>-</td><td>${totalNomCargo}</td>
                        <td>${totalAsisCargo}</td><td>${totalPromCargo.toFixed(2)}</td>
                        <td>${((totalPromCargo/totalNomCargo)*100).toFixed(1)}%</td>
                    </tr>`;
            }
        });
    }

    function verTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        btn.classList.add('active');
    }
</script>
</body>
</html>
