<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP 2026 - AUDITORÍA DE VENTANA MÓVIL</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* VISOR DE AUDITORÍA CRÍTICO */
        .visor-auditoria { background: #fff3cd; border: 2px solid #f39c12; padding: 15px; margin: 10px 0; border-radius: 8px; display: none; }
        .alerta-bloqueo { 
            background: var(--rojo); color: white; padding: 15px; border-radius: 5px; 
            font-weight: bold; text-align: center; margin-top: 10px; border: 3px solid #000;
            animation: parpadeo 0.8s infinite;
        }
        @keyframes parpadeo { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: #eee; padding: 10px; border: 1px solid #ddd; color: var(--azul); }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #fManual { border: 2px solid var(--naranja); background: #fffdf0; font-weight: bold; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-verde { background: var(--verde); }
        .btn-rojo { background: var(--rojo); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2>E.B.N. "LUCILA PALACIOS"</h2>
    <p>AUDITORÍA PROACTIVA: 30 DÍAS CONSECUTIVOS (SIN CORTE DE MES)</p>
</header>

<div class="card">
    <h3>📝 Registro y Control de Límites</h3>
    
    <label>FECHA DE REGISTRO:</label>
    <input type="date" id="fManual" onchange="recalcularTodo()">

    <label>Trabajador:</label>
    <select id="sPersona" onchange="auditoria30DiasReales(this.value)"></select>

    <div id="visor" class="visor-auditoria">
        <div id="informeDetallado"></div>
        <div id="alertaGrave" class="alerta-bloqueo hidden">⚠️ BLOQUEO: LÍMITE DE 3 EVENTOS ALCANZADO EN LA VENTANA DE 30 DÍAS</div>
    </div>

    <label>Estatus:</label>
    <select id="sEstatus">
        <option value="ASISTENCIA">ASISTENCIA ✅</option>
        <option value="INASISTENCIA">INASISTENCIA ❌</option>
        <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
    </select>
    
    <label>Hora de Entrada (7:00, 12:00, 6:00 Exactos):</label>
    <input type="time" id="hEntrada">
    
    <button id="btnGuardar" class="btn btn-verde" onclick="guardarRegistroFinal()">GUARDAR EN BASE DE DATOS</button>
</div>

<div class="card">
    <h3>📋 Verificación de Registros del Día</h3>
    <table id="tHoy">
        <thead><tr><th>Nombre</th><th>Estatus</th><th>Hora</th><th>Cargo</th></tr></thead>
        <tbody id="bHoy"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('fManual').value = new Date().toISOString().split('T')[0];
    let nomina = [];

    // Cargar Nómina
    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        const sP = document.getElementById('sPersona');
        sP.innerHTML = '<option value="">-- Seleccionar Trabajador --</option>';
        nomina = [];
        snap.forEach(doc => {
            nomina.push(doc.data());
            sP.innerHTML += `<option value="${doc.data().n}">${doc.data().n}</option>`;
        });
    });

    // FUNCIÓN DE AUDITORÍA DE VENTANA MÓVIL (30 días hacia atrás desde CUALQUIER fecha)
    async function auditoria30DiasReales(nombre) {
        if(!nombre) { document.getElementById('visor').style.display='none'; return; }
        document.getElementById('visor').style.display = 'block';

        // 1. Obtener la fecha seleccionada y restarle 30 días en milisegundos
        const fechaActualMili = new Date(document.getElementById('fManual').value + "T12:00:00").getTime();
        const treintaDiasEnMili = 30 * 24 * 60 * 60 * 1000;
        const puntoInicioBusqueda = fechaActualMili - treintaDiasEnMili;

        // 2. Buscar en Firebase registros del trabajador en ese rango
        const snap = await db.collection("asistencia_ebnlp_final")
                           .where("n", "==", nombre)
                           .where("ts", ">=", puntoInicioBusqueda) // Aquí está la clave: busca en los últimos 30 días reales
                           .where("ts", "<=", fechaActualMili)
                           .get();

        let inas = 0, perm = 0;
        snap.forEach(doc => {
            const e = doc.data().e;
            if(e === "INASISTENCIA") inas++;
            if(e === "PERMISO PERSONAL") perm++;
        });

        // 3. Mostrar resultados
        const info = document.getElementById('informeDetallado');
        info.innerHTML = `
            <strong>REPORTE DE 30 DÍAS CONSECUTIVOS:</strong><br>
            📅 Rango: Del ${new Date(puntoInicioBusqueda).toLocaleDateString()} al ${new Date(fechaActualMili).toLocaleDateString()}<br><br>
            ❌ Inasistencias: <b style="font-size:16px">${inas}</b> / 3<br>
            📝 Permisos Personales: <b style="font-size:16px">${perm}</b> / 3
        `;

        const alerta = document.getElementById('alertaGrave');
        const btn = document.getElementById('btnGuardar');

        if(inas >= 3 || perm >= 3) {
            alerta.classList.remove('hidden');
            btn.className = "btn btn-rojo";
            btn.innerText = "BLOQUEADO POR REGLAMENTO";
        } else {
            alerta.classList.add('hidden');
            btn.className = "btn btn-verde";
            btn.innerText = "GUARDAR EN BASE DE DATOS";
        }
        return { inas, perm };
    }

    async function guardarRegistroFinal() {
        const n = document.getElementById('sPersona').value;
        const f = document.getElementById('fManual').value;
        const h = document.getElementById('hEntrada').value;
        let e = document.getElementById('sEstatus').value;

        if(!n || !f) return alert("Complete Nombre y Fecha");

        // Re-auditar antes de guardar para evitar errores
        const auditoria = await auditoria30DiasReales(n);
        
        if((e === "INASISTENCIA" && auditoria.inas >= 3) || (e === "PERMISO PERSONAL" && auditoria.perm >= 3)) {
            alert("SISTEMA BLOQUEADO: El trabajador ya posee 3 registros de este tipo en los últimos 30 días consecutivos.");
            return;
        }

        const p = nomina.find(x => x.n === n);
        // Lógica de Retraso Estricta (Tolerancia Cero)
        if(e === "ASISTENCIA" && h) {
            const hn = parseInt(h.replace(":",""));
            if((p.t==="MAÑANA" && hn>700) || (p.t==="TARDE" && hn>1200) || (p.t==="VIGILANCIA DÍA" && hn>600) || (p.t==="VIGILANCIA NOCHE" && hn>1800)) e="RETRASO";
        }

        // GUARDADO CON TIMESTAMP (TS) PARA LA AUDITORÍA FUTURA
        await db.collection("asistencia_ebnlp_final").add({
            n, e, f, h: h || "--", ts: new Date(f + "T12:00:00").getTime(), c: p.c, t: p.t
        });

        alert("Registro guardado con éxito.");
        auditoria30DiasReales(n);
        recalcularTodo();
    }

    function recalcularTodo() {
        const f = document.getElementById('fManual').value;
        db.collection("asistencia_ebnlp_final").where("f","==",f).onSnapshot(snap => {
            const b = document.getElementById('bHoy');
            b.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                b.innerHTML += `<tr><td>${d.n}</td><td>${d.e}</td><td>${d.h}</td><td>${d.c}</td></tr>`;
            });
        });
        const n = document.getElementById('sPersona').value;
        if(n) auditoria30DiasReales(n);
    }
    recalcularTodo();
</script>
</body>
</html>
