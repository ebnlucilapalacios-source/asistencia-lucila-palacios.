<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EBNLP 2026 - CONTROL ADMINISTRATIVO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: var(--azul); border-bottom: 2px solid var(--naranja); padding-bottom: 5px; font-size: 15px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: white; padding: 10px; border-radius: 8px; text-align: center; border-top: 4px solid var(--azul); }
        .stat-box p { font-size: 24px; font-weight: bold; margin: 5px 0; color: var(--azul); }

        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: var(--azul); color: white; padding: 8px; border: 1px solid #ddd; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        .fila-retraso { background-color: #ffcdd2 !important; color: #b71c1c; font-weight: bold; }
        .alerta-limite { color: var(--rojo); font-weight: bold; font-size: 10px; display: block; margin-top: 5px; }

        label { display: block; font-weight: bold; margin-top: 8px; font-size: 11px; color: #444; }
        select, input { width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }
        .btn-rojo { background: var(--rojo); }
        .hidden { display: none; }

        .vigi-card { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 11px; text-align: center; background: #fafafa; margin-bottom: 5px; }
        .vigi-activa { border: 2px solid var(--naranja); background: #fff3e0; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h2>E.B.N. "LUCILA PALACIOS"</h2>
    <p>Gestión de Nómina, Permisos e Inasistencias 2026</p>
</header>

<div class="card stats-grid">
    <div class="stat-box"><h4>% ASISTENCIA</h4><p id="pTot">0%</p></div>
    <div class="stat-box"><h4>RETRASOS HOY</h4><p id="rTot" style="color:var(--rojo);">0</p></div>
</div>

<div class="card">
    <h3>🛡️ Vigilancia Interdiaria</h3>
    <div id="vA" class="vigi-card">GRUPO A: <span id="listA">...</span></div>
    <div id="vB" class="vigi-card">GRUPO B: <span id="listB">...</span></div>
</div>

<div class="card">
    <h3>📝 Registrar Asistencia o Novedad</h3>
    <label>Trabajador:</label>
    <select id="sPersonal" onchange="verificarLimites(this.value)"></select>
    <div id="msgLimites"></div>

    <label>Estatus / Novedad:</label>
    <select id="sEstatus">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
        <option value="REPOSO POR CUIDO">REPOSO POR CUIDO 👶</option>
        <option value="VACACIONES">VACACIONES 🌴</option>
        <option value="PERMISO PERSONAL">PERMISO PERSONAL (Máx 3) 📝</option>
        <option value="INASISTENCIA">INASISTENCIA (Máx 3) ❌</option>
    </select>

    <label>Hora (Si es Presente):</label>
    <input type="time" id="hEntrada">
    
    <button class="btn btn-verde" onclick="guardar()">GUARDAR REGISTRO</button>
</div>

<div class="card">
    <button class="btn btn-azul" onclick="document.getElementById('admin').classList.toggle('hidden')">⚙️ GESTIÓN DE PERSONAL Y TURNOS</button>
    <div id="admin" class="hidden" style="margin-top:15px; border-top:1px solid #ddd; padding-top:10px;">
        <h4>+ Nuevo Ingreso</h4>
        <input type="text" id="nN" placeholder="Nombre Completo">
        <select id="nC">
            <option value="Docente">Docente</option>
            <option value="Obrero">Obrero</option>
            <option value="Administrativo">Administrativo</option>
            <option value="Cocinera">Cocinera</option>
            <option value="Vigilante">Vigilante</option>
        </select>
        <select id="nT">
            <option value="MAÑANA">MAÑANA</option>
            <option value="TARDE">TARDE</option>
            <option value="VIGILANCIA DÍA">VIGILANCIA DÍA (6am-6pm)</option>
            <option value="VIGILANCIA NOCHE">VIGILANCIA NOCHE (6pm-6am)</option>
        </select>
        <button class="btn btn-verde" onclick="ingreso()">GUARDAR EN NÓMINA</button>

        <hr>
        <h4 style="color:var(--naranja);">🔄 Mover Vigilante de Grupo</h4>
        <select id="sVigi"></select>
        <select id="sGrupo"><option value="A">GRUPO A</option><option value="B">GRUPO B</option></select>
        <button class="btn btn-azul" onclick="moverVigi()">ACTUALIZAR GRUPO</button>

        <hr>
        <button class="btn btn-rojo" onclick="limpiar()">BORRAR TODO (MODO PRUEBA)</button>
    </div>
</div>

<div class="card">
    <h3>📋 Reporte Detallado - Hoy</h3>
    <table id="tableR">
        <thead><tr><th>Nombre</th><th>Hora</th><th>Estatus</th><th>Cargo</th></tr></thead>
        <tbody id="bodyR"></tbody>
    </table>
    <button class="btn btn-azul" onclick="descargar()">EXPORTAR EXCEL</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const hoy = new Date().toISOString().split('T')[0];
    let nomina = [];

    // CARGA DE DATOS
    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sPersonal'), sV = document.getElementById('sVigi');
        const lA = document.getElementById('listA'), lB = document.getElementById('listB');
        sP.innerHTML = sV.innerHTML = '<option value="">-- Seleccionar --</option>';
        let vA = [], vB = [];
        snap.forEach(doc => {
            const d = doc.data(); d.id = doc.id; nomina.push(d);
            sP.innerHTML += `<option value="${d.n}">${d.n}</option>`;
            if(d.c === "Vigilante") {
                sV.innerHTML += `<option value="${d.n}">${d.n}</option>`;
                (d.g === "B") ? vB.push(d.n) : vA.push(d.n);
            }
        });
        lA.innerText = vA.join(", "); lB.innerText = vB.join(", ");
        actualizar();
    });

    // VERIFICAR LÍMITES DE 30 DÍAS
    async function verificarLimites(nombre) {
        if(!nombre) return;
        const msg = document.getElementById('msgLimites');
        const hace30dias = Date.now() - (30 * 24 * 60 * 60 * 1000);
        
        const snap = await db.collection("asistencia_ebnlp_final")
            .where("n", "==", nombre)
            .where("ts", ">=", hace30dias)
            .get();

        let inasistencias = 0, permisos = 0;
        snap.forEach(doc => {
            if(doc.data().e === "INASISTENCIA") inasistencias++;
            if(doc.data().e === "PERMISO PERSONAL") permisos++;
        });

        let html = `<p style="font-size:11px; margin:5px 0;">Últimos 30 días: <b>${inasistencias} Inasistencias</b> | <b>${permisos} Permisos</b></p>`;
        if(inasistencias >= 3) html += `<span class="alerta-limite">⚠️ ALERTA: Ya alcanzó el límite de 3 inasistencias.</span>`;
        if(permisos >= 3) html += `<span class="alerta-limite">⚠️ ALERTA: Ya alcanzó el límite de 3 permisos personales.</span>`;
        msg.innerHTML = html;
    }

    async function guardar() {
        const n = document.getElementById('sPersonal').value, h = document.getElementById('hEntrada').value;
        let e = document.getElementById('sEstatus').value;
        const p = nomina.find(x => x.n === n);
        if(!n) return alert("Seleccione trabajador");

        // Lógica de retraso (solo si el estatus es ASISTENCIA)
        if(e === "ASISTENCIA" && h) {
            const hN = parseInt(h.replace(":",""));
            if(p.t === "MAÑANA" && hN > 715) e = "RETRASO";
            else if(p.t === "TARDE" && hN > 1215) e = "RETRASO";
            else if(p.t === "VIGILANCIA DÍA" && hN > 615) e = "RETRASO";
            else if(p.t === "VIGILANCIA NOCHE" && hN > 1815) e = "RETRASO";
        }

        await db.collection("asistencia_ebnlp_final").add({ n, c:p.c, t:p.t, h:h||"--", e, f:hoy, ts:Date.now() });
        alert("Guardado como: " + e);
        verificarLimites(n);
    }

    // GESTIÓN NÓMINA
    async function ingreso() {
        const n = document.getElementById('nN').value.toUpperCase().trim(), c = document.getElementById('nC').value, t = document.getElementById('nT').value;
        if(!n) return;
        await db.collection("nomina_institucional").add({ n, c, t, g: "A" });
        document.getElementById('nN').value = "";
    }

    async function moverVigi() {
        const n = document.getElementById('sVigi').value, g = document.getElementById('sGrupo').value;
        const p = nomina.find(x => x.n === n);
        await db.collection("nomina_institucional").doc(p.id).update({ g: g });
        alert("Vigilante movido al Grupo " + g);
    }

    function actualizar() {
        db.collection("asistencia_ebnlp_final").where("f", "==", hoy).onSnapshot(snap => {
            const body = document.getElementById('bodyR');
            let r = 0, p = 0; body.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data(); const esR = d.e === "RETRASO";
                if(esR) r++; p++;
                body.innerHTML += `<tr class="${esR?'fila-retraso':''}"><td>${d.n}</td><td>${d.h}</td><td>${d.e}</td><td>${d.c}</td></tr>`;
            });
            document.getElementById('rTot').innerText = r;
            document.getElementById('pTot').innerText = nomina.length > 0 ? Math.round((p/nomina.length)*100)+"%" : "0%";
            
            const diff = Math.floor((new Date() - new Date("2026-03-02")) / 86400000);
            const t = (diff % 2 === 0) ? "A" : "B";
            document.getElementById('vA').className = (t === "A") ? "vigi-card vigi-activa" : "vigi-card";
            document.getElementById('vB').className = (t === "B") ? "vigi-card vigi-activa" : "vigi-card";
        });
    }

    async function limpiar() {
        if(!confirm("¿Limpiar historial?")) return;
        const s = await db.collection("asistencia_ebnlp_final").get();
        const b = db.batch(); s.forEach(d => b.delete(d.ref)); await b.commit();
        alert("Base de datos limpia");
    }

    function descargar() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tableR')), `EBNLP_Reporte_${hoy}.xlsx`); }
</script>
</body>
</html>
