<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia - EBNLP</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --verde: #27ae60; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 30px; }
        header { background: linear-gradient(180deg, var(--azul), #1a2a6c); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }
        .logo-box { width: 90px; height: 90px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--naranja); }
        .logo-img { width: 75px; height: auto; }
        
        .form-card { background: white; margin: 20px 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--azul); }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; margin-bottom: 15px; box-sizing: border-box; }
        
        .horario-tag { background: #e8f4fd; color: #004085; padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; margin-bottom: 15px; border: 1px solid #b8daff; }
        .retardo-alerta { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; display: none; margin-bottom: 15px; }

        .btn-save { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; background: var(--verde); color: white; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" class="logo-img">
    </div>
    <h1 style="font-size: 18px; margin: 0;">E.B.N. "LUCILA PALACIOS"</h1>
    <p style="font-size: 11px; margin: 5px 0 0;">REGISTRO DE ASISTENCIA Y RETARDOS</p>
</header>

<div class="form-card">
    <label>Fecha de la Jornada:</label>
    <input type="date" id="fechaReg">

    <label>Trabajador:</label>
    <select id="selectPersona" onchange="verificarHorario()">
        <option value="">Seleccione al personal...</option>
        <option value="Docente" data-hora="07:00">Docente (Mañana: 7am - 12pm)</option>
        <option value="Obrero" data-hora="07:00">Obrero (7am - 1pm)</option>
        <option value="Administrativo" data-hora="07:00">Administrativo (7am - 1pm)</option>
        <option value="Cocinera" data-hora="07:00">Cocinera (7am - 2pm)</option>
        <option value="Vigilante" data-hora="18:00">Vigilante (Noche: 6pm - 6am)</option>
    </select>

    <div id="tagHorario" class="horario-tag">Seleccione cargo para ver horario reglamentario</div>
    
    <div id="alertaRetardo" class="retardo-alerta">⚠️ ATENCIÓN: Se registrará como RETARDO</div>

    <div style="display: flex; gap: 10px;">
        <div style="flex:1">
            <label>Hora Entrada:</label>
            <input type="time" id="hEntrada" onchange="verificarHorario()">
        </div>
        <div style="flex:1">
            <label>Hora Salida:</label>
            <input type="time" id="hSalida">
        </div>
    </div>

    <label>Estatus General:</label>
    <select id="estatusAsis">
        <option value="Asistencia">Asistencia ✅</option>
        <option value="Inasistencia">Inasistencia ❌</option>
        <option value="Permiso">Permiso 📝</option>
    </select>

    <button class="btn-save" onclick="procesarGuardado()">💾 GUARDAR REGISTRO</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('fechaReg').valueAsDate = new Date();

    function verificarHorario() {
        const sel = document.getElementById('selectPersona');
        const horaEntradaReal = document.getElementById('hEntrada').value;
        const alerta = document.getElementById('alertaRetardo');
        const tag = document.getElementById('tagHorario');
        
        if (!sel.value) return;

        const horaLimite = sel.options[sel.selectedIndex].getAttribute('data-hora');
        tag.innerText = "Entrada Reglamentaria: " + horaLimite;

        if (horaEntradaReal && horaEntradaReal > horaLimite) {
            alerta.style.display = "block";
        } else {
            alerta.style.display = "none";
        }
    }

    async function procesarGuardado() {
        const cargo = document.getElementById('selectPersona').value;
        const hE = document.getElementById('hEntrada').value;
        const hS = document.getElementById('hSalida').value;
        const fec = document.getElementById('fechaReg').value;
        const est = document.getElementById('estatusAsis').value;
        
        const horaLimite = document.getElementById('selectPersona').options[document.getElementById('selectPersona').selectedIndex].getAttribute('data-hora');
        let esRetardo = hE > horaLimite;

        if(!cargo || !hE || !hS) return alert("Por favor, complete las horas de entrada y salida.");

        try {
            await db.collection("asistencia_personal").add({
                cargo: cargo,
                fecha: fec,
                entrada: hE,
                salida: hS,
                estatus: est,
                retardo: esRetardo,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert(esRetardo ? "✅ Guardado con éxito (Se registró el RETARDO)" : "✅ Guardado con éxito a tiempo");
        } catch(e) { alert("Error al conectar con la base de datos."); }
    }
</script>
</body>
</html>
