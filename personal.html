<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DEFINITIVO EBNLP 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 15px auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 900px; }
        h3 { color: var(--azul); border-left: 5px solid var(--naranja); padding-left: 10px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        .retraso { background: #ffebee; color: var(--rojo); font-weight: bold; }
        .bloqueo { background: var(--rojo); color: white; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 50% { opacity: 0.5; } }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-verde { background: var(--verde); } .btn-azul { background: var(--azul); } .btn-rojo { background: var(--rojo); } .btn-gris { background: #666; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2>E.B.N. "LUCILA PALACIOS"</h2>
    <p>SISTEMA MAESTRO 2026 - REGLAMENTO ESTRICTO</p>
</header>

<div class="card">
    <h3>📝 Registro y Auditoría 30 Días</h3>
    <label>FECHA:</label>
    <input type="date" id="fManual" onchange="actualizarTablas()">
    <label>TRABAJADOR:</label>
    <select id="sPersona" onchange="auditar(this.value)"></select>

    <div id="visorAuditoria" style="display:none; background:#fff3cd; padding:15px; border-radius:8px; margin:10px 0;">
        <div id="statusAuditoria"></div>
        <div id="msgBloqueo" class="bloqueo hidden">BLOQUEADO: EXCESO DE EVENTOS (3)</div>
    </div>

    <label>ESTATUS:</label>
    <select id="sEstatus">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="INASISTENCIA">INASISTENCIA ❌</option>
        <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
    </select>
    <label>HORA DE ENTRADA:</label>
    <input type="time" id="hEntrada">
    <button id="btnGuardar" class="btn btn-verde" onclick="guardar()">GUARDAR REGISTRO</button>
</div>

<div class="card">
    <h3>📊 Rendimiento por Cargo</h3>
    <table>
        <thead><tr><th>Cargo</th><th>Hoy</th><th>Total</th><th>%</th></tr></thead>
        <tbody id="bCargos"></tbody>
    </table>
</div>

<div class="card">
    <h3>📋 Lista de Asistencia</h3>
    <div id="listaContenedor">
        <table>
            <thead><tr><th>Nombre</th><th>Estatus</th><th>Hora</th><th>Cargo</th></tr></thead>
            <tbody id="bHoy"></tbody>
        </table>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="btn btn-gris" onclick="limpiarVista()">LIMPIAR VISTA (NO BORRA DATOS)</button>
        <button class="btn btn-azul" onclick="actualizarTablas()">RECARGAR LISTA</button>
    </div>
    <button class="btn btn-rojo" style="margin-top:10px;" onclick="exportarPDF()">DESCARGAR REPORTE PDF</button>
</div>

<div class="card">
    <button class="btn btn-azul" onclick="document.getElementById('pAdmin').classList.toggle('hidden')">⚙️ GESTIÓN DE PERSONAL</button>
    <div id="pAdmin" class="hidden">
        <h4>+ Alta de Personal</h4>
        <input type="text" id="addNom" placeholder="Nombre Apellido">
        <select id="addCar">
            <option value="Docente">Docente</option>
            <option value="Obrero">Obrero</option>
            <option value="Administrativo">Administrativo</option>
            <option value="CNAE (Cocinera)">CNAE (Cocinera)</option>
            <option value="Vigilante">Vigilante</option>
        </select>
        <select id="addTur">
            <option value="MAÑANA">MAÑANA</option>
            <option value="TARDE">TARDE</option>
        </select>
        <button class="btn btn-verde" onclick="alta()">DAR DE ALTA</button>
        <hr>
        <h4>X Baja de Personal</h4>
        <select id="sBaja"></select>
        <button class="btn btn-rojo" onclick="baja()">ELIMINAR</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    document.getElementById('fManual').value = new Date().toISOString().split('T')[0];
    let nomina = [];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sPersona'), sB = document.getElementById('sBaja');
        sP.innerHTML = sB.innerHTML = '<option value="">-- Seleccione --</option>';
        snap.forEach(doc => {
            const d = doc.data(); d.id = doc.id; nomina.push(d);
            sP.innerHTML += `<option value="${d.n}">${d.n}</option>`;
            sB.innerHTML += `<option value="${d.n}">${d.n}</option>`;
        });
        actualizarTablas();
    });

    async function auditar(n) {
        if(!n) return; document.getElementById('visorAuditoria').style.display='block';
        const fRef = new Date(document.getElementById('fManual').value + "T12:00:00").getTime();
        const snap = await db.collection("asistencia_ebnlp_final").where("n","==",n).where("ts",">=", fRef - (30*86400000)).get();
        let inas=0, perm=0;
        snap.forEach(d => { if(d.data().e==="INASISTENCIA") inas++; if(d.data().e==="PERMISO PERSONAL") perm++; });
        document.getElementById('statusAuditoria').innerHTML = `Faltas: ${inas}/3 | Permisos: ${perm}/3`;
        const m = document.getElementById('msgBloqueo'), b = document.getElementById('btnGuardar');
        if(inas>=3 || perm>=3) { m.classList.remove('hidden'); b.disabled=true; b.style.opacity="0.5"; }
        else { m.classList.add('hidden'); b.disabled=false; b.style.opacity="1"; }
    }

    async function guardar() {
        const n = document.getElementById('sPersona').value, f = document.getElementById('fManual').value, h = document.getElementById('hEntrada').value;
        let e = document.getElementById('sEstatus').value;
        const p = nomina.find(x => x.n === n);
        if(e === "ASISTENCIA" && h) {
            const t = parseInt(h.replace(":",""));
            if(p.c === "Docente" && ((p.t==="MAÑANA" && t>700) || (p.t==="TARDE" && t>1200))) e="RETRASO";
            else if(p.c === "Obrero" && ((p.t==="MAÑANA" && t>645) || (p.t==="TARDE" && t>1130))) e="RETRASO";
            else if(p.c === "CNAE (Cocinera)" && t>700) e="RETRASO";
            else if(p.c === "Administrativo" && ((p.t==="MAÑANA" && t>645) || (p.t==="TARDE" && t>1200))) e="RETRASO";
            else if(p.c === "Vigilante" && ((p.t==="MAÑANA" && t>600) || (p.t==="TARDE" && t>1800))) e="RETRASO";
        }
        await db.collection("asistencia_ebnlp_final").add({n, e, f, h:h||"--", c:p.c, ts:new Date(f+"T12:00:00").getTime()});
        alert("Guardado");
    }

    function actualizarTablas() {
        document.getElementById('listaContenedor').style.display = 'block';
        const f = document.getElementById('fManual').value;
        db.collection("asistencia_ebnlp_final").onSnapshot(snap => {
            const bH = document.getElementById('bHoy'), bC = document.getElementById('bCargos');
            const docs = snap.docs.filter(d => d.data().f === f);
            const cnt = {Docente:0, Obrero:0, Administrativo:0, "CNAE (Cocinera)":0, Vigilante:0};
            bH.innerHTML = "";
            docs.forEach(doc => {
                const d = doc.data(); if(d.e==="ASISTENCIA" || d.e==="RETRASO") cnt[d.c]++;
                bH.innerHTML += `<tr class="${d.e==='RETRASO'?'retraso':''}"><td>${d.n}</td><td>${d.e}</td><td>${d.h}</td><td>${d.c}</td></tr>`;
            });
            bC.innerHTML = "";
            Object.keys(cnt).forEach(c => {
                const tot = nomina.filter(x => x.c === c).length;
                bC.innerHTML += `<tr><td>${c}</td><td>${cnt[c]}</td><td>${tot}</td><td>${tot>0?Math.round((cnt[c]/tot)*100):0}%</td></tr>`;
            });
        });
    }

    function limpiarVista() { document.getElementById('listaContenedor').style.display = 'none'; }
    async function alta() {
        const n = document.getElementById('addNom').value.toUpperCase(), c = document.getElementById('addCar').value, t = document.getElementById('addTur').value;
        if(n) await db.collection("nomina_institucional").add({n, c, t});
    }
    async function baja() {
        const n = document.getElementById('sBaja').value, p = nomina.find(x => x.n === n);
        if(p && confirm(`¿Borrar a ${n}?`)) await db.collection("nomina_institucional").doc(p.id).delete();
    }
    async function exportarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const f = document.getElementById('fManual').value;
        const snap = await db.collection("asistencia_ebnlp_final").where("f","==",f).get();
        const d = []; snap.forEach(x => d.push([x.data().n, x.data().e, x.data().h, x.data().c]));
        doc.text(`Reporte EBNLP - ${f}`, 10, 10);
        doc.autoTable({ head: [['Nombre', 'Estatus', 'Hora', 'Cargo']], body: d, startY: 20 });
        doc.save(`Asistencia_${f}.pdf`);
    }
</script>
</body>
</html>
