<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA CONTROL - LUCILA PALACIOS</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --gris-oscuro: #333; --gris-claro: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris-claro); margin: 0; padding-bottom: 50px; }
        
        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .dash-card { background: white; padding: 10px; border-radius: 8px; text-align: center; border-top: 4px solid var(--azul); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .dash-card h4 { margin: 0; font-size: 0.65rem; color: #666; text-transform: uppercase; }
        .dash-card .valor { font-size: 1.2rem; font-weight: bold; color: var(--azul); }

        /* Tabs */
        .tabs { display: flex; background: white; padding: 10px; gap: 5px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 10px 2px; border: none; border-radius: 5px; font-weight: bold; font-size: 0.65rem; cursor: pointer; background: #eee; }
        .tab-btn.active { background: var(--naranja); color: white; }

        /* Desplegables de Marcado */
        .cargo-section { margin: 8px 10px; background: white; border-radius: 6px; border: 1px solid #ddd; overflow: hidden; }
        .cargo-title { background: #444; color: white; padding: 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; }
        .cargo-content { display: none; padding: 10px; }
        .cargo-content.open { display: block; }

        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .ficha { background: white; padding: 8px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-size: 0.7rem; }
        
        .btn-status { width: 100%; padding: 5px; margin: 2px 0; border: none; border-radius: 3px; font-size: 0.55rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Lista Diaria al Final (Banner Naranja) */
        .seccion-reporte { margin: 20px 10px; }
        .banner-naranja { background: var(--naranja); color: white; padding: 12px; font-weight: bold; font-size: 0.8rem; border-radius: 8px 8px 0 0; text-align: center; }
        .tabla-contenedor { background: white; border: 1px solid #ccc; border-top: none; overflow-x: auto; }
        .tabla-app { width: 100%; border-collapse: collapse; font-size: 0.65rem; min-width: 400px; }
        .tabla-app th { background: #f0f0f0; color: #333; padding: 10px 5px; border: 1px solid #ddd; }
        .tabla-app td { padding: 8px 5px; border: 1px solid #eee; text-align: center; }

        .hidden { display: none; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="dash-card"><h4>Adm.</h4><div id="dAdm" class="valor">0</div></div>
    <div class="dash-card"><h4>CNAE</h4><div id="dCnae" class="valor">0</div></div>
    <div class="dash-card"><h4>Vig.</h4><div id="dVig" class="valor">0</div></div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="verTab('tabEscuela', this)">ESCUELA</button>
    <button class="tab-btn" onclick="verTab('tabVigilancia', this)">VIGILANCIA</button>
    <button class="tab-btn" onclick="verTab('tabEstadistica', this)">ESTADÍSTICA</button>
    <button class="tab-btn" onclick="verTab('tabNomina', this)">NÓMINA</button>
</div>

<div id="tabEscuela" class="tab-content">
    <div style="padding:10px; display:flex; gap:5px; background:white;">
        <input type="date" id="fechaEscuela" onchange="actualizarTodo()">
        <select id="turnoSeleccionado" onchange="actualizarTodo()"><option value="MAÑANA">MAÑANA</option><option value="TARDE">TARDE</option></select>
    </div>
    <div id="contEscuela"></div>
    <div class="seccion-reporte">
        <div class="banner-naranja">LISTA DIARIA - RESUMEN DE ASISTENCIA Y OBSERVACIONES</div>
        <div class="tabla-contenedor">
            <table class="tabla-app">
                <thead><tr><th>NOMBRE</th><th>ESTATUS</th><th>HORARIO</th><th>OBSERVACIONES</th></tr></thead>
                <tbody id="listaDiariaGlobal"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="tabVigilancia" class="tab-content hidden">
    <div style="padding:10px; background:white;">
        <input type="date" id="fechaVig" onchange="actualizarTodo()">
        <select id="filtroGrupo" onchange="actualizarTodo()" style="margin-top:5px;"><option value="GRUPO I">GRUPO I</option><option value="GRUPO II">GRUPO II</option></select>
    </div>
    <div id="contVigilancia"></div>
</div>

<div id="tabEstadistica" class="tab-content hidden">
    <div style="padding:15px; display:flex; gap:5px; background:white;">
        <input type="month" id="mesReporte">
        <button onclick="generarEstadistica()" style="background:var(--azul); color:white; border:none; padding:10px; border-radius:5px; font-weight:bold;">CALCULAR MES</button>
    </div>
    <div class="banner-naranja">ESTADÍSTICA POR GÉNERO Y CARGO</div>
    <div class="tabla-contenedor">
        <table class="tabla-app">
            <thead><tr><th>CARGO</th><th>GEN</th><th>NOM</th><th>ASI</th><th>PROM</th><th>%</th></tr></thead>
            <tbody id="bodyEstadistica"></tbody>
        </table>
    </div>
    <div class="banner-naranja" style="margin-top:20px;">CONSOLIDADO INDIVIDUAL (7 ESTATUS)</div>
    <div class="tabla-contenedor">
        <table class="tabla-app">
            <thead><tr><th>NOMBRE</th><th>ASI</th><th>ACT</th><th>RET</th><th>INA</th><th>VAC</th><th>MED</th><th>PER</th><th>PROM</th></tr></thead>
            <tbody id="bodyIndividual"></tbody>
        </table>
    </div>
</div>

<div id="tabNomina" class="tab-content hidden">
    <div style="padding:15px; background:white; margin:10px; border-radius:10px; border:1px solid #ddd;">
        <input type="text" id="nNombre" placeholder="NOMBRE COMPLETO" style="text-transform:uppercase; margin-bottom:10px;">
        <select id="nCargo" style="margin-bottom:10px;"><option value="Docente">Docente</option><option value="Obrero">Obrero</option><option value="Administrativo">Administrativo</option><option value="CNAE (Cocinera)">CNAE (Cocinera)</option><option value="Vigilante">Vigilante</option></select>
        <div style="display:flex; gap:5px;"><select id="nGen" style="flex:1;"><option value="F">F</option><option value="M">M</option></select><select id="nGrupo" style="flex:2;"><option value="-">Escuela</option><option value="GRUPO I">Vig I</option><option value="GRUPO II">Vig II</option></select></div>
        <button onclick="agregarNomina()" style="background:var(--azul); color:white; border:none; padding:12px; width:100%; border-radius:5px; font-weight:bold; margin-top:10px;">AÑADIR A NÓMINA</button>
    </div>
    <div class="tabla-contenedor" style="margin:10px;"><table class="tabla-app"><thead><tr><th>Nombre</th><th>Cargo</th><th>Acción</th></tr></thead><tbody id="bodyNomina"></tbody></table></div>
</div>

<script>
    // Configuración Firebase (La misma que has usado)
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nomina = [];
    document.getElementById('fechaEscuela').value = new Date().toISOString().split('T')[0];
    document.getElementById('fechaVig').value = new Date().toISOString().split('T')[0];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = []; snap.forEach(doc => { let d = doc.data(); d.id = doc.id; nomina.push(d); });
        renderNomina(); actualizarTodo();
    });

    async function actualizarTodo() {
        const f = document.getElementById('fechaEscuela').value;
        const snap = await db.collection("asistencia_ebnlp_final").where("f", "==", f).get();
        const marcados = {}; 
        let c = {Docente:0, Obrero:0, Administrativo:0, "CNAE (Cocinera)":0, Vigilante:0};

        snap.forEach(doc => {
            const d = doc.data(); marcados[d.n] = d;
            if(["ASISTENCIA", "ACT. INST.", "RETRASO"].includes(d.e)) { c[d.c]++; }
        });

        document.getElementById('dAdm').innerText = c.Administrativo;
        document.getElementById('dCnae').innerText = c["CNAE (Cocinera)"];
        document.getElementById('dVig').innerText = c.Vigilante;

        dibujarMarcado("contEscuela", ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)"], f, marcados);
        dibujarMarcado("contVigilancia", ["Vigilante"], document.getElementById('fechaVig').value, marcados, document.getElementById('filtroGrupo').value);
        
        renderListaDiaria(marcados);
    }

    function dibujarMarcado(contId, cargos, fecha, marcados, grupo = null) {
        const cont = document.getElementById(contId); cont.innerHTML = "";
        cargos.forEach(cargo => {
            let lista = nomina.filter(p => p.c === cargo);
            if(cargo === "Vigilante") lista = lista.filter(p => p.grupo === grupo);
            if(lista.length === 0) return;

            const sec = document.createElement('div');
            sec.className = "cargo-section";
            sec.innerHTML = `<div class="cargo-title" onclick="this.nextElementSibling.classList.toggle('open')"><span>${cargo.toUpperCase()}</span> <span>▼</span></div>`;
            
            const box = document.createElement('div'); box.className = "cargo-content";
            const grid = document.createElement('div'); grid.className = "grid-fichas";

            lista.sort((a,b)=>a.n.localeCompare(b.n)).forEach(p => {
                const m = marcados[p.n];
                const f = document.createElement('div'); f.className = "ficha";
                if(!m) {
                    f.innerHTML = `<b>${p.n}</b><br>
                        <button class="btn-status" style="background:#d4edda" onclick="registrar('${p.n}','ASISTENCIA')">ASISTENCIA</button>
                        <button class="btn-status" style="background:#fff3cd" onclick="registrar('${p.n}','RETRASO')">RETRASO</button>
                        <button class="btn-status" style="background:#f8d7da" onclick="registrar('${p.n}','INASISTENCIA')">INASISTENCIA</button>
                        <button class="btn-status" style="background:#e1f5fe" onclick="registrar('${p.n}','ACT. INST.')">ACT. INST.</button>
                        <button class="btn-status" style="background:#f3e5f5" onclick="registrar('${p.n}','VACACIONES')">VACACIONES</button>
                        <button class="btn-status" style="background:#e8f5e9" onclick="registrar('${p.n}','P. MÉDICO')">P. MÉDICO</button>
                        <button class="btn-status" style="background:#eee" onclick="registrar('${p.n}','P. PERSONAL')">P. PERSONAL</button>`;
                } else {
                    f.innerHTML = `<b style="color:var(--azul)">${p.n}</b><br><span style="color:green; font-weight:bold;">✓ ${m.e}</span><br>
                        ${m.hS === "---" && !["INASISTENCIA","VACACIONES","P. MÉDICO","P. PERSONAL"].includes(m.e) ? 
                        `<button class="btn-status" style="background:var(--azul); color:white" onclick="marcarSalida('${m.n}','${fecha}')">SALIDA</button>` : `<small>${m.hE} / ${m.hS}</small>`}`;
                }
                grid.appendChild(f);
            });
            box.appendChild(grid); sec.appendChild(box); cont.appendChild(sec);
        });
    }

    function renderListaDiaria(marcados) {
        const body = document.getElementById('listaDiariaGlobal');
        body.innerHTML = "";
        // Filtrar solo los que tienen algún registro hoy
        const personalMarcado = nomina.filter(p => marcados[p.n]).sort((a,b) => a.n.localeCompare(b.n));
        
        if(personalMarcado.length === 0) {
            body.innerHTML = `<tr><td colspan="4">No hay registros para esta fecha</td></tr>`;
            return;
        }

        personalMarcado.forEach(p => {
            const m = marcados[p.n];
            body.innerHTML += `<tr>
                <td style="text-align:left; font-weight:bold;">${p.n}</td>
                <td>${m.e}</td>
                <td>${m.hE} / ${m.hS}</td>
                <td style="font-style:italic; color:#555;">${m.obs || "-"}</td>
            </tr>`;
        });
    }

    async function registrar(n, e) {
        const p = nomina.find(x => x.n === n);
        const f = (p.c === "Vigilante") ? document.getElementById('fechaVig').value : document.getElementById('fechaEscuela').value;
        let hE = "---", obs = "";
        if(!["INASISTENCIA","VACACIONES","P. MÉDICO","P. PERSONAL"].includes(e)) {
            hE = prompt("Hora Entrada:", "07:00"); if(!hE) return;
        } else {
            obs = prompt("Observación / Causa:");
        }
        await db.collection("asistencia_ebnlp_final").add({ n, e, f, c: p.c, gender: p.gender, hE, hS: "---", obs: obs||"", mes: f.substring(0,7) });
        actualizarTodo();
    }

    async function marcarSalida(n, f) {
        const hS = prompt("Hora Salida:"); if(!hS) return;
        const q = await db.collection("asistencia_ebnlp_final").where("n","==",n).where("f","==",f).get();
        if(!q.empty) await db.collection("asistencia_ebnlp_final").doc(q.docs[0].id).update({ hS });
        actualizarTodo();
    }

    async function generarEstadistica() {
        const mes = document.getElementById('mesReporte').value; if(!mes) return;
        const snap = await db.collection("asistencia_ebnlp_final").where("mes","==",mes).get();
        const docs = snap.docs.map(d => d.data());
        const bEst = document.getElementById('bodyEstadistica'); bEst.innerHTML = "";
        const bInd = document.getElementById('bodyIndividual'); bInd.innerHTML = "";

        ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)", "Vigilante"].forEach(cargo => {
            ["F","M"].forEach(g => {
                const lista = nomina.filter(x => x.c === cargo && x.gender === g);
                if(lista.length > 0) {
                    const asis = docs.filter(d => d.c === cargo && d.gender === g && ["ASISTENCIA","ACT. INST.","RETRASO"].includes(d.e)).length;
                    const prom = (asis / 20).toFixed(2);
                    bEst.innerHTML += `<tr><td>${cargo}</td><td>${g}</td><td>${lista.length}</td><td>${asis}</td><td>${prom}</td><td>${((prom/lista.length)*100).toFixed(1)}%</td></tr>`;
                }
            });
        });

        nomina.sort((a,b)=>a.n.localeCompare(b.n)).forEach(p => {
            const m = docs.filter(d => d.n === p.n);
            const r = (e) => m.filter(x => x.e === e).length;
            const prom = ((r("ASISTENCIA")+r("ACT. INST.")+r("RETRASO")) / (p.c === "Vigilante" ? 15 : 20)).toFixed(2);
            bInd.innerHTML += `<tr><td style="text-align:left">${p.n}</td><td>${r("ASISTENCIA")}</td><td>${r("ACT. INST.")}</td><td>${r("RETRASO")}</td><td>${r("INASISTENCIA")}</td><td>${r("VACACIONES")}</td><td>${r("P. MÉDICO")}</td><td>${r("P. PERSONAL")}</td><td><b>${prom}</b></td></tr>`;
        });
    }

    function agregarNomina() {
        const n = document.getElementById('nNombre').value.toUpperCase(); if(!n) return;
        db.collection("nomina_institucional").add({ n, c: document.getElementById('nCargo').value, gender: document.getElementById('nGen').value, grupo: document.getElementById('nGrupo').value });
        document.getElementById('nNombre').value = "";
    }

    function renderNomina() {
        const b = document.getElementById('bodyNomina'); b.innerHTML = "";
        nomina.sort((a,b)=>a.n.localeCompare(b.n)).forEach(p => {
            b.innerHTML += `<tr><td style="text-align:left">${p.n}</td><td>${p.c}</td><td><button onclick="db.collection('nomina_institucional').doc('${p.id}').delete()">X</button></td></tr>`;
        });
    }

    function verTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden'); btn.classList.add('active');
    }
</script>
</body>
</html>
