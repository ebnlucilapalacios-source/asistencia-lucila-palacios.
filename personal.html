<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP 2026 - SISTEMA TOTAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: var(--azul); border-left: 5px solid var(--naranja); padding-left: 10px; font-size: 14px; text-transform: uppercase; }

        /* MÓDULO AUDITORÍA */
        .visor-auditoria { background: #fff3cd; border: 2px solid #f39c12; padding: 15px; margin: 10px 0; border-radius: 8px; display: none; }
        .alerta-bloqueo { background: var(--rojo); color: white; padding: 15px; border-radius: 5px; font-weight: bold; text-align: center; margin-top: 10px; animation: flash 0.8s infinite; }
        @keyframes flash { 0%, 100% {opacity: 1;} 50% {opacity: 0.5;} }

        /* TABLAS Y ESTADÍSTICAS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: white; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--azul); }
        .stat-box p { font-size: 26px; font-weight: bold; margin: 5px 0; color: var(--azul); }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: #eee; padding: 10px; border: 1px solid #ddd; color: var(--azul); }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        .retraso-celda { color: var(--rojo); font-weight: bold; background: #ffebee; }

        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #fManual { border: 2px solid var(--naranja); background: #fffdf0; font-weight: bold; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }
        .btn-rojo { background: var(--rojo); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2>E.B.N. "LUCILA PALACIOS"</h2>
    <p>SISTEMA MAESTRO: CARGOS, ASISTENCIA Y AUDITORÍA 2026</p>
</header>

<div class="card stats-grid">
    <div class="stat-box"><h4>ASISTENCIA %</h4><p id="pTotal">0%</p></div>
    <div class="stat-box"><h4>RETRASOS</h4><p id="rTotal" style="color:var(--rojo);">0</p></div>
</div>

<div class="card">
    <h3>📝 Registro y Auditoría Estricta</h3>
    <label>FECHA DE REGISTRO:</label>
    <input type="date" id="fManual" onchange="actualizarTodo()">

    <label>Trabajador:</label>
    <select id="sPersona" onchange="ejecutarAuditoria(this.value)"></select>

    <div id="visor" class="visor-auditoria">
        <div id="resumenAuditoria"></div>
        <div id="alertaGrave" class="alerta-bloqueo hidden">⚠️ LÍMITE DE 3 FALTAS/PERMISOS ALCANZADO</div>
    </div>

    <label>Estatus:</label>
    <select id="sEstatus">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="INASISTENCIA">INASISTENCIA ❌</option>
        <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
    </select>
    
    <label>Hora de Entrada (7, 12, 6 en punto):</label>
    <input type="time" id="hEntrada">
    
    <button id="btnGuardar" class="btn btn-verde" onclick="guardar()">GUARDAR REGISTRO</button>
</div>

<div class="card">
    <h3>📊 Rendimiento por Cargos</h3>
    <table id="tablaCargos">
        <thead>
            <tr><th>Cargo</th><th>Hoy</th><th>Nómina</th><th>% Diaro</th><th>% Mensual</th></tr>
        </thead>
        <tbody id="bodyCargos"></tbody>
    </table>
</div>

<div class="card">
    <h3>📋 Reporte del Día</h3>
    <table id="tHoy">
        <thead><tr><th>Nombre</th><th>Estatus</th><th>Hora</th><th>Cargo</th></tr></thead>
        <tbody id="bHoy"></tbody>
    </table>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
        <button class="btn btn-rojo" onclick="exportarPDF('hoy')">PDF DÍA</button>
        <button class="btn btn-rojo" style="background:#7b1f16" onclick="exportarPDF('mes')">PDF MES</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('fManual').value = new Date().toISOString().split('T')[0];
    let nomina = [];

    // Cargar Nómina
    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sPersona');
        sP.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            nomina.push(doc.data());
            sP.innerHTML += `<option value="${doc.data().n}">${doc.data().n}</option>`;
        });
        actualizarTodo();
    });

    // AUDITORÍA: CONTEO DE INASISTENCIAS Y PERMISOS (30 DÍAS REALES)
    async function ejecutarAuditoria(n) {
        if(!n) { document.getElementById('visor').style.display='none'; return; }
        document.getElementById('visor').style.display='block';
        
        const fRef = new Date(document.getElementById('fManual').value + "T12:00:00").getTime();
        const fInicio = fRef - (30 * 24 * 60 * 60 * 1000);

        const snap = await db.collection("asistencia_ebnlp_final").where("n","==",n).where("ts",">=",fInicio).get();
        let f=0, p=0;
        snap.forEach(d => {
            if(d.data().e === "INASISTENCIA") f++;
            if(d.data().e === "PERMISO PERSONAL") p++;
        });

        document.getElementById('resumenAuditoria').innerHTML = `<b>Auditoría (Últimos 30 días):</b><br>❌ Inasistencias: ${f}/3<br>📝 Permisos: ${p}/3`;
        document.getElementById('alertaGrave').className = (f>=3 || p>=3) ? "alerta-bloqueo" : "hidden";
        return {f, p};
    }

    // GUARDAR CON TOLERANCIA CERO
    async function guardar() {
        const n = document.getElementById('sPersona').value, f = document.getElementById('fManual').value, h = document.getElementById('hEntrada').value;
        let e = document.getElementById('sEstatus').value;
        if(!n) return alert("Seleccione trabajador");

        const audit = await ejecutarAuditoria(n);
        if((e==="INASISTENCIA" && audit.f >= 3) || (e==="PERMISO PERSONAL" && audit.p >= 3)) {
            return alert("SISTEMA BLOQUEADO: Exceso de faltas o permisos.");
        }

        const p = nomina.find(x => x.n === n);
        // Lógica 7, 12, 6 en punto
        if(e === "ASISTENCIA" && h) {
            const hn = parseInt(h.replace(":",""));
            if((p.t==="MAÑANA" && hn>700) || (p.t==="TARDE" && hn>1200) || (p.t==="VIGILANCIA DÍA" && hn>600) || (p.t==="VIGILANCIA NOCHE" && hn>1800)) e="RETRASO";
        }

        await db.collection("asistencia_ebnlp_final").add({
            n, c:p.c, t:p.t, h:h||"--", e, f, ts:new Date(f + "T12:00:00").getTime(), mes:f.substring(0,7)
        });
        alert("Guardado");
        ejecutarAuditoria(n);
    }

    // ACTUALIZAR PORCENTAJES POR CARGO Y LISTA
    function actualizarTodo() {
        const fSel = document.getElementById('fManual').value;
        db.collection("asistencia_ebnlp_final").onSnapshot(snap => {
            const bHoy = document.getElementById('bHoy'), bCargos = document.getElementById('bodyCargos');
            const docsHoy = snap.docs.filter(d => d.data().f === fSel);
            let r=0, asisG=0;
            const cH = {Docente:0, Obrero:0, Administrativo:0, Cocinera:0, Vigilante:0};
            const cM = {...cH};

            bHoy.innerHTML = "";
            docsHoy.forEach(doc => {
                const d = doc.data();
                if(d.e==="RETRASO") r++;
                if(d.e==="ASISTENCIA" || d.e==="RETRASO") { asisG++; cH[d.c]++; }
                bHoy.innerHTML += `<tr class="${d.e==='RETRASO'?'retraso-celda':''}"><td>${d.n}</td><td>${d.e}</td><td>${d.h}</td><td>${d.c}</td></tr>`;
            });

            snap.docs.filter(d => d.data().mes === fSel.substring(0,7)).forEach(doc => {
                const d = doc.data(); if(d.e==="ASISTENCIA" || d.e==="RETRASO") cM[d.c]++;
            });

            document.getElementById('rTotal').innerText = r;
            document.getElementById('pTotal').innerText = nomina.length > 0 ? Math.round((asisG/nomina.length)*100)+"%" : "0%";

            // Generar tabla de Cargos con Porcentajes
            bCargos.innerHTML = "";
            Object.keys(cH).forEach(cargo => {
                const nC = nomina.filter(x => x.c === cargo).length;
                const pD = nC > 0 ? Math.round((cH[cargo]/nC)*100) : 0;
                const pM = nC > 0 ? Math.min(100, Math.round((cM[cargo]/(nC*22))*100)) : 0;
                bCargos.innerHTML += `<tr><td>${cargo}</td><td>${cH[cargo]}</td><td>${nC}</td><td>${pD}%</td><td>${pM}%</td></tr>`;
            });
        });
    }

    async function exportarPDF(tipo) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const f = document.getElementById('fManual').value;
        doc.text("E.B.N. LUCILA PALACIOS", 105, 15, { align: "center" });
        const data = [];
        const q = (tipo==='hoy') ? db.collection("asistencia_ebnlp_final").where("f","==",f) : db.collection("asistencia_ebnlp_final").where("mes","==",f.substring(0,7));
        const snap = await q.get();
        snap.forEach(d => data.push([d.data().n, d.data().f, d.data().e, d.data().h, d.data().c]));
        doc.autoTable({ head: [['Nombre', 'Fecha', 'Estatus', 'Hora', 'Cargo']], body: data, startY: 25 });
        doc.save(`EBNLP_${tipo}.pdf`);
    }
</script>
</body>
</html>
