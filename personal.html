<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EBNLP 2026 - AUDITORÍA DE FALTAS</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: var(--azul); border-bottom: 2px solid var(--naranja); padding-bottom: 5px; font-size: 15px; }
        
        /* ALERTAS DE LÍMITES */
        .visor-limites { background: #fff3e0; padding: 10px; border-radius: 6px; border-left: 5px solid var(--naranja); margin-bottom: 10px; display: none; }
        .texto-alerta { color: var(--rojo); font-weight: bold; animation: parpadeo 1.5s infinite; }
        @keyframes parpadeo { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: var(--azul); color: white; padding: 8px; border: 1px solid #ddd; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        .fila-retraso { background-color: #ffcdd2 !important; color: #b71c1c; font-weight: bold; }

        label { display: block; font-weight: bold; margin-top: 8px; font-size: 11px; color: #444; }
        select, input { width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }
        .btn-rojo { background: var(--rojo); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2>E.B.N. "LUCILA PALACIOS"</h2>
    <p>Auditoría de Inasistencias y Permisos 2026</p>
</header>

<div class="card">
    <h3>📝 Registro de Novedades</h3>
    
    <label>1. Seleccionar Trabajador:</label>
    <select id="sP" onchange="auditarFaltas(this.value)"></select>

    <div id="visor" class="visor-limites">
        <div id="infoConteo">Cargando historial...</div>
    </div>

    <label>2. Estatus a Registrar:</label>
    <select id="sE">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="INASISTENCIA">INASISTENCIA ❌ (Máx 3)</option>
        <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝 (Máx 3)</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
        <option value="REPOSO POR CUIDO">REPOSO POR CUIDO 👶</option>
        <option value="VACACIONES">VACACIONES 🌴</option>
    </select>

    <label>3. Hora (Si asistió):</label>
    <input type="time" id="hE">

    <button class="btn btn-verde" onclick="guardar()">GUARDAR EN EXPEDIENTE DIGITAL</button>
</div>

<div class="card">
    <h3>📊 Historial de Hoy</h3>
    <table id="tableR">
        <thead><tr><th>Nombre</th><th>Estatus</th><th>Hora</th><th>Cargo</th></tr></thead>
        <tbody id="bodyR"></tbody>
    </table>
    <button class="btn btn-azul" onclick="descargar()">DESCARGAR REPORTE EXCEL</button>
</div>

<div class="card">
    <button class="btn btn-azul" onclick="document.getElementById('adm').classList.toggle('hidden')">⚙️ GESTIÓN DE NÓMINA</button>
    <div id="adm" class="hidden">
        <h4>+ Nuevo Personal</h4>
        <input type="text" id="nN" placeholder="Nombre Completo">
        <select id="nC">
            <option value="Docente">Docente</option>
            <option value="Obrero">Obrero</option>
            <option value="Administrativo">Administrativo</option>
            <option value="Cocinera">Cocinera</option>
            <option value="Vigilante">Vigilante</option>
        </select>
        <select id="nT">
            <option value="MAÑANA">MAÑANA</option>
            <option value="TARDE">TARDE</option>
            <option value="VIGILANCIA DÍA">VIGILANCIA DÍA</option>
            <option value="VIGILANCIA NOCHE">VIGILANCIA NOCHE</option>
        </select>
        <button class="btn btn-verde" onclick="ingreso()">ALTA</button>
        <button class="btn btn-rojo" onclick="limpiar()">LIMPIAR TODO</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const hoy = new Date().toISOString().split('T')[0];
    let nomina = [];

    // CARGA NÓMINA
    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sP');
        sP.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            const d = doc.data(); d.id = doc.id; nomina.push(d);
            sP.innerHTML += `<option value="${d.n}">${d.n}</option>`;
        });
        actualizarTabla();
    });

    // AUDITORÍA DE 30 DÍAS
    async function auditarFaltas(nombre) {
        if(!nombre) { document.getElementById('visor').style.display = 'none'; return; }
        
        const visor = document.getElementById('visor');
        const info = document.getElementById('infoConteo');
        visor.style.display = 'block';
        
        const hace30 = Date.now() - (30 * 24 * 60 * 60 * 1000);
        const snap = await db.collection("asistencia_ebnlp_final")
            .where("n", "==", nombre)
            .where("ts", ">=", hace30).get();

        let f = 0, p = 0;
        snap.forEach(doc => {
            if(doc.data().e === "INASISTENCIA") f++;
            if(doc.data().e === "PERMISO PERSONAL") p++;
        });

        let msg = `Trabajador: <b>${nombre}</b><br>Faltas (30d): <b>${f}/3</b> | Permisos (30d): <b>${p}/3</b>`;
        
        if(f >= 3) msg += `<br><span class="texto-alerta">⚠️ ALERTA: Límite de inasistencias alcanzado.</span>`;
        if(p >= 3) msg += `<br><span class="texto-alerta">⚠️ ALERTA: Límite de permisos alcanzado.</span>`;
        
        info.innerHTML = msg;
    }

    async function guardar() {
        const n = document.getElementById('sP').value, h = document.getElementById('hE').value;
        let e = document.getElementById('sE').value;
        const p = nomina.find(x => x.n === n);
        
        if(!n) return alert("Selecciona a alguien.");

        // Lógica de retraso
        if(e === "ASISTENCIA" && h) {
            const hN = parseInt(h.replace(":",""));
            if(p.t === "MAÑANA" && hN > 715) e = "RETRASO";
            else if(p.t === "TARDE" && hN > 1215) e = "RETRASO";
            else if(p.t === "VIGILANCIA DÍA" && hN > 615) e = "RETRASO";
            else if(p.t === "VIGILANCIA NOCHE" && hN > 1815) e = "RETRASO";
        }

        await db.collection("asistencia_ebnlp_final").add({
            n, c:p.c, t:p.t, h:h||"--", e, f:hoy, ts:Date.now()
        });
        
        alert("¡Registro guardado!");
        auditarFaltas(n);
    }

    function actualizarTabla() {
        db.collection("asistencia_ebnlp_final").where("f", "==", hoy).onSnapshot(snap => {
            const body = document.getElementById('bodyR');
            body.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                body.innerHTML += `<tr class="${d.e==='RETRASO'?'fila-retraso':''}">
                    <td>${d.n}</td><td>${d.e}</td><td>${d.h}</td><td>${d.c}</td>
                </tr>`;
            });
        });
    }

    async function ingreso() {
        const n = document.getElementById('nN').value.toUpperCase().trim(), c = document.getElementById('nC').value, t = document.getElementById('nT').value;
        if(n) await db.collection("nomina_institucional").add({ n, c, t, g: "A" });
        document.getElementById('nN').value = "";
    }

    async function limpiar() {
        if(confirm("¿Borrar todo?")) {
            const s = await db.collection("asistencia_ebnlp_final").get();
            const b = db.batch(); s.forEach(d => b.delete(d.ref)); await b.commit();
        }
    }

    function descargar() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tableR')), `EBNLP_${hoy}.xlsx`); }
</script>
</body>
</html>
