<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EBNLP 2026 - HORARIOS POR CARGO</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: var(--azul); border-left: 5px solid var(--naranja); padding-left: 10px; font-size: 14px; text-transform: uppercase; }
        .retraso-fila { background-color: #ffebee !important; color: var(--rojo); font-weight: bold; }
        .alerta-bloqueo { background: var(--rojo); color: white; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; margin-top: 10px; animation: flash 0.8s infinite; }
        @keyframes flash { 0%, 100% {opacity: 1;} 50% {opacity: 0.5;} }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }
        .btn-rojo { background: var(--rojo); }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2>E.B.N. "LUCILA PALACIOS"</h2>
    <p>SISTEMA DE ASISTENCIA - REGLAMENTO POR CARGO</p>
</header>

<div class="card">
    <h3>📝 Registro de Asistencia</h3>
    <label>FECHA:</label>
    <input type="date" id="fManual" onchange="actualizarTodo()">

    <label>Trabajador:</label>
    <select id="sPersona" onchange="auditoria30Dias(this.value)"></select>

    <div id="visorAuditoria" class="card" style="display:none; background:#fff3cd; border:1px solid #f39c12;">
        <div id="textoAuditoria"></div>
        <div id="bloqueoMsg" class="alerta-bloqueo hidden">BLOQUEADO POR REGLAMENTO (3 FALTAS/PERMISOS)</div>
    </div>

    <label>Estatus:</label>
    <select id="sEstatus">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="INASISTENCIA">INASISTENCIA ❌</option>
        <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
    </select>

    <label>Hora de Entrada:</label>
    <input type="time" id="hEntrada">
    
    <button id="btnGuardar" class="btn btn-verde" onclick="guardar()">GUARDAR REGISTRO</button>
</div>

<div class="card">
    <h3>📊 Estadísticas por Cargo</h3>
    <table>
        <thead><tr><th>Cargo</th><th>Hoy</th><th>Total</th><th>% Día</th><th>% Mes</th></tr></thead>
        <tbody id="bodyCargos"></tbody>
    </table>
</div>

<div class="card">
    <h3>📋 Lista de Asistencia (Hoy)</h3>
    <table>
        <thead><tr><th>Nombre</th><th>Estatus</th><th>Hora</th><th>Cargo</th></tr></thead>
        <tbody id="bLista"></tbody>
    </table>
    <button class="btn btn-rojo" onclick="exportar()">DESCARGAR PDF</button>
</div>

<div class="card">
    <button class="btn btn-azul" onclick="document.getElementById('admin').classList.toggle('hidden')">⚙️ GESTIÓN DE NÓMINA</button>
    <div id="admin" class="hidden">
        <h4>+ Nuevo Ingreso</h4>
        <input type="text" id="nNom" placeholder="Nombre">
        <select id="nCar">
            <option value="Docente">Docente</option>
            <option value="Obrero">Obrero</option>
            <option value="Administrativo">Administrativo</option>
            <option value="Cocinera">Cocinera</option>
            <option value="Vigilante">Vigilante</option>
        </select>
        <select id="nTur">
            <option value="MAÑANA">MAÑANA</option>
            <option value="TARDE">TARDE</option>
            <option value="NOCHE">NOCHE</option>
        </select>
        <button class="btn btn-verde" onclick="alta()">AÑADIR</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('fManual').value = new Date().toISOString().split('T')[0];
    let nomina = [];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sPersona');
        sP.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            nomina.push(doc.data());
            sP.innerHTML += `<option value="${doc.data().n}">${doc.data().n}</option>`;
        });
        actualizarTodo();
    });

    async function auditoria30Dias(n) {
        if(!n) return;
        document.getElementById('visorAuditoria').style.display='block';
        const f = new Date(document.getElementById('fManual').value + "T12:00:00").getTime();
        const snap = await db.collection("asistencia_ebnlp_final").where("n","==",n).where("ts",">=", f - (30*86400000)).get();
        let fa=0, pe=0;
        snap.forEach(d => { if(d.data().e==="INASISTENCIA") fa++; if(d.data().e==="PERMISO PERSONAL") pe++; });
        document.getElementById('textoAuditoria').innerHTML = `Faltas: ${fa}/3 | Permisos: ${pe}/3`;
        const b = document.getElementById('bloqueoMsg'), btn = document.getElementById('btnGuardar');
        if(fa>=3 || pe>=3) { b.classList.remove('hidden'); btn.innerText="BLOQUEADO"; btn.disabled=true; }
        else { b.classList.add('hidden'); btn.innerText="GUARDAR REGISTRO"; btn.disabled=false; }
        return {fa, pe};
    }

    async function guardar() {
        const n = document.getElementById('sPersona').value, f = document.getElementById('fManual').value, h = document.getElementById('hEntrada').value;
        let e = document.getElementById('sEstatus').value;
        const p = nomina.find(x => x.n === n);
        
        // LÓGICA DE HORARIOS POR CARGO (TOLERANCIA CERO)
        if(e === "ASISTENCIA" && h) {
            const t = parseInt(h.replace(":",""));
            if(p.c === "Docente" && p.t === "MAÑANA" && t > 700) e = "RETRASO";
            else if(p.c === "Docente" && p.t === "TARDE" && t > 1200) e = "RETRASO";
            else if(p.c === "Obrero" && p.t === "MAÑANA" && t > 700) e = "RETRASO";
            else if(p.c === "Obrero" && p.t === "TARDE" && t > 1200) e = "RETRASO";
            else if(p.c === "Administrativo" && t > 800) e = "RETRASO";
            else if(p.c === "Cocinera" && t > 700) e = "RETRASO";
            else if(p.c === "Vigilante" && p.t === "MAÑANA" && t > 600) e = "RETRASO";
            else if(p.c === "Vigilante" && p.t === "NOCHE" && t > 1800) e = "RETRASO";
        }

        await db.collection("asistencia_ebnlp_final").add({n, e, f, h:h||"--", c:p.c, ts:new Date(f+"T12:00:00").getTime(), mes:f.substring(0,7)});
        alert("Guardado");
    }

    function actualizarTodo() {
        const f = document.getElementById('fManual').value;
        db.collection("asistencia_ebnlp_final").onSnapshot(snap => {
            const bL = document.getElementById('bLista'), bC = document.getElementById('bodyCargos');
            const hDocs = snap.docs.filter(d => d.data().f === f);
            const cH = {Docente:0, Obrero:0, Administrativo:0, Cocinera:0, Vigilante:0};
            
            bL.innerHTML = "";
            hDocs.forEach(doc => {
                const d = doc.data();
                if(d.e==="ASISTENCIA" || d.e==="RETRASO") cH[d.c]++;
                bL.innerHTML += `<tr class="${d.e==='RETRASO'?'retraso-fila':''}"><td>${d.n}</td><td>${d.e}</td><td>${d.h}</td><td>${d.c}</td></tr>`;
            });

            bC.innerHTML = "";
            Object.keys(cH).forEach(c => {
                const tot = nomina.filter(x => x.c === c).length;
                bC.innerHTML += `<tr><td>${c}</td><td>${cH[c]}</td><td>${tot}</td><td>${tot>0?Math.round((cH[c]/tot)*100):0}%</td><td>-</td></tr>`;
            });
        });
    }

    async function alta() {
        const n = document.getElementById('nNom').value.toUpperCase(), c = document.getElementById('nCar').value, t = document.getElementById('nTur').value;
        if(n) await db.collection("nomina_institucional").add({n, c, t});
    }
</script>
</body>
</html>
