<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP - Sistema Integral de Asistencia</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #e74c3c; --verde: #27ae60; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        
        /* 1. CABECERA Y LOGO (CORREGIDO) */
        header { background: var(--azul); color: white; text-align: center; padding: 25px 10px; border-bottom: 6px solid var(--naranja); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo-contenedor { 
            width: 90px; height: 90px; background: white; border-radius: 50%; 
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
            border: 4px solid var(--naranja); overflow: hidden; position: relative;
        }
        .logo-contenedor img { width: 85%; height: auto; position: relative; z-index: 2; }
        .logo-fallback { position: absolute; color: var(--azul); font-weight: bold; font-size: 20px; z-index: 1; }

        /* 2. ESTADÍSTICAS Y CARGOS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border-top: 4px solid var(--azul); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .disgregacion-panel { background: white; margin: 0 15px 15px; padding: 15px; border-radius: 12px; border-left: 6px solid var(--naranja); }
        .cargo-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 13px; }

        /* 3. VIGILANCIA */
        .vigi-box { background: white; margin: 0 15px 15px; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #ddd; }
        .vigi-activa { background: #fff3e0; border: 2px solid var(--naranja); color: #d35400; font-weight: bold; padding: 10px; border-radius: 8px; }
        .vigi-espera { opacity: 0.4; font-size: 11px; padding: 5px; }

        /* 4. FORMULARIO PRINCIPAL */
        .card { background: white; margin: 15px; padding: 25px; border-radius: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        label { font-size: 11px; font-weight: bold; color: var(--azul); display: block; margin-top: 10px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }
        .btn-rojo { background: var(--rojo); }

        /* 5. TABLA Y VISUALIZACIÓN DE RETRASOS (CORREGIDO) */
        .tabla-card { background: white; margin: 15px; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: var(--azul); color: white; padding: 12px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        
        /* ESTILO ROJO PARA RETRASOS */
        .fila-retraso { background-color: #ffdada !important; color: #b71c1c; font-weight: bold; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; }
        .badge-retraso { background: var(--rojo); color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-contenedor">
        <span class="logo-fallback">EBNLP</span>
        <img id="logoImg" src="https://i.ibb.co/XSbL8w4/logo-oficial-ebnlp.png" alt="Logo" onerror="this.style.opacity='0'">
    </div>
    <h2 style="margin:0;">E.B.N. "LUCILA PALACIOS"</h2>
    <p style="margin:5px 0 0; font-size:11px; opacity:0.8;">SISTEMA TÉCNICO DE ASISTENCIA 2026</p>
</header>

<div class="stats-grid">
    <div class="stat-card"><h4>Asistencia</h4><p id="stAsis" style="font-size:24px;">0%</p></div>
    <div class="stat-card"><h4>Retrasos</h4><p id="stRet" style="font-size:24px; color:var(--rojo);">0</p></div>
</div>

<div class="disgregacion-panel">
    <strong>📊 ASISTENCIA POR GRUPOS:</strong>
    <div id="disgregacionList" style="margin-top:10px;"></div>
</div>

<div class="vigi-box">
    <div style="font-size:11px; font-weight:bold; margin-bottom:8px;">🛡️ ROL DE VIGILANCIA DE GUARDIA</div>
    <div id="vigiA" class="vigi-espera">GRUPO A: Osmil, Daher, Pedro, Moises</div>
    <div id="vigiB" class="vigi-espera">GRUPO B: Cesar, Juan, Guillermo, Darwin, Joseyver</div>
</div>

<div class="card">
    <label>1. Seleccionar Personal:</label>
    <select id="nomIn" onchange="autoLlenar()"><option value="">Cargando lista...</option></select>
    
    <div style="display:flex; gap:10px">
        <input type="text" id="carIn" placeholder="Cargo" readonly style="background:#f0f0f0">
        <input type="text" id="turIn" placeholder="Turno" readonly style="background:#f0f0f0">
    </div>

    <label>2. Hora de Entrada (Manual):</label>
    <input type="time" id="horaIn">

    <label>3. Estatus Administrativo:</label>
    <select id="estIn">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="VACACIONES">VACACIONES 🌴</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
        <option value="PERMISO">PERMISO 📝</option>
        <option value="FALTA">INASISTENCIA ❌</option>
    </select>

    <button class="btn btn-verde" onclick="registrar()">GUARDAR ASISTENCIA</button>
</div>

<div class="card">
    <button class="btn btn-azul" style="font-size:11px; padding:10px;" onclick="document.getElementById('adminPanel').classList.toggle('hidden')">⚙️ PANEL DE INGRESOS / EGRESOS</button>
    <div id="adminPanel" class="hidden" style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
        <label>Nuevo Ingreso:</label>
        <input type="text" id="newN" placeholder="Nombre completo">
        <select id="newC">
            <option value="Docente">Docente</option><option value="Obrero">Obrero</option>
            <option value="Administrativo">Administrativo</option><option value="Cocinera">Cocinera</option>
            <option value="Vigilante">Vigilante</option>
        </select>
        <select id="newT"><option value="MAÑANA">Mañana</option><option value="TARDE">Tarde</option></select>
        <button class="btn btn-azul" onclick="gestionNomina('ADD')">Añadir a Nómina</button>
        <hr>
        <label>Egreso de Personal:</label>
        <select id="delN"></select>
        <button class="btn btn-rojo" onclick="gestionNomina('DEL')">Eliminar de Nómina</button>
    </div>
</div>

<div class="tabla-card">
    <div style="padding:15px; background:#f0f0f0; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:bold; font-size:12px;">REGISTROS DE HOY</span>
        <button onclick="descargarExcel()" style="cursor:pointer; font-size:11px;">📥 EXPORTAR EXCEL</button>
    </div>
    <table id="tablaReporte">
        <thead><tr><th>NOMBRE</th><th>HORA</th><th>ESTATUS</th><th>CARGO</th></tr></thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    // --- FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const hoy = new Date().toLocaleDateString('en-CA');

    // --- LÓGICA DE RETRASO ---
    function calcularEstatus(cargo, turno, horaM) {
        const [h, m] = horaM.split(':').map(Number);
        const t = h * 60 + m;
        if (turno === "MAÑANA") {
            if ((cargo === "Docente" || cargo === "Cocinera") && t > 420) return "RETRASO"; // 7:00
            if ((cargo === "Obrero" || cargo === "Administrativo") && t > 405) return "RETRASO"; // 6:45
        } else {
            if (cargo === "Docente" && t > 720) return "RETRASO"; // 12:00
            if (cargo === "Obrero" && t > 690) return "RETRASO"; // 11:30
        }
        return "ASISTENCIA";
    }

    // --- MANEJO DE NÓMINA ---
    let nominaCloud = [];
    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nominaCloud = [];
        const sel = document.getElementById('nomIn'), del = document.getElementById('delN');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        del.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            const d = doc.data(); d.id = doc.id;
            nominaCloud.push(d);
            sel.innerHTML += `<option value="${d.n}">${d.n}</option>`;
            del.innerHTML += `<option value="${d.n}">${d.n}</option>`;
        });
        actualizarPantalla();
    });

    function autoLlenar() {
        const p = nominaCloud.find(x => x.n === document.getElementById('nomIn').value);
        if(p) { document.getElementById('carIn').value = p.c; document.getElementById('turIn').value = p.t; }
    }

    async function gestionNomina(tipo) {
        if(tipo === 'ADD') {
            const n = document.getElementById('newN').value.toUpperCase();
            if(!n) return alert("Ingrese nombre");
            await db.collection("nomina_institucional").add({n, c: document.getElementById('newC').value, t: document.getElementById('newT').value});
            document.getElementById('newN').value = "";
        } else {
            const val = document.getElementById('delN').value;
            const p = nominaCloud.find(x => x.n === val);
            if(p && confirm("¿Eliminar?")) await db.collection("nomina_institucional").doc(p.id).delete();
        }
    }

    // --- REGISTRO DE ASISTENCIA ---
    async function registrar() {
        const n = document.getElementById('nomIn').value, h = document.getElementById('horaIn').value;
        const c = document.getElementById('carIn').value, t = document.getElementById('turIn').value;
        let e = document.getElementById('estIn').value;

        if(!n || !h) return alert("⚠️ ERROR: Ingrese la hora manual.");
        if(e === "ASISTENCIA") e = calcularEstatus(c, t, h);

        await db.collection("asistencia_ebnlp_final").add({ n, c, t, h, e, f: hoy, ts: Date.now() });
        alert("REGISTRADO: " + e);
    }

    // --- ACTUALIZACIÓN DE TABLA Y ESTADÍSTICAS (REAL-TIME) ---
    function actualizarPantalla() {
        db.collection("asistencia_ebnlp_final").where("f", "==", hoy).orderBy("ts", "desc").onSnapshot(snap => {
            const cuerpo = document.getElementById('cuerpoTabla');
            const res = { Docente:0, Obrero:0, Administrativo:0, Cocinera:0, Vigilante:0 };
            let r = 0, p = 0;
            cuerpo.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                const esR = d.e === "RETRASO";
                if(esR) r++; 
                if(d.e === "ASISTENCIA" || esR) { p++; res[d.c]++; }
                
                cuerpo.innerHTML += `
                    <tr class="${esR ? 'fila-retraso' : ''}">
                        <td>${d.n}</td>
                        <td>${d.h}</td>
                        <td><span class="status-badge ${esR ? 'badge-retraso' : ''}">${d.e}</span></td>
                        <td>${d.c}</td>
                    </tr>`;
            });

            // Disgregación
            let html = "";
            ["Docente", "Obrero", "Administrativo", "Cocinera", "Vigilante"].forEach(cargo => {
                const total = nominaCloud.filter(x => x.c === cargo).length;
                html += `<div class="cargo-item"><span>${cargo}s:</span> <b>${res[cargo]}/${total}</b></div>`;
            });
            document.getElementById('disgregacionList').innerHTML = html;

            // Vigilancia
            const diff = Math.floor((new Date() - new Date("2026-03-02")) / 86400000);
            const turno = (diff % 2 === 0) ? "A" : "B";
            document.getElementById('vigiA').className = (turno === "A") ? "vigi-activa" : "vigi-espera";
            document.getElementById('vigiB').className = (turno === "B") ? "vigi-activa" : "vigi-espera";

            document.getElementById('stRet').innerText = r;
            document.getElementById('stAsis').innerText = nominaCloud.length > 0 ? Math.round((p/nominaCloud.length)*100) + "%" : "0%";
        });
    }

    function descargarExcel() {
        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tablaReporte')), `REPORTE_EBNLP_${hoy}.xlsx`);
    }
</script>
</body>
</html>
