        header { background: linear-gradient(180deg, var(--azul), #1a2a6c); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }

        .logo-img { width: 55px; height: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid var(--azul); }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; color: var(--azul); }
        .card { background: white; margin: 0 15px 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        label { display: block; font-size: 12px; font-weight: bold; margin: 10px 0 5px; color: var(--azul); }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-ingreso { background: var(--verde); }
        .btn-egreso { background: var(--naranja); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th { background: var(--azul); color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .vigilante-row { background-color: var(--celeste); }
    </style>
</head>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const hoy = new Date().toLocaleDateString('en-CA');
    const TOTAL_PLANTILLA = 73;

    function autoCompletar() {
        const n = document.getElementById('nombreInput').value;
        const c = document.getElementById('cargoInput');
        const h = document.getElementById('horarioInput');
        if(n.includes("Vigilante")) { c.value="Vigilante"; h.value="Rotativo"; }
        else if(n.includes("Docente-M")) { c.value="Docente"; h.value="07:00-12:00"; }
        else if(n.includes("Docente-T")) { c.value="Docente"; h.value="13:00-17:30"; }
        else if(n.includes("Obrero")) { c.value="Obrero"; h.value="07:00-13:00"; }
        else if(n.includes("Cocinera")) { c.value="Cocinera"; h.value="07:00-14:00"; }
    }

    async function registrar(tipo) {
        const nombre = document.getElementById('nombreInput').value;
        const cargo = document.getElementById('cargoInput').value;
        const hora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });

        if(!nombre) return alert("Seleccione un trabajador");

        const ref = db.collection("asistencia_personal").where("fecha", "==", hoy).where("nombre", "==", nombre);
        const query = await ref.get();

        if (query.empty) {
            await db.collection("asistencia_personal").add({
                nombre, cargo, fecha: hoy,
                ingreso: tipo === 'INGRESO' ? hora : '--',
                egreso: tipo === 'EGRESO' ? hora : '--',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        } else {
            const docId = query.docs[0].id;
            const update = tipo === 'INGRESO' ? { ingreso: hora } : { egreso: hora };
            await db.collection("asistencia_personal").doc(docId).update(update);
        }
        cargarDatos();
    }

    async function cargarDatos() {
        const snap = await db.collection("asistencia_personal").where("fecha", "==", hoy).get();
        let html = ""; let presentes = 0; let retardos = 0;
        snap.forEach(doc => {
            const d = doc.data(); presentes++;
            if(d.ingreso && d.ingreso.includes("AM") && d.ingreso > "07:15") retardos++;
            html += `<tr ${d.cargo.includes("Vigilante") ? 'class="vigilante-row"' : ''}>
                <td><b>${d.nombre}</b></td><td>${d.cargo}</td>
                <td>${d.ingreso || '--'}</td><td>${d.egreso || '--'}</td>
            </tr>`;
        });
        document.getElementById('tablaCuerpo').innerHTML = html;
        document.getElementById('statPresentes').innerText = presentes;
        document.getElementById('statRetardos').innerText = retardos;
        document.getElementById('statAsistencia').innerText = ((presentes / TOTAL_PLANTILLA) * 100).toFixed(1) + "%";
    }
    cargarDatos();
</script>
