<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA LUCILA PALACIOS - V6.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --verde: #1d6f42; --rojo: #d9534f; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 5px; border-bottom: 4px solid var(--naranja); }
        .dashboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; background: #fff; }
        .dash-card { border: 1px solid #ddd; padding: 5px; border-radius: 4px; text-align: center; border-bottom: 3px solid var(--azul); }
        .dash-card h4 { margin: 0; font-size: 0.6rem; color: #666; }
        .dash-card .valor { font-size: 1rem; font-weight: bold; color: var(--azul); }
        .tabs { display: flex; gap: 2px; padding: 5px; background: #fff; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; border-radius: 4px; font-weight: bold; background: #eee; cursor: pointer; font-size: 0.65rem; }
        .tab-btn.active { background: var(--naranja); color: white; }
        .cargo-section { margin: 10px; background: white; border-radius: 8px; border: 1px solid #ccc; overflow: hidden; }
        .cargo-title { background: var(--azul); color: white; padding: 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; }
        .cargo-content { display: none; padding: 10px; }
        .cargo-content.open { display: block; }
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
        .ficha { background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #ddd; text-align: center; font-size: 0.7rem; }
        .btn-check { width: 100%; padding: 5px; margin: 2px 0; border: none; border-radius: 3px; cursor: pointer; font-size: 0.6rem; font-weight: bold; }
        .sub-t { background: var(--naranja); color: white; padding: 10px; margin: 10px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }
        .table-wrap { overflow-x: auto; background: white; border-radius: 8px; margin: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th { background: #444; color: white; padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        .retraso-celda { color: var(--rojo); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header><h4>SISTEMA CONTROL - LUCILA PALACIOS</h4></header>

<div class="dashboard">
    <div class="dash-card"><h4>DOC</h4><div id="dDoc" class="valor">0</div></div>
    <div class="dash-card"><h4>OBR</h4><div id="dObr" class="valor">0</div></div>
    <div class="dash-card"><h4>ADM</h4><div id="dAdm" class="valor">0</div></div>
    <div class="dash-card"><h4>CNAE</h4><div id="dCnae" class="valor">0</div></div>
    <div class="dash-card"><h4>VIG</h4><div id="dVig" class="valor">0</div></div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="verTab('tabEscuela', this)">ESCUELA</button>
    <button class="tab-btn" onclick="verTab('tabVigilancia', this)">VIGILANCIA</button>
    <button class="tab-btn" onclick="verTab('tabEstadistica', this)">ESTADÍSTICA</button>
    <button class="tab-btn" onclick="verTab('tabNomina', this)">NÓMINA</button>
</div>

<div id="tabEscuela" class="tab-content">
    <div style="padding:10px;"><input type="date" id="fechaEscuela" onchange="actualizarTodo()"></div>
    <div id="contEscuela"></div>
    <div class="sub-t">LISTA DIARIA DE ASISTENCIA (ESCUELA)</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Nombre</th><th>Turno</th><th>Estatus</th><th>H. Entrada</th><th>Obs</th></tr></thead>
            <tbody id="resumenEscuela"></tbody>
        </table>
    </div>
</div>

<div id="tabVigilancia" class="tab-content hidden">
    <div style="padding:10px; display:flex; gap:5px;">
        <input type="date" id="fechaVig" onchange="actualizarTodo()">
        <select id="filtroGrupo" onchange="actualizarTodo()" style="flex:1"><option value="GRUPO I">GRUPO I</option><option value="GRUPO II">GRUPO II</option></select>
    </div>
    <div id="contVigilancia"></div>
    <div class="sub-t">LISTA DIARIA (VIGILANCIA)</div>
    <div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Estatus</th><th>Entrada/Salida</th></tr></thead><tbody id="resumenVigilancia"></tbody></table></div>
</div>

<div id="tabEstadistica" class="tab-content hidden">
    <div style="padding:10px; background:white; margin:10px; border-radius:8px; display:flex; gap:5px;">
        <input type="month" id="mesReporte" style="flex:1">
        <button onclick="generarEstadistica()" style="background:var(--azul); color:white; border:none; padding:10px; border-radius:5px;">CALCULAR</button>
        <button onclick="exportarExcel('tablaEstadistica', 'Estadistica_Mensual')" style="background:var(--verde); color:white; border:none; padding:10px; border-radius:5px;">EXCEL</button>
    </div>
    <div class="table-wrap">
        <table id="tablaEstadistica">
            <thead><tr><th>CARGO</th><th>GEN</th><th>NÓM</th><th>ASIS</th><th>PROM REAL</th><th>% EFEC</th></tr></thead>
            <tbody id="bodyEstadistica"></tbody>
        </table>
    </div>
</div>

<div id="tabNomina" class="tab-content hidden">
    <div style="padding:15px; background:white; margin:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="text" id="nNombre" placeholder="NOMBRE COMPLETO" style="width:100%; padding:8px; margin-bottom:5px; text-transform:uppercase;">
        <div style="display:flex; gap:5px;">
            <select id="nCargo" style="flex:1; padding:8px;"><option value="Docente">Docente</option><option value="Obrero">Obrero</option><option value="Administrativo">Administrativo</option><option value="CNAE (Cocinera)">CNAE (Cocinera)</option><option value="Vigilante">Vigilante</option></select>
            <select id="nGen" style="padding:8px;"><option value="F">F</option><option value="M">M</option></select>
            <select id="nGrupo" style="flex:1; padding:8px;"><option value="General">Escuela</option><option value="GRUPO I">Vig I</option><option value="GRUPO II">Vig II</option></select>
        </div>
        <button onclick="agregarNomina()" style="width:100%; padding:10px; margin-top:5px; background:var(--verde); color:white; border:none; border-radius:5px;">+ GUARDAR</button>
    </div>
    <div style="padding:10px;"><button onclick="descargarRespaldo()" style="width:100%; padding:12px; background:var(--azul); color:white; border:none; border-radius:5px;">📥 DESCARGAR TODA LA ASISTENCIA (EXCEL)</button></div>
    <div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Cargo</th><th>Acción</th></tr></thead><tbody id="bodyNomina"></tbody></table></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nomina = [];
    document.getElementById('fechaEscuela').value = new Date().toISOString().split('T')[0];
    document.getElementById('fechaVig').value = new Date().toISOString().split('T')[0];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        snap.forEach(doc => { let d = doc.data(); d.id = doc.id; nomina.push(d); });
        renderNomina();
        actualizarTodo();
    });

    async function actualizarTodo() {
        dibujarSeccion("contEscuela", ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)"], document.getElementById('fechaEscuela').value, "resumenEscuela");
        dibujarSeccion("contVigilancia", ["Vigilante"], document.getElementById('fechaVig').value, "resumenVigilancia", document.getElementById('filtroGrupo').value);
        actualizarDash(document.getElementById('fechaEscuela').value);
    }

    async function actualizarDash(f) {
        const snap = await db.collection("asistencia_ebnlp_final").where("f", "==", f).get();
        let c = {Docente:0, Obrero:0, Administrativo:0, "CNAE (Cocinera)":0, Vigilante:0};
        snap.forEach(d => { if(!["INASISTENCIA","P. PERSONAL"].includes(d.data().e)) c[d.data().c]++; });
        document.getElementById('dDoc').innerText = c.Docente;
        document.getElementById('dObr').innerText = c.Obrero;
        document.getElementById('dAdm').innerText = c.Administrativo;
        document.getElementById('dCnae').innerText = c["CNAE (Cocinera)"];
        document.getElementById('dVig').innerText = c.Vigilante;
    }

    async function registrar(n, e, f) {
        const p = nomina.find(x => x.n === n);
        const t = prompt("Turno: 1 (Mañana) o 2 (Tarde)", "1");
        let hE = prompt("Hora Entrada (HH:mm):", "07:00"); if(!hE) return;

        let finalE = e;
        const [h, m] = hE.split(':').map(Number);
        const minTot = h * 60 + m;

        // LÓGICA DE RETRASO SEGÚN CARGO Y TURNO
        if(e === "ASISTENCIA") {
            if(t === "1") { // Mañana
                if((p.c === "Docente" || p.c === "CNAE (Cocinera)") && minTot > 420) finalE = "RETRASO"; // > 7:00
                if((p.c === "Obrero" || p.c === "Administrativo") && minTot > 405) finalE = "RETRASO"; // > 6:45
            } else { // Tarde
                if(p.c === "Docente" && minTot > 720) finalE = "RETRASO"; // > 12:00
                if(p.c === "Administrativo" && minTot > 720) finalE = "RETRASO"; // > 12:00
                if(p.c === "Obrero" && minTot > 690) finalE = "RETRASO"; // > 11:30
            }
            if(p.c === "Vigilante" && minTot > 360 && h < 12) finalE = "RETRASO"; // Vigilante Día > 6:00
        }

        await db.collection("asistencia_ebnlp_final").add({ n, e: finalE, f, c: p.c, gender: p.gender, t: t === "1" ? "Mañana" : "Tarde", hE, hS: "---", mes: f.substring(0,7) });
        actualizarTodo();
    }

    async function dibujarSeccion(contId, cargos, fecha, resId, grupo = null) {
        const snap = await db.collection("asistencia_ebnlp_final").where("f", "==", fecha).get();
        const marcados = {};
        const resBody = document.getElementById(resId); resBody.innerHTML = "";
        snap.forEach(d => marcados[d.data().n] = d.data());

        const cont = document.getElementById(contId); cont.innerHTML = "";

        cargos.forEach(cargo => {
            let list = nomina.filter(p => p.c === cargo);
            if(cargo === "Vigilante") list = list.filter(p => p.grupo === grupo);
            if(list.length === 0) return;

            const sec = document.createElement('div');
            sec.className = "cargo-section";
            sec.innerHTML = `<div class="cargo-title" onclick="this.nextElementSibling.classList.toggle('open')"><span>${cargo.toUpperCase()} (${list.length})</span> <span>▼</span></div>`;
            
            const content = document.createElement('div'); content.className = "cargo-content";
            const grid = document.createElement('div'); grid.className = "grid-fichas";

            list.forEach(p => {
                const m = marcados[p.n];
                const f = document.createElement('div'); f.className = "ficha";
                if(!m) {
                    f.innerHTML = `<b>${p.n}</b><br><button class="btn-check" style="background:#d4edda" onclick="registrar('${p.n}','ASISTENCIA','${fecha}')">MARCAR</button>`;
                } else {
                    f.innerHTML = `<b>${p.n}</b><br><b style="color:${m.e==='RETRASO'?'red':'green'}">${m.e}</b><br><small>${m.hE}</small>`;
                    resBody.innerHTML += `<tr><td>${p.n}</td><td>${m.t||'N/A'}</td><td class="${m.e==='RETRASO'?'retraso-celda':''}">${m.e}</td><td>${m.hE}</td><td>${m.obs||''}</td></tr>`;
                }
                grid.appendChild(f);
            });
            content.appendChild(grid); sec.appendChild(content); cont.appendChild(sec);
        });
    }

    async function descargarRespaldo() {
        const snap = await db.collection("asistencia_ebnlp_final").get();
        const data = snap.docs.map(d => d.data());
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Historico");
        XLSX.writeFile(wb, "Respaldo_Asistencia_Lucila.xlsx");
    }

    async function generarEstadistica() {
        const mes = document.getElementById('mesReporte').value; if(!mes) return;
        const snap = await db.collection("asistencia_ebnlp_final").where("mes", "==", mes).get();
        const data = snap.docs.map(d => d.data());
        const bEst = document.getElementById('bodyEstadistica'); bEst.innerHTML = "";
        ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)", "Vigilante"].forEach(c => {
            let tN = 0, tA = 0, tP = 0;
            ["F", "M"].forEach(g => {
                const nT = nomina.filter(p => p.c === c && p.gender === g);
                if(nT.length > 0) {
                    const asis = data.filter(x => x.c === c && x.gender === g && ["ASISTENCIA","RETRASO"].includes(x.e)).length;
                    const div = (c === "Vigilante") ? 15 : 20;
                    const pr = (asis / div).toFixed(2);
                    bEst.innerHTML += `<tr><td>${c}</td><td>${g}</td><td>${nT.length}</td><td>${asis}</td><td>${pr}</td><td>${((pr/nT.length)*100).toFixed(1)}%</td></tr>`;
                    tN += nT.length; tA += asis; tP += parseFloat(pr);
                }
            });
        });
    }

    function verTab(id, btn) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.remove('hidden'); btn.classList.add('active'); }
    function agregarNomina() { const n = document.getElementById('nNombre').value.toUpperCase(); db.collection("nomina_institucional").add({ n, c: document.getElementById('nCargo').value, gender: document.getElementById('nGen').value, grupo: document.getElementById('nGrupo').value }); }
    function renderNomina() { const b = document.getElementById('bodyNomina'); b.innerHTML = ""; nomina.forEach(p => b.innerHTML += `<tr><td>${p.n}</td><td>${p.c}</td><td><button onclick="db.collection('nomina_institucional').doc('${p.id}').delete()">❌</button></td></tr>`); }
    function exportarExcel(id, name) { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(id)), name + ".xlsx"); }
</script>
</body>
</html>
