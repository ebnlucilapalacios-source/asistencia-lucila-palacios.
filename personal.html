<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Personal y Vigilancia - EBNLP</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            messagingSenderId: "368890880546",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.marcar = async (id, nombre, rol, grupo) => {
            const h = new Date().toISOString().split('T')[0];
            const horaActual = new Date().getHours();
            
            // Lógica de turnos para vigilantes
            let turnoDesc = "Administrativo";
            if (rol === 'vigilante') {
                turnoDesc = (horaActual >= 18 || horaActual < 6) ? "Nocturno (6pm-6am)" : "Especial Diurno (6am-6pm)";
            }

            await setDoc(doc(db, "asistencia_personal", h), { 
                [id]: { 
                    asistio: 1, 
                    nombre: nombre, 
                    turno: turnoDesc,
                    hora: new Date().toLocaleTimeString() 
                } 
            }, { merge: true });
        };

        window.escuchar = (cb) => {
            const h = new Date().toISOString().split('T')[0];
            onSnapshot(doc(db, "asistencia_personal", h), (d) => cb(d.data() || {}));
        };
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; background: #f4f7f6; margin: 0;">
    <div style="background: #1a2a6c; color: white; padding: 15px;">
        <h2>Panel Control EBNLP</h2>
        <div id="info-grupo" style="background:#f39c12; color:#1a2a6c; display:inline-block; padding:5px 15px; border-radius:20px; font-weight:bold; font-size:0.9em; margin-bottom:10px;"></div>
        <br>
        <a href="index.html" style="color: white; font-size: 0.8em;">⬅ Volver al Menú</a>
    </div>

    <div id="lista" style="padding: 20px; max-width: 450px; margin: auto;"></div>

    <script>
        // Todo tu personal integrado
        const staff = [
            {id:1, n:"YANITZA GÓMEZ", rol:"admin"},
            {id:2, n:"MARÍA ACUÑA", rol:"admin"},
            {id:3, n:"KARELYS REYES", rol:"admin"},
            // Vigilantes (IDs únicos para no chocar con el personal anterior)
            {id:101, n:"VIGILANTE 1 (B)", rol:"vigilante", grupo:"B"},
            {id:102, n:"VIGILANTE 2 (B)", rol:"vigilante", grupo:"B"},
            {id:201, n:"VIGILANTE 3 (A)", rol:"vigilante", grupo:"A"},
            {id:202, n:"VIGILANTE 4 (A)", rol:"vigilante", grupo:"A"}
        ];

        function obtenerGrupoHoy() {
            const hoy = new Date();
            const ref = new Date("2026-02-28"); // El 28-Feb fue A, hoy 01-Mar es B
            const diff = Math.floor((hoy - ref) / (1000 * 60 * 60 * 24));
            return (diff % 2 === 0) ? "A" : "B";
        }

        const grupoActivo = obtenerGrupoHoy();
        document.getElementById('info-grupo').innerText = "HOY TRABAJA EL GRUPO: " + grupoActivo;

        function render(d = {}) {
            const c = document.getElementById('lista'); c.innerHTML = "";
            staff.forEach(s => {
                const registro = d[s.id];
                const yaMarco = registro && (registro === 1 || registro.asistio === 1);
                
                // Las administradoras siempre pueden marcar. Los vigilantes solo si es su grupo.
                const puedeMarcar = s.rol === 'admin' || s.grupo === grupoActivo;

                c.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:15px; background:white; border-radius:8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid ${s.rol === 'admin' ? '#3498db' : '#f39c12'}; opacity: ${puedeMarcar ? '1' : '0.5'}">
                    <div style="text-align:left;">
                        <span style="font-weight:bold; display:block;">${s.n}</span>
                        <small style="color:#7f8c8d;">${s.rol === 'admin' ? 'Administrativo' : 'Vigilante - G'+s.grupo}</small>
                    </div>
                    <button onclick="marcar(${s.id}, '${s.n}', '${s.rol}', '${s.grupo}')" 
                        ${yaMarco || !puedeMarcar ? 'disabled' : ''} 
                        style="background:${yaMarco ? '#27ae60' : (puedeMarcar ? '#1a2a6c' : '#ccc')}; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">
                        ${yaMarco ? 'REGISTRADO' : (puedeMarcar ? 'MARCAR' : 'NO TOCA')}
                    </button>
                </div>`;
            });
        }
        window.escuchar(render);
    </script>
</body>
</html>
