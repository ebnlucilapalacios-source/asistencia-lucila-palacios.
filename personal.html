<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA CONTROL TOTAL - LUCILA PALACIOS</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --verde: #1d6f42; --gris: #f4f4f4; --rojo: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding-bottom: 50px; }
        header { background: var(--azul); color: white; text-align: center; padding: 5px; border-bottom: 4px solid var(--naranja); }
        
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #fff; }
        .dash-card { border: 1px solid #ddd; padding: 5px; border-radius: 4px; text-align: center; border-bottom: 3px solid var(--azul); }
        .dash-card h4 { margin: 0; font-size: 0.6rem; color: #666; }
        .dash-card .valor { font-size: 0.9rem; font-weight: bold; color: var(--azul); }

        .tabs { display: flex; gap: 2px; padding: 5px; background: #fff; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; border-radius: 4px; font-weight: bold; background: #eee; cursor: pointer; font-size: 0.65rem; text-transform: uppercase; }
        .tab-btn.active { background: var(--naranja); color: white; }

        .cargo-section { margin: 10px; background: white; border-radius: 8px; border: 1px solid #ccc; overflow: hidden; }
        .cargo-title { background: var(--azul); color: white; padding: 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; }
        .cargo-content { display: none; padding: 10px; }
        .cargo-content.open { display: block; }
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
        .ficha { background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #ddd; text-align: center; font-size: 0.7rem; }
        
        .btn-check { width: 100%; padding: 5px; margin: 2px 0; border: none; border-radius: 3px; cursor: pointer; font-size: 0.6rem; font-weight: bold; }
        .btn-asis { background: #d4edda; color: #155724; }
        .btn-act { background: #d1ecf1; color: #0c5460; }
        .btn-ret { background: #fff3cd; color: #856404; }
        .btn-ina { background: #f8d7da; color: #721c24; }
        .btn-vac { background: #d1e7ff; color: #004085; }
        .btn-med { background: #e2e3e5; color: #383d41; }
        .btn-per { background: #f3e5f5; color: #4a148c; }
        .btn-salida { background: var(--azul); color: white; margin-top: 5px; }
        
        .sub-t { background: var(--naranja); color: white; padding: 10px; margin: 10px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; text-align: center; }
        .table-wrap { overflow-x: auto; background: white; border-radius: 8px; margin: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        th { background: #444; color: white; padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        .hidden { display: none; }
        .btn-limpiar { background: var(--rojo); color: white; border: none; padding: 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header><h4>SISTEMA CONTROL - LUCILA PALACIOS</h4></header>

<div class="dashboard">
    <div class="dash-card"><h4>ADMIN.</h4><div id="dAdm" class="valor">0</div></div>
    <div class="dash-card"><h4>CNAE</h4><div id="dCnae" class="valor">0</div></div>
    <div class="dash-card"><h4>VIGILANCIA</h4><div id="dVig" class="valor">0</div></div>
    <div class="dash-card"><h4>EFECTIVIDAD</h4><div id="dEfec" class="valor">0%</div></div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="verTab('tabEscuela', this)">Escuela</button>
    <button class="tab-btn" onclick="verTab('tabVigilancia', this)">Vigilancia</button>
    <button class="tab-btn" onclick="verTab('tabEstadistica', this)">Estadística</button>
    <button class="tab-btn" onclick="verTab('tabNomina', this)">Nómina</button>
</div>

<div id="tabEscuela" class="tab-content">
    <div style="padding:10px; display:flex; gap:5px; align-items: center; background: white;">
        <input type="date" id="fechaEscuela" onchange="actualizarTodo()">
        <button class="btn-limpiar" onclick="limpiarDia('fechaEscuela')">LIMPIAR DÍA</button>
        <select id="turnoSeleccionado" style="flex:1; padding:5px;"><option value="MAÑANA">MAÑANA</option><option value="TARDE">TARDE</option></select>
    </div>
    <div id="contEscuela"></div>
    <div class="sub-t">LISTA DIARIA / NOVEDADES</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Nombre</th><th>Estatus</th><th>E/S</th><th>Obs. Entrada</th><th>Motivo Salida</th></tr></thead>
            <tbody id="resumenEscuela"></tbody>
        </table>
    </div>
</div>

<div id="tabVigilancia" class="tab-content hidden">
    <div style="padding:10px; display:flex; gap:5px; align-items: center; background: white;">
        <input type="date" id="fechaVig" onchange="actualizarTodo()">
        <button class="btn-limpiar" onclick="limpiarDia('fechaVig')">LIMPIAR DÍA</button>
        <select id="filtroGrupo" onchange="actualizarTodo()" style="flex:1; padding:6px;"><option value="GRUPO I">GRUPO I</option><option value="GRUPO II">GRUPO II</option></select>
    </div>
    <div id="contVigilancia"></div>
</div>

<div id="tabEstadistica" class="tab-content hidden">
    <div style="padding:15px; background:white; margin:10px; border-radius:8px; display:flex; gap:10px;">
        <input type="month" id="mesReporte" style="flex:2; padding:10px; border:1px solid #ccc;">
        <button onclick="generarReportes()" style="flex:1; background:var(--azul); color:white; border:none; border-radius:5px; font-weight:bold;">CALCULAR</button>
        <button onclick="exportarEstadistica()" style="flex:1; background:var(--verde); color:white; border:none; border-radius:5px; font-weight:bold;">EXCEL</button>
    </div>
    <div class="sub-t">PROMEDIO REAL DISGREGADO</div>
    <div class="table-wrap"><table id="tablaEstFinal"><thead><tr><th>CARGO</th><th>GEN</th><th>NÓM</th><th>ASIS</th><th>PROM</th><th>% EFEC</th></tr></thead><tbody id="bodyEstadistica"></tbody></table></div>
    <div class="sub-t">CONSOLIDADO INDIVIDUAL</div>
    <div class="table-wrap"><table id="tablaIndFinal"><thead><tr><th>NOMBRE</th><th>ASIS</th><th>RET</th><th>INA</th><th>P.M</th><th>P.P</th><th>S.ANT</th><th>PROM</th><th>%</th></tr></thead><tbody id="bodyIndividual"></tbody></table></div>
</div>

<div id="tabNomina" class="tab-content hidden">
    <div style="padding:15px; background:white; margin:10px; border-radius:8px; border:1px solid #ddd;">
        <h4 style="margin:0 0 10px 0;">Nuevo Personal</h4>
        <input type="text" id="nNombre" placeholder="NOMBRE COMPLETO" style="width:100%; padding:10px; margin-bottom:5px; text-transform:uppercase;">
        <div style="display:flex; gap:5px;">
            <select id="nCargo" style="flex:1; padding:8px;"><option value="Docente">Docente</option><option value="Obrero">Obrero</option><option value="Administrativo">Administrativo</option><option value="CNAE (Cocinera)">CNAE (Cocinera)</option><option value="Vigilante">Vigilante</option></select>
            <select id="nGen" style="padding:8px;"><option value="F">F</option><option value="M">M</option></select>
            <select id="nGrupo" style="flex:1; padding:8px;"><option value="General">Escuela</option><option value="GRUPO I">Vig I</option><option value="GRUPO II">Vig II</option></select>
        </div>
        <button onclick="agregarNomina()" style="width:100%; padding:12px; margin-top:8px; background:var(--naranja); color:white; border:none; border-radius:5px; font-weight:bold;">GUARDAR</button>
    </div>
    <div style="padding:10px; display:flex; gap:5px;">
        <button onclick="descargarNominaRespaldo()" style="flex:1; padding:10px; background:#444; color:white; border:none; border-radius:5px; font-size:0.7rem;">📥 RESPALDO JSON</button>
        <button onclick="document.getElementById('fileRestaurar').click()" style="flex:1; padding:10px; background:var(--rojo); color:white; border:none; border-radius:5px; font-size:0.7rem;">📤 RESTAURAR</button>
        <input type="file" id="fileRestaurar" hidden accept=".json" onchange="importarNominaJSON(this)">
    </div>
    <div class="table-wrap"><table><thead style="background:var(--azul); color:white;"><tr><th>Nombre</th><th>Cargo</th><th>Acción</th></tr></thead><tbody id="bodyNomina"></tbody></table></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nomina = [];
    document.getElementById('fechaEscuela').value = new Date().toISOString().split('T')[0];
    document.getElementById('fechaVig').value = new Date().toISOString().split('T')[0];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        snap.forEach(doc => { let d = doc.data(); d.id = doc.id; nomina.push(d); });
        nomina.sort((a,b) => a.n.localeCompare(b.n));
        renderNomina(); actualizarTodo();
    });

    async function actualizarTodo() {
        dibujarSeccion("contEscuela", ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)"], document.getElementById('fechaEscuela').value, "resumenEscuela");
        dibujarSeccion("contVigilancia", ["Vigilante"], document.getElementById('fechaVig').value, null, document.getElementById('filtroGrupo').value);
    }

    async function dibujarSeccion(contId, cargos, fecha, resId = null, grupo = null) {
        const snap = await db.collection("asistencia_ebnlp_final").where("f", "==", fecha).get();
        const marcados = {}; const resBody = resId ? document.getElementById(resId) : null;
        if(resBody) resBody.innerHTML = "";
        
        snap.forEach(d => {
            const data = d.data();
            data.docId = d.id;
            marcados[data.n] = data;
        });

        const cont = document.getElementById(contId); cont.innerHTML = "";

        cargos.forEach(cargo => {
            let list = nomina.filter(p => p.c === cargo);
            if(cargo === "Vigilante") list = list.filter(p => p.grupo === grupo);
            if(list.length === 0) return;
            const sec = document.createElement('div'); sec.className = "cargo-section";
            sec.innerHTML = `<div class="cargo-title" onclick="this.nextElementSibling.classList.toggle('open')"><span>${cargo.toUpperCase()}</span> <span>▼</span></div>`;
            const content = document.createElement('div'); content.className = "cargo-content";
            const grid = document.createElement('div'); grid.className = "grid-fichas";

            list.forEach(p => {
                const m = marcados[p.n]; const f = document.createElement('div'); f.className = "ficha";
                if(!m) {
                    f.innerHTML = `<b>${p.n}</b><br>
                        <button class="btn-check btn-asis" onclick="registrar('${p.n}','ASISTENCIA','${fecha}')">ASISTENCIA</button>
                        <button class="btn-check btn-act" onclick="registrar('${p.n}','ACT. INST.','${fecha}')">ACT. INST.</button>
                        <button class="btn-check btn-ret" onclick="registrar('${p.n}','RETRASO','${fecha}')">RETRASO</button>
                        <button class="btn-check btn-ina" onclick="registrar('${p.n}','INASISTENCIA','${fecha}')">INASISTENCIA</button>
                        <button class="btn-check btn-vac" onclick="registrar('${p.n}','VACACIONES','${fecha}')">VACACIONES</button>
                        <button class="btn-check btn-med" onclick="registrar('${p.n}','P. MÉDICO','${fecha}')">P. MÉDICO</button>
                        <button class="btn-check btn-per" onclick="registrar('${p.n}','P. PERSONAL','${fecha}')">P. PERSONAL</button>`;
                } else {
                    f.innerHTML = `<b>${p.n}</b><br><b style="color:green">✓ ${m.e}</b><br>
                        <small>E: ${m.hE} | S: ${m.hS}</small><br>
                        ${m.hS === "---" && ["ASISTENCIA","RETRASO","ACT. INST."].includes(m.e) ? `<button class="btn-check btn-salida" onclick="marcarSalida('${m.docId}','${m.n}')">SALIDA</button>` : ''}
                        <button onclick="borrar('${m.n}','${fecha}')" style="border:none; color:red; font-size:9px; cursor:pointer; background:none; margin-top:5px;">[BORRAR]</button>`;
                    if(resBody) resBody.innerHTML += `<tr><td style="text-align:left">${p.n}</td><td>${m.e}</td><td>${m.hE}/${m.hS}</td><td>${m.obs||"-"}</td><td>${m.obs_salida||"-"}</td></tr>`;
                }
                grid.appendChild(f);
            });
            content.appendChild(grid); sec.appendChild(content); cont.appendChild(sec);
        });
    }

    async function registrar(n, e, f) {
        const p = nomina.find(x => x.n === n);
        let hE = "---", obs = "";
        let limite = "07:15"; let sug = "07:00";
        if(p.c === "Obrero") { sug = "06:30"; limite = "06:45"; }

        if(["ASISTENCIA","RETRASO","ACT. INST."].includes(e)) {
            hE = prompt(`Hora Entrada para ${n}:`, sug);
            if(!hE) return;
            if(hE > limite && e === "ASISTENCIA") {
                if(confirm("Se detecta hora después del límite. ¿Cambiar a RETRASO?")){
                    e = "RETRASO"; obs = prompt("Motivo del retraso:");
                }
            }
        } else { obs = prompt("Motivo de la inasistencia/permiso:"); }

        await db.collection("asistencia_ebnlp_final").add({ 
            n, e, f, c: p.c, gender: p.gender, grupo: p.grupo, mes: f.substring(0,7), 
            hE, hS: "---", obs: obs || "", obs_salida: "" 
        });
        actualizarTodo();
    }

    async function marcarSalida(docId, nombre) {
        let hSugerida = (document.getElementById('turnoSeleccionado').value === "MAÑANA") ? "12:00" : "18:00";
        let hS = prompt(`Hora Salida para ${nombre}:`, new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}));
        if(!hS) return;

        let motivo = "";
        if(hS < hSugerida) {
            motivo = prompt("SALIDA ANTICIPADA. Ingrese motivo del retiro:");
            if(!motivo) { alert("Debe indicar un motivo."); return; }
        }
        await db.collection("asistencia_ebnlp_final").doc(docId).update({ hS, obs_salida: motivo || "Completa" });
        actualizarTodo();
    }

    async function borrar(n, f) {
        if(confirm(`¿Borrar registro de ${n}?`)) {
            const q = await db.collection("asistencia_ebnlp_final").where("n","==",n).where("f","==",f).get();
            const batch = db.batch(); q.forEach(d => batch.delete(d.ref)); await batch.commit();
            actualizarTodo();
        }
    }

    async function limpiarDia(idInput) {
        const f = document.getElementById(idInput).value;
        if(confirm(`¿Borrar todo el día ${f}?`)) {
            const q = await db.collection("asistencia_ebnlp_final").where("f","==",f).get();
            const batch = db.batch(); q.forEach(d => batch.delete(d.ref)); await batch.commit();
            actualizarTodo();
        }
    }

    async function generarReportes() {
        const mes = document.getElementById('mesReporte').value; if(!mes) return alert("Seleccione un mes.");
        const snap = await db.collection("asistencia_ebnlp_final").where("mes", "==", mes).get();
        const data = []; snap.forEach(d => data.push(d.data()));
        
        const bEst = document.getElementById('bodyEstadistica'); bEst.innerHTML = "";
        ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)", "Vigilante"].forEach(c => {
            let nTot = 0, aTot = 0, pTot = 0;
            ["F", "M"].forEach(g => {
                const nT = nomina.filter(p => p.c === c && p.gender === g).length;
                if (nT > 0) {
                    const asis = data.filter(x => x.c === c && x.gender === g && ["ASISTENCIA","ACT. INST.","RETRASO"].includes(x.e)).length;
                    const prom = (asis / (c === "Vigilante" ? 15 : 20)).toFixed(2);
                    bEst.innerHTML += `<tr><td>${c}</td><td>${g}</td><td>${nT}</td><td>${asis}</td><td>${prom}</td><td>${((prom/nT)*100).toFixed(1)}%</td></tr>`;
                    nTot += nT; aTot += asis; pTot += parseFloat(prom);
                }
            });
            if (nTot > 0) bEst.innerHTML += `<tr style="background:#eee; font-weight:bold"><td>TOTAL ${c}</td><td>-</td><td>${nTot}</td><td>${aTot}</td><td>${pTot.toFixed(2)}</td><td>${((pTot/nTot)*100).toFixed(1)}%</td></tr>`;
        });

        const bInd = document.getElementById('bodyIndividual'); bInd.innerHTML = "";
        nomina.forEach(p => {
            const r = data.filter(x => x.n === p.n); if(r.length === 0) return;
            const asis = r.filter(x => ["ASISTENCIA","ACT. INST."].includes(x.e)).length;
            const sAnt = r.filter(x => x.obs_salida && x.obs_salida !== "Completa").length;
            const prom = (asis / (p.c === "Vigilante" ? 15 : 20)).toFixed(2);
            bInd.innerHTML += `<tr><td style="text-align:left"><b>${p.n}</b></td><td>${asis}</td><td>${r.filter(x=>x.e==="RETRASO").length}</td><td>${r.filter(x=>x.e==="INASISTENCIA").length}</td><td>${r.filter(x=>x.e==="P. MÉDICO").length}</td><td>${r.filter(x=>x.e==="P. PERSONAL").length}</td><td style="color:red">${sAnt}</td><td>${prom}</td><td>${(prom*100).toFixed(1)}%</td></tr>`;
        });
    }

    function exportarEstadistica() {
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.table_to_sheet(document.getElementById('tablaEstFinal')), "Estadistica");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.table_to_sheet(document.getElementById('tablaIndFinal')), "Individual");
        XLSX.writeFile(wb, `Reporte_Control_LP_${document.getElementById('mesReporte').value}.xlsx`);
    }

    function descargarNominaRespaldo() {
        const b = new Blob([JSON.stringify(nomina)], {type:"application/json"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "respaldo_nomina.json"; a.click();
    }

    function importarNominaJSON(input) {
        const r = new FileReader();
        r.onload = async function() {
            const data = JSON.parse(r.result);
            if(confirm("¿Restaurar nómina?")){
                const snap = await db.collection("nomina_institucional").get();
                const batch = db.batch(); snap.forEach(d => batch.delete(d.ref));
                data.forEach(p => batch.set(db.collection("nomina_institucional").doc(), {n:p.n, c:p.c, gender:p.gender, grupo:p.grupo}));
                await batch.commit(); alert("Nómina cargada.");
            }
        };
        r.readAsText(input.files[0]);
    }

    function verTab(id, btn) { 
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
        document.getElementById(id).classList.remove('hidden'); btn.classList.add('active'); 
    }
    
    function renderNomina() { 
        const b = document.getElementById('bodyNomina'); b.innerHTML = ""; 
        nomina
