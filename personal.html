<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP - Sistema Profesional 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 50px; }
        
        header { background: var(--azul); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }
        .logo-box { width: 100px; height: 100px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--naranja); overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .logo-box img { width: 90%; height: auto; }

        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card-stat { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid var(--azul); }
        
        .card { background: white; margin: 10px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        label { font-size: 11px; font-weight: bold; color: var(--azul); display: block; margin-top: 10px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-verde { background: var(--verde); }
        .btn-azul { background: var(--azul); }

        /* VISUALIZACIÓN DE RETRASOS */
        .fila-retraso { background-color: #ffdada !important; color: #b71c1c; font-weight: bold; }
        .badge-retraso { background: var(--rojo); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        th { background: var(--azul); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://i.ibb.co/XSbL8w4/logo-oficial-ebnlp.png" alt="EBN Lucila Palacios" onerror="this.src='https://cdn-icons-png.flaticon.com/512/167/167707.png'">
    </div>
    <h2 style="margin:0;">E.B.N. "LUCILA PALACIOS"</h2>
    <p style="margin:0; font-size:11px;">San Félix - Reporte Estadístico de Asistencia</p>
</header>

<div class="grid-stats">
    <div class="card-stat"><h4>Asistencia %</h4><p id="stPor">0%</p></div>
    <div class="card-stat"><h4>Retardos Hoy</h4><p id="stRet" style="color:var(--rojo);">0</p></div>
</div>

<div class="card">
    <label>Trabajador:</label>
    <select id="nomIn" onchange="autoCompletar()"><option value="">-- Seleccionar --</option></select>
    
    <div style="display:flex; gap:10px">
        <input type="text" id="carIn" placeholder="Cargo" readonly style="background:#f9f9f9">
        <input type="text" id="turIn" placeholder="Turno" readonly style="background:#f9f9f9">
    </div>

    <label><b>HORA DE ENTRADA (MANUAL):</b></label>
    <input type="time" id="horaManual">

    <label>Estatus Administrativo:</label>
    <select id="estIn">
        <option value="ASISTENCIA">PRESENTE ✅</option>
        <option value="VACACIONES">VACACIONES 🌴</option>
        <option value="REPOSO">REPOSO MÉDICO 🏥</option>
        <option value="PERMISO">PERMISO 📝</option>
        <option value="FALTA">INASISTENCIA ❌</option>
    </select>

    <button class="btn btn-verde" onclick="registrar()">GUARDAR ASISTENCIA</button>
</div>

<div class="card" style="overflow-x:auto">
    <button class="btn btn-azul" onclick="descargarExcel()">📥 EXPORTAR REPORTE EXCEL</button>
    <table id="tablaExcel">
        <thead>
            <tr><th>NOMBRE</th><th>HORA</th><th>ESTATUS</th><th>CARGO</th></tr>
        </thead>
        <tbody id="cuerpoTabla">
            </tbody>
    </table>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const hoy = new Date().toLocaleDateString('en-CA');

    // LÓGICA DE RETRASO SEGÚN PARÁMETROS
    function evaluarRetraso(cargo, turno, horaM) {
        const [h, m] = horaM.split(':').map(Number);
        const min = h * 60 + m; 
        if (turno === "MAÑANA") {
            if ((cargo === "Docente" || cargo === "Cocinera") && min > 420) return "RETRASO"; // 7:00 AM
            if ((cargo === "Obrero" || cargo === "Administrativo") && min > 405) return "RETRASO"; // 6:45 AM
        } else {
            if (cargo === "Docente" && min > 720) return "RETRASO"; // 12:00 PM
            if (cargo === "Obrero" && min > 690) return "RETRASO"; // 11:30 AM
        }
        return "ASISTENCIA";
    }

    let nominaLocal = [];
    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nominaLocal = [];
        const sel = document.getElementById('nomIn');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            nominaLocal.push(doc.data());
            sel.innerHTML += `<option value="${doc.data().n}">${doc.data().n}</option>`;
        });
    });

    function autoCompletar() {
        const p = nominaLocal.find(x => x.n === document.getElementById('nomIn').value);
        if(p) { 
            document.getElementById('carIn').value = p.c; 
            document.getElementById('turIn').value = p.t; 
        }
    }

    async function registrar() {
        const n = document.getElementById('nomIn').value, h = document.getElementById('horaManual').value;
        const c = document.getElementById('carIn').value, t = document.getElementById('turIn').value;
        let e = document.getElementById('estIn').value;

        if(!n || !h) return alert("⚠️ Ingrese el NOMBRE y la HORA MANUAL");
        if(e === "ASISTENCIA") e = evaluarRetraso(c, t, h);

        await db.collection("asistencia_ebnlp_final").add({ n, c, t, f: hoy, e, h, ts: Date.now() });
        alert("✅ Registro exitoso");
    }

    // ESCUCHA EN TIEMPO REAL PARA LLENAR LA TABLA
    db.collection("asistencia_ebnlp_final").where("f", "==", hoy).orderBy("ts", "desc").onSnapshot(snap => {
        const cuerpo = document.getElementById('cuerpoTabla');
        let totalR = 0;
        cuerpo.innerHTML = "";
        
        snap.forEach(doc => {
            const d = doc.data();
            const esR = d.e === "RETRASO";
            if(esR) totalR++;

            cuerpo.innerHTML += `
                <tr class="${esR ? 'fila-retraso' : ''}">
                    <td>${d.n}</td>
                    <td>${d.h}</td>
                    <td>${esR ? '<span class="badge-retraso">RETRASO</span>' : d.e}</td>
                    <td>${d.c}</td>
                </tr>`;
        });
        document.getElementById('stRet').innerText = totalR;
        document.getElementById('stPor').innerText = nominaLocal.length > 0 ? Math.round((snap.size / nominaLocal.length) * 100) + "%" : "0%";
    });

    function descargarExcel() {
        XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tablaExcel')), `Reporte_EBNLP_${hoy}.xlsx`);
    }
</script>
</body>
</html>
