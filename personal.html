<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA CONTROL E.B.N. LUCILA PALACIOS</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --verde: #1d6f42; --rojo: #d32f2f; --purpura: #6a1b9a; --gris: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--gris); margin: 0; padding-bottom: 60px; color: #333; }
        
        /* Header y Dashboard */
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        .dash-card { border: 1px solid #eee; padding: 8px; border-radius: 5px; text-align: center; border-bottom: 3px solid var(--azul); }
        .dash-card h4 { margin: 0; font-size: 0.6rem; color: #666; text-transform: uppercase; }
        .dash-card div { font-size: 1rem; font-weight: bold; color: var(--azul); }

        /* Navegación */
        .tabs { display: flex; background: white; position: sticky; top: 0; z-index: 1000; padding: 5px; gap: 3px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 12px 2px; border: none; background: #eee; font-weight: bold; font-size: 0.65rem; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: var(--naranja); color: white; }

        /* Secciones */
        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; }
        .control-bar { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 8px; border: 1px solid #ddd; }
        
        /* Fichas */
        .cargo-group { margin-bottom: 15px; background: white; border-radius: 8px; border: 1px solid #ddd; overflow: hidden; }
        .cargo-header { background: var(--azul); color: white; padding: 10px; font-weight: bold; font-size: 0.8rem; display: flex; justify-content: space-between; cursor: pointer; }
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; padding: 10px; }
        .ficha { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; position: relative; }
        .ficha b { font-size: 0.75rem; display: block; margin-bottom: 8px; color: #2c3e50; min-height: 2.5em; }
        
        /* Botones */
        .btn { width: 100%; padding: 7px; margin: 2px 0; border: none; border-radius: 4px; font-weight: bold; font-size: 0.65rem; cursor: pointer; }
        .btn-asis { background: #d4edda; color: #155724; }
        .btn-ina { background: #f8d7da; color: #721c24; }
        .btn-ret { background: #fff3cd; color: #856404; }
        .btn-per { background: #f3e5f5; color: var(--purpura); }
        .btn-vac { background: #e3f2fd; color: #0d47a1; }
        .btn-salida { background: var(--azul); color: white; margin-top: 5px; }
        
        /* Tablas */
        .table-container { background: white; border-radius: 8px; overflow-x: auto; border: 1px solid #ddd; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; min-width: 600px; }
        th { background: #f4f4f4; padding: 10px; border: 1px solid #ddd; }
        td { padding: 8px; border: 1px solid #eee; text-align: center; }
        
        input, select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.8rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-size:1.2rem;">E.B.N. LUCILA PALACIOS</h2>
    <small>SISTEMA INTEGRAL DE CONTROL DE PERSONAL</small>
</header>

<div class="dashboard">
    <div class="dash-card"><h4>Asistentes</h4><div id="countAsis">0</div></div>
    <div class="dash-card"><h4>Inasist.</h4><div id="countIna">0</div></div>
    <div class="dash-card"><h4>Retrasos</h4><div id="countRet">0</div></div>
    <div class="dash-card"><h4>Permisos</h4><div id="countPer">0</div></div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('escuela', this)">DIARIO ESCUELA</button>
    <button class="tab-btn" onclick="switchTab('vigilancia', this)">VIGILANCIA</button>
    <button class="tab-btn" onclick="switchTab('estadistica', this)">ESTADÍSTICA</button>
    <button class="tab-btn" onclick="switchTab('nomina', this)">NÓMINA</button>
</div>

<div id="tab-escuela" class="tab-content active">
    <div class="control-bar">
        <input type="date" id="fechaEscuela" onchange="syncData()">
        <select id="turnoEscuela" onchange="syncData()" style="flex:1">
            <option value="MAÑANA">MAÑANA</option>
            <option value="TARDE">TARDE</option>
        </select>
        <button onclick="exportTable('tableAsis', 'Reporte_Diario')" style="background:var(--verde); color:white; border:none; padding:8px 15px; border-radius:4px;">EXCEL</button>
    </div>
    <div id="fichasEscuela"></div>
    <div class="table-container">
        <table id="tableAsis">
            <thead><tr><th>NOMBRE</th><th>CARGO</th><th>ESTATUS</th><th>ENTRADA</th><th>SALIDA</th><th>OBSERVACIÓN</th></tr></thead>
            <tbody id="resumenEscuela"></tbody>
        </table>
    </div>
</div>

<div id="tab-vigilancia" class="tab-content">
    <div class="control-bar">
        <input type="date" id="fechaVig" onchange="syncData()">
        <select id="grupoVig" onchange="syncData()" style="flex:1">
            <option value="GRUPO I">GRUPO I (Interdiario)</option>
            <option value="GRUPO II">GRUPO II (Interdiario)</option>
        </select>
        <select id="turnoVigReal" style="flex:1">
            <option value="NOCHE">NOCHE (6PM-6AM)</option>
            <option value="DÍA">DÍA (Fines/Feriados)</option>
        </select>
    </div>
    <div id="fichasVig"></div>
    <div class="table-container">
        <table id="tableVig">
            <thead><tr><th>NOMBRE</th><th>GRUPO</th><th>TURNO</th><th>ESTATUS</th><th>E/S</th><th>OBS</th></tr></thead>
            <tbody id="resumenVig"></tbody>
        </table>
    </div>
</div>

<div id="tab-estadistica" class="tab-content">
    <div class="control-bar">
        <input type="month" id="mesFiltro">
        <button onclick="calcEstadistica()" style="background:var(--azul); color:white; border:none; padding:8px 15px; flex:1">GENERAR MES</button>
        <button onclick="exportTable('tableEst', 'Estadistica_Mensual')" style="background:var(--verde); color:white; border:none; padding:8px 15px;">EXCEL</button>
    </div>
    <div class="table-container">
        <table id="tableEst">
            <thead><tr><th>NOMBRE</th><th>ASIS</th><th>ACT</th><th>RET</th><th>INA</th><th>VAC</th><th>P.M</th><th>P.P</th><th>S.ANT</th></tr></thead>
            <tbody id="resumenEst"></tbody>
        </table>
    </div>
</div>

<div id="tab-nomina" class="tab-content">
    <div class="control-bar" style="display:block">
        <h4>Agregar Personal</h4>
        <input type="text" id="nomNombre" placeholder="APELLIDOS Y NOMBRES" style="width:100%; margin-bottom:10px; text-transform:uppercase">
        <div style="display:flex; gap:5px; margin-bottom:10px">
            <select id="nomCargo" style="flex:2">
                <option value="Docente">Docente</option>
                <option value="Obrero">Obrero</option>
                <option value="Administrativo">Administrativo</option>
                <option value="CNAE (Cocinera)">CNAE (Cocinera)</option>
                <option value="Vigilante">Vigilante</option>
            </select>
            <select id="nomGen" style="flex:1"><option value="F">F</option><option value="M">M</option></select>
        </div>
        <select id="nomGrupo" style="width:100%; margin-bottom:10px">
            <option value="General">ESCUELA</option>
            <option value="GRUPO I">VIGILANCIA I</option>
            <option value="GRUPO II">VIGILANCIA II</option>
        </select>
        <button onclick="saveNomina()" style="width:100%; background:var(--azul); color:white; border:none; padding:12px; border-radius:5px; font-weight:bold">GUARDAR PERSONAL</button>
    </div>
    <div class="table-container">
        <table><thead><tr><th>Nombre</th><th>Cargo</th><th>Eliminar</th></tr></thead><tbody id="listaNomina"></tbody></table>
    </div>
</div>

<script>
    // 1. FIREBASE CONFIG
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let nominaGlobal = [];

    // 2. INICIO
    document.getElementById('fechaEscuela').value = new Date().toISOString().split('T')[0];
    document.getElementById('fechaVig').value = new Date().toISOString().split('T')[0];

    db.collection("nomina_institucional").orderBy("n").onSnapshot(snap => {
        nominaGlobal = [];
        let html = "";
        snap.forEach(doc => {
            let d = doc.data(); d.id = doc.id; nominaGlobal.push(d);
            html += `<tr><td style="text-align:left">${d.n}</td><td>${d.c}</td><td><button onclick="deleteNomina('${d.id}')">❌</button></td></tr>`;
        });
        document.getElementById('listaNomina').innerHTML = html;
        syncData();
    });

    // 3. LOGICA DE TABS
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        btn.classList.add('active');
    }

    // 4. LOGICA DE REGISTRO
    async function syncData() {
        const fEsc = document.getElementById('fechaEscuela').value;
        const fVig = document.getElementById('fechaVig').value;
        const snap = await db.collection("asistencia_ebnlp_final").where("f", "in", [fEsc, fVig]).get();
        const marcados = {};
        let c = { ASIS:0, INA:0, RET:0, PER:0 };

        snap.forEach(d => {
            let data = d.data();
            marcados[data.n + "_" + data.f] = { ...data, id: d.id };
            if(data.f === fEsc) {
                if(data.e === "ASISTENCIA") c.ASIS++;
                else if(data.e === "INASISTENCIA") c.INA++;
                else if(data.e === "RETRASO") c.RET++;
                else if(data.e.includes("P.")) c.PER++;
            }
        });

        document.getElementById('countAsis').innerText = c.ASIS;
        document.getElementById('countIna').innerText = c.INA;
        document.getElementById('countRet').innerText = c.RET;
        document.getElementById('countPer').innerText = c.PER;

        renderFichas("fichasEscuela", "resumenEscuela", ["Docente","Obrero","Administrativo","CNAE (Cocinera)"], fEsc, marcados);
        renderFichas("fichasVig", "resumenVig", ["Vigilante"], fVig, marcados, document.getElementById('grupoVig').value);
    }

    function renderFichas(contId, resId, cargos, fecha, marcados, grupo = null) {
        let html = ""; let resHtml = "";
        cargos.forEach(cargo => {
            let filtrados = nominaGlobal.filter(p => p.c === cargo);
            if(grupo) filtrados = filtrados.filter(p => p.grupo === grupo);
            if(filtrados.length === 0) return;

            html += `<div class="cargo-group"><div class="cargo-header" onclick="this.nextElementSibling.classList.toggle('hidden')">${cargo.toUpperCase()} <span>▼</span></div><div class="grid-fichas">`;
            
            filtrados.forEach(p => {
                const m = marcados[p.n + "_" + fecha];
                if(!m) {
                    html += `<div class="ficha"><b>${p.n}</b>
                        <button class="btn btn-asis" onclick="doRegister('${p.n}','ASISTENCIA','${fecha}')">ASISTENCIA</button>
                        <button class="btn btn-ret" onclick="doRegister('${p.n}','RETRASO','${fecha}')">RETRASO</button>
                        <button class="btn btn-ina" onclick="doRegister('${p.n}','INASISTENCIA','${fecha}')">INASISTENCIA</button>
                        <button class="btn btn-per" onclick="doRegister('${p.n}','P. PERSONAL','${fecha}')">P. PERSONAL</button>
                        <button class="btn btn-vac" onclick="doRegister('${p.n}','VACACIONES','${fecha}')">VACACIONES</button>
                    </div>`;
                } else {
                    html += `<div class="ficha" style="border-color:var(--verde)"><b>${p.n}</b><strong style="color:var(--verde)">${m.e}</strong><br><small>${m.hE} - ${m.hS}</small>
                        ${m.hS === "---" && ["ASISTENCIA","RETRASO"].includes(m.e) ? `<button class="btn btn-salida" onclick="doSalida('${m.id}','${p.n}','${p.c}')">MARCAR SALIDA</button>` : ''}
                        <button onclick="deleteReg('${m.id}')" style="border:none; color:red; font-size:9px; background:none; cursor:pointer">Eliminar</button></div>`;
                    
                    resHtml += `<tr><td style="text-align:left">${p.n}</td><td>${cargo === 'Vigilante' ? p.grupo : p.c}</td><td>${m.e}</td><td>${m.hE}</td><td>${m.hS}</td><td>${m.obs || m.obs_salida || "-"}</td></tr>`;
                }
            });
            html += `</div></div>`;
        });
        document.getElementById(contId).innerHTML = html;
        document.getElementById(resId).innerHTML = resHtml;
    }

    async function doRegister(n, e, f) {
        const p = nominaGlobal.find(x => x.n === n);
        let hE = "---", obs = "", tVig = "";

        if(p.c === "Vigilante") {
            tVig = document.getElementById('turnoVigReal').value;
            hE = prompt("Hora Entrada Vigilante:", tVig === "NOCHE" ? "18:00" : "06:00");
        } else {
            const t = document.getElementById('turnoEscuela').value;
            let lim = (t === "MAÑANA") ? (p.c === "Docente" ? "07:00" : "06:45") : (p.c === "Obrero" ? "11:30" : "12:00");
            hE = prompt("Hora Entrada:", lim);
            if(hE > lim && e === "ASISTENCIA") { if(confirm("¿Cambiar a RETRASO?")) e = "RETRASO"; }
        }

        if(!hE) return;

        if(e === "INASISTENCIA" || e === "P. PERSONAL") {
            obs = prompt("Justificación (Obligatoria):");
            if(!obs || obs.length < 3) return alert("Justificación inválida");
            // Alerta 3 fallas
            const hist = await db.collection("asistencia_ebnlp_final").where("n","==",n).where("e","==",e).get();
            let count = 0; hist.forEach(doc => { if(doc.data().mes === f.substring(0,7)) count++; });
            if(count >= 2) alert(`⚠️ ALERTA: ${n} ya tiene ${count+1} ${e} este mes.`);
        }

        await db.collection("asistencia_ebnlp_final").add({ n, e, f, c:p.c, hE, hS:"---", obs, obs_salida:"", mes:f.substring(0,7), turnoVig: tVig, grupo: p.grupo });
        syncData();
    }

    async function doSalida(id, n, c) {
        let hS = prompt("Hora Salida:"); if(!hS) return;
        let limS = "12:00"; 
        if(c === "Vigilante") limS = "06:00";
        else {
            const t = document.getElementById('turnoEscuela').value;
            if(t === "MAÑANA") limS = (c === "Docente") ? "12:00" : "12:45";
            else limS = (c === "Docente") ? "17:00" : "18:00";
        }
        let obs_s = ""; if(hS < limS) { obs_s = prompt("Motivo Salida Anticipada:"); if(!obs_s) return; }
        await db.collection("asistencia_ebnlp_final").doc(id).update({ hS, obs_salida: obs_s || "Completa" });
        syncData();
    }

    async function calcEstadistica() {
        const mes = document.getElementById('mesFiltro').value;
        if(!mes) return;
        const snap = await db.collection("asistencia_ebnlp_final").where("mes", "==", mes).get();
        const data = []; snap.forEach(d => data.push(d.data()));
        let html = "";
        nominaGlobal.forEach(p => {
            const r = data.filter(x => x.n === p.n);
            if(r.length === 0) return;
            html += `<tr><td style="text-align:left">${p.n}</td>
                <td>${r.filter(x=>x.e==="ASISTENCIA").length}</td><td>${r.filter(x=>x.e==="ACT. INST.").length}</td>
                <td>${r.filter(x=>x.e==="RETRASO").length}</td><td style="color:red">${r.filter(x=>x.e==="INASISTENCIA").length}</td>
                <td>${r.filter(x=>x.e==="VACACIONES").length}</td><td>${r.filter(x=>x.e==="P. MÉDICO").length}</td>
                <td style="color:var(--purpura)">${r.filter(x=>x.e==="P. PERSONAL").length}</td>
                <td style="color:red">${r.filter(x=>x.obs_salida && x.obs_salida !== "Completa").length}</td></tr>`;
        });
        document.getElementById('resumenEst').innerHTML = html;
    }

    async function saveNomina() {
        const n = document.getElementById('nomNombre').value.toUpperCase();
        if(!n) return;
        await db.collection("nomina_institucional").add({ 
            n, c: document.getElementById('nomCargo').value, 
            gender: document.getElementById('nomGen').value, 
            grupo: document.getElementById('nomGrupo').value 
        });
        document.getElementById('nomNombre').value = "";
    }

    function exportTable(id, name) {
        const wb = XLSX.utils.table_to_book(document.getElementById(id));
        XLSX.writeFile(wb, `${name}.xlsx`);
    }

    async function deleteNomina(id) { if(confirm("¿Eliminar de nómina?")) await db.collection("nomina_institucional").doc(id).delete(); }
    async function deleteReg(id) { if(confirm("¿Borrar registro?")) { await db.collection("asistencia_ebnlp_final").doc(id).delete(); syncData(); } }
</script>
</body>
</html>
