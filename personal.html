<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal - E.B.N. Lucila Palacios</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --verde: #27ae60; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; padding-bottom: 50px; }
        
        header { 
            background: linear-gradient(180deg, var(--azul) 0%, #1a2a6c 100%); 
            color: white; text-align: center; padding: 25px; border-bottom: 5px solid var(--naranja); 
        }
        .logo-box { 
            width: 100px; height: 100px; background: white; border-radius: 50%; 
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; 
            border: 3px solid var(--naranja); overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .logo-img { width: 85px; height: auto; display: block; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid var(--azul); }
        .stat-card h4 { margin: 0; font-size: 10px; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; color: var(--azul); }

        .card { background: white; margin: 0 15px 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--azul); }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; margin-bottom: 15px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-bottom: 10px; color: white; transition: 0.3s; }
        .btn-save { background: var(--verde); }
        .btn-pdf { background: var(--rojo); }
        .btn-report { background: var(--azul); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
        th { background: var(--azul); color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .vigilante-row { background-color: #e3f2fd; }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5H98MFLK" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<header>
    <div class="logo-box">
        <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" class="logo-img" alt="Logo">
    </div>
    <h1 style="margin: 0; font-size: 20px;">E.B.N. "LUCILA PALACIOS"</h1>
    <p style="margin: 5px 0 0; font-size: 12px; opacity: 0.9;">Sistema Integral de Control de Asistencia</p>
</header>

<div class="stats-grid">
    <div class="stat-card"><h4>% Asistencia Día</h4><p>0%</p></div>
    <div class="stat-card"><h4>Retardos Hoy</h4><p>0</p></div>
</div>

<div class="card">
    <h3>📋 Registro de Jornada</h3>
    
    <label>Fecha Seleccionada:</label>
    <input type="date" id="fechaReg">

    <label>Persona:</label>
    <select id="selPersona">
        <option value="">Seleccione...</option>
        <optgroup label="Docentes">
            <option value="Ana David">Ana David</option>
            <option value="Andreina Flores">Andreina Flores</option>
            <option value="Angel Figuera">Angel Figuera</option>
            <option value="Dalia Luces">Dalia Luces</option>
            <option value="Dayana Jiménez">Dayana Jiménez</option>
        </optgroup>
        <optgroup label="Obreros">
            <option value="Ana Figuera">Ana Figuera</option>
            <option value="Carlos Castillo">Carlos Castillo</option>
            <option value="Danielys Campos">Danielys Campos</option>
            <option value="Dayana García">Dayana García</option>
        </optgroup>
        <optgroup label="Vigilantes">
            <option value="Cesar Suárez">Cesar Suárez (Vigilante-B)</option>
            <option value="Daher Cardier">Daher Cardier (Vigilante-A)</option>
            <option value="Darwin Aguilera">Darwin Aguilera (Vigilante-B)</option>
        </optgroup>
    </select>

    <label>Estatus:</label>
    <select id="estatus">
        <option value="Asistencia">Asistencia ✅</option>
        <option value="Inasistencia">Inasistencia ❌</option>
        <option value="Permiso">Permiso 📝</option>
    </select>

    <button class="btn btn-save" onclick="guardar()">💾 GUARDAR REGISTRO</button>
    <button class="btn btn-pdf">📄 DESCARGAR PDF DIARIO</button>
    
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>NOMBRE DEL TRABAJADOR</th>
                    <th>CARGO</th>
                    <th>H. OFICIAL</th>
                    <th>ESTATUS</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <tr><td>Ana David</td><td>Docente</td><td>07:00-12:00</td><td>PENDIENTE</td></tr>
                <tr class="vigilante-row"><td>Cesar Suárez</td><td>Vigilante-B</td><td>18:00-06:00</td><td>PENDIENTE</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('fechaReg').valueAsDate = new Date();

    async function guardar() {
        const nombre = document.getElementById('selPersona').value;
        const est = document.getElementById('estatus').value;
        const fecha = document.getElementById('fechaReg').value;

        if(!nombre) return alert("Seleccione un trabajador");

        try {
            await db.collection("asistencia_personal").add({
                nombre, estatus: est, fecha,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("✅ Registro guardado exitosamente");
        } catch(e) { alert("Error al guardar"); }
    }
</script>
</body>
</html>
