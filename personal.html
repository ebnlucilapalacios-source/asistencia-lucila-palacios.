<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA EBNLP 2026 - FINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .contenedor { max-width: 1000px; margin: auto; padding: 10px; }
        .card { background: white; margin-bottom: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: var(--azul); border-left: 5px solid var(--naranja); padding-left: 10px; text-transform: uppercase; font-size: 0.9rem; }
        
        .t-wrap { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; font-size: 12px; }
        th { background: #f1f3f5; padding: 10px; border: 1px solid #ddd; color: var(--azul); }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-verde { background: var(--verde); } .btn-azul { background: var(--azul); } .btn-rojo { background: var(--rojo); } .btn-gris { background: #6c757d; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">E.B.N. "LUCILA PALACIOS"</h2>
    <small>GESTIÓN TÉCNICA Y GRUPOS DE VIGILANCIA</small>
</header>

<div class="contenedor">

    <div class="card">
        <h3>📝 Registro de Entrada</h3>
        <input type="date" id="fManual" onchange="actualizarTodo()">
        
        <label>TRABAJADOR:</label>
        <select id="sPersona" onchange="detectarVigilante(this.value)"></select>
        
        <div id="infoVigilante" class="hidden" style="background: #fff3e0; padding: 10px; margin-top:10px; border-radius:8px; border: 1px solid #ffb74d;">
            <p id="txtGrupo" style="margin:0; font-weight:bold; color:#e65100;"></p>
            <label>DEFINIR GUARDIA ACTUAL:</label>
            <select id="turnoVig">
                <option value="DIA">GUARDIA DÍA (06:00 AM)</option>
                <option value="NOCHE">GUARDIA NOCHE (06:00 PM)</option>
            </select>
        </div>

        <select id="sEstatus" style="margin-top:10px;">
            <option value="ASISTENCIA">PRESENTE ✅</option>
            <option value="INASISTENCIA">INASISTENCIA ❌</option>
            <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝</option>
            <option value="REPOSO">REPOSO MÉDICO 🏥</option>
            <option value="VACACIONES">VACACIONES 🌴</option>
        </select>
        
        <input type="time" id="hEntrada" style="margin-top:10px;">
        <button class="btn btn-verde" onclick="guardar()">GUARDAR ASISTENCIA</button>
    </div>

    <div class="card">
        <h3>📅 Consolidado Mensual</h3>
        <div class="t-wrap">
            <table>
                <thead>
                    <tr><th>Nombre</th><th>Cargo/Grupo</th><th style="background:#e8f5e9">Asis</th><th style="background:#ffebee">Retar</th><th style="background:#fff3e0">Faltas</th><th>Perm/Vac</th></tr>
                </thead>
                <tbody id="bMensual"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3>📋 Lista del Día: <span id="fechaTit"></span></h3>
        
        <div id="wrapperLista" class="hidden">
            <div class="t-wrap">
                <table>
                    <thead>
                        <tr><th>Nombre</th><th>Cargo/Grupo</th><th>Estatus</th><th>Hora</th></tr>
                    </thead>
                    <tbody id="bLista"></tbody>
                </table>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
            <button class="btn btn-gris" onclick="controlVista('ocultar')">OCULTAR VISTA</button>
            <button class="btn btn-azul" onclick="controlVista('mostrar')">MOSTRAR LISTA</button>
        </div>
        <button class="btn btn-gris" style="background:#555" onclick="limpiarPantalla()">LIMPIAR PANTALLA (PRIVACIDAD)</button>
        <button class="btn btn-rojo" style="background:#8b0000" onclick="generarPDF()">PDF DEL DÍA</button>
    </div>

    <div class="card">
        <button class="btn btn-gris" onclick="document.getElementById('pAdmin').classList.toggle('hidden')">⚙️ GESTIÓN DE PERSONAL</button>
        <div id="pAdmin" class="hidden">
            <h4>+ Nuevo Personal</h4>
            <input type="text" id="nN" placeholder="Nombre completo">
            <select id="nC" onchange="mostrarGrupoExtra(this.value)">
                <option value="Docente">Docente</option>
                <option value="Obrero">Obrero</option>
                <option value="Administrativo">Administrativo</option>
                <option value="CNAE (Cocinera)">CNAE (Cocinera)</option>
                <option value="Vigilante">Vigilante</option>
            </select>
            <div id="grupoExtra" class="hidden">
                <select id="nG" style="margin-top:5px;">
                    <option value="GRUPO A">GRUPO A</option><option value="GRUPO B">GRUPO B</option>
                    <option value="GRUPO C">GRUPO C</option><option value="GRUPO D">GRUPO D</option>
                </select>
            </div>
            <select id="nT" style="margin-top:10px;"><option value="MAÑANA">TURNO MAÑANA</option><option value="TARDE">TURNO TARDE</option></select>
            <button class="btn btn-verde" onclick="alta()">AÑADIR A NÓMINA</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('fManual').value = new Date().toISOString().split('T')[0];
    let nomina = [];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sPersona');
        sP.innerHTML = '<option value="">-- Seleccionar Trabajador --</option>';
        snap.forEach(doc => {
            let d = doc.data(); d.id = doc.id; nomina.push(d);
            sP.innerHTML += `<option value="${d.n}">${d.n}</option>`;
        });
        actualizarTodo();
    });

    function controlVista(accion) {
        const wrap = document.getElementById('wrapperLista');
        if(accion === 'mostrar') {
            wrap.classList.remove('hidden');
            actualizarTodo();
        } else {
            wrap.classList.add('hidden');
        }
    }

    function limpiarPantalla() {
        document.getElementById('bLista').innerHTML = '<tr><td colspan=4 style="padding:20px; color:#777;">Vista vacía por seguridad. Pulse "Mostrar" para ver.</td></tr>';
    }

    function mostrarGrupoExtra(valor) { document.getElementById('grupoExtra').className = (valor === "Vigilante") ? "" : "hidden"; }

    function detectarVigilante(n) {
        const t = nomina.find(x => x.n === n);
        const div = document.getElementById('infoVigilante');
        if (t && t.c === "Vigilante") {
            div.classList.remove('hidden');
            document.getElementById('txtGrupo').innerText = `VIGILANTE: ${t.g || 'SIN GRUPO'}`;
        } else { div.classList.add('hidden'); }
    }

    async function guardar() {
        const n = document.getElementById('sPersona').value, f = document.getElementById('fManual').value, h = document.getElementById('hEntrada').value;
        let e = document.getElementById('sEstatus').value;
        const p = nomina.find(x => x.n === n);
        if(!p) return alert("Seleccione personal");

        if(e === "ASISTENCIA" && h) {
            const t = parseInt(h.replace(":",""));
            if(p.c === "Vigilante") {
                const tv = document.getElementById('turnoVig').value;
                if((tv==="DIA" && t>600) || (tv==="NOCHE" && t>1800)) e="RETRASO";
            } else {
                if(p.c === "Docente") { if((p.t==="MAÑANA" && t>700) || (p.t==="TARDE" && t>1200)) e="RETRASO"; }
                else if(p.c === "Obrero" || p.c === "Administrativo") { if((p.t==="MAÑANA" && t>645) || (p.t==="TARDE" && t>1200)) e="RETRASO"; }
                else if(p.c === "CNAE (Cocinera)") { if(t>700) e="RETRASO"; }
            }
        }
        await db.collection("asistencia_ebnlp_final").add({ n, e, f, h:h||"--", c:p.c, g:p.g || "", ts:new Date(f+"T12:00:00").getTime(), mes:f.substring(0,7) });
        alert("¡Guardado!");
    }

    function actualizarTodo() {
        const fH = document.getElementById('fManual').value, mesH = fH.substring(0,7);
        document.getElementById('fechaTit').innerText = fH;

        db.collection("asistencia_ebnlp_final").onSnapshot(snap => {
            const bL = document.getElementById('bLista'), bM = document.getElementById('bMensual');
            const dH = snap.docs.filter(d => d.data().f === fH);
            const dM = snap.docs.filter(d => d.data().mes === mesH);

            bL.innerHTML = "";
            dH.forEach(doc => {
                const d = doc.data();
                bL.innerHTML += `<tr><td>${d.n}</td><td>${d.c} ${d.g?'('+d.g+')':''}</td><td>${d.e}</td><td>${d.h}</td></tr>`;
            });

            bM.innerHTML = "";
            nomina.forEach(p => {
                const regs = dM.filter(r => r.data().n === p.n);
                let asis = regs.filter(r => r.data().e === "ASISTENCIA").length;
                let ret = regs.filter(r => r.data().e === "RETRASO").length;
                let falt = regs.filter(r => r.data().e === "INASISTENCIA").length;
                let otros = regs.filter(r => ["PERMISO PERSONAL","VACACIONES","REPOSO"].includes(r.data().e)).length;

                bM.innerHTML += `<tr><td>${p.n}</td><td>${p.c} ${p.g||''}</td><td>${asis}</td><td>${ret}</td><td>${falt}</td><td>${otros}</td></tr>`;
            });
        });
    }

    async function alta() {
        const n = document.getElementById('nN').value.toUpperCase().trim(), c = document.getElementById('nC').value, t = document.getElementById('nT').value, g = document.getElementById('nG').value;
        if(n) await db.collection("nomina_institucional").add({n, c, t, g: c==="Vigilante"?g:""});
        document.getElementById('nN').value = "";
    }

    async function generarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const f = document.getElementById('fManual').value;
        const snap = await db.collection("asistencia_ebnlp_final").where("f","==",f).get();
        const data = []; snap.forEach(x => data.push([x.data().n, x.data().c, x.data().e, x.data().h]));
        doc.text(`REPORTE EBNLP - ${f}`, 14, 15);
        doc.autoTable({ head: [['Nombre', 'Cargo', 'Estatus', 'Hora']], body: data, startY: 20 });
        doc.save(`Asistencia_${f}.pdf`);
    }
</script>
</body>
</html>
