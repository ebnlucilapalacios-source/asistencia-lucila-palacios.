<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Maestro - Lucila Palacios</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        const USUARIO_ADMIN = "admin_lucila";
        const LOGO_URL = "https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", alumnos: [], asistencias: {}, feriados: [] };

        function calcularEdad(fNac) {
            if(!fNac) return 0;
            const hoy = new Date();
            const cumple = new Date(fNac);
            let edad = hoy.getFullYear() - cumple.getFullYear();
            if (hoy.getMonth() < cumple.getMonth() || (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
            return edad;
        }

        window.login = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const docSnap = await getDoc(doc(dbCloud, "docentes_db", user));
            if (docSnap.exists() && docSnap.data().pass === pass) {
                window.usuarioActual = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (user === USUARIO_ADMIN) document.getElementById('adminPanel').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", user), (s) => { window.db = s.data(); window.render(); });
            } else { alert("Acceso denegado"); }
        };

        // --- EXPORTACIÓN A EXCEL ---
        window.exportarTablaExcel = (idTabla, nombreArchivo) => {
            const tabla = document.getElementById(idTabla);
            const libro = XLSX.utils.table_to_book(tabla);
            XLSX.writeFile(libro, `${nombreArchivo}.xlsx`);
        };

        // --- ASISTENCIA DIARIA (DIRECCIÓN) ---
        window.verAsistenciaDiaria = async () => {
            const container = document.getElementById('resultadosAdmin');
            const hoy = document.getElementById('fechaSeleccionada').value;
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            
            let tM = 0, tH = 0, tV = 0;
            let html = `<h4 class="tit-admin">MONITOREO DIARIO: ${hoy}</h4>
                        <table class="tabla-admin" id="tablaDiariaAdmin">
                        <thead><tr><th>Sección</th><th>Matrícula</th><th>Hembras</th><th>Varones</th><th>Asistencia %</th></tr></thead><tbody>`;

            snap.forEach(dSnap => {
                const d = dSnap.data();
                if (dSnap.id === USUARIO_ADMIN || !d.alumnos) return;
                let aH = 0, aV = 0;
                if (d.asistencias && d.asistencias[hoy]) {
                    d.alumnos.forEach(al => { if (d.asistencias[hoy][al.id] === 1) al.genero === 'F' ? aH++ : aV++; });
                }
                const mSec = d.alumnos.length;
                const porc = mSec > 0 ? ((aH+aV)/mSec*100).toFixed(0) : 0;
                tM += mSec; tH += aH; tV += aV;
                html += `<tr><td>${d.seccion || 'S/N'}</td><td>${mSec}</td><td>${aH}</td><td>${aV}</td><td>${porc}%</td></tr>`;
            });

            html += `</tbody><tfoot style="background:#eee"><tr><td><b>TOTALES</b></td><td><b>${tM}</b></td><td><b>${tH}</b></td><td><b>${tV}</b></td><td><b>${tM>0?((tH+tV)/tM*100).toFixed(1):0}%</b></td></tr></tfoot></table>
            <button onclick="exportarTablaExcel('tablaDiariaAdmin', 'Asistencia_Diaria_${hoy}')" class="btn-excel">📥 Descargar Excel Diario</button>`;
            container.innerHTML = html;
        };

        // --- CONSOLIDADO MENSUAL (DIRECCIÓN) ---
        window.verConsolidadoMensual = async () => {
            const container = document.getElementById('resultadosAdmin');
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            const mesAct = new Date().getMonth();
            const anioAct = new Date().getFullYear();
            const nombreMes = new Intl.DateTimeFormat('es-ES', { month: 'long'}).format(new Date());

            let gMatH = 0, gMatV = 0, gSumaPromH = 0, gSumaPromV = 0, gEdades = {};
            let filas = "";

            snap.forEach(dSnap => {
                const d = dSnap.data();
                if (dSnap.id === USUARIO_ADMIN || !d.alumnos) return;
                let sH = 0, sV = 0, sDias = 0;
                d.alumnos.forEach(al => {
                    const e = calcularEdad(al.nacimiento);
                    al.genero === 'F' ? gMatH++ : gMatV++;
                    if(!gEdades[e]) gEdades[e] = { F: 0, M: 0 };
                    gEdades[e][al.genero]++;
                });
                Object.keys(d.asistencias || {}).forEach(f => {
                    const fecha = new Date(f + "T00:00:00");
                    const esFer = d.feriados && d.feriados.includes(f);
                    if (fecha.getMonth() === mesAct && fecha.getFullYear() === anioAct && fecha.getDay() !== 0 && fecha.getDay() !== 6 && !esFer) {
                        sDias++;
                        d.alumnos.forEach(al => { if (d.asistencias[f][al.id] === 1) al.genero === 'F' ? sH++ : sV++; });
                    }
                });
                const pH = sDias > 0 ? (sH / sDias) : 0;
                const pV = sDias > 0 ? (sV / sDias) : 0;
                gSumaPromH += pH; gSumaPromV += pV;
                filas += `<tr><td>${d.seccion}</td><td>${d.alumnos.length}</td><td>${pH.toFixed(1)}</td><td>${pV.toFixed(1)}</td><td>${(pH+pV).toFixed(1)}</td></tr>`;
            });

            container.innerHTML = `
                <div class="reporte-direccion">
                    <h4 class="tit-admin">CONSOLIDADO INSTITUCIONAL: ${nombreMes.toUpperCase()}</h4>
                    <table class="tabla-admin" id="tablaConsolidado">
                        <thead><tr><th>Grado/Sección</th><th>Matrícula</th><th>Prom. Hembras</th><th>Prom. Varones</th><th>Prom. Real</th></tr></thead>
                        <tbody>${filas}</tbody>
                        <tfoot style="background:#eee"><tr><td><b>TOTAL ESCUELA</b></td><td><b>${gMatH+gMatV}</b></td><td><b>${gSumaPromH.toFixed(1)}</b></td><td><b>${gSumaPromV.toFixed(1)}</b></td><td><b>${(gSumaPromH+gSumaPromV).toFixed(1)}</b></td></tr></tfoot>
                    </table>
                    <button onclick="exportarTablaExcel('tablaConsolidado', 'Consolidado_Mensual_${nombreMes}')" class="btn-excel">📥 Descargar Excel Mensual</button>
                </div>`;
        };

        window.render = () => {
            const f = document.getElementById('fechaSeleccionada').value || new Date().toISOString().split('T')[0];
            const fechaObj = new Date(f + "T00:00:00");
            const esFin = fechaObj.getDay() === 0 || fechaObj.getDay() === 6;
            const esFer = window.db.feriados && window.db.feriados.includes(f);

            document.getElementById('displayFecha').innerText = f;
            document.getElementById('docente').value = window.db.docente || "";
            document.getElementById('seccion').value = window.db.seccion || "";
            
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";

            if (!esFin && !esFer) {
                window.db.alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[f] && window.db.asistencias[f][a.id]) || 0;
                    let c = "#ccc", t = "F";
                    if(est === 1) { c = "var(--exito)"; t = "P"; }
                    if(est === 2) { c = "var(--morado)"; t = "J"; }
                    lista.innerHTML += `<div class="student-item">
                        <div style="width:10px; height:10px; border-radius:50%; background:${a.genero==='F'?'#ff99cc':'#99ccff'}"></div>
                        <div style="flex-grow:1"><b>${a.nombre}</b> <small onclick="eliminarAlumno(${a.id})" style="color:red; cursor:pointer">(X)</small></div>
                        <button onclick="marcar(${a.id})" style="width:35px; background:${c}; color:white; border:none; border-radius:4px; font-weight:bold;">${t}</button>
                    </div>`;
                });
            } else {
                lista.innerHTML = `<p style='color:red; text-align:center;'>🚫 DÍA NO LABORABLE</p>`;
            }
            generarEstadisticaDocente();
        };

        function generarEstadisticaDocente() {
            const alumnos = window.db.alumnos || [];
            const asistencias = window.db.asistencias || {};
            const mesAct = new Date().getMonth();
            const anioAct = new Date().getFullYear();
            let dias = 0, sH = 0, sV = 0, disg = {};

            alumnos.forEach(al => {
                const e = calcularEdad(al.nacimiento);
                if(!disg[e]) disg[e] = { F: 0, M: 0 };
                disg[e][al.genero]++;
            });

            Object.keys(asistencias).forEach(f => {
                const fe = new Date(f + "T00:00:00");
                const esF = window.db.feriados && window.db.feriados.includes(f);
                if (fe.getMonth() === mesAct && fe.getFullYear() === anioAct && fe.getDay() !== 0 && fe.getDay() !== 6 && !esF) {
                    dias++;
                    alumnos.forEach(al => { if (asistencias[f][al.id] === 1) al.genero === 'F' ? sH++ : sV++; });
                }
            });

            const pH = dias > 0 ? (sH / dias).toFixed(1) : "0.0";
            const pV = dias > 0 ? (sV / dias).toFixed(1) : "0.0";

            document.getElementById('reporteDocenteContenedor').innerHTML = `
                <div class="reporte-container">
                    <h3 style="text-align:center; color:var(--celeste); font-size:14px; margin:0">ESTADÍSTICA DE MI SECCIÓN</h3>
                    <div class="promedio-real-card">
                        <div><small>H</small><br><b style="color:#e91e63">${pH}</b></div>
                        <div><small>V</small><br><b style="color:#2196f3">${pV}</b></div>
                        <div><small>TOTAL</small><br><b>${(parseFloat(pH)+parseFloat(pV)).toFixed(1)}</b></div>
                    </div>
                </div>`;
        }

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f] = {};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id] + 1) % 3 || 1;
            window.saveToCloud(window.db);
        };
        window.toggleFeriado = () => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.feriados) window.db.feriados = [];
            const idx = window.db.feriados.indexOf(f);
            idx === -1 ? window.db.feriados.push(f) : window.db.feriados.splice(idx, 1);
            window.saveToCloud(window.db);
        };
        window.agregarAlumno = () => {
            const nom = document.getElementById('newNombre').value.toUpperCase();
            const nac = document.getElementById('newNac').value;
            if(!nom || !nac) return alert("Faltan datos");
            window.db.alumnos.push({ id: Date.now(), nombre: nom, genero: document.getElementById('newGen').value, nacimiento: nac });
            window.saveToCloud(window.db);
        };
        window.eliminarAlumno = async (id) => { if(confirm("¿Retirar?")) { window.db.alumnos = window.db.alumnos.filter(a => a.id !== id); await window.saveToCloud(window.db); } };
        window.saveToCloud = async (data) => { await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), data); };
        window.actualizarPerfil = () => { window.db.docente = document.getElementById('docente').value; window.db.seccion = document.getElementById('seccion').value; window.saveToCloud(window.db); };
        window.logout = () => location.reload();
        document.addEventListener("DOMContentLoaded", () => { document.getElementById('fechaSeleccionada').value = new Date().toISOString().split('T')[0]; });
    </script>

    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --gris: #f4f7f6; --exito: #27ae60; --morado: #8e44ad; --rojo: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: var(--gris); font-size: 13px; }
        header { background: var(--azul); color: white; padding: 10px; text-align: center; }
        .container { max-width: 450px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--exito); color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-excel { background: #1D6F42; color: white; font-size: 11px; font-weight: bold; margin-top: 10px; cursor: pointer; border: none; }
        
        .tabla-admin { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: center; font-size: 11px; background: white; }
        .tabla-admin th, .tabla-admin td { border: 1px solid #eee; padding: 6px; }
        .tit-admin { margin: 10px 0 5px 0; color: var(--azul); }

        .reporte-container { background: white; border-radius: 12px; padding: 15px; border-left: 6px solid var(--celeste); margin-top: 15px; }
        .promedio-real-card { display: flex; justify-content: space-around; text-align: center; background: #f0f4f8; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .student-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f9f9f9; }
        @media print { .no-print, header, .card, .btn-excel { display: none !important; } .reporte-container, .reporte-direccion { width: 100%; display: block !important; } }
    </style>
</head>
<body>

<div id="authSection" style="max-width: 300px; margin: 50px auto; text-align: center; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" style="width:70px;">
    <h3>Lucila Palacios</h3>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Clave">
    <button onclick="login()" class="btn-main">Entrar</button>
</div>

<div id="appContent" style="display: none;">
    <header>
        <button onclick="logout()" style="width:auto; float:right; background:var(--rojo); color:white; border:none; padding:4px 8px; font-size:10px; border-radius:4px;">Salir</button>
        <b>U.E. LUCILA PALACIOS</b>
    </header>

    <div class="container">
        <div id="adminPanel" class="card no-print" style="display:none; border: 2px solid var(--azul);">
            <b style="color:var(--azul);">🏢 PANEL DE DIRECCIÓN</b>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button onclick="verAsistenciaDiaria()" style="background:var(--celeste); color:white; font-size:10px;">📅 Diario</button>
                <button onclick="verConsolidadoMensual()" style="background:var(--morado); color:white; font-size:10px;">📊 Consolidado</button>
            </div>
            <div id="resultadosAdmin"></div>
        </div>

        <div class="card no-print">
            <input type="date" id="fechaSeleccionada" onchange="window.render()">
            <button onclick="toggleFeriado()" style="background:var(--rojo); color:white; font-size:11px;">🚩 Marcar/Quitar Feriado</button>
            <input type="text" id="docente" onchange="actualizarPerfil()" placeholder="Docente">
            <input type="text" id="seccion" onchange="actualizarPerfil()" placeholder="Sección">
        </div>

        <div class="card no-print">
            <b>+ Inscripción</b>
            <input type="text" id="newNombre" placeholder="Nombre completo">
            <div style="display:flex; gap:5px;">
                <select id="newGen" style="width:40%"><option value="F">Hembra</option><option value="M">Varón</option></select>
                <input type="date" id="newNac" style="width:60%">
            </div>
            <button onclick="agregarAlumno()" class="btn-main">Inscribir</button>
        </div>

        <div class="card no-print">
            <p style="text-align:center; margin:0 0 10px 0;">Asistencia: <b id="displayFecha"></b></p>
            <div id="listaAsistencia"></div>
        </div>

        <div id="reporteDocenteContenedor"></div>
    </div>
</div>

</body>
</html>
