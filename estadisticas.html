<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas EBNLP</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            messagingSenderId: "368890880546",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.syncSec = (s, cb) => onSnapshot(doc(db, "secciones", s), (d) => cb(d.data()));
        window.saveSec = async (s, d) => await setDoc(doc(db, "secciones", s), d);
    </script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; text-align: center; }
        header { background: #2980b9; color: white; padding: 20px; border-bottom: 4px solid #f39c12; }
        .card { background: white; padding: 20px; margin: 15px auto; max-width: 400px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn { background: #2980b9; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h2 style="margin:0;">Estadísticas de Alumnos</h2>
        <a href="index.html" style="color: white; text-decoration: none; font-size: 0.8rem;">← VOLVER AL MENÚ</a>
    </header>
    <div class="card">
        <h3>Introducir Sección</h3>
        <input type="text" id="secIn" placeholder="Ej: 1A" style="padding:10px; width:70%; border-radius:5px; border:1px solid #ccc;">
        <br><br>
        <button class="btn" onclick="conectar()">ENTRAR</button>
    </div>
    <div id="panel" style="display:none;" class="card">
        <h4 id="txtSec"></h4>
        <p>Matrícula: <b id="txtT">0</b> (H: <span id="txtH">0</span> | V: <span id="txtV">0</span>)</p>
    </div>
    <script>
        function conectar() {
            const s = document.getElementById('secIn').value.toUpperCase().trim();
            if(!s) return;
            window.syncSec(s, (data) => {
                document.getElementById('panel').style.display = 'block';
                document.getElementById('txtSec').innerText = "Sección: " + s;
                const d = data || { alumnos: [] };
                const h = d.alumnos.filter(a => a.g === 'F').length;
                const v = d.alumnos.filter(a => a.g === 'M').length;
                document.getElementById('txtH').innerText = h;
                document.getElementById('txtV').innerText = v;
                document.getElementById('txtT').innerText = h + v;
            });
        }
    </script>
</body>
</html>
