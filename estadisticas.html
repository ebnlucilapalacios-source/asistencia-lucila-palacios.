<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirección - Lucila Palacios</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        const USUARIO_ADMIN = "admin_lucila";
        const LOGO_URL = "https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", alumnos: [], asistencias: {}, feriados: [] };

        function calcularEdad(fNac) {
            if(!fNac) return 0;
            const hoy = new Date();
            const cumple = new Date(fNac);
            let edad = hoy.getFullYear() - cumple.getFullYear();
            if (hoy.getMonth() < cumple.getMonth() || (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
            return edad;
        }

        window.login = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const docSnap = await getDoc(doc(dbCloud, "docentes_db", user));
            if (docSnap.exists() && docSnap.data().pass === pass) {
                window.usuarioActual = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (user === USUARIO_ADMIN) document.getElementById('adminPanel').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", user), (s) => { window.db = s.data(); window.render(); });
            } else { alert("Datos incorrectos"); }
        };

        // --- GRAN CONSOLIDADO DE DIRECCIÓN ---
        window.generarConsolidadoDireccion = async () => {
            const container = document.getElementById('resultadosAdmin');
            container.innerHTML = "⌛ Procesando datos institucionales...";
            
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            const mesAct = new Date().getMonth();
            const anioAct = new Date().getFullYear();

            // Variables Globales de la Escuela
            let globalMatH = 0, globalMatV = 0;
            let globalAsisH = 0, globalAsisV = 0;
            let globalDiasHabiles = 0;
            let globalEdades = {};
            let tablaSecciones = "";

            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (docSnap.id === USUARIO_ADMIN || !d.alumnos) return;

                let secH = 0, secV = 0, secDias = 0, secSumaH = 0, secSumaV = 0;

                // 1. Matrícula y Edades de la sección
                d.alumnos.forEach(al => {
                    const edad = calcularEdad(al.nacimiento);
                    if (al.genero === 'F') { secH++; globalMatH++; } else { secV++; globalMatV++; }
                    
                    if (!globalEdades[edad]) globalEdades[edad] = { F: 0, M: 0 };
                    globalEdades[edad][al.genero]++;
                });

                // 2. Asistencias del mes para esta sección
                Object.keys(d.asistencias || {}).forEach(f => {
                    const fecha = new Date(f + "T00:00:00");
                    if (fecha.getMonth() === mesAct && fecha.getFullYear() === anioAct && fecha.getDay() !== 0 && fecha.getDay() !== 6) {
                        secDias++;
                        d.alumnos.forEach(al => {
                            if (d.asistencias[f][al.id] === 1) {
                                if (al.genero === 'F') secSumaH++; else secSumaV++;
                            }
                        });
                    }
                });

                const promSecH = secDias > 0 ? (secSumaH / secDias).toFixed(1) : "0.0";
                const promSecV = secDias > 0 ? (secSumaV / secDias).toFixed(1) : "0.0";
                
                globalAsisH += parseFloat(promSecH);
                globalAsisV += parseFloat(promSecV);
                if(secDias > globalDiasHabiles) globalDiasHabiles = secDias;

                tablaSecciones += `
                    <tr>
                        <td style="text-align:left"><b>${d.seccion || 'S/N'}</b></td>
                        <td>${secH+secV}</td>
                        <td style="color:#e91e63">${promSecH}</td>
                        <td style="color:#2196f3">${promSecV}</td>
                        <td style="background:#f0f0f0"><b>${(parseFloat(promSecH)+parseFloat(promSecV)).toFixed(1)}</b></td>
                    </tr>`;
            });

            // Cálculos Finales Globales
            const totalMatricula = globalMatH + globalMatV;
            const totalAsistenciaReal = (globalAsisH + globalAsisV).toFixed(1);
            const porcentajeEficiencia = totalMatricula > 0 ? Math.round((totalAsistenciaReal / totalMatricula) * 100) : 0;

            // Tabla de Edades Global
            let filasEdades = "";
            Object.keys(globalEdades).sort((a,b)=>a-b).forEach(e => {
                filasEdades += `<tr><td>${e} años</td><td>${globalEdades[e].F}</td><td>${globalEdades[e].M}</td><td>${globalEdades[e].F + globalEdades[e].M}</td></tr>`;
            });

            container.innerHTML = `
                <div class="reporte-direccion">
                    <h3 style="color:var(--azul); border-bottom:2px solid var(--azul);">CONSOLIDADO GLOBAL MENSUAL</h3>
                    
                    <div class="resumen-grid">
                        <div class="resumen-item"><b>${totalMatricula}</b><br><small>MATRÍCULA</small></div>
                        <div class="resumen-item"><b>${totalAsistenciaReal}</b><br><small>PROM. ASIST.</small></div>
                        <div class="resumen-item" style="background:var(--azul); color:white;"><b>${porcentajeEficiencia}%</b><br><small>EFICIENCIA</small></div>
                    </div>

                    <p class="seccion-titulo">📊 ASISTENCIA POR SECCIÓN (PROM. REAL)</p>
                    <table class="tabla-admin">
                        <thead><tr><th>Grado/Sec</th><th>Mat.</th><th>H</th><th>V</th><th>Total</th></tr></thead>
                        <tbody>${tablaSecciones}</tbody>
                    </table>

                    <p class="seccion-titulo">🎂 MATRÍCULA POR EDAD Y GÉNERO (Toda la Escuela)</p>
                    <table class="tabla-admin">
                        <thead><tr><th>Edad</th><th>H (Hembras)</th><th>V (Varones)</th><th>Total</th></tr></thead>
                        <tbody>${filasEdades}</tbody>
                        <tfoot style="background:#eee; font-weight:bold;">
                            <tr><td>TOTALES</td><td>${globalMatH}</td><td>${globalMatV}</td><td>${totalMatricula}</td></tr>
                        </tfoot>
                    </table>
                    <button onclick="window.print()" class="btn-imprimir">🖨️ Imprimir Reporte de Dirección</button>
                </div>`;
        };

        window.render = () => {
            const f = document.getElementById('fechaSeleccionada').value || new Date().toISOString().split('T')[0];
            const fechaObj = new Date(f + "T00:00:00");
            const esFinDeSemana = fechaObj.getDay() === 0 || fechaObj.getDay() === 6;
            
            document.getElementById('displayFecha').innerText = f;
            document.getElementById('docente').value = window.db.docente || "";
            document.getElementById('seccion').value = window.db.seccion || "";
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";
            
            if(!window.db.feriados.includes(f) && !esFinDeSemana) {
                window.db.alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[f] && window.db.asistencias[f][a.id]) || 0;
                    let c = "#ccc", t = "F";
                    if(est === 1) { c = "var(--exito)"; t = "P"; }
                    if(est === 2) { c = "var(--morado)"; t = "J"; }
                    lista.innerHTML += `<div class="student-item">
                        <div style="width:10px; height:10px; border-radius:50%; background:${a.genero==='F'?'#ff99cc':'#99ccff'}"></div>
                        <div style="flex-grow:1"><b>${a.nombre}</b> <small onclick="eliminarAlumno(${a.id})" style="color:red; cursor:pointer;">(Retirar)</small></div>
                        <button onclick="marcar(${a.id})" style="width:40px; background:${c}; color:white; border:none; border-radius:5px; font-weight:bold;">${t}</button>
                    </div>`;
                });
            } else { lista.innerHTML = `<p style='color:red; text-align:center;'>${esFinDeSemana ? 'FIN DE SEMANA' : 'FERIADO'}</p>`; }
            generarReporteDocente();
        };

        function generarReporteDocente() {
            const alumnos = window.db.alumnos || [];
            const asistencias = window.db.asistencias || {};
            const mesAct = new Date().getMonth();
            const anioAct = new Date().getFullYear();
            let dias = 0, sumaH = 0, sumaV = 0;

            Object.keys(asistencias).forEach(f => {
                const fecha = new Date(f + "T00:00:00");
                if (fecha.getMonth() === mesAct && fecha.getFullYear() === anioAct && fecha.getDay() !== 0 && fecha.getDay() !== 6) {
                    dias++;
                    alumnos.forEach(al => { if (asistencias[f][al.id] === 1) al.genero === 'F' ? sumaH++ : sumaV++; });
                }
            });

            const pH = dias > 0 ? (sumaH / dias).toFixed(1) : "0.0";
            const pV = dias > 0 ? (sumaV / dias).toFixed(1) : "0.0";
            
            let disg = {}; let mH = 0, mV = 0;
            alumnos.forEach(al => {
                const e = calcularEdad(al.nacimiento);
                if(!disg[e]) disg[e] = { F: 0, M: 0 };
                disg[e][al.genero]++;
                al.genero === 'F' ? mH++ : mV++;
            });

            let fEdades = "";
            Object.keys(disg).sort((a,b)=>a-b).forEach(e => {
                fEdades += `<tr><td>${e} años</td><td>${disg[e].F}</td><td>${disg[e].M}</td><td>${disg[e].F+disg[e].M}</td></tr>`;
            });

            document.getElementById('reporteDocenteContenedor').innerHTML = `
                <div class="reporte-container">
                    <img src="${LOGO_URL}" style="width:50px; display:block; margin:0 auto;">
                    <h3 style="text-align:center; color:var(--celeste); font-size:14px;">ESTADÍSTICA DE SECCIÓN</h3>
                    <div class="promedio-real-card">
                        <div><small>PROM. H</small><br><b style="color:#e91e63">${pH}</b></div>
                        <div><small>PROM. V</small><br><b style="color:#2196f3">${pV}</b></div>
                        <div><small>TOTAL</small><br><b>${(parseFloat(pH)+parseFloat(pV)).toFixed(1)}</b></div>
                    </div>
                    <table class="tabla-disgregada">
                        <thead><tr><th>Edad</th><th>H</th><th>V</th><th>T</th></tr></thead>
                        <tbody>${fEdades}</tbody>
                    </table>
                </div>`;
        }

        window.agregarAlumno = () => {
            const nom = document.getElementById('newNombre').value.toUpperCase();
            const nac = document.getElementById('newNac').value;
            if(!nom || !nac) return alert("Falta datos");
            window.db.alumnos.push({ id: Date.now(), nombre: nom, genero: document.getElementById('newGen').value, nacimiento: nac });
            window.saveToCloud(window.db);
        };
        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f] = {};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id] + 1) % 3 || 1;
            window.saveToCloud(window.db);
        };
        window.eliminarAlumno = async (id) => { if(confirm("¿Retirar alumno?")) { window.db.alumnos = window.db.alumnos.filter(a => a.id !== id); await window.saveToCloud(window.db); } };
        window.saveToCloud = async (data) => { await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), data); };
        window.actualizarPerfil = () => { window.db.docente = document.getElementById('docente').value; window.db.seccion = document.getElementById('seccion').value; window.saveToCloud(window.db); };
        window.logout = () => location.reload();
        window.toggleFeriado = () => {
            const f = document.getElementById('fechaSeleccionada').value;
            const idx = window.db.feriados.indexOf(f);
            idx === -1 ? window.db.feriados.push(f) : window.db.feriados.splice(idx, 1);
            window.saveToCloud(window.db);
        };
        document.addEventListener("DOMContentLoaded", () => { document.getElementById('fechaSeleccionada').value = new Date().toISOString().split('T')[0]; });
    </script>

    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --gris: #f4f7f6; --exito: #27ae60; --morado: #8e44ad; --rojo: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: var(--gris); font-size: 14px; }
        header { background: var(--azul); color: white; padding: 10px; text-align: center; }
        .container { max-width: 450px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--exito); color: white; font-weight: bold; border: none; }
        
        /* Estilos Admin */
        .reporte-direccion { background: white; padding: 15px; border-radius: 10px; border-top: 5px solid var(--azul); margin-top: 15px; }
        .resumen-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; text-align: center; }
        .resumen-item { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .seccion-titulo { font-weight: bold; font-size: 12px; margin-top: 15px; color: var(--celeste); }
        .tabla-admin { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 5px; }
        .tabla-admin th, .tabla-admin td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        
        .promedio-real-card { display: flex; justify-content: space-around; text-align: center; background: #f0f4f8; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .tabla-disgregada { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tabla-disgregada th, .tabla-disgregada td { border: 1px solid #eee; padding: 4px; text-align: center; }
        .student-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
        .btn-imprimir { background: var(--azul); color: white; border: none; margin-top: 15px; cursor: pointer; }
        
        @media print { .no-print, header, .card { display: none !important; } .reporte-direccion, .reporte-container { display: block !important; border: none; width: 100%; } }
    </style>
</head>
<body>

<div id="authSection" style="max-width: 300px; margin: 50px auto; text-align: center; background: white; padding: 20px; border-radius: 15px;">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" style="width:70px;">
    <h3>Lucila Palacios</h3>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Clave">
    <button onclick="login()" class="btn-main">Entrar</button>
</div>

<div id="appContent" style="display: none;">
    <header>
        <button onclick="logout()" style="width:auto; float:right; background:var(--rojo); color:white; border:none; padding:4px 8px; font-size:10px;">Salir</button>
        <b>LUCILA PALACIOS</b>
    </header>

    <div class="container">
        <div id="adminPanel" class="card no-print" style="display:none; background: #eef2f3;">
            <b style="color:var(--azul);">🏢 PANEL DE DIRECCIÓN</b>
            <button onclick="generarConsolidadoDireccion()" style="background:var(--morado); color:white;">Generar Consolidado Institucional</button>
            <div id="resultadosAdmin"></div>
        </div>

        <div class="card no-print">
            <input type="text" id="docente" onchange="actualizarPerfil()" placeholder="Docente">
            <input type="text" id="seccion" onchange="actualizarPerfil()" placeholder="Grado y Sección">
        </div>

        <div class="card no-print">
            <b>+ Nuevo Alumno</b>
            <input type="text" id="newNombre" placeholder="Nombre completo">
            <div style="display:flex; gap:5px;">
                <select id="newGen" style="width:40%"><option value="F">Hembra</option><option value="M">Varón</option></select>
                <input type="date" id="newNac" style="width:60%">
            </div>
            <button onclick="agregarAlumno()" class="btn-main">Guardar</button>
        </div>

        <div class="card no-print">
            <input type="date" id="fechaSeleccionada" onchange="window.render()">
            <button onclick="toggleFeriado()" style="background:var(--rojo); color:white; font-size:11px;">🚩 Feriado</button>
            <div id="listaAsistencia"></div>
        </div>

        <div id="reporteDocenteContenedor"></div>
    </div>
</div>

</body>
</html>
