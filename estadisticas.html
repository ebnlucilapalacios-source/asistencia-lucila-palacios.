<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadística - Lucila Palacios</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        const CODIGO_ESCUELA = "LUCILA2026";
        const LOGO_URL = "https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", alumnos: [], asistencias: {}, feriados: [] };

        function calcularEdad(fNac) {
            if(!fNac) return "S/D";
            const hoy = new Date();
            const cumple = new Date(fNac);
            let edad = hoy.getFullYear() - cumple.getFullYear();
            if (hoy.getMonth() < cumple.getMonth() || (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
            return edad;
        }

        window.login = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const docSnap = await getDoc(doc(dbCloud, "docentes_db", user));
            if (docSnap.exists() && docSnap.data().pass === pass) {
                window.usuarioActual = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", user), (s) => { window.db = s.data(); window.render(); });
            } else { alert("Datos incorrectos"); }
        };

        window.render = () => {
            const f = document.getElementById('fechaSeleccionada').value || new Date().toISOString().split('T')[0];
            document.getElementById('displayFecha').innerText = f;
            document.getElementById('docente').value = window.db.docente || "";
            document.getElementById('seccion').value = window.db.seccion || "";
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";
            
            if(!window.db.feriados.includes(f)) {
                window.db.alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[f] && window.db.asistencias[f][a.id]) || 0;
                    let c = "#ccc", t = "F";
                    if(est === 1) { c = "var(--exito)"; t = "P"; }
                    if(est === 2) { c = "var(--morado)"; t = "J"; }
                    lista.innerHTML += `<div class="student-item">
                        <div style="width:10px; height:10px; border-radius:50%; background:${a.genero==='F'?'#ff99cc':'#99ccff'}"></div>
                        <div style="flex-grow:1">
                            <b>${a.nombre}</b>
                            <button onclick="eliminarAlumno(${a.id})" class="btn-delete">🗑️ Retirar</button>
                        </div>
                        <button onclick="marcar(${a.id})" style="width:40px; background:${c}; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">${t}</button>
                    </div>`;
                });
            } else { lista.innerHTML = "<p style='color:red; text-align:center; font-weight:bold;'>🚩 DÍA FERIADO O SIN ACTIVIDAD</p>"; }
            
            generarReporteDocente();
        };

        // --- REPORTE MENSUAL INTEGRAL ---
        function generarReporteDocente() {
            const alumnos = window.db.alumnos || [];
            const asistencias = window.db.asistencias || {};
            const hoy = new Date();
            const mesAct = hoy.getMonth();
            const anioAct = hoy.getFullYear();

            let diasClase = 0, totalP_H = 0, totalP_V = 0, totalFaltas = 0;

            Object.keys(asistencias).forEach(fechaStr => {
                const fecha = new Date(fechaStr + "T00:00:00");
                if (fecha.getMonth() === mesAct && fecha.getFullYear() === anioAct) {
                    diasClase++;
                    alumnos.forEach(al => {
                        const status = asistencias[fechaStr][al.id];
                        if (status === 1) { // Presente
                            al.genero === 'F' ? totalP_H++ : totalP_V++;
                        } else {
                            totalFaltas++;
                        }
                    });
                }
            });

            const promH = diasClase > 0 ? (totalP_H / diasClase).toFixed(1) : "0.0";
            const promV = diasClase > 0 ? (totalP_V / diasClase).toFixed(1) : "0.0";
            const promAsis = (parseFloat(promH) + parseFloat(promV)).toFixed(1);
            
            const matTotal = alumnos.length;
            const eficiencia = (diasClase * matTotal) > 0 ? Math.round(((totalP_H + totalP_V) / (diasClase * matTotal)) * 100) : 0;

            // Tabla de Matrícula Disgregada
            let disgregacion = {};
            let matH = 0, matV = 0;
            alumnos.forEach(al => {
                const e = calcularEdad(al.nacimiento);
                if(!disgregacion[e]) disgregacion[e] = { F: 0, M: 0 };
                disgregacion[e][al.genero]++;
                al.genero === 'F' ? matH++ : matV++;
            });

            let filas = "";
            Object.keys(disgregacion).sort((a,b)=>a-b).forEach(e => {
                filas += `<tr><td>${e} años</td><td>${disgregacion[e].F}</td><td>${disgregacion[e].M}</td><td>${disgregacion[e].F + disgregacion[e].M}</td></tr>`;
            });

            document.getElementById('reporteDocenteContenedor').innerHTML = `
                <div class="reporte-container">
                    <img src="${LOGO_URL}" style="width:55px; display:block; margin: 0 auto 10px;">
                    <h2 class="titulo-reporte">REPORTE ESTADÍSTICO MENSUAL</h2>
                    
                    <div class="porcentaje-box">
                        <h1>${eficiencia}%</h1>
                        <p>EFICIENCIA DEL MES</p>
                    </div>

                    <div class="promedio-real-card">
                        <div class="stat-item"><small>PROM. HEMBRAS</small><br><b style="color:#e91e63">${promH}</b></div>
                        <div class="stat-item" style="border-left:1px solid #ddd; border-right:1px solid #ddd; padding:0 10px;"><small>PROM. VARONES</small><br><b style="color:#2196f3">${promV}</b></div>
                        <div class="stat-item"><small>ASIST. DIARIA</small><br><b>${promAsis}</b></div>
                    </div>

                    <div class="info-adicional">
                        <span>Días Laborados: <b>${diasClase}</b></span> | 
                        <span>Matrícula Total: <b>${matTotal}</b></span>
                    </div>

                    <p style="font-weight:bold; font-size:11px; margin-top:15px; text-align:center; color:#555;">DISTRIBUCIÓN DE MATRÍCULA</p>
                    <table class="tabla-disgregada">
                        <thead><tr><th>Edad</th><th>H</th><th>V</th><th>Total</th></tr></thead>
                        <tbody>${filas}</tbody>
                        <tfoot style="background:#eee; font-weight:bold;"><tr><td>TOTAL</td><td>${matH}</td><td>${matV}</td><td>${matH+matV}</td></tr></tfoot>
                    </table>
                    <button onclick="window.print()" class="btn-imprimir">🖨️ Imprimir para Dirección</button>
                </div>`;
        }

        // --- FUNCIONES DE ACCIÓN ---
        window.eliminarAlumno = async (id) => {
            if(confirm("¿Seguro que desea retirar a este alumno del plantel? Esta acción no se puede deshacer.")) {
                window.db.alumnos = window.db.alumnos.filter(a => a.id !== id);
                await window.saveToCloud(window.db);
            }
        };

        window.agregarAlumno = () => {
            const nom = document.getElementById('newNombre').value.toUpperCase();
            const nac = document.getElementById('newNac').value;
            if(!nom || !nac) return alert("Falta nombre o fecha");
            window.db.alumnos.push({ id: Date.now(), nombre: nom, genero: document.getElementById('newGen').value, nacimiento: nac });
            window.saveToCloud(window.db);
            document.getElementById('newNombre').value = "";
        };

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f] = {};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id] + 1) % 3 || 1;
            window.saveToCloud(window.db);
        };

        window.saveToCloud = async (data) => { await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), data); };
        window.actualizarPerfil = () => { window.db.docente = document.getElementById('docente').value; window.db.seccion = document.getElementById('seccion').value; window.saveToCloud(window.db); };
        window.logout = () => location.reload();
        window.toggleFeriado = () => {
            const f = document.getElementById('fechaSeleccionada').value;
            const idx = window.db.feriados.indexOf(f);
            idx === -1 ? window.db.feriados.push(f) : window.db.feriados.splice(idx, 1);
            window.saveToCloud(window.db);
        };
        document.addEventListener("DOMContentLoaded", () => { document.getElementById('fechaSeleccionada').value = new Date().toISOString().split('T')[0]; });
    </script>

    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --gris: #f4f7f6; --exito: #27ae60; --morado: #8e44ad; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--gris); }
        header { background: var(--azul); color: white; padding: 15px; text-align: center; border-bottom: 3px solid #f39c12; }
        .container { max-width: 450px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 12px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--exito); color: white; font-weight: bold; border: none; cursor: pointer; }
        
        /* Reporte Mensual */
        .reporte-container { background: white; border-radius: 20px; padding: 25px; border-left: 10px solid var(--celeste); box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .titulo-reporte { color: var(--celeste); text-align: center; font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; margin: 5px 0 15px; }
        .porcentaje-box { background: var(--celeste); color: white; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; }
        .porcentaje-box h1 { font-size: 3.5rem; margin: 0; }
        .promedio-real-card { display: flex; justify-content: space-around; background: #f8f9fa; border: 1px solid #ddd; border-radius: 12px; padding: 15px; text-align: center; }
        .stat-item small { font-size: 8px; color: #666; font-weight: bold; text-transform: uppercase; }
        .info-adicional { font-size: 11px; text-align: center; margin-top: 10px; color: #666; }
        .tabla-disgregada { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; margin-top: 5px; }
        .tabla-disgregada th, .tabla-disgregada td { border: 1px solid #eee; padding: 8px; }
        .btn-imprimir { background: var(--celeste); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; width: 100%; }

        .student-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #f0f0f0; }
        .btn-delete { width: auto; background: none; border: none; color: var(--rojo); font-size: 10px; cursor: pointer; padding: 0; margin-left: 10px; text-decoration: underline; }
        .logo-login { width: 85px; height: 85px; margin-bottom: 10px; border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        @media print { .card, header, .btn-main, .no-print, .btn-delete { display: none !important; } .reporte-container { border: 1px solid #eee; width: 100%; box-shadow: none; margin: 0; } }
    </style>
</head>
<body>

<div id="authSection" style="max-width: 320px; margin: 60px auto; padding: 25px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center;">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" class="logo-login">
    <h3 style="color: var(--azul); margin:5px 0 20px;">Lucila Palacios</h3>
    <input type="text" id="loginUser" placeholder="Usuario Docente">
    <input type="password" id="loginPass" placeholder="Contraseña">
    <button onclick="login()" class="btn-main" style="margin-top: 15px;">Entrar al Sistema</button>
</div>

<div id="appContent" style="display: none;">
    <header>
        <button onclick="logout()" style="width:auto; float:right; background:var(--rojo); color:white; font-size:10px; border:none; padding:5px 12px; border-radius:5px; cursor:pointer;">Cerrar Sesión</button>
        <h4 style="margin:0; letter-spacing:1px;">LUCILA PALACIOS</h4>
    </header>

    <div class="container">
        <div class="card no-print">
            <input type="text" id="docente" onchange="actualizarPerfil()" placeholder="Nombre del Docente">
            <input type="text" id="seccion" onchange="actualizarPerfil()" placeholder="Grado y Sección">
        </div>

        <div class="card no-print">
            <b style="color:var(--celeste); font-size:14px;">📝 Inscripción de Alumno</b>
            <input type="text" id="newNombre" placeholder="Apellidos y Nombres">
            <div style="display:flex; gap:5px;">
                <select id="newGen" style="width:40%"><option value="F">Hembra</option><option value="M">Varón</option></select>
                <input type="date" id="newNac" style="width:60%">
            </div>
            <button onclick="agregarAlumno()" class="btn-main">Registrar Alumno</button>
        </div>

        <div class="card no-print">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <input type="date" id="fechaSeleccionada" onchange="window.render()" style="width:65%;">
                <button onclick="toggleFeriado()" style="background:var(--rojo); color:white; font-size:10px; width:30%; padding:8px;">🚩 Feriado</button>
            </div>
            <p style="font-size: 12px; text-align: center; margin: 10px 0; color:#777;">Control de Asistencia: <b id="displayFecha" style="color:#333;"></b></p>
            <div id="listaAsistencia"></div>
        </div>

        <div id="reporteDocenteContenedor"></div>
    </div>
</div>

</body>
</html>
