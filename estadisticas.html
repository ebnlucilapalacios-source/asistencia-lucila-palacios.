<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control - E.B.N. Lucila Palacios</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        const USUARIO_ADMIN = "admin_lucila";
        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", grado: "", alumnos: [], asistencias: {}, feriados: [] };

        // Lógica de Cálculo de Edad Real
        function calcularEdad(fNac) {
            if(!fNac) return 0;
            const hoy = new Date();
            const cumple = new Date(fNac);
            let edad = hoy.getFullYear() - cumple.getFullYear();
            const m = hoy.getMonth() - cumple.getMonth();
            if (m < 0 || (m === 0 && hoy.getDate() < cumple.getDate())) edad--;
            return edad;
        }

        window.login = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const docSnap = await getDoc(doc(dbCloud, "docentes_db", user));
            if (docSnap.exists() && docSnap.data().pass === pass) {
                window.usuarioActual = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (user === USUARIO_ADMIN) document.getElementById('adminPanel').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", user), (s) => { window.db = s.data(); window.render(); });
            } else { alert("Acceso denegado"); }
        };

        // --- ESTADÍSTICA DEL DOCENTE: PROMEDIOS POR GÉNERO ---
        function generarEstadisticaDocente() {
            const f = document.getElementById('fechaSeleccionada').value;
            const mesAct = new Date(f + "T00:00:00").getMonth();
            const anioAct = new Date(f + "T00:00:00").getFullYear();
            
            let matH = 0, matV = 0;
            let sumaAsisH = 0, sumaAsisV = 0, diasHabiles = 0;
            let disgEdades = {};

            // 1. Matrícula y Edades
            window.db.alumnos.forEach(al => {
                const edad = calcularEdad(al.nacimiento);
                al.genero === 'F' ? matH++ : matV++;
                if(!disgEdades[edad]) disgEdades[edad] = { F: 0, M: 0 };
                disgEdades[edad][al.genero]++;
            });

            // 2. Cálculo de Promedio Real (H/V)
            Object.keys(window.db.asistencias || {}).forEach(fechaStr => {
                const fechaObj = new Date(fechaStr + "T00:00:00");
                const esFeriado = window.db.feriados && window.db.feriados.includes(fechaStr);
                
                // Solo días del mes actual, que no sean fin de semana ni feriados
                if (fechaObj.getMonth() === mesAct && fechaObj.getFullYear() === anioAct && 
                    fechaObj.getDay() !== 0 && fechaObj.getDay() !== 6 && !esFeriado) {
                    
                    diasHabiles++;
                    window.db.alumnos.forEach(al => {
                        if (window.db.asistencias[fechaStr][al.id] === 1) {
                            al.genero === 'F' ? sumaAsisH++ : sumaAsisV++;
                        }
                    });
                }
            });

            const promH = diasHabiles > 0 ? (sumaAsisH / diasHabiles).toFixed(1) : "0.0";
            const promV = diasHabiles > 0 ? (sumaAsisV / diasHabiles).toFixed(1) : "0.0";
            const eficiencia = (matH + matV) > 0 ? (((parseFloat(promH) + parseFloat(promV)) / (matH + matV)) * 100).toFixed(1) : 0;

            // Renderizar Tablas de Docente
            let htmlEdades = "";
            Object.keys(disgEdades).sort((a,b)=>a-b).forEach(e => {
                htmlEdades += `<tr><td>${e} años</td><td>${disgEdades[e].F}</td><td>${disgEdades[e].M}</td><td>${disgEdades[e].F+disgEdades[e].M}</td></tr>`;
            });

            document.getElementById('reporteDocenteContenedor').innerHTML = `
                <div class="card reporte-docente">
                    <h4 class="titulo-stat">📊 RESUMEN ESTADÍSTICO MENSUAL</h4>
                    <div class="grid-promedios">
                        <div class="item-prom"><b>${promH}</b><br><small>Prom. Hembras</small></div>
                        <div class="item-prom"><b>${promV}</b><br><small>Prom. Varones</small></div>
                        <div class="item-prom" style="background:var(--azul); color:white;"><b>${eficiencia}%</b><br><small>Eficiencia</small></div>
                    </div>
                    <p class="sub-tit">MATRÍCULA POR EDAD (911)</p>
                    <table class="tabla-mini">
                        <thead><tr><th>Edad</th><th>H</th><th>V</th><th>T</th></tr></thead>
                        <tbody>${htmlEdades}</tbody>
                        <tfoot style="background:#eee"><tr><td><b>TOTAL</b></td><td>${matH}</td><td>${matV}</td><td>${matH+matV}</td></tr></tfoot>
                    </table>
                </div>`;
        }

        window.render = () => {
            const f = document.getElementById('fechaSeleccionada').value;
            const esFin = (new Date(f + "T00:00:00")).getDay() % 6 === 0;
            const esFer = window.db.feriados && window.db.feriados.includes(f);

            document.getElementById('docenteNombre').innerText = window.db.docente || "No asignado";
            document.getElementById('docenteGrado').innerText = (window.db.grado || "-") + " " + (window.db.seccion || "-");
            
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";

            if (!esFin && !esFer) {
                window.db.alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[f] && window.db.asistencias[f][a.id]) || 0;
                    let color = "#ccc", texto = "F";
                    if(est === 1) { color = "var(--exito)"; texto = "P"; }
                    if(est === 2) { color = "var(--morado)"; texto = "J"; }

                    lista.innerHTML += `
                        <div class="student-row">
                            <div class="genero-dot ${a.genero}"></div>
                            <div style="flex-grow:1"><b>${a.nombre}</b></div>
                            <button onclick="marcar(${a.id})" class="btn-p" style="background:${color}">${texto}</button>
                        </div>`;
                });
            } else {
                lista.innerHTML = `<div class="aviso-feriado">🚫 DÍA NO LABORABLE</div>`;
            }
            generarEstadisticaDocente();
        };

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f] = {};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id] + 1) % 3 || 1;
            window.saveToCloud(window.db);
        };

        window.agregarAlumno = () => {
            const nom = document.getElementById('newNom').value.toUpperCase();
            const nac = document.getElementById('newNac').value;
            if(!nom || !nac) return alert("Complete los datos");
            window.db.alumnos.push({ id: Date.now(), nombre: nom, genero: document.getElementById('newGen').value, nacimiento: nac });
            window.saveToCloud(window.db);
            document.getElementById('newNom').value = "";
        };

        window.toggleFeriado = () => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.feriados) window.db.feriados = [];
            const idx = window.db.feriados.indexOf(f);
            idx === -1 ? window.db.feriados.push(f) : window.db.feriados.splice(idx, 1);
            window.saveToCloud(window.db);
        };

        window.saveToCloud = async (d) => { await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), d); };
        window.logout = () => location.reload();
        document.addEventListener("DOMContentLoaded", () => { document.getElementById('fechaSeleccionada').value = new Date().toISOString().split('T')[0]; });
    </script>

    <style>
        :root { --azul: #003366; --celeste: #0056b3; --exito: #28a745; --morado: #6f42c1; --rojo: #d9534f; --fondo: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); margin: 0; color: #333; }
        
        /* Encabezado Institucional */
        header { background: var(--azul); color: white; padding: 15px; text-align: center; border-bottom: 5px solid #ffcc00; }
        .logo-inst { width: 60px; margin-bottom: 5px; }

        .container { max-width: 480px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 15px; }
        
        /* Datos de la Docente */
        .info-docente { border-left: 5px solid var(--celeste); background: #eef6ff; }
        .info-docente b { color: var(--azul); font-size: 16px; }

        /* Estilos de Lista */
        .student-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .genero-dot { width: 12px; height: 12px; border-radius: 50%; }
        .genero-dot.F { background: #ff85a2; }
        .genero-dot.M { background: #3498db; }
        .btn-p { width: 42px; height: 32px; border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* Estadísticas */
        .grid-promedios { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
        .item-prom { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #ddd; }
        .item-prom b { font-size: 18px; }
        .tabla-mini { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        .tabla-mini th, .tabla-mini td { border: 1px solid #eee; padding: 6px; }
        .titulo-stat { margin: 0; color: var(--azul); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .sub-tit { font-size: 11px; font-weight: bold; color: #777; margin-top: 15px; }

        .aviso-feriado { background: #fff5f5; color: #c53030; padding: 20px; text-align: center; font-weight: bold; border-radius: 8px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        .btn-add { background: var(--exito); color: white; border: none; font-weight: bold; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="authSection" style="max-width:320px; margin: 80px auto; text-align: center; background: white; padding: 30px; border-radius: 20px;">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" class="logo-inst">
    <h2 style="color:var(--azul); margin:10px 0;">E.B.N. LUCILA PALACIOS</h2>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Clave">
    <button onclick="login()" style="background:var(--azul); color:white; font-weight:bold;">INGRESAR</button>
</div>

<div id="appContent" style="display: none;">
    <header>
        <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" width="40" style="vertical-align: middle;">
        <b>E.B.N. "LUCILA PALACIOS"</b>
        <button onclick="logout()" style="width:auto; float:right; background:var(--rojo); color:white; border:none; padding:4px 10px; border-radius:4px; font-size:12px;">SALIR</button>
    </header>

    <div class="container">
        <div class="card info-docente no-print">
            Docente: <b id="docenteNombre"></b><br>
            Grado y Sección: <b id="docenteGrado"></b>
        </div>

        <div class="card no-print">
            <label style="font-size:12px;">Fecha de Asistencia:</label>
            <input type="date" id="fechaSeleccionada" onchange="window.render()">
            <button onclick="toggleFeriado()" style="background:#fff; color:var(--rojo); border: 1px solid var(--rojo); font-size:11px;">🚩 MARCAR COMO NO LABORABLE</button>
        </div>

        <div class="card no-print">
            <b style="color:var(--celeste)">+ Registro de Matrícula</b>
            <input type="text" id="newNom" placeholder="Nombres y Apellidos">
            <div style="display:flex; gap:5px;">
                <select id="newGen" style="width:40%"><option value="F">Hembra</option><option value="M">Varón</option></select>
                <input type="date" id="newNac" style="width:60%">
            </div>
            <button onclick="agregarAlumno()" class="btn-add">INSCRIBIR ALUMNO</button>
        </div>

        <div class="card">
            <p style="text-align:center; font-weight:bold; margin:0 0 10px 0;">Control del día: <span id="displayFecha"></span></p>
            <div id="listaAsistencia"></div>
        </div>

        <div id="reporteDocenteContenedor"></div>
    </div>
</div>

</body>
</html>
