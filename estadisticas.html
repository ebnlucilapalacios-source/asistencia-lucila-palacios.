<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas EBNLP</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            messagingSenderId: "368890880546",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.syncSec = (s, cb) => onSnapshot(doc(db, "secciones", s), (d) => cb(d.data()));
        window.saveSec = async (s, d) => await setDoc(doc(db, "secciones", s), d);
    </script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; text-align: center; }
        .card { background: white; padding: 20px; margin: 15px auto; max-width: 450px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-blue { background: #2980b9; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <header style="background: #2980b9; color: white; padding: 25px;">
        <h2 style="margin:0;">Control de Alumnos</h2>
        <a href="index.html" class="no-print" style="color: white; text-decoration: none; font-size: 0.9rem;">← Volver al Menú</a>
    </header>
    <div class="card no-print">
        <h3>Grado y Sección</h3>
        <input type="text" id="seccionInput" placeholder="Ej: 1A" style="padding:12px; width:70%; margin-bottom:15px; border:1px solid #ccc; border-radius:8px;">
        <br>
        <button class="btn-blue" onclick="cargarSeccion()">ENTRAR</button>
    </div>
    <div id="panelSeccion" style="display:none;">
        <div class="card">
            <h3>Matrícula Total: <span id="txtTotal">0</span></h3>
            <p>Hembras: <span id="txtH">0</span> | Varones: <span id="txtV">0</span></p>
            <button class="no-print" onclick="window.print()" style="padding:8px; cursor:pointer;">🖨️ Imprimir Reporte</button>
        </div>
        <div class="card">
            <h4>Pase de Lista Hoy</h4>
            <div id="listaAlumnos"></div>
        </div>
    </div>
    <script>
        let datosSeccion = { alumnos: [], asistencias: {} };
        let secActiva = "";
        function cargarSeccion() {
            secActiva = document.getElementById('seccionInput').value.toUpperCase().trim();
            if(!secActiva) return;
            window.syncSec(secActiva, (data) => {
                datosSeccion = data || { alumnos: [], asistencias: {} };
                document.getElementById('panelSeccion').style.display = 'block';
                renderAlumnos();
            });
        }
        function renderAlumnos() {
            const h = datosSeccion.alumnos.filter(a => a.g === 'F').length;
            const v = datosSeccion.alumnos.filter(a => a.g === 'M').length;
            document.getElementById('txtH').innerText = h;
            document.getElementById('txtV').innerText = v;
            document.getElementById('txtTotal').innerText = h + v;
            const cont = document.getElementById('listaAlumnos');
            cont.innerHTML = "";
            const hoy = new Date().toISOString().split('T')[0];
            datosSeccion.alumnos.forEach(a => {
                const p = datosSeccion.asistencias[hoy]?.[a.id] === 1;
                cont.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:8px;">
                    <span>${a.n}</span>
                    <button style="background:${p?'#27ae60':'#ccc'}; color:white; border:none; padding:6px 12px; border-radius:5px; cursor:pointer;" onclick="marcarAsis(${a.id})">${p?'P':'F'}</button>
                </div>`;
            });
        }
        async function marcarAsis(id) {
            const hoy = new Date().toISOString().split('T')[0];
            if(!datosSeccion.asistencias[hoy]) datosSeccion.asistencias[hoy] = {};
            datosSeccion.asistencias[hoy][id] = datosSeccion.asistencias[hoy][id] === 1 ? 0 : 1;
            await window.saveSec(secActiva, datosSeccion);
        }
    </script>
</body>
</html>
