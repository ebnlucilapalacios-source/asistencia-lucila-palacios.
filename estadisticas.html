<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA EBN LUCILA PALACIOS - OFICIAL</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);
        const USUARIO_ADMIN = "admin_lucila";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", grado: "", turno: "", alumnos: [], asistencias: {}, feriados: [] };

        // --- LOGIN ---
        window.login = async () => {
            const u = document.getElementById('loginUser').value.toLowerCase().trim();
            const p = document.getElementById('loginPass').value;
            const snap = await getDoc(doc(dbCloud, "docentes_db", u));
            if (snap.exists() && snap.data().pass === p) {
                window.usuarioActual = u;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (u === USUARIO_ADMIN) document.getElementById('adminPanel').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", u), (s) => { window.db = s.data(); window.render(); });
            } else alert("Acceso denegado");
        };

        // --- CONSOLIDADO DIRECCIÓN (ORDENADO A-Z Y 1-6) ---
        window.consolidadoMensual = async () => {
            const fSel = document.getElementById('fechaSeleccionada').value;
            const mesRef = new Date(fSel + "T00:00:00").getMonth();
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            
            let docentes = [];
            snap.forEach(dSnap => {
                const data = dSnap.data();
                if(dSnap.id !== USUARIO_ADMIN && data.alumnos) {
                    docentes.push(data);
                }
            });

            // Lógica de Ordenamiento Estricto: Grado -> Sección
            docentes.sort((a, b) => {
                const gA = parseInt(a.grado) || 0;
                const gB = parseInt(b.grado) || 0;
                if (gA !== gB) return gA - gB;
                return (a.seccion || "").localeCompare(b.seccion || "");
            });

            let h = `<div class="btns-admin-row no-print">
                        <button onclick="descargarPDFAdmin()" class="btn-pdf">💾 EXPORTAR PDF</button>
                     </div>
                     <table class="tabla-admin" id="tablaAdminConsolidado">
                     <thead>
                        <tr>
                            <th rowspan="2">DOCENTE</th>
                            <th rowspan="2">G/S</th>
                            <th colspan="3">MATRÍCULA</th>
                            <th colspan="2">MOV</th>
                            <th colspan="3">PROM. REAL</th>
                        </tr>
                        <tr>
                            <th>H</th><th>V</th><th>T</th>
                            <th>I</th><th>E</th>
                            <th>H</th><th>V</th><th>T</th>
                        </tr>
                     </thead><tbody>`;

            docentes.forEach(d => {
                const alms = d.alumnos || [];
                const activos = alms.filter(a => !a.retirado);
                const mH = activos.filter(a => a.genero === 'F').length;
                const mV = activos.filter(a => a.genero === 'M').length;
                
                const mI = alms.filter(a => a.fechaIngreso && new Date(a.fechaIngreso+"T00:00:00").getMonth() === mesRef).length;
                const mE = alms.filter(a => a.retirado && a.fechaEgreso && new Date(a.fechaEgreso+"T00:00:00").getMonth() === mesRef).length;

                // Cálculo de Promedios (Simplificado para el reporte)
                let sH=0, sV=0, ds=0;
                Object.keys(d.asistencias).forEach(f => {
                    const fo = new Date(f + "T00:00:00");
                    if(fo.getMonth() === mesRef && fo.getDay()!==0 && fo.getDay()!==6 && !d.feriados?.includes(f)) {
                        ds++; activos.forEach(a => { if(d.asistencias[f][a.id] === 1) a.genero === 'F' ? sH++ : sV++; });
                    }
                });
                const pH = ds > 0 ? (sH/ds).toFixed(1) : "0.0";
                const pV = ds > 0 ? (sV/ds).toFixed(1) : "0.0";
                const pT = (parseFloat(pH) + parseFloat(pV)).toFixed(1);

                h += `<tr>
                        <td style="text-align:left">${d.docente}</td>
                        <td>${d.grado}${d.seccion}</td>
                        <td>${mH}</td><td>${mV}</td><td>${activos.length}</td>
                        <td style="color:green">${mI}</td><td style="color:red">${mE}</td>
                        <td>${pH}</td><td>${pV}</td><td>${pT}</td>
                      </tr>`;
            });
            h += `</tbody></table>`;
            document.getElementById('adminOutput').innerHTML = h;
        };

        window.descargarPDFAdmin = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l');
            doc.text("EBN LUCILA PALACIOS - REPORTE DE DIRECCIÓN", 14, 15);
            doc.autoTable({ 
                html: '#tablaAdminConsolidado', 
                startY: 20, 
                theme: 'grid',
                styles: { fontSize: 8, halign: 'center' },
                headStyles: { fillColor: [0, 33, 71] }
            });
            doc.save("Consolidado_Direccion.pdf");
        };

        // --- RENDER ASISTENCIA ---
        window.render = () => {
            const fSel = document.getElementById('fechaSeleccionada').value;
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";
            const activos = (window.db.alumnos || []).filter(a => !a.retirado);
            
            activos.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(a => {
                const st = (window.db.asistencias[fSel] && window.db.asistencias[fSel][a.id]) || 0;
                let c = "#ccc", t = "F"; 
                if(st===1){ c="var(--exito)"; t="P"; }
                lista.innerHTML += `<div class="alumno-fila">
                    <span>${a.nombre}</span>
                    <button onclick="marcar(${a.id})" class="btn-check" style="background:${c}">${t}</button>
                </div>`;
            });
        };

        window.marcar = async (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f]={};
            window.db.asistencias[f][id] = window.db.asistencias[f][id] === 1 ? 0 : 1;
            await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), window.db);
        };

        window.logout = () => location.reload();
    </script>

    <style>
        :root { --azul: #002147; --exito: #28a745; --rojo: #dc3545; --morado: #6f42c1; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tabla-admin { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        .tabla-admin th, .tabla-admin td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        .tabla-admin th { background: #eee; }
        .alumno-fila { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; align-items: center; }
        .btn-check { width: 40px; height: 35px; border: none; color: white; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-pdf { background: var(--rojo); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        header { background: var(--azul); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="authSection" style="max-width:320px; margin: 50px auto; text-align: center;">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" width="80">
    <h2>SISTEMA LUCILA</h2>
    <div class="card">
        <input type="text" id="loginUser" placeholder="Usuario">
        <input type="password" id="loginPass" placeholder="Contraseña">
        <button onclick="login()" style="background:var(--azul); color:white;">ENTRAR</button>
    </div>
</div>

<div id="appContent" style="display:none; max-width: 600px; margin: auto;">
    <header>
        <b>EBN LUCILA PALACIOS</b>
        <button onclick="logout()" style="width:auto; background:none; border:1px solid white; color:white; font-size:10px;">SALIR</button>
    </header>

    <div id="adminPanel" class="card" style="display:none; border: 2px solid var(--morado);">
        <h4 style="color:var(--morado); margin:0;">📊 PANEL DE DIRECCIÓN</h4>
        <button onclick="consolidadoMensual()" style="background:var(--morado); color:white;">GENERAR TABLA ORDENADA</button>
        <div id="adminOutput" style="overflow-x: auto;"></div>
    </div>

    <div class="card">
        <input type="date" id="fechaSeleccionada" value="2026-03-08" onchange="window.render()">
        <div id="listaAsistencia"></div>
    </div>
</div>

</body>
</html>
