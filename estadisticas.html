<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Integral - Lucila Palacios</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        const USUARIO_ADMIN = "admin_lucila";
        const LOGO_URL = "https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", alumnos: [], asistencias: {}, feriados: [] };

        function calcularEdad(fNac) {
            if(!fNac) return 0;
            const hoy = new Date();
            const cumple = new Date(fNac);
            let edad = hoy.getFullYear() - cumple.getFullYear();
            if (hoy.getMonth() < cumple.getMonth() || (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
            return edad;
        }

        window.login = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const docSnap = await getDoc(doc(dbCloud, "docentes_db", user));
            if (docSnap.exists() && docSnap.data().pass === pass) {
                window.usuarioActual = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (user === USUARIO_ADMIN) document.getElementById('adminPanel').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", user), (s) => { window.db = s.data(); window.render(); });
            } else { alert("Datos incorrectos"); }
        };

        // --- LÓGICA DE DIRECCIÓN (MONITOREO DIARIO) ---
        window.monitoreoDiario = async () => {
            const container = document.getElementById('resultadosAdmin');
            const hoy = document.getElementById('fechaSeleccionada').value;
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            let tH = 0, tV = 0, tM = 0;
            let tabla = `<table class="tabla-admin"><thead><tr><th>Sección</th><th>Mat.</th><th>H</th><th>V</th><th>Total</th></tr></thead><tbody>`;

            snap.forEach(dSnap => {
                const d = dSnap.data();
                if (dSnap.id === USUARIO_ADMIN || !d.alumnos) return;
                let aH = 0, aV = 0;
                if (d.asistencias && d.asistencias[hoy]) {
                    d.alumnos.forEach(al => { if (d.asistencias[hoy][al.id] === 1) al.genero === 'F' ? aH++ : aV++; });
                }
                tH += aH; tV += aV; tM += d.alumnos.length;
                tabla += `<tr><td>${d.seccion || 'S/N'}</td><td>${d.alumnos.length}</td><td style="color:#e91e63">${aH}</td><td style="color:#2196f3">${aV}</td><td><b>${aH+aV}</b></td></tr>`;
            });
            
            const porc = tM > 0 ? ((tH+tV)/tM*100).toFixed(1) : 0;
            container.innerHTML = `
                <div class="reporte-direccion">
                    <p class="seccion-titulo">📅 MONITOREO DEL DÍA: ${hoy}</p>
                    <div class="resumen-grid">
                        <div class="resumen-item"><b>${tM}</b><br><small>MATRÍCULA</small></div>
                        <div class="resumen-item"><b>${tH+tV}</b><br><small>ASISTENCIA</small></div>
                        <div class="resumen-item" style="background:var(--exito); color:white;"><b>${porc}%</b><br><small>PORCENTAJE</small></div>
                    </div>
                    ${tabla}</tbody></table>
                </div>`;
        };

        // --- RENDERIZADO Y ESTADÍSTICA DOCENTE ---
        window.render = () => {
            const f = document.getElementById('fechaSeleccionada').value || new Date().toISOString().split('T')[0];
            const fechaObj = new Date(f + "T00:00:00");
            const esFinDeSemana = fechaObj.getDay() === 0 || fechaObj.getDay() === 6;
            const esFeriado = window.db.feriados && window.db.feriados.includes(f);

            document.getElementById('displayFecha').innerText = f;
            document.getElementById('docente').value = window.db.docente || "";
            document.getElementById('seccion').value = window.db.seccion || "";
            
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";

            if (!esFinDeSemana && !esFeriado) {
                window.db.alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[f] && window.db.asistencias[f][a.id]) || 0;
                    let c = "#ccc", t = "F";
                    if(est === 1) { c = "var(--exito)"; t = "P"; }
                    if(est === 2) { c = "var(--morado)"; t = "J"; }
                    lista.innerHTML += `<div class="student-item">
                        <div style="width:10px; height:10px; border-radius:50%; background:${a.genero==='F'?'#ff99cc':'#99ccff'}"></div>
                        <div style="flex-grow:1"><b>${a.nombre}</b> <button onclick="eliminarAlumno(${a.id})" class="btn-del">Retirar</button></div>
                        <button onclick="marcar(${a.id})" style="width:35px; background:${c}; color:white; border:none; border-radius:4px; font-weight:bold;">${t}</button>
                    </div>`;
                });
            } else {
                lista.innerHTML = `<p style='color:red; text-align:center; font-weight:bold;'>🚫 ${esFinDeSemana ? 'FIN DE SEMANA (SIN CLASES)' : 'DÍA FERIADO REGISTRADO'}</p>`;
            }
            generarEstadisticaDocente();
        };

        function generarEstadisticaDocente() {
            const alumnos = window.db.alumnos || [];
            const asistencias = window.db.asistencias || {};
            const mesAct = new Date().getMonth();
            const anioAct = new Date().getFullYear();

            let diasHabilesConLista = 0, sumaH = 0, sumaV = 0;
            let matH = 0, matV = 0, disg = {};

            alumnos.forEach(al => {
                const e = calcularEdad(al.nacimiento);
                if(!disg[e]) disg[e] = { F: 0, M: 0 };
                disg[e][al.genero]++;
                al.genero === 'F' ? matH++ : matV++;
            });

            Object.keys(asistencias).forEach(f => {
                const fecha = new Date(f + "T00:00:00");
                const esFeriado = window.db.feriados && window.db.feriados.includes(f);
                // SOLO lunes a viernes, que NO sea feriado y sea del mes actual
                if (fecha.getMonth() === mesAct && fecha.getFullYear() === anioAct && fecha.getDay() !== 0 && fecha.getDay() !== 6 && !esFeriado) {
                    diasHabilesConLista++;
                    alumnos.forEach(al => {
                        if (asistencias[f][al.id] === 1) al.genero === 'F' ? sumaH++ : sumaV++;
                    });
                }
            });

            const pH = diasHabilesConLista > 0 ? (sumaH / diasHabilesConLista).toFixed(1) : "0.0";
            const pV = diasHabilesConLista > 0 ? (sumaV / diasHabilesConLista).toFixed(1) : "0.0";
            const totalProm = (parseFloat(pH) + parseFloat(pV)).toFixed(1);

            let filasEdades = "";
            Object.keys(disg).sort((a,b)=>a-b).forEach(e => {
                filasEdades += `<tr><td>${e} años</td><td>${disg[e].F}</td><td>${disg[e].M}</td><td>${disg[e].F+disg[e].M}</td></tr>`;
            });

            document.getElementById('reporteDocenteContenedor').innerHTML = `
                <div class="reporte-container">
                    <img src="${LOGO_URL}" style="width:40px; display:block; margin:0 auto;">
                    <h3 style="text-align:center; color:var(--celeste); font-size:14px; margin:5px 0;">ESTADÍSTICA DE SECCIÓN</h3>
                    <div class="promedio-real-card">
                        <div><small>PROM. H</small><br><b style="color:#e91e63">${pH}</b></div>
                        <div><small>PROM. V</small><br><b style="color:#2196f3">${pV}</b></div>
                        <div><small>TOTAL REAL</small><br><b>${totalProm}</b></div>
                    </div>
                    <table class="tabla-admin" style="font-size:11px;">
                        <thead><tr><th>Edad</th><th>H</th><th>V</th><th>Mat.</th></tr></thead>
                        <tbody>${filasEdades}</tbody>
                        <tfoot style="background:#f9f9f9; font-weight:bold;"><tr><td>TOTAL</td><td>${matH}</td><td>${matV}</td><td>${matH+matV}</td></tr></tfoot>
                    </table>
                    <p style="font-size:9px; text-align:center; color:gray; margin-top:5px;">Días hábiles calculados (Lun-Vie sin feriados): ${diasHabilesConLista}</p>
                    <button onclick="window.print()" class="btn-main" style="background:var(--celeste); margin-top:10px;">🖨️ Imprimir Reporte</button>
                </div>`;
        }

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f] = {};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id] + 1) % 3 || 1;
            window.saveToCloud(window.db);
        };
        window.toggleFeriado = () => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.feriados) window.db.feriados = [];
            const idx = window.db.feriados.indexOf(f);
            idx === -1 ? window.db.feriados.push(f) : window.db.feriados.splice(idx, 1);
            window.saveToCloud(window.db);
        };
        window.agregarAlumno = () => {
            const nom = document.getElementById('newNombre').value.toUpperCase();
            const nac = document.getElementById('newNac').value;
            if(!nom || !nac) return alert("Faltan datos");
            window.db.alumnos.push({ id: Date.now(), nombre: nom, genero: document.getElementById('newGen').value, nacimiento: nac });
            window.saveToCloud(window.db);
            document.getElementById('newNombre').value = "";
        };
        window.eliminarAlumno = async (id) => { if(confirm("¿Retirar alumno?")) { window.db.alumnos = window.db.alumnos.filter(a => a.id !== id); await window.saveToCloud(window.db); } };
        window.saveToCloud = async (data) => { await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), data); };
        window.actualizarPerfil = () => { window.db.docente = document.getElementById('docente').value; window.db.seccion = document.getElementById('seccion').value; window.saveToCloud(window.db); };
        window.logout = () => location.reload();
        document.addEventListener("DOMContentLoaded", () => { document.getElementById('fechaSeleccionada').value = new Date().toISOString().split('T')[0]; });
    </script>

    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --gris: #f4f7f6; --exito: #27ae60; --morado: #8e44ad; --rojo: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: var(--gris); font-size: 13px; }
        header { background: var(--azul); color: white; padding: 10px; text-align: center; border-bottom: 3px solid #f39c12; }
        .container { max-width: 450px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--exito); color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-del { background: none; border: none; color: red; font-size: 10px; text-decoration: underline; width: auto; padding: 0; margin-left: 5px; cursor: pointer; }
        
        /* Dirección */
        .resumen-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; text-align: center; }
        .resumen-item { background: #fff; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        .tabla-admin { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: center; }
        .tabla-admin th, .tabla-admin td { border: 1px solid #eee; padding: 6px; }

        /* Reporte Docente */
        .reporte-container { background: white; border-radius: 12px; padding: 15px; border-left: 6px solid var(--celeste); margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .promedio-real-card { display: flex; justify-content: space-around; text-align: center; background: #f0f4f8; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .student-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f9f9f9; }

        @media print { .no-print, header, .card { display: none !important; } .reporte-container, .reporte-direccion { border: 1px solid #ccc; width: 100%; display: block !important; } }
    </style>
</head>
<body>

<div id="authSection" style="max-width: 300px; margin: 50px auto; text-align: center; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" style="width:70px;">
    <h3>Lucila Palacios</h3>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Clave">
    <button onclick="login()" class="btn-main">Entrar</button>
</div>

<div id="appContent" style="display: none;">
    <header>
        <button onclick="logout()" style="width:auto; float:right; background:var(--rojo); color:white; border:none; padding:4px 8px; font-size:10px; border-radius:4px;">Salir</button>
        <b>LUCILA PALACIOS 2026</b>
    </header>

    <div class="container">
        <div id="adminPanel" class="card no-print" style="display:none; border: 1px solid var(--azul);">
            <b style="color:var(--azul);">🏢 CONTROL DE DIRECCIÓN</b>
            <button onclick="monitoreoDiario()" style="background:var(--morado); color:white; margin-top:10px;">Ver Asistencia de Hoy</button>
            <div id="resultadosAdmin"></div>
        </div>

        <div class="card no-print">
            <input type="date" id="fechaSeleccionada" onchange="window.render()">
            <button onclick="toggleFeriado()" style="background:var(--rojo); color:white; font-size:11px;">🚩 Marcar como Feriado</button>
            <input type="text" id="docente" onchange="actualizarPerfil()" placeholder="Nombre Docente">
            <input type="text" id="seccion" onchange="actualizarPerfil()" placeholder="Grado y Sección">
        </div>

        <div class="card no-print">
            <b>+ Inscripción</b>
            <input type="text" id="newNombre" placeholder="Nombre del Alumno">
            <div style="display:flex; gap:5px;">
                <select id="newGen" style="width:40%"><option value="F">Hembra</option><option value="M">Varón</option></select>
                <input type="date" id="newNac" style="width:60%">
            </div>
            <button onclick="agregarAlumno()" class="btn-main">Inscribir en Matrícula</button>
        </div>

        <div class="card no-print">
            <p style="text-align:center; margin:0 0 10px 0;">Lista de: <b id="displayFecha"></b></p>
            <div id="listaAsistencia"></div>
        </div>

        <div id="reporteDocenteContenedor"></div>
    </div>
</div>

</body>
</html>
