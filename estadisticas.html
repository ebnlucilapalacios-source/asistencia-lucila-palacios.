<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirección - Control Total Lucila Palacios</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        const USUARIO_ADMIN = "admin_lucila";
        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", alumnos: [], asistencias: {}, feriados: [] };

        function calcularEdad(fNac) {
            if(!fNac) return 0;
            const hoy = new Date();
            const cumple = new Date(fNac);
            let edad = hoy.getFullYear() - cumple.getFullYear();
            if (hoy.getMonth() < cumple.getMonth() || (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
            return edad;
        }

        window.login = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const docSnap = await getDoc(doc(dbCloud, "docentes_db", user));
            if (docSnap.exists() && docSnap.data().pass === pass) {
                window.usuarioActual = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (user === USUARIO_ADMIN) document.getElementById('adminPanel').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", user), (s) => { window.db = s.data(); window.render(); });
            } else { alert("Error de credenciales"); }
        };

        // --- REPORTE DIRECCIÓN: ASISTENCIA DIARIA CON DISGREGACIÓN ---
        window.verAsistenciaDiariaCompleta = async () => {
            const container = document.getElementById('resultadosAdmin');
            const hoy = document.getElementById('fechaSeleccionada').value;
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            
            let html = `
                <div class="card-reporte">
                    <h3 class="titulo-reporte">📅 REPORTE DIARIO DE ASISTENCIA: ${hoy}</h3>
                    <table class="tabla-maestra" id="tablaAdminDiaria">
                        <thead>
                            <tr>
                                <th>Grado / Sección</th>
                                <th>Matrícula</th>
                                <th>H (Asis)</th>
                                <th>V (Asis)</th>
                                <th>Total Asis.</th>
                                <th>% Asis.</th>
                            </tr>
                        </thead>
                        <tbody>`;

            let totalM = 0, totalH = 0, totalV = 0;

            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (docSnap.id === USUARIO_ADMIN || !d.alumnos) return;

                let asisH = 0, asisV = 0;
                if (d.asistencias && d.asistencias[hoy]) {
                    d.alumnos.forEach(al => {
                        if (d.asistencias[hoy][al.id] === 1) al.genero === 'F' ? asisH++ : asisV++;
                    });
                }
                
                const mat = d.alumnos.length;
                const asisT = asisH + asisV;
                const porc = mat > 0 ? ((asisT / mat) * 100).toFixed(1) : 0;

                totalM += mat; totalH += asisH; totalV += asisV;

                html += `
                    <tr>
                        <td style="text-align:left"><b>${d.seccion}</b></td>
                        <td>${mat}</td>
                        <td class="txt-hembra">${asisH}</td>
                        <td class="txt-varon">${asisV}</td>
                        <td><b>${asisT}</b></td>
                        <td class="badge-porc">${porc}%</td>
                    </tr>`;
            });

            const tAsisTotal = totalH + totalV;
            const tPorcTotal = totalM > 0 ? ((tAsisTotal / totalM) * 100).toFixed(1) : 0;

            html += `
                        </tbody>
                        <tfoot class="pie-tabla">
                            <tr>
                                <td>TOTAL ESCUELA</td>
                                <td>${totalM}</td>
                                <td>${totalH}</td>
                                <td>${totalV}</td>
                                <td>${tAsisTotal}</td>
                                <td>${tPorcTotal}%</td>
                            </tr>
                        </tfoot>
                    </table>
                    <button onclick="descargarExcel('tablaAdminDiaria', 'Asistencia_Diaria')" class="btn-excel">📥 Exportar a Excel</button>
                </div>`;
            container.innerHTML = html;
        };

        // --- REPORTE DIRECCIÓN: CONSOLIDADO CON EDADES Y PROMEDIOS ---
        window.verConsolidadoTotal = async () => {
            const container = document.getElementById('resultadosAdmin');
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            const mesAct = new Date().getMonth();
            const anioAct = new Date().getFullYear();

            let html = `<div class="card-reporte"><h3 class="titulo-reporte">📊 CONSOLIDADO MENSUAL Y CENSO DE EDADES</h3>`;
            
            let gEdades = {};
            let filasSecciones = "";
            let tMatH = 0, tMatV = 0, tPromH = 0, tPromV = 0;

            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (docSnap.id === USUARIO_ADMIN || !d.alumnos) return;

                let sH = 0, sV = 0, sDias = 0;
                d.alumnos.forEach(al => {
                    const e = calcularEdad(al.nacimiento);
                    al.genero === 'F' ? tMatH++ : tMatV++;
                    if(!gEdades[e]) gEdades[e] = { F: 0, M: 0 };
                    gEdades[e][al.genero]++;
                });

                Object.keys(d.asistencias || {}).forEach(f => {
                    const fe = new Date(f + "T00:00:00");
                    const esF = d.feriados && d.feriados.includes(f);
                    if (fe.getMonth() === mesAct && fe.getFullYear() === anioAct && fe.getDay() !== 0 && fe.getDay() !== 6 && !esF) {
                        sDias++;
                        d.alumnos.forEach(al => { if (d.asistencias[f][al.id] === 1) al.genero === 'F' ? sH++ : sV++; });
                    }
                });

                const ph = sDias > 0 ? (sH / sDias) : 0;
                const pv = sDias > 0 ? (sV / sDias) : 0;
                tPromH += ph; tPromV += pv;

                filasSecciones += `<tr><td>${d.seccion}</td><td>${d.alumnos.length}</td><td>${ph.toFixed(1)}</td><td>${pv.toFixed(1)}</td><td><b>${(ph+pv).toFixed(1)}</b></td></tr>`;
            });

            html += `
                <p class="subtitulo">1. PROMEDIOS REALES POR SECCIÓN</p>
                <table class="tabla-maestra" id="tablaPromedios">
                    <thead><tr><th>Sección</th><th>Matrícula</th><th>Prom. H</th><th>Prom. V</th><th>Prom. Real</th></tr></thead>
                    <tbody>${filasSecciones}</tbody>
                </table>

                <p class="subtitulo">2. DISGREGACIÓN DE MATRÍCULA POR EDADES (Toda la escuela)</p>
                <table class="tabla-maestra" id="tablaEdades">
                    <thead><tr><th>Edad</th><th>Hembras</th><th>Varones</th><th>Total</th></tr></thead>
                    <tbody>`;

            Object.keys(gEdades).sort((a,b)=>a-b).forEach(e => {
                html += `<tr><td>${e} años</td><td>${gEdades[e].F}</td><td>${gEdades[e].M}</td><td><b>${gEdades[e].F + gEdades[e].M}</b></td></tr>`;
            });

            html += `</tbody></table>
                <button onclick="descargarExcel('tablaPromedios', 'Consolidado_Escuela')" class="btn-excel">📥 Descargar Reporte Completo</button>
            </div>`;
            container.innerHTML = html;
        };

        window.descargarExcel = (id, nom) => {
            const table = document.getElementById(id);
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, `${nom}.xlsx`);
        };

        window.render = () => {
            const f = document.getElementById('fechaSeleccionada').value || new Date().toISOString().split('T')[0];
            document.getElementById('displayFecha').innerText = f;
            document.getElementById('docente').value = window.db.docente || "";
            document.getElementById('seccion').value = window.db.seccion || "";
            
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";
            const esFin = (new Date(f + "T00:00:00")).getDay() % 6 === 0;
            const esFer = window.db.feriados && window.db.feriados.includes(f);

            if (!esFin && !esFer) {
                window.db.alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[f] && window.db.asistencias[f][a.id]) || 0;
                    let c = "#ccc"; if(est===1) c="var(--exito)"; if(est===2) c="var(--morado)";
                    lista.innerHTML += `<div class="student-item">
                        <div class="dot" style="background:${a.genero==='F'?'#ff99cc':'#99ccff'}"></div>
                        <div style="flex-grow:1"><b>${a.nombre}</b></div>
                        <button onclick="marcar(${a.id})" class="btn-p" style="background:${c}">${est===1?'P':est===2?'J':'F'}</button>
                    </div>`;
                });
            } else { lista.innerHTML = `<p style='text-align:center; color:red;'>DÍA NO LABORABLE</p>`; }
        };

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f] = {};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id] + 1) % 3 || 1;
            window.saveToCloud(window.db);
        };
        window.saveToCloud = async (data) => { await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), data); };
        window.logout = () => location.reload();
        document.addEventListener("DOMContentLoaded", () => { document.getElementById('fechaSeleccionada').value = new Date().toISOString().split('T')[0]; });
    </script>

    <style>
        :root { --azul: #003366; --celeste: #0066cc; --exito: #28a745; --morado: #6f42c1; --rojo: #dc3545; --fondo: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--fondo); font-size: 14px; }
        header { background: var(--azul); color: white; padding: 12px; text-align: center; font-weight: bold; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 12px; }
        
        /* Tablas Profesionales */
        .tabla-maestra { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 12px; }
        .tabla-maestra th { background: #e9ecef; padding: 10px; border: 1px solid #dee2e6; color: #495057; }
        .tabla-maestra td { padding: 8px; border: 1px solid #dee2e6; text-align: center; }
        .pie-tabla { background: #343a40; color: white; font-weight: bold; }
        
        .titulo-reporte { color: var(--azul); border-bottom: 2px solid var(--azul); padding-bottom: 5px; margin-top: 0; }
        .subtitulo { font-weight: bold; color: var(--celeste); margin: 15px 0 5px 0; border-left: 4px solid var(--celeste); padding-left: 8px; }
        
        .txt-hembra { color: #e83e8c; font-weight: bold; }
        .txt-varon { color: #007bff; font-weight: bold; }
        .badge-porc { background: #e7f3ff; color: #004085; font-weight: bold; }

        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        .btn-excel { background: #1D6F42; color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 15px; }
        .btn-p { width: 40px; color: white; font-weight: bold; border: none; }
        .student-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="authSection" style="max-width: 300px; margin: 60px auto; text-align: center; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h2>Lucila Palacios</h2>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Contraseña">
    <button onclick="login()" style="background:var(--azul); color:white;">ENTRAR</button>
</div>

<div id="appContent" style="display: none;">
    <header>
        U.E. LUCILA PALACIOS - SISTEMA DE GESTIÓN
        <button onclick="logout()" style="width:auto; float:right; background:var(--rojo); color:white; padding:4px 10px; font-size:12px;">SALIR</button>
    </header>

    <div class="container">
        <div id="adminPanel" class="card no-print" style="display:none; border-top: 5px solid var(--azul);">
            <b style="color:var(--azul); font-size:16px;">🏢 ÁREA DE DIRECCIÓN</b>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
                <button onclick="verAsistenciaDiariaCompleta()" style="background:var(--celeste); color:white;">📅 Reporte Diario</button>
                <button onclick="verConsolidadoTotal()" style="background:var(--morado); color:white;">📊 Consolidado Mensual</button>
            </div>
            <div id="resultadosAdmin"></div>
        </div>

        <div class="card no-print">
            <label>Seleccionar Fecha:</label>
            <input type="date" id="fechaSeleccionada" onchange="window.render()">
            <input type="text" id="docente" placeholder="Nombre de la Docente" readonly>
            <input type="text" id="seccion" placeholder="Grado y Sección" readonly>
        </div>

        <div class="card no-print">
            <p style="text-align:center; font-weight:bold;">Asistencia del día: <span id="displayFecha"></span></p>
            <div id="listaAsistencia"></div>
        </div>
    </div>
</div>

</body>
</html>
