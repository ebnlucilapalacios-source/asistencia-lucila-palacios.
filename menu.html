<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP v22.0 - Turno Mañana y Tarde</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.guardarEnNube = async (reg) => {
            const idDoc = `${reg.fec}_${reg.nombre.replace(/\s+/g, '_')}`;
            await setDoc(doc(db, "asistencias", idDoc), reg);
        };

        window.escucharTodo = (fecha, mes, anio, cb) => {
            onSnapshot(query(collection(db, "asistencias"), where("fec", "==", fecha)), (snapD) => {
                const lDia = []; snapD.forEach(d => lDia.push(d.data()));
                onSnapshot(collection(db, "asistencias"), (snapM) => {
                    const lMes = [];
                    snapM.forEach(d => {
                        const data = d.data();
                        const f = new Date(data.fec + "T00:00:00");
                        if(f.getMonth() === mes && f.getFullYear() === anio) lMes.push(data);
                    });
                    cb(lDia, lMes);
                });
            });
        };
    </script>

    <style>
        :root { --azul: #1a2a6c; --naranja: #f39c12; --verde: #27ae60; --rojo: #e74c3c; --gris: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 10px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 5px solid var(--naranja); margin-bottom: 20px; padding-bottom: 10px; }
        .logo { height: 90px; width: auto; margin-bottom: 5px; }
        .stats-banner { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 12px; border-radius: 10px; text-align: center; border-left: 5px solid var(--azul); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-box h2 { margin: 5px 0 0; color: var(--azul); font-size: 22px; }
        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .card { background: white; border: 1px solid #eee; padding: 15px; border-radius: 12px; }
        label { font-weight: bold; color: var(--azul); display: block; margin-top: 10px; font-size: 12px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; box-sizing: border-box; }
        .btn-save { background: var(--verde); color: white; font-weight: bold; border: none; cursor: pointer; height: 45px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { background: var(--azul); color: white; padding: 10px; }
        td { padding: 8px; border: 1px solid #eee; text-align: center; }
        .retardo { background: #fff5f5; color: #c0392b; font-weight: bold; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container" id="pdfArea">
    <header>
        <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" class="logo">
        <h1 style="margin:0; color:var(--azul); font-size: 20px;">E.B.N. "LUCILA PALACIOS"</h1>
        <p style="margin:0; font-size: 12px;">CONTROL DE ASISTENCIA TURNO MAÑANA / TARDE</p>
    </header>

    <div class="stats-banner no-print">
        <div class="stat-box"><p>Asistencia Hoy</p><h2 id="pDia">0%</h2></div>
        <div class="stat-box"><p>Retardos Hoy</p><h2 id="rDia">0</h2></div>
        <div class="stat-box"><p>Asistencia Mes</p><h2 id="pMes">0%</h2></div>
    </div>

    <div class="grid">
        <div class="side no-print">
            <div class="card">
                <label>Turno de Trabajo:</label>
                <select id="turnoActivo" onchange="render()">
                    <option value="MAÑANA">MAÑANA ☀️</option>
                    <option value="TARDE">TARDE ⛅</option>
                </select>

                <label>Fecha:</label>
                <input type="date" id="fec" onchange="conectar()">

                <label>Trabajador:</label>
                <select id="sPer" onchange="actualizarHorasSugeridas()"></select>

                <label>Estatus:</label>
                <select id="sEst">
                    <option value="Asistencia">Asistencia ✅</option>
                    <option value="Inasistencia Injustificada">Inasistencia ❌</option>
                    <option value="Permiso Personal">Permiso 📝</option>
                    <option value="Vacaciones">Vacaciones 🏖️</option>
                </select>

                <div style="display:flex; gap:5px;">
                    <div><label>Entrada:</label><input type="time" id="hE"></div>
                    <div><label>Salida:</label><input type="time" id="hS"></div>
                </div>

                <button class="btn-save" onclick="enviar()">💾 GUARDAR REGISTRO</button>
            </div>
        </div>

        <div class="card">
            <h3 style="text-align:center; margin:0 0 10px; font-size: 14px;">Resumen: <span id="fTit"></span></h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Trabajador</th><th>Cargo</th><th>H. Oficial</th><th>Entrada</th><th>Estatus</th><th>Retardo</th></tr>
                    </thead>
                    <tbody id="tCuerpo"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración de Horarios Segun Tu solicitud
    const horarios = {
        "MAÑANA": { "Docente": "07:00", "Obrero": "07:00", "Administrativo": "07:00", "Cocinera": "07:00" },
        "TARDE": { "Docente": "12:00", "Obrero": "11:30", "Administrativo": "12:00" }
    };

    const nominaRaw = `Yanitza Malave,Directivo;María Muñoz,Directivo;Dayana Jiménez,Docente;Rosa Nacaratto,Docente;Norelis Pérez,Obrero;Gilda Villarroel,Obrero;Raiza Vallenilla,Cocinera;Osmil Sanabria,Vigilante-A;Pedro González,Vigilante-A`;
    let nomina = nominaRaw.split(';').map(x => ({nombre: x.split(',')[0], cargo: x.split(',')[1]})).sort((a,b)=>a.nombre.localeCompare(b.nombre));
    
    let datosDia = [], datosMes = [];

    function conectar() {
        const f = document.getElementById('fec').value;
        const d = new Date(f + "T00:00:00");
        window.escucharTodo(f, d.getMonth(), d.getFullYear(), (dia, mes) => {
            datosDia = dia; datosMes = mes; render();
        });
    }

    function actualizarHorasSugeridas() {
        const turno = document.getElementById('turnoActivo').value;
        const p = nomina[document.getElementById('sPer').value];
        const horaLimite = horarios[turno][p.cargo] || "07:00";
        document.getElementById('hE').value = horaLimite;
    }

    function render() {
        const turno = document.getElementById('turnoActivo').value;
        const tbody = document.getElementById('tCuerpo');
        tbody.innerHTML = "";
        document.getElementById('fTit').innerText = document.getElementById('fec').value + " (" + turno + ")";

        let aH = 0, rH = 0;
        nomina.forEach(p => {
            const reg = datosDia.find(r => r.nombre === p.nombre);
            const limite = horarios[turno][p.cargo] || "07:00";
            if(reg?.est === "Asistencia") { aH++; if(reg.minT > 0) rH++; }
            
            let rowClass = reg?.minT > 0 ? "retardo" : "";
            tbody.innerHTML += `<tr class="${rowClass}"><td>${p.nombre}</td><td>${p.cargo}</td><td>${limite}</td><td>${reg?.hEnt || '--'}</td><td>${reg?.est || 'PENDIENTE'}</td><td>${reg?.minT || 0} min</td></tr>`;
        });

        document.getElementById('pDia').innerText = Math.round((aH/nomina.length)*100) + "%";
        document.getElementById('rDia').innerText = rH;
    }

    async function enviar() {
        const turno = document.getElementById('turnoActivo').value;
        const p = nomina[document.getElementById('sPer').value];
        const hE = document.getElementById('hE').value;
        const est = document.getElementById('sEst').value;
        const fec = document.getElementById('fec').value;
        
        let minT = 0;
        const limite = horarios[turno][p.cargo];
        if(est === "Asistencia" && limite && hE > limite) {
            const [h1, m1] = hE.split(':').map(Number);
            const [h2, m2] = limite.split(':').map(Number);
            minT = (h1*60+m1) - (h2*60+m2);
        }

        await window.guardarEnNube({ nombre: p.nombre, cargo: p.cargo, fec, hEnt: hE, hSal: document.getElementById('hS').value, est, minT, turno });
        alert("Sincronizado ✅");
    }

    document.getElementById('fec').valueAsDate = new Date();
    document.getElementById('sPer').innerHTML = nomina.map((p,i) => `<option value="${i}">${p.nombre}</option>`).join('');
    setTimeout(conectar, 1000);
</script>
</body>
</html>
