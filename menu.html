<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - EBNLP</title>
    <style>
        :root { --azul: #1a2a6c; --naranja: #f39c12; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: linear-gradient(135deg, var(--azul), #154360); color: white; width: 100%; padding: 20px 0; text-align: center; border-bottom: 5px solid var(--naranja); }
        .logo { width: 100px; height: 100px; background: white; border-radius: 50%; padding: 5px; border: 2px solid var(--naranja); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px; width: 90%; max-width: 800px; }
        .card { background: white; border-radius: 15px; padding: 30px; text-align: center; text-decoration: none; color: var(--azul); box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 8px solid var(--azul); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <header>
        <img src="https://ebnlucilapalacios-source.github.io/asistencia-lucila-palacios/IMG_20260225_005025_993.png" class="logo">
        <h1>E.B.N. "LUCILA PALACIOS"</h1>
        <p>Panel de Gestión Centralizado</p>
    </header>
    <div class="container">
        <a href="index.html" class="card" style="border-top-color: #27ae60;">
            <div style="font-size: 40px;">📝</div>
            <h2>Registro de Personal</h2>
            <p>Control de entrada/salida de docentes, administrativos y obreros.</p>
        </a>
        <a href="estadisticas.html" class="card" style="border-top-color: #2980b9;">
            <div style="font-size: 40px;">📊</div>
            <h2>Control de Alumnos</h2>
            <p>Matrícula, asistencia por sección y reportes imprimibles.</p>
        </a>
    </div>
</body>
</html>
