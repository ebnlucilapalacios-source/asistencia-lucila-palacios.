<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA E.B.N. LUCILA PALACIOS - GESTIÓN DE NÓMINA</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --negro: #1a1a1a; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding-bottom: 40px; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .contenedor { max-width: 500px; margin: auto; padding: 20px; background: white; border-radius: 15px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        h2 { color: var(--azul); font-size: 1.1rem; border-left: 4px solid var(--naranja); padding-left: 10px; margin-top: 25px; text-transform: uppercase; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.8rem; color: #555; }
        
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 12px; text-transform: uppercase; font-size: 0.75rem; transition: 0.3s; }
        .btn-verde { background: var(--verde); box-shadow: 0 4px 0 #1b5e20; }
        .btn-rojo { background: var(--rojo); box-shadow: 0 4px 0 #b71c1c; }
        .btn-negro { background: var(--negro); box-shadow: 0 4px 0 #000; }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        .divisor { border-top: 2px solid #eee; margin: 30px 0; }
        .alerta-box { background: #fff3e0; border: 1px solid #ffe0b2; padding: 10px; border-radius: 8px; font-size: 0.75rem; color: #e65100; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <h1>E.B.N. "LUCILA PALACIOS"</h1>
    <p>PANEL DE ADMINISTRACIÓN DE NÓMINA</p>
</header>

<div class="contenedor">

    <h2>➕ Ingreso de Personal (Alta)</h2>
    <label>Nombre Completo:</label>
    <input type="text" id="nomNuevo" placeholder="EJ: PEDRO PÉREZ">
    
    <label>Cargo Institucional:</label>
    <select id="carNuevo">
        <option value="Docente">Docente</option>
        <option value="Obrero">Obrero</option>
        <option value="Administrativo">Administrativo</option>
        <option value="CNAE (Cocinera)">CNAE (Cocinera)</option>
        <option value="Vigilante">Vigilante</option>
    </select>

    <label>Turno Asignado:</label>
    <select id="trnNuevo">
        <option value="MAÑANA">MAÑANA</option>
        <option value="TARDE">TARDE</option>
    </select>

    <button class="btn btn-verde" onclick="darAlta()">DAR DE ALTA EN SISTEMA</button>


    <div class="divisor"></div>


    <h2 style="color: var(--rojo);">✖ Egreso de Personal (Baja)</h2>
    <label>Seleccionar Trabajador para retirar:</label>
    <select id="selectEgreso">
        <option value="">-- Buscando personal... --</option>
    </select>
    <button class="btn btn-rojo" onclick="darBaja()">ELIMINAR DEFINITIVAMENTE</button>


    <div class="divisor"></div>


    <h2>🛠️ Mantenimiento de Base de Datos</h2>
    <div class="alerta-box">
        <b>¡CUIDADO!</b> Estas acciones son irreversibles. Úsalas solo para limpieza de datos o inicio de año escolar.
    </div>

    <button class="btn btn-rojo" onclick="borrarHistorialAsistencia()">BORRAR TODO EL HISTORIAL DE ASISTENCIA</button>
    <button class="btn btn-negro" onclick="vaciarNominaCompleta()">VACIAR TODA LA NÓMINA (INICIO DESDE CERO)</button>

</div>

<script>
    // Configuración Firebase
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Cargar la lista de nombres para el menú de Egreso automáticamente
    db.collection("nomina_institucional").orderBy("n", "asc").onSnapshot(snap => {
        const sel = document.getElementById('selectEgreso');
        sel.innerHTML = '<option value="">-- Seleccionar Trabajador --</option>';
        snap.forEach(doc => {
            sel.innerHTML += `<option value="${doc.id}">${doc.data().n} (${doc.data().c})</option>`;
        });
    });

    // FUNCIÓN: DAR DE ALTA
    async function darAlta() {
        const n = document.getElementById('nomNuevo').value.trim().toUpperCase();
        const c = document.getElementById('carNuevo').value;
        const t = document.getElementById('trnNuevo').value;

        if(!n) return alert("Error: Debe escribir el nombre completo.");

        try {
            await db.collection("nomina_institucional").add({ n, c, t });
            alert("✅ Personal dado de alta correctamente.");
            document.getElementById('nomNuevo').value = "";
        } catch (error) {
            alert("Error al guardar: " + error);
        }
    }

    // FUNCIÓN: DAR DE BAJA
    async function darBaja() {
        const id = document.getElementById('selectEgreso').value;
        if(!id) return alert("Error: Seleccione un trabajador de la lista.");

        if(confirm("¿Está seguro de que desea eliminar a este trabajador de la nómina? Esto borrará sus datos permanentemente.")) {
            try {
                await db.collection("nomina_institucional").doc(id).delete();
                alert("❌ Personal eliminado de la base de datos.");
            } catch (error) {
                alert("Error al eliminar: " + error);
            }
        }
    }

    // FUNCIÓN: BORRAR ASISTENCIAS (MANTENIMIENTO)
    async function borrarHistorialAsistencia() {
        if(confirm("⚠ ¡ADVERTENCIA CRÍTICA! Se borrarán todos los registros de asistencia acumulados. ¿Desea continuar?")) {
            const snap = await db.collection("asistencia_ebnlp_final").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("Historial de asistencia vaciado correctamente.");
        }
    }

    // FUNCIÓN: VACIAR NÓMINA (MANTENIMIENTO)
    async function vaciarNominaCompleta() {
        if(confirm("🚨 ¡ALERTA DE SEGURIDAD! Se borrarán TODOS los trabajadores registrados. El sistema quedará vacío. ¿Confirmar acción?")) {
            const snap = await db.collection("nomina_institucional").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("Nómina vaciada. El sistema está en blanco.");
        }
    }
</script>
</body>
</html>
