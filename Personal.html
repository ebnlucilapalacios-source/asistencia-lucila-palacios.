<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA MAESTRO - E.B.N. LUCILA PALACIOS</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --rojo: #850000; --verde: #1d6f42; --celeste: #3498db; --morado: #6c5ce7; --turquesa: #00cec9; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; font-size: 13px; }
        header { background: var(--azul); color: white; text-align: center; padding: 10px; border-bottom: 5px solid var(--naranja); }
        .logo { max-height: 60px; margin-bottom: 5px; }
        .contenedor { max-width: 1200px; margin: auto; padding: 10px; }

        /* Alertas Directivas */
        .alertas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .alerta-card { background: white; padding: 10px; border-radius: 8px; border-left: 5px solid var(--rojo); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .alerta-card.permiso { border-left-color: var(--celeste); }

        /* Buscador */
        .search-container { background: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; border: 1px solid #ddd; }
        .search-container input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        /* Fichas y Tablas */
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .ficha { background: white; padding: 10px; border-radius: 12px; border: 1px solid #ddd; text-align: center; position: relative; }
        .badge-v { position: absolute; top: 5px; right: 5px; background: var(--azul); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; }

        .btn-check { width: 100%; padding: 6px; margin: 2px 0; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; font-size: 0.7rem; font-weight: bold; color: #333; }
        
        /* Colores de Estatus */
        .row-asistencia { background: #d4edda !important; }
        .row-inasistencia { background: #f8d7da !important; }
        .row-retraso { background: #fff3cd !important; }
        .row-reposo { background: #efdbff !important; }
        .row-vacaciones { background: #81ecec !important; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #ccc; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .tab-btn.active { background: var(--naranja); color: white; }
        
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.75rem; }
        th { background: var(--azul); color: white; padding: 8px; }
        td { border: 1px solid #eee; padding: 6px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" class="logo">
    <h2 style="margin:0;">E.B.N. "LUCILA PALACIOS"</h2>
    <p style="margin:0; font-size: 0.8rem;">CONTROL ADMINISTRATIVO V.2026</p>
</header>

<div class="contenedor" id="area-pdf">
    <div class="alertas-grid no-print">
        <div class="alerta-card">
            <h4 style="margin:0; color:var(--rojo);">⚠️ FALTAS CRÍTICAS (3+)</h4>
            <div id="listaCritica" style="font-size: 0.7rem; margin-top:5px;">Cargando alertas...</div>
        </div>
        <div class="alerta-card permiso">
            <h4 style="margin:0; color:var(--azul);">📅 PERMISOS ACTIVOS</h4>
            <div id="listaPermisos" style="font-size: 0.7rem; margin-top:5px;">No hay permisos hoy.</div>
        </div>
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" onclick="verTab('tabReg')">📋 REGISTRO</button>
        <button class="tab-btn" onclick="verTab('tabCons')">📊 CONSOLIDADO</button>
        <button class="tab-btn" onclick="descargarPDF()" style="background:var(--rojo); color:white;">📄 PDF</button>
    </div>

    <div class="search-container no-print">
        <input type="date" id="fechaFiltro" onchange="actualizarTodo()">
        <select id="turnoFiltro" onchange="dibujarFichas()">
            <option value="MAÑANA">MAÑANA</option>
            <option value="TARDE">TARDE</option>
            <option value="VIGILANCIA">VIGILANCIA (ROTATIVO)</option>
        </select>
        <input type="text" id="buscador" placeholder="🔍 Buscar por nombre..." onkeyup="filtrarFichas()">
    </div>

    <div id="tabReg" class="tab-content">
        <div id="fichasGrid" class="grid-fichas no-print"></div>
        <div style="overflow-x:auto; background:white; border-radius:8px;">
            <table id="tablaDiaria">
                <thead><tr><th>Nombre</th><th>Cargo</th><th>Estatus</th><th>Entrada</th><th>Salida</th><th>Observación</th></tr></thead>
                <tbody id="bodyDiario"></tbody>
            </table>
        </div>
    </div>

    <div id="tabCons" class="tab-content hidden">
        <div style="background:white; padding:15px; margin-bottom:10px;">
            Mes: <input type="month" id="mesCons" onchange="procesarConsolidado()">
            <button onclick="exportarExcel()" style="background:var(--verde); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">📥 Excel</button>
        </div>
        <table id="tablaConsolidado">
            <thead><tr><th>Nombre</th><th>Asis</th><th>Ret</th><th>Faltas</th><th>Perm</th><th>RM/VAC</th><th>% Efic.</th></tr></thead>
            <tbody id="bodyCons"></tbody>
        </table>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nomina = [];
    document.getElementById('fechaFiltro').valueAsDate = new Date();

    // CARGAR NÓMINA CON GRUPOS DE VIGILANCIA
    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        snap.forEach(doc => { let d = doc.data(); d.id = doc.id; nomina.push(d); });
        nomina.sort((a,b) => a.n.localeCompare(b.n));
        actualizarTodo();
    });

    function obtenerHorario(cargo, turno) {
        if (cargo === "Docente") return (turno === "MAÑANA") ? {e:"07:00", s:"12:00"} : {e:"12:00", s:"17:00"};
        if (cargo === "Obrero" || cargo === "Administrativo") return (turno === "MAÑANA") ? {e:"06:45", s:"12:45"} : {e:"11:30", s:"17:30"};
        if (cargo === "CNAE (Cocinera)") return {e:"07:00", s:"14:00"};
        if (cargo === "Vigilante") return {e:"06:00", s:"18:00"}; // Referencia base
        return {e:"07:00", s:"12:00"};
    }

    async function marcar(nombre, estatus) {
        const fecha = document.getElementById('fechaFiltro').value;
        const turno = document.getElementById('turnoFiltro').value;
        const p = nomina.find(x => x.n === nombre);
        const h = obtenerHorario(p.c, turno);

        // LÍMITE DE PERMISOS PERSONALES (3 MÁXIMO)
        if(estatus === "PERMISO PERSONAL") {
            const mes = fecha.substring(0,7);
            const snap = await db.collection("asistencia_ebnlp_final").where("n","==",nombre).where("mes","==",mes).where("e","==","PERMISO PERSONAL").get();
            if(snap.size >= 3) { alert("⛔ ALERTA: Ya utilizó sus 3 permisos del mes."); return; }
        }

        let horaEntrada = (estatus === "ASISTENCIA" || estatus === "RETRASO") ? h.e : "JUST.";
        let obs = "";

        if(estatus === "RETRASO") horaEntrada = prompt("Hora real de llegada:", h.e);
        if(estatus !== "ASISTENCIA") obs = prompt("Motivo/Observación:");

        await db.collection("asistencia_ebnlp_final").add({
            n: nombre, f: fecha, e: estatus, hE: horaEntrada, hS: h.s, c: p.c, mes: fecha.substring(0,7), obs: obs || ""
        });
    }

    function actualizarTodo() {
        dibujarFichas();
        cargarTablaDiaria();
        actualizarAlertas();
    }

    function cargarTablaDiaria() {
        const f = document.getElementById('fechaFiltro').value;
        db.collection("asistencia_ebnlp_final").where("f", "==", f).onSnapshot(snap => {
            const b = document.getElementById('bodyDiario'); b.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                let cl = (d.e==="ASISTENCIA")?"row-asistencia":(d.e==="INASISTENCIA")?"row-inasistencia":(d.e==="RETRASO")?"row-retraso":(d.e==="REPOSO MÉDICO")?"row-reposo":"row-vacaciones";
                b.innerHTML += `<tr class="${cl}"><td>${d.n}</td><td>${d.c}</td><td>${d.e}</td><td>${d.hE}</td><td>${d.hS}</td><td>${d.obs}</td></tr>`;
            });
        });
    }

    function dibujarFichas() {
        const turno = document.getElementById('turnoFiltro').value;
        const fecha = document.getElementById('fechaFiltro').value;
        db.collection("asistencia_ebnlp_final").where("f", "==", fecha).get().then(snap => {
            const marcados = {}; snap.forEach(d => marcados[d.data().n] = true);
            const grid = document.getElementById('fichasGrid'); grid.innerHTML = "";
            
            nomina.forEach(p => {
                // Filtro visual por turno y vigilancia
                let mostrar = (turno === "VIGILANCIA") ? (p.c === "Vigilante") : (p.c !== "Vigilante");
                if(!mostrar) return;

                const div = document.createElement('div'); div.className = "ficha";
                div.innerHTML = marcados[p.n] ? `<p>${p.n}</p><b style="color:var(--verde)">✓ REGISTRADO</b>` : 
                    `<span class="badge-v">${p.grupo || ''}</span><p><b>${p.n}</b></p>
                    <button class="btn-check" style="background:#d4edda" onclick="marcar('${p.n}','ASISTENCIA')">✅ ASISTENCIA</button>
                    <button class="btn-check" style="background:#f8d7da" onclick="marcar('${p.n}','INASISTENCIA')">❌ INASISTENCIA</button>
                    <button class="btn-check" style="background:#efdbff" onclick="marcar('${p.n}','REPOSO MÉDICO')">🏥 REPOSO</button>
                    <button class="btn-check" style="background:#81ecec" onclick="marcar('${p.n}','VACACIONES')">🏝️ VACACIONES</button>
                    <button class="btn-check" style="background:#e2e3e5" onclick="marcar('${p.n}','PERMISO PERSONAL')">📄 PERMISO</button>`;
                grid.appendChild(div);
            });
        });
    }

    async function actualizarAlertas() {
        const mes = document.getElementById('fechaFiltro').value.substring(0,7);
        const snap = await db.collection("asistencia_ebnlp_final").where("mes", "==", mes).get();
        const data = snap.docs.map(d => d.data());
        
        let faltasHtml = ""; let permisosHtml = "";
        nomina.forEach(p => {
            const ind = data.filter(x => x.n === p.n);
            const f = ind.filter(x => x.e === "INASISTENCIA").length;
            const per = ind.filter(x => x.e === "PERMISO PERSONAL").length;
            if(f >= 3) faltasHtml += `<div>🔴 ${p.n} (${f} faltas)</div>`;
            if(per > 0) permisosHtml += `<div>🔵 ${p.n} (${per}/3 usados)</div>`;
        });
        document.getElementById('listaCritica').innerHTML = faltasHtml || "Sin alertas de faltas.";
        document.getElementById('listaPermisos').innerHTML = permisosHtml || "Sin permisos registrados.";
    }

    function filtrarFichas() {
        const v = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.ficha').forEach(f => f.style.display = f.innerText.toLowerCase().includes(v) ? "block" : "none");
    }

    function verTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function descargarPDF() {
        const opt = { margin: 5, filename: 'Reporte_EBNLP.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'letter', orientation: 'landscape' } };
        html2pdf().set(opt).from(document.getElementById('area-pdf')).save();
    }
</script>
</body>
</html>
