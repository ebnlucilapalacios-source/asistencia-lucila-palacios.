<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA E.B.N. LUCILA PALACIOS</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --rojo: #850000; --verde: #1d6f42; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; }
        header { background: var(--azul); color: white; text-align: center; padding: 10px; border-bottom: 5px solid var(--naranja); }
        
        /* Dashboard Estilo Captura */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .dash-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .dash-card h4 { margin: 0; color: #444; font-size: 1.1rem; }
        .dash-card .valor { font-size: 2rem; font-weight: bold; color: var(--azul); }

        /* Tabs Estilo Captura */
        .tabs { display: flex; gap: 5px; padding: 10px; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 5px; font-weight: bold; background: #ddd; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: var(--naranja); color: white; }

        /* Fichas y Bloqueo */
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; padding: 10px; }
        .ficha { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; text-align: center; position: relative; }
        
        /* Reparación: Bloqueo Visual */
        .vigilante-bloqueado { opacity: 0.25; pointer-events: none; filter: grayscale(1); }
        .vigilante-bloqueado::before { content: "NO TOCA TRABAJAR"; position: absolute; top: 40%; left: 0; width: 100%; color: var(--rojo); font-weight: bold; font-size: 0.8rem; z-index: 10; }

        /* Botones de Acción */
        .btn-pdf { background: var(--rojo); color: white; }
        .btn-excel { background: var(--verde); color: white; }
        .action-btn { width: 48%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.8rem; }
        th { background: var(--azul); color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<header><h2>E.B.N. "LUCILA PALACIOS"</h2></header>

<div class="dashboard">
    <div class="dash-card"><h4>Vigilancia</h4><span class="valor" id="dVig">0</span></div>
    <div class="dash-card" style="border-bottom: 4px solid var(--verde)"><h4>Efectividad</h4><span class="valor" id="dEfec">0%</span></div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="verTab('tabReg')">DIARIO</button>
    <button class="tab-btn" onclick="verTab('tabCons')">MENSUAL/PDF</button>
    <button class="tab-btn" onclick="verTab('tabNom')">PERSONAL</button>
</div>

<div id="tabReg" class="tab-content">
    <div style="padding:10px; background:white; margin:10px; border-radius:8px;">
        <b>Fecha:</b> <input type="date" id="fechaFiltro" onchange="dibujarPaseLista()">
        <br><br>
        <b style="color:var(--rojo)">Vigilancia Activa:</b>
        <select id="grupoVigActivo" onchange="dibujarPaseLista()" style="padding:5px; font-weight:bold;">
            <option value="Grupo I">GRUPO I</option>
            <option value="Grupo II">GRUPO II</option>
        </select>
    </div>
    <div id="fichasGrid" class="grid-fichas"></div>
</div>

<div id="tabCons" class="tab-content hidden" style="padding:10px;">
    <div style="background:white; padding:15px; border-radius:8px;">
        <b>Mes:</b> <input type="month" id="mesReporte">
        <button onclick="procesarConsolidado()" style="background:var(--azul); color:white; padding:10px; border:none; border-radius:5px; margin-left:10px;">CALCULAR ESTADÍSTICA</button>
    </div>

    <div style="background:var(--naranja); color:white; padding:10px; margin-top:15px; font-weight:bold; border-radius:5px;">AUDITORÍA INDIVIDUAL</div>
    <table id="tablaAuditoria">
        <thead><tr><th>Cédula</th><th>Nombre</th><th>Grupo</th><th>Asis.</th><th>Retr.</th><th>Perm.</th></tr></thead>
        <tbody id="bodyAuditoria"></tbody>
    </table>

    <div style="display:flex; justify-content: space-between;">
        <button class="action-btn btn-excel" onclick="descargarExcel()">EXCEL</button>
        <button class="action-btn btn-pdf">PDF OFICIAL FIRMADO</button>
    </div>
</div>

<div id="tabNom" class="tab-content hidden" style="padding:10px;">
    <table>
        <thead><tr><th>Cédula</th><th>Nombre</th><th>Cargo</th><th>Género</th><th>Grupo</th><th>Eliminar</th></tr></thead>
        <tbody id="bodyNomina"></tbody>
    </table>
</div>

<script>
    // Configuración Firebase (Usando la tuya)
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nominaLocal = [];
    document.getElementById('fechaFiltro').value = new Date().toISOString().split('T')[0];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nominaLocal = [];
        snap.forEach(doc => { let d = doc.data(); d.id = doc.id; nominaLocal.push(d); });
        renderizarNomina();
        dibujarPaseLista();
    });

    // REPARACIÓN DE BLOQUEO: Comparación de texto ultra-segura
    function dibujarPaseLista() {
        const fecha = document.getElementById('fechaFiltro').value;
        const selector = document.getElementById('grupoVigActivo').value.toLowerCase().replace(/\s/g, '');
        
        db.collection("asistencia_ebnlp_final").where("f", "==", fecha).get().then(snap => {
            const marcados = {}; snap.forEach(d => marcados[d.data().n] = d.data());
            const cont = document.getElementById('fichasGrid'); 
            cont.innerHTML = "";
            
            nominaLocal.forEach(p => {
                const div = document.createElement('div');
                div.className = "ficha";
                
                // Normalizamos el grupo de la nómina (Ej: "GRUPO II" -> "grupoii")
                const grupoNomina = (p.grupo || "").toLowerCase().replace(/\s/g, '');

                // Lógica de Bloqueo Reparada: 
                // Solo bloquea si es Vigilante Y los grupos no coinciden limpiamente
                if (p.c === "Vigilante" && grupoNomina !== selector) {
                    div.classList.add('vigilante-bloqueado');
                }

                const m = marcados[p.n];
                if(!m) {
                    div.innerHTML = `<b>${p.n}</b><br><small>${p.c}</small><br>
                        <button onclick="marcar('${p.n}','ASISTENCIA')" style="background:#d4edda; width:100%; margin-top:5px; border:1px solid #ccc; padding:5px; font-weight:bold;">ASISTENCIA</button>
                        <button onclick="marcar('${p.n}','INASISTENCIA')" style="background:#f8d7da; width:100%; margin-top:5px; border:1px solid #ccc; padding:5px; font-weight:bold;">FALTA</button>`;
                } else {
                    div.style.background = "#eee";
                    div.innerHTML = `<b>${p.n}</b><br><p style="color:green; font-weight:bold;">✓ ${m.e}</p>`;
                }
                cont.appendChild(div);
            });
            actualizarDashboard(marcados);
        });
    }

    async function marcar(nombre, estatus) {
        const p = nominaLocal.find(x => x.n === nombre);
        const fecha = document.getElementById('fechaFiltro').value;
        const mes = fecha.substring(0,7);
        
        await db.collection("asistencia_ebnlp_final").add({
            n: nombre, f: fecha, e: estatus, c: p.c, mes: mes, cedula: p.cedula || "S/C"
        });
        dibujarPaseLista();
    }

    function actualizarDashboard(marcados) {
        let asisVig = 0;
        Object.values(marcados).forEach(m => { if(m.c === "Vigilante" && m.e === "ASISTENCIA") asisVig++; });
        document.getElementById('dVig').innerText = asisVig;
        let total = Object.keys(marcados).length;
        document.getElementById('dEfec').innerText = nominaLocal.length > 0 ? Math.round((total/nominaLocal.length)*100)+"%" : "0%";
    }

    function verTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    function renderizarNomina() {
        const b = document.getElementById('bodyNomina'); b.innerHTML = "";
        nominaLocal.forEach(p => {
            b.innerHTML += `<tr><td>${p.cedula || '---'}</td><td>${p.n}</td><td>${p.c}</td><td>${p.gender || '---'}</td><td>${p.grupo}</td><td><button onclick="db.collection('nomina_institucional').doc('${p.id}').delete()">❌</button></td></tr>`;
        });
    }

    // Funciones de Reporte (Captura 1)
    async function procesarConsolidado() {
        const mes = document.getElementById('mesReporte').value;
        const snap = await db.collection("asistencia_ebnlp_final").where("mes", "==", mes).get();
        const data = snap.docs.map(d => d.data());
        const b = document.getElementById('bodyAuditoria'); b.innerHTML = "";
        
        nominaLocal.forEach(p => {
            const ind = data.filter(x => x.n === p.n);
            const asis = ind.filter(x => x.e === "ASISTENCIA").length;
            const retr = ind.filter(x => x.e === "RETRASO").length;
            const perm = ind.filter(x => x.e.includes("PERMISO")).length;
            b.innerHTML += `<tr><td>${p.cedula || ''}</td><td>${p.n}</td><td>${p.grupo}</td><td>${asis}</td><td>${retr}</td><td>${perm}</td></tr>`;
        });
    }

    function descargarExcel() {
        const wb = XLSX.utils.table_to_book(document.getElementById('tablaAuditoria'));
        XLSX.writeFile(wb, "Reporte_Lucila_Palacios.xlsx");
    }
</script>
</body>
</html>
