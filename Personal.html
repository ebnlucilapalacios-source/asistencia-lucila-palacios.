<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E.B.N. LUCILA PALACIOS - CONTROL DE ASISTENCIA</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --rojo: #850000; --verde: #2d7a31; --gris: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; color: #333; }
        
        /* ENCABEZADO ACTUALIZADO */
        header { 
            background: var(--azul); 
            color: white; 
            text-align: center; 
            padding: 25px 15px; 
            border-bottom: 5px solid var(--naranja); 
        }
        header h1 { margin: 0; font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
        header p { 
            margin: 5px 0 0 0; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            color: var(--naranja); 
            font-weight: bold; 
            letter-spacing: 2px;
        }

        .contenedor { max-width: 600px; margin: auto; padding: 15px; }

        /* DASHBOARD */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #ccc; position: relative; border-bottom: 4px solid var(--azul); }
        .dash-card.full { grid-column: 1 / 3; background: var(--azul); color: white; }
        .dash-card.disabled { background: #f2f2f2; opacity: 0.6; border-bottom: 4px solid #bbb; }
        .pres { font-size: 1.6rem; font-weight: bold; display: block; color: var(--azul); }
        .dash-card.full .pres { color: white; font-size: 2.2rem; }
        .promedio-tag { position: absolute; top: 5px; right: 8px; font-size: 0.65rem; padding: 2px 6px; border-radius: 8px; font-weight: bold; }

        /* SECCIONES */
        .card-seccion { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 4px solid var(--naranja); }
        .sec-header { color: var(--azul); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; font-size: 0.85rem; border-left: 4px solid var(--naranja); padding-left: 10px; }
        
        label { display: block; margin-top: 12px; font-size: 0.75rem; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }

        /* BOTONES */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem; }
        .btn-verde { background: var(--verde); box-shadow: 0 4px 0 #1e5c25; }
        .btn-azul { background: var(--azul); }
        .btn-rojo { background: var(--rojo); box-shadow: 0 4px 0 #5a0000; }
        .group-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>E.B.N. "LUCILA PALACIOS"</h1>
    <p>CONTROL DE ASISTENCIA</p>
</header>

<div class="contenedor">

    <div class="dashboard">
        <div class="dash-card full"><h4>Efectividad de la Jornada</h4><span class="pres" id="txtEfec">0%</span></div>
        <div class="dash-card" id="cardDoc"><span class="promedio-tag" id="percDoc">0%</span><h4>Docentes</h4><span class="pres" id="pDoc">0</span><small>de <span id="tDoc">0</span></small></div>
        <div class="dash-card" id="cardObr"><span class="promedio-tag" id="percObr">0%</span><h4>Obreros</h4><span class="pres" id="pObr">0</span><small>de <span id="tObr">0</span></small></div>
        <div class="dash-card" id="cardVA"><span class="promedio-tag" id="percVA">0%</span><h4>Vigilancia A</h4><span class="pres" id="pVA">0</span><small>de <span id="tVA">0</span></small></div>
        <div class="dash-card" id="cardVB"><span class="promedio-tag" id="percVB">0%</span><h4>Vigilancia B</h4><span class="pres" id="pVB">0</span><small>de <span id="tVB">0</span></small></div>
    </div>

    <div class="card-seccion">
        <div class="sec-header">📝 Registro de Entrada / Salida</div>
        <div class="group-btns">
            <input type="date" id="fManual" onchange="actualizarTodo()">
            <select id="sTurno">
                <option value="MAÑANA">MAÑANA (7:00 AM)</option>
                <option value="TARDE">TARDE (12:00 PM)</option>
                <option value="NOCHE">NOCHE (VIGILANCIA)</option>
            </select>
        </div>
        
        <label>Nombre del Trabajador:</label>
        <select id="sPersona"></select>

        <div class="group-btns">
            <div>
                <label>Estatus:</label>
                <select id="sEstatus">
                    <option value="ASISTENCIA">ASISTENCIA</option>
                    <option value="INASISTENCIA">INASISTENCIA</option>
                    <option value="RETRASO">RETRASO</option>
                    <option value="PERMISO">PERMISO</option>
                </select>
            </div>
            <div>
                <label>Hora:</label>
                <input type="time" id="hEnt">
            </div>
        </div>
        
        <button class="btn btn-verde" onclick="guardarAsistencia()">PROCESAR REGISTRO</button>
    </div>

    <div class="card-seccion">
        <div class="sec-header">📊 Reportes del Sistema</div>
        <input type="month" id="mesC" onchange="cargarConsolidado()">
        <button class="btn btn-azul" onclick="descargarPDFMensual()">GENERAR PDF MENSUAL</button>
    </div>

</div>

<script>
    // Configuración Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", 
        authDomain: "control-de-asistencia-d585e.firebaseapp.com", 
        projectId: "control-de-asistencia-d585e", 
        appId: "1:368890880546:web:a97ab4372dea536217207b" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nominaLocal = [];
    document.getElementById('fManual').value = new Date().toISOString().split('T')[0];

    // Escuchar cambios en Nómina
    db.collection("nomina_institucional").onSnapshot(snap => {
        nominaLocal = [];
        let t = {Doc:0, Obr:0, VA:0, VB:0};
        const sP = document.getElementById('sPersona');
        sP.innerHTML = '<option value="">-- SELECCIONAR --</option>';
        
        snap.forEach(doc => {
            let d = doc.data(); d.id = doc.id;
            nominaLocal.push(d);
            sP.innerHTML += `<option value="${d.n}">${d.n}</option>`;
            if(d.c === "Docente") t.Doc++; 
            else if(d.c === "Obrero") t.Obr++;
            else if(d.g === "GRUPO A") t.VA++; 
            else if(d.g === "GRUPO B") t.VB++;
        });

        document.getElementById('tDoc').innerText = t.Doc; 
        document.getElementById('tObr').innerText = t.Obr;
        document.getElementById('tVA').innerText = t.VA; 
        document.getElementById('tVB').innerText = t.VB;
        actualizarTodo();
    });

    // Guardar con Cero Tolerancia
    async function guardarAsistencia() {
        const n = document.getElementById('sPersona').value;
        const f = document.getElementById('fManual').value;
        const e_user = document.getElementById('sEstatus').value;
        const hE = document.getElementById('hEnt').value;
        const t = document.getElementById('sTurno').value;
        const p = nominaLocal.find(x => x.n === n);
        
        if(!p) return alert("Por favor seleccione un trabajador");

        let eFinal = e_user;
        if(e_user === "ASISTENCIA" && hE) {
            const [h, m] = hE.split(':').map(Number);
            const min = h * 60 + m;
            
            if(t === "MAÑANA") {
                if(p.c === "Docente" && min > 420) eFinal = "RETRASO"; // > 7:00 AM
                if(p.c === "Obrero" && min > 405) eFinal = "RETRASO";   // > 6:45 AM
            } else if (t === "TARDE") {
                if(p.c === "Docente" && min > 720) eFinal = "RETRASO";  // > 12:00 PM
            }
        }

        await db.collection("asistencia_ebnlp_final").add({ 
            n, f, e: eFinal, hE, c: p.c, g: p.g||"", mes: f.substring(0,7), turno: t 
        });
        alert("¡Registro guardado!");
    }

    // Dashboard con filtro de fines de semana
    function actualizarTodo() {
        const fH = document.getElementById('fManual').value;
        const fecha = new Date(fH + "T12:00:00");
        const esFDS = (fecha.getDay() === 0 || fecha.getDay() === 6);
        
        db.collection("asistencia_ebnlp_final").where("f","==",fH).onSnapshot(snap => {
            let h = {Doc:0, Obr:0, VA:0, VB:0};
            snap.forEach(doc => {
                const d = doc.data();
                if(d.e==="ASISTENCIA" || d.e==="RETRASO") {
                    if(d.c==="Docente") h.Doc++; else if(d.c==="Obrero") h.Obr++; 
                    else if(d.g==="GRUPO A") h.VA++; else if(d.g==="GRUPO B") h.VB++;
                }
            });

            const render = (pres, tid, percId, cargo, cardId) => {
                const tot = parseInt(document.getElementById(tid).innerText);
                const tag = document.getElementById(percId);
                const card = document.getElementById(cardId);
                
                if(esFDS && !cargo.includes("Vigilancia")) {
                    tag.innerText = "LIBRE"; card.classList.add('disabled');
                    document.getElementById(percId.replace('perc','p')).innerText = "-";
                } else {
                    const p = (tot > 0 ? Math.round((pres/tot)*100) : 0);
                    tag.innerText = p + "%"; card.classList.remove('disabled');
                    document.getElementById(percId.replace('perc','p')).innerText = pres;
                    tag.style.color = p < 70 ? "red" : "green";
                }
            };

            render(h.Doc,'tDoc','percDoc','Docente','cardDoc');
            render(h.Obr,'tObr','percObr','Obrero','cardObr');
            render(h.VA,'tVA','percVA','Vigilancia','cardVA');
            render(h.VB,'tVB','percVB','Vigilancia','cardVB');
        });
    }

    function descargarPDFMensual() {
        alert("Generando PDF...");
        // Aquí iría la lógica de jsPDF según los datos filtrados
    }
</script>
</body>
</html>
