<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA MAESTRO EBNLP 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --rojo: #d32f2f; --verde: #2e7d32; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; color: #333; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .contenedor { max-width: 1200px; margin: auto; padding: 10px; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dash-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid var(--azul); }
        .dash-card h4 { margin: 0; font-size: 0.7rem; color: #666; text-transform: uppercase; }
        .dash-card p { margin: 5px 0 0; font-size: 1.8rem; font-weight: bold; color: var(--azul); }

        .card { background: white; margin-bottom: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h3 { margin-top: 0; color: var(--azul); border-left: 5px solid var(--naranja); padding-left: 10px; text-transform: uppercase; font-size: 0.85rem; }
        
        .nomina-resumen { background: #e3f2fd; padding: 10px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; border: 1px solid #bbdefb; }
        .nom-item { font-size: 0.75rem; font-weight: bold; color: #0d47a1; }

        .t-wrap { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; font-size: 11px; }
        th { background: #f8f9fa; padding: 10px; border: 1px solid #ddd; color: var(--azul); text-transform: uppercase; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        
        .hidden { display: none; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.8rem; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.9rem; text-transform: uppercase; }
        .btn-verde { background: var(--verde); } .btn-azul { background: var(--azul); } .btn-gris { background: #6c757d; } .btn-rojo { background: var(--rojo); }
    </style>
</head>
<body>

<header>
    <h2>E.B.N. "LUCILA PALACIOS"</h2>
    <small>CONTROL DE ASISTENCIA INTEGRAL 2026</small>
</header>

<div class="contenedor">

    <div class="dashboard">
        <div class="dash-card"><h4>Docentes</h4><p id="presDoc">0</p></div>
        <div class="dash-card"><h4>Obreros</h4><p id="presObr">0</p></div>
        <div class="dash-card"><h4>Admin.</h4><p id="presAdm">0</p></div>
        <div class="dash-card"><h4>CNAE</h4><p id="presCnae">0</p></div>
        <div class="dash-card"><h4>Vig. A</h4><p id="presVigA">0</p></div>
        <div class="dash-card"><h4>Vig. B</h4><p id="presVigB">0</p></div>
    </div>

    <div class="card">
        <h3>📝 Registro de Asistencia</h3>
        <input type="date" id="fManual" onchange="actualizarTodo()">
        
        <label>SELECCIONAR TRABAJADOR:</label>
        <select id="sPersona"></select>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div>
                <label>ESTATUS:</label>
                <select id="sEstatus">
                    <option value="ASISTENCIA">PRESENTE ✅</option>
                    <option value="INASISTENCIA">INASISTENCIA ❌</option>
                    <option value="PERMISO">PERMISO 📝</option>
                    <option value="REPOSO">REPOSO 🏥</option>
                    <option value="VACACIONES">VACACIONES 🌴</option>
                </select>
            </div>
            <div><label>HORA ENTRADA:</label><input type="time" id="hEntrada"></div>
        </div>
        <button class="btn btn-verde" onclick="guardar()">GUARDAR REGISTRO</button>
    </div>

    <div class="card">
        <h3>📊 Consolidado Mensual Detallado</h3>
        <div id="areaConsolidado" class="hidden">
            <div class="t-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Cargo / Grupo</th>
                            <th style="background:#e8f5e9;">Asis.</th>
                            <th style="background:#ffebee;">Inasis.</th>
                            <th style="background:#fff3e0;">Perm.</th>
                            <th style="background:#e1f5fe;">Repos.</th>
                            <th style="background:#f3e5f5;">Vacac.</th>
                            <th style="background:var(--azul); color:white;">Prom/Día</th>
                        </tr>
                    </thead>
                    <tbody id="bEstatusMensual"></tbody>
                </table>
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn btn-gris" onclick="toggleSec('areaConsolidado', false)">OCULTAR</button>
            <button class="btn btn-azul" onclick="toggleSec('areaConsolidado', true)">VER REPORTE</button>
        </div>
    </div>

    <div class="card">
        <h3>📋 Lista del Día: <span id="titFecha"></span></h3>
        <div id="areaLista" class="hidden">
            <div class="t-wrap">
                <table>
                    <thead><tr><th>Nombre</th><th>Cargo</th><th>Grupo</th><th>Estatus</th><th>Entrada</th></tr></thead>
                    <tbody id="bLista"></tbody>
                </table>
            </div>
            <button class="btn btn-rojo" style="margin-top:15px;" onclick="limpiarListaDia()">🗑️ LIMPIAR LISTA DEL DÍA (EGRESO)</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn btn-gris" onclick="toggleSec('areaLista', false)">OCULTAR</button>
            <button class="btn btn-azul" onclick="toggleSec('areaLista', true)">MOSTRAR LISTA</button>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('fManual').value = new Date().toISOString().split('T')[0];
    let nomina = [];

    // Cargar Nómina
    db.collection("nomina_institucional").onSnapshot(snap => {
        nomina = [];
        const sP = document.getElementById('sPersona');
        sP.innerHTML = '<option value="">-- Seleccionar --</option>';
        snap.forEach(doc => {
            let d = doc.data(); d.id = doc.id; nomina.push(d);
            sP.innerHTML += `<option value="${d.n}">${d.n} (${d.c})</option>`;
        });
        actualizarTodo();
    });

    function toggleSec(id, v) { document.getElementById(id).classList.toggle('hidden', !v); }

    async function guardar() {
        const n = document.getElementById('sPersona').value, f = document.getElementById('fManual').value, hE = document.getElementById('hEntrada').value, e = document.getElementById('sEstatus').value;
        const p = nomina.find(x => x.n === n);
        if(!p) return alert("Seleccione personal");
        
        await db.collection("asistencia_ebnlp_final").add({ n, f, e, hE: hE||"--", c: p.c, g: p.g||"", mes: f.substring(0,7) });
        alert("¡Guardado!");
    }

    // Función para borrar los registros del día (Egreso)
    async function limpiarListaDia() {
        const f = document.getElementById('fManual').value;
        if(!confirm(`¿Desea borrar toda la lista de asistencia del día ${f}?`)) return;
        const snap = await db.collection("asistencia_ebnlp_final").where("f", "==", f).get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        alert("Lista del día borrada.");
    }

    function actualizarTodo() {
        const fH = document.getElementById('fManual').value, mH = fH.substring(0,7);
        document.getElementById('titFecha').innerText = fH;
        
        db.collection("asistencia_ebnlp_final").onSnapshot(snap => {
            const bL = document.getElementById('bLista'), bEst = document.getElementById('bEstatusMensual');
            const dH = snap.docs.filter(d => d.data().f === fH);
            const dM = snap.docs.filter(d => d.data().mes === mH);

            // Dashboard Hoy
            let hoy = {Docente:0, Obrero:0, Administrativo:0, CNAE:0, VigA:0, VigB:0};
            bL.innerHTML = "";
            dH.forEach(doc => {
                const d = doc.data();
                if(d.e === "ASISTENCIA") {
                    if(d.c === "Vigilante" && d.g === "GRUPO A") hoy.VigA++; 
                    else if(d.c === "Vigilante" && d.g === "GRUPO B") hoy.VigB++;
                    else if(d.c === "CNAE (Cocinera)") hoy.CNAE++; 
                    else if(d.c === "Administrativo") hoy.Administrativo++; 
                    else hoy[d.c]++;
                }
                bL.innerHTML += `<tr><td>${d.n}</td><td>${d.c}</td><td>${d.g||'--'}</td><td>${d.e}</td><td>${d.hE}</td></tr>`;
            });
            document.getElementById('presDoc').innerText = hoy.Docente; document.getElementById('presObr').innerText = hoy.Obrero;
            document.getElementById('presAdm').innerText = hoy.Administrativo; document.getElementById('presCnae').innerText = hoy.CNAE;
            document.getElementById('presVigA').innerText = hoy.VigA; document.getElementById('presVigB').innerText = hoy.VigB;

            // Consolidado Detallado (Como se sabe quién tiene cada estatus)
            bEst.innerHTML = "";
            const categorias = ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)", "Vigilante GRUPO A", "Vigilante GRUPO B"];
            categorias.forEach(c => {
                const isV = c.includes("Vigilante");
                const filtrados = dM.filter(d => d.data().c === (isV?"Vigilante":c) && (isV? d.data().g===c.replace("Vigilante ","") : true));
                
                const asis = filtrados.filter(r => r.data().e === "ASISTENCIA").length;
                const fal = filtrados.filter(r => r.data().e === "INASISTENCIA").length;
                const per = filtrados.filter(r => r.data().e === "PERMISO").length;
                const rep = filtrados.filter(r => r.data().e === "REPOSO").length;
                const vac = filtrados.filter(r => r.data().e === "VACACIONES").length;
                const dias = [...new Set(filtrados.map(d => d.data().f))].length || 1;

                bEst.innerHTML += `<tr>
                    <td style="text-align:left;"><b>${c}</b></td>
                    <td>${asis}</td><td>${fal}</td><td>${per}</td><td>${rep}</td><td>${vac}</td>
                    <td style="background:#e3f2fd;">${(asis/dias).toFixed(1)}</td>
                </tr>`;
            });
        });
    }
</script>
</body>
</html>
