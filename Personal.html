<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA CONTROL E.B.N. LUCILA PALACIOS</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { 
            --azul: #0a2144; --naranja: #f39c12; --rojo: #850000; --verde: #1d6f42; 
            --celeste: #3498db; --gris: #f4f4f4; --blanco: #ffffff; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; color: #333; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .contenedor { max-width: 1300px; margin: auto; padding: 10px; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .dash-card { background: white; padding: 12px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--azul); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .dash-card .valor { font-size: 1.6rem; font-weight: bold; color: var(--azul); display: block; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #ddd; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--naranja); color: white; }

        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .ficha { background: white; padding: 12px; border-radius: 12px; border: 1px solid #ddd; text-align: center; position: relative; }
        
        /* Estilo para Vigilantes Bloqueados */
        .ficha.vigilante-bloqueado { opacity: 0.4; pointer-events: none; background: #ebebeb; border: 1px dashed var(--rojo); }
        .ficha.vigilante-bloqueado::after { content: "GRUPO NO ACTIVO"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.7rem; color: var(--rojo); font-weight: bold; width: 100%; }
        
        .btn-check { width: 100%; padding: 7px; margin: 2px 0; border: 1px solid #eee; border-radius: 5px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        /* Colores de Filas */
        .row-asistencia { background-color: #d4edda !important; }
        .row-vacaciones { background-color: #d1e7ff !important; }
        .row-actividad { background-color: #d1ecf1 !important; }
        .row-retraso { background-color: #fff3cd !important; }
        .row-inasistencia { background-color: #f8d7da !important; }
        .row-permiso-m { background-color: #e2e3e5 !important; }
        .row-permiso-p { background-color: #ffffff !important; }

        .table-wrap { overflow-x: auto; background: white; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { background: var(--azul); color: white; padding: 10px; border: 1px solid #334; }
        td { padding: 8px; border: 1px solid #eee; text-align: center; }
        
        .sec-header { background: var(--naranja); color: white; padding: 8px 15px; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        .hidden { display: none; }
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<header>
    <h1>E.B.N. "LUCILA PALACIOS"</h1>
    <p>CONTROL DE ASISTENCIA Y ESTADÍSTICA PROMEDIO 2026</p>
</header>

<div class="contenedor">
    <div class="dashboard">
        <div class="dash-card"><h4>Docentes</h4><span class="valor" id="dDoc">0</span></div>
        <div class="dash-card"><h4>Obreros</h4><span class="valor" id="dObr">0</span></div>
        <div class="dash-card"><h4>Admin.</h4><span class="valor" id="dAdm">0</span></div>
        <div class="dash-card"><h4>CNAE</h4><span class="valor" id="dCnae">0</span></div>
        <div class="dash-card"><h4>Vigilancia</h4><span class="valor" id="dVig">0</span></div>
        <div class="dash-card" style="border-bottom-color: var(--verde);"><h4>Efectividad</h4><span class="valor" id="dEfec">0%</span></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="verTab('tabReg')">DIARIO</button>
        <button class="tab-btn" onclick="verTab('tabCons')">MENSUAL</button>
        <button class="tab-btn" onclick="verTab('tabNom')">NÓMINA / RESPALDO</button>
    </div>

    <div id="tabReg" class="tab-content">
        <div style="display:flex; gap:10px; margin-bottom:15px; background:white; padding:10px; border-radius:8px; align-items:center; flex-wrap: wrap; border: 2px solid var(--azul);">
            <b>Fecha:</b> <input type="date" id="fechaFiltro" onchange="dibujarPaseLista();">
            <b style="color: var(--rojo);">Vigilancia Activa Hoy:</b> 
            <select id="grupoVigActivo" onchange="dibujarPaseLista()" style="background: #fff8f8; font-weight: bold; border-color: var(--rojo);">
                <option value="Grupo I">VIGILANCIA GRUPO I</option>
                <option value="Grupo II">VIGILANCIA GRUPO II</option>
            </select>
            <input type="text" id="buscador" placeholder="Buscar personal..." onkeyup="filtrarFichas()" style="flex-grow:1;">
        </div>
        
        <div id="fichasGrid" class="grid-fichas"></div>
        
        <div class="sec-header">REPORTE DEL DÍA</div>
        <div class="table-wrap">
            <table id="tablaDiaria">
                <thead><tr><th>Nombre</th><th>Cargo</th><th>Estatus</th><th>Entrada/Salida</th><th>Obs.</th><th>Acción</th></tr></thead>
                <tbody id="bodyDia"></tbody>
            </table>
        </div>
    </div>

    <div id="tabNom" class="tab-content hidden">
        <div style="background:white; padding:15px; border-radius:10px; margin-bottom:15px;">
            <h3>Gestión de Personal</h3>
            <div style="display:grid; grid-template-columns: 2fr 1fr 0.5fr 1fr 1fr; gap:8px;">
                <input type="text" id="nNombre" placeholder="NOMBRE COMPLETO" style="text-transform:uppercase">
                <select id="nCargo">
                    <option value="Docente">Docente</option>
                    <option value="Obrero">Obrero</option>
                    <option value="Administrativo">Administrativo</option>
                    <option value="CNAE (Cocinera)">CNAE (Cocinera)</option>
                    <option value="Vigilante">Vigilante</option>
                </select>
                <select id="nGenero"><option value="F">F</option><option value="M">M</option></select>
                <select id="nGrupo">
                    <option value="General">General (Doc/Adm/Obr)</option>
                    <option value="Grupo I">Vigilancia Grupo I</option>
                    <option value="Grupo II">Vigilancia Grupo II</option>
                </select>
                <button onclick="agregarPersonal()" style="background:var(--azul); color:white; border:none; border-radius:5px; font-weight:bold;">GUARDAR</button>
            </div>
            <div style="margin-top:20px; padding-top:15px; border-top:2px solid #eee; display: flex; gap: 10px;">
                <button onclick="exportarRespaldo()" style="background:#444; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">📥 RESPALDO JSON</button>
                <input type="file" id="importFile" style="display:none" onchange="importarRespaldo(event)">
                <button onclick="document.getElementById('importFile').click()" style="background:var(--rojo); color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">📤 RESTAURAR SISTEMA</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Nombre</th><th>Cargo</th><th>Género</th><th>Grupo/Turno</th><th>Acción</th></tr></thead>
                <tbody id="bodyNomina"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nominaLocal = [];
    document.getElementById('fechaFiltro').value = new Date().toISOString().split('T')[0];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nominaLocal = [];
        snap.forEach(doc => { let d = doc.data(); d.id = doc.id; nominaLocal.push(d); });
        nominaLocal.sort((a,b) => a.n.localeCompare(b.n));
        renderizarNomina();
        dibujarPaseLista();
    });

    async function marcar(nombre, estatus) {
        const fecha = document.getElementById('fechaFiltro').value;
        const p = nominaLocal.find(x => x.n === nombre);
        const yaMarcado = await db.collection("asistencia_ebnlp_final").where("n", "==", nombre).where("f", "==", fecha).get();
        if(!yaMarcado.empty) { alert("Esta persona ya tiene un registro hoy."); return; }

        let hE = "---", hS = "---", obs = "";
        if(["ASISTENCIA", "RETRASO"].includes(estatus)) hE = prompt(`Entrada para ${nombre}:`, "07:00");
        if(estatus === "VACACIONES") { hE = "VAC"; hS = "VAC"; }
        obs = prompt("Observación / Motivo:");

        await db.collection("asistencia_ebnlp_final").add({
            n: nombre, f: fecha, e: estatus, hE, hS, trn: "DIARIO",
            c: p.c, gender: p.gender, mes: fecha.substring(0,7), obs: obs || "", grupo: p.grupo
        });
        dibujarPaseLista();
    }

    function dibujarPaseLista() {
        const fecha = document.getElementById('fechaFiltro').value;
        const grupoActivoVig = document.getElementById('grupoVigActivo').value;
        
        db.collection("asistencia_ebnlp_final").where("f", "==", fecha).get().then(snap => {
            const marcados = {}; snap.forEach(d => marcados[d.data().n] = d.data());
            const cont = document.getElementById('fichasGrid'); cont.innerHTML = "";
            
            nominaLocal.forEach(p => {
                const div = document.createElement('div');
                div.className = "ficha";
                
                // LÓGICA DE BLOQUEO: Solo aplica si el cargo es 'Vigilante'
                if(p.c === "Vigilante" && p.grupo !== grupoActivoVig) {
                    div.classList.add('vigilante-bloqueado');
                }

                const m = marcados[p.n];
                if(!m) {
                    div.innerHTML = `<p>${p.n}</p>
                        <button class="btn-check" style="background:#d4edda" onclick="marcar('${p.n}','ASISTENCIA')">ASISTENCIA</button>
                        <button class="btn-check" style="background:#d1e7ff" onclick="marcar('${p.n}','VACACIONES')">VACACIONES</button>
                        <button class="btn-check" style="background:#fff3cd" onclick="marcar('${p.n}','RETRASO')">RETRASO</button>
                        <button class="btn-check" style="background:#f8d7da" onclick="marcar('${p.n}','INASISTENCIA')">FALTA</button>
                        <button class="btn-check" style="background:#e2e3e5" onclick="marcar('${p.n}','PERMISO MÉDICO')">P. MÉDICO</button>`;
                } else {
                    div.style.background = "#eee"; 
                    div.innerHTML = `<p>${p.n}</p><small style="color:var(--verde); font-weight:bold;">✓ REGISTRADO: ${m.e}</small>`;
                }
                cont.appendChild(div);
            });
            cargarTablaDiaria();
        });
    }

    function cargarTablaDiaria() {
        const fecha = document.getElementById('fechaFiltro').value;
        db.collection("asistencia_ebnlp_final").where("f", "==", fecha).onSnapshot(snap => {
            const b = document.getElementById('bodyDia'); b.innerHTML = "";
            let counts = {Docente:0, Obrero:0, Administrativo:0, "CNAE (Cocinera)":0, Vigilante:0};
            snap.forEach(doc => {
                const d = doc.data();
                let cl = (d.e === "ASISTENCIA") ? "row-asistencia" : (d.e === "VACACIONES") ? "row-vacaciones" : (d.e === "RETRASO") ? "row-retraso" : (d.e === "INASISTENCIA") ? "row-inasistencia" : "row-permiso-m";
                if(d.e === "ASISTENCIA" || d.e === "RETRASO") counts[d.c]++;
                b.innerHTML += `<tr class="${cl}"><td>${d.n}</td><td>${d.c}</td><td>${d.e}</td><td>${d.hE} / ${d.hS}</td><td>${d.obs}</td><td><button onclick="borrarRegistro('${doc.id}')">🗑️</button></td></tr>`;
            });
            // Actualizar Dashboard
            if(document.getElementById('dDoc')) document.getElementById('dDoc').innerText = counts.Docente;
            if(document.getElementById('dObr')) document.getElementById('dObr').innerText = counts.Obrero;
            if(document.getElementById('dAdm')) document.getElementById('dAdm').innerText = counts.Administrativo;
            if(document.getElementById('dCnae')) document.getElementById('dCnae').innerText = counts["CNAE (Cocinera)"];
            if(document.getElementById('dVig')) document.getElementById('dVig').innerText = counts.Vigilante;
        });
    }

    async function agregarPersonal() {
        const n = document.getElementById('nNombre').value.toUpperCase();
        if(n) await db.collection("nomina_institucional").add({
            n, c: document.getElementById('nCargo').value, 
            gender: document.getElementById('nGenero').value, 
            grupo: document.getElementById('nGrupo').value
        });
        document.getElementById('nNombre').value = "";
    }

    function renderizarNomina() {
        const b = document.getElementById('bodyNomina'); b.innerHTML = "";
        nominaLocal.forEach(p => {
            b.innerHTML += `<tr><td>${p.n}</td><td>${p.c}</td><td>${p.gender}</td><td>${p.grupo}</td><td><button onclick="db.collection('nomina_institucional').doc('${p.id}').delete()">❌ ELIMINAR</button></td></tr>`;
        });
    }

    // --- RESPALDO Y RESTAURACIÓN ---
    async function exportarRespaldo() {
        const n = await db.collection("nomina_institucional").get();
        const a = await db.collection("asistencia_ebnlp_final").get();
        const backup = {
            nomina: n.docs.map(d => d.data()),
            asistencia: a.docs.map(d => d.data())
        };
        const blob = new Blob([JSON.stringify(backup)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `RESPALDO_SISTEMA_LUCILA_${new Date().toLocaleDateString()}.json`;
        link.click();
    }

    async function importarRespaldo(event) {
        if(!confirm("¡ATENCIÓN! Esto agregará los datos del respaldo a los actuales. ¿Deseas continuar?")) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            if(data.nomina) for(let x of data.nomina) await db.collection("nomina_institucional").add(x);
            if(data.asistencia) for(let y of data.asistencia) await db.collection("asistencia_ebnlp_final").add(y);
            alert("Restauración completada con éxito.");
            location.reload();
        };
        reader.readAsText(event.target.files[0]);
    }

    function verTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        if(event) event.currentTarget.classList.add('active');
    }
    
    function filtrarFichas() {
        const v = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.ficha').forEach(f => {
            f.style.display = f.innerText.toLowerCase().includes(v) ? "block" : "none";
        });
    }

    async function borrarRegistro(id) {
        if(confirm("¿Seguro que deseas eliminar este registro de asistencia?")) {
            await db.collection("asistencia_ebnlp_final").doc(id).delete();
        }
    }
</script>
</body>
</html>
