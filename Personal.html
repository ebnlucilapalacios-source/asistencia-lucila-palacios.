<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA CONTROL E.B.N. LUCILA PALACIOS</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --azul: #0a2144; --naranja: #f39c12; --rojo: #850000; --verde: #2d7a31; --gris: #f4f4f4; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; color: #333; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .contenedor { max-width: 1100px; margin: auto; padding: 10px; }

        /* Colores por Estatus */
        .row-asistencia { background-color: #d4edda !important; } /* Verde claro */
        .row-retraso { background-color: #fff3cd !important; }    /* Amarillo */
        .row-inasistencia { background-color: #f8d7da !important; } /* Rojo claro */
        .row-permiso-p { background-color: #e2e3e5 !important; }  /* Gris */
        .row-permiso-m { background-color: #d1ecf1 !important; }  /* Celeste */
        .row-reposo { background-color: #f5c6cb !important; }     /* Rosa */
        .row-vacaciones { background-color: #cce5ff !important; }  /* Azul claro */

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .dash-card { background: var(--blanco); padding: 10px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--azul); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .dash-card.full { grid-column: 1 / -1; background: var(--azul); color: white; }
        .pres { font-size: 1.4rem; font-weight: bold; display: block; color: var(--azul); }
        .dash-card.full .pres { color: white; font-size: 2rem; }

        .card-seccion { background: var(--blanco); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-top: 4px solid var(--naranja); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .sec-header { color: var(--azul); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 0.85rem; border-left: 5px solid var(--naranja); padding-left: 10px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; background: #ddd; border: none; cursor: pointer; border-radius: 8px 8px 0 0; font-weight: bold; font-size: 0.75rem; }
        .tab-btn.active { background: var(--naranja); color: white; }
        
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 0.85rem; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; text-transform: uppercase; font-size: 0.7rem; }
        .btn-verde { background: var(--verde); } .btn-azul { background: var(--azul); } .btn-rojo { background: var(--rojo); }
        .group-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .table-wrap { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; text-align: center; }
        th { background: var(--azul); color: white; padding: 8px; }
        td { padding: 8px; border: 1px solid #ddd; }
        .hidden { display: none; }
        .stats-box { background: #eef2f7; padding: 10px; border-radius: 8px; font-weight: bold; color: var(--azul); text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>E.B.N. "LUCILA PALACIOS"</h1>
    <p>SISTEMA DE CONTROL Y ESTADÍSTICA 2026</p>
</header>

<div class="contenedor">

    <div class="dashboard">
        <div class="dash-card full"><h4>Efectividad de Hoy</h4><span class="pres" id="efecTotal">0%</span></div>
        <div class="dash-card"><h4>Docentes</h4><span class="pres" id="curDoc">0</span></div>
        <div class="dash-card"><h4>Obreros</h4><span class="pres" id="curObr">0</span></div>
        <div class="dash-card"><h4>Admin.</h4><span class="pres" id="curAdm">0</span></div>
        <div class="dash-card"><h4>CNAE</h4><span class="pres" id="curCn">0</span></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="verTab('tabRegistro')">ASISTENCIA</button>
        <button class="tab-btn" onclick="verTab('tabReportes')">REPORTES</button>
        <button class="tab-btn" onclick="verTab('tabNomina')">NÓMINA</button>
    </div>

    <div id="tabRegistro" class="tab-content">
        <div class="card-seccion">
            <div class="sec-header">📝 Registro de Jornada</div>
            <div class="group-btns">
                <input type="date" id="fechaReg" onchange="actualizarTodo()">
                <select id="turno">
                    <option value="MAÑANA">MAÑANA</option>
                    <option value="TARDE">TARDE</option>
                    <option value="NOCHE">NOCHE (VIGILANTES)</option>
                    <option value="FIN_SEMANA">FIN DE SEMANA (VIG)</option>
                </select>
            </div>
            <label>Trabajador:</label>
            <select id="selectPersona"></select>
            <div class="group-btns">
                <div>
                    <label>Estatus:</label>
                    <select id="estatus">
                        <option value="ASISTENCIA">ASISTENCIA ✅</option>
                        <option value="RETRASO">RETRASO ⚠️</option>
                        <option value="INASISTENCIA">INASISTENCIA ❌</option>
                        <option value="PERMISO PERSONAL">PERMISO PERSONAL 📝</option>
                        <option value="PERMISO MÉDICO">PERMISO MÉDICO 🏥</option>
                        <option value="REPOSO">REPOSO 🛌</option>
                        <option value="VACACIONES">VACACIONES 🌴</option>
                    </select>
                </div>
                <div><label>Entrada:</label><input type="time" id="horaEntrada"></div>
            </div>
            <button class="btn btn-verde" onclick="guardarRegistro()">GUARDAR ASISTENCIA</button>
        </div>
        <div class="table-wrap">
            <table id="tablaDia">
                <thead><tr><th>Nombre</th><th>Estatus</th><th>Entrada</th><th>Acción</th></tr></thead>
                <tbody id="bodyDia"></tbody>
            </table>
        </div>
    </div>

    <div id="tabReportes" class="tab-content hidden">
        <div class="card-seccion">
            <div class="sec-header">📊 Promedio Real Disgregado</div>
            <input type="month" id="mesReporte" onchange="cargarConsolidado()">
            <div id="diasLaborados" class="stats-box" style="margin-top:10px;"></div>

            <div class="table-wrap">
                <table id="tablaEstadistica">
                    <thead>
                        <tr>
                            <th>Cargo</th>
                            <th>Nómina</th>
                            <th>Prom. F</th>
                            <th>Prom. M</th>
                            <th>Prom. Total</th>
                        </tr>
                    </thead>
                    <tbody id="bodyEstadistica"></tbody>
                </table>
            </div>
            <button class="btn btn-rojo" onclick="generarPDFMensual()">DESCARGAR REPORTE PDF</button>
        </div>
    </div>

    <div id="tabNomina" class="tab-content hidden">
        <div class="card-seccion">
            <div class="sec-header">👥 Gestión de Personal</div>
            <input type="text" id="nomNuevo" placeholder="NOMBRE COMPLETO" style="text-transform:uppercase">
            <div class="group-btns">
                <select id="carNuevo">
                    <option value="Docente">Docente</option>
                    <option value="Obrero">Obrero</option>
                    <option value="Administrativo">Administrativo</option>
                    <option value="CNAE (Cocinera)">CNAE (Cocinera)</option>
                    <option value="Vigilante">Vigilante</option>
                </select>
                <select id="genNuevo">
                    <option value="F">FEMENINO</option>
                    <option value="M">MASCULINO</option>
                </select>
            </div>
            <button class="btn btn-azul" onclick="agregarANomina()">AGREGAR A NÓMINA</button>
            <div class="table-wrap">
                <table><thead><tr><th>Nombre</th><th>Cargo</th><th>Gen</th><th>Acción</th></tr></thead><tbody id="bodyNomina"></tbody></table>
            </div>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nominaLocal = [];
    document.getElementById('fechaReg').value = new Date().toISOString().split('T')[0];
    document.getElementById('mesReporte').value = new Date().toISOString().substring(0,7);

    function verTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'tabReportes') cargarConsolidado();
    }

    // MAPEO DE COLORES POR ESTATUS
    const coloresEstatus = {
        "ASISTENCIA": "row-asistencia",
        "RETRASO": "row-retraso",
        "INASISTENCIA": "row-inasistencia",
        "PERMISO PERSONAL": "row-permiso-p",
        "PERMISO MÉDICO": "row-permiso-m",
        "REPOSO": "row-reposo",
        "VACACIONES": "row-vacaciones"
    };

    db.collection("nomina_institucional").onSnapshot(snap => {
        nominaLocal = [];
        const sel = document.getElementById('selectPersona'), bNom = document.getElementById('bodyNomina');
        sel.innerHTML = '<option value="">-- SELECCIONAR --</option>'; bNom.innerHTML = "";
        snap.forEach(doc => {
            let d = doc.data(); d.id = doc.id; nominaLocal.push(d);
            sel.innerHTML += `<option value="${d.n}">${d.n}</option>`;
            bNom.innerHTML += `<tr><td>${d.n}</td><td>${d.c}</td><td>${d.gender || 'F'}</td><td><button onclick="eliminarDeNomina('${d.id}')">X</button></td></tr>`;
        });
        actualizarTodo();
    });

    async function guardarRegistro() {
        const n = document.getElementById('selectPersona').value, f = document.getElementById('fechaReg').value, e = document.getElementById('estatus').value;
        const hE = document.getElementById('horaEntrada').value, trn = document.getElementById('turno').value;
        const p = nominaLocal.find(x => x.n === n);
        if(!p) return alert("Seleccione trabajador");

        await db.collection("asistencia_ebnlp_final").add({ 
            n, f, e, hE, c: p.c, gender: p.gender || 'F', mes: f.substring(0,7) 
        });
        alert("✅ Guardado");
    }

    function actualizarTodo() {
        const fH = document.getElementById('fechaReg').value;
        db.collection("asistencia_ebnlp_final").where("f", "==", fH).onSnapshot(snap => {
            let h = {Doc:0, Obr:0, Adm:0, Cn:0};
            const bD = document.getElementById('bodyDia'); bD.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const claseColor = coloresEstatus[d.e] || "";
                if(d.e === "ASISTENCIA" || d.e === "RETRASO") {
                    if(d.c === "Docente") h.Doc++; else if(d.c === "Obrero") h.Obr++; else if(d.c === "Administrativo") h.Adm++; else if(d.c === "CNAE (Cocinera)") h.Cn++;
                }
                bD.innerHTML += `<tr class="${claseColor}"><td>${d.n}</td><td>${d.e}</td><td>${d.hE||'-'}</td><td><button onclick="eliminarAsis('${doc.id}')">X</button></td></tr>`;
            });
            document.getElementById('curDoc').innerText = h.Doc; document.getElementById('curObr').innerText = h.Obr;
            document.getElementById('curAdm').innerText = h.Adm; document.getElementById('curCn').innerText = h.Cn;
            let totalActual = Object.values(h).reduce((a,b)=>a+b,0);
            document.getElementById('efecTotal').innerText = nominaLocal.length > 0 ? Math.round((totalActual/nominaLocal.length)*100)+"%" : "0%";
        });
    }

    async function cargarConsolidado() {
        const mes = document.getElementById('mesReporte').value;
        const snap = await db.collection("asistencia_ebnlp_final").where("mes", "==", mes).get();
        
        // Estructura para promedios: { Cargo: { M: sumaAsis, F: sumaAsis, total: sumaAsis } }
        let stats = {
            "Docente": { M:0, F:0, T:0 },
            "Obrero": { M:0, F:0, T:0 },
            "Administrativo": { M:0, F:0, T:0 },
            "CNAE (Cocinera)": { M:0, F:0, T:0 },
            "Vigilante": { M:0, F:0, T:0 }
        };
        let dias = new Set();
        
        snap.forEach(doc => {
            const d = doc.data();
            if(d.e === "ASISTENCIA" || d.e === "RETRASO") {
                dias.add(d.f);
                if(stats[d.c]) {
                    stats[d.c][d.gender || 'F']++;
                    stats[d.c].T++;
                }
            }
        });

        const nDias = dias.size || 1;
        document.getElementById('diasLaborados').innerText = `Días laborados en el mes: ${nDias}`;
        
        const bE = document.getElementById('bodyEstadistica'); bE.innerHTML = "";
        for(let cargo in stats) {
            let nFilas = nominaLocal.filter(p => p.c === cargo);
            let nF = nFilas.filter(p => p.gender === 'F').length || 1;
            let nM = nFilas.filter(p => p.gender === 'M').length || 1;
            let nT = nFilas.length || 1;

            bE.innerHTML += `
                <tr>
                    <td>${cargo}</td>
                    <td>${nFilas.length}</td>
                    <td>${(stats[cargo].F / nDias).toFixed(2)}</td>
                    <td>${(stats[cargo].M / nDias).toFixed(2)}</td>
                    <td>${(stats[cargo].T / nDias).toFixed(2)}</td>
                </tr>`;
        }
    }

    async function agregarANomina() {
        const n = document.getElementById('nomNuevo').value.toUpperCase();
        const c = document.getElementById('carNuevo').value;
        const g = document.getElementById('genNuevo').value;
        if(n) await db.collection("nomina_institucional").add({n, c, gender: g});
        document.getElementById('nomNuevo').value = "";
    }

    async function eliminarAsis(id) { if(confirm("¿Eliminar?")) await db.collection("asistencia_ebnlp_final").doc(id).delete(); }
    async function eliminarDeNomina(id) { if(confirm("¿Eliminar?")) await db.collection("nomina_institucional").doc(id).delete(); }

    function generarPDFMensual() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("REPORTE ESTADÍSTICO EBNLP - " + document.getElementById('mesReporte').value, 14, 15);
        doc.autoTable({ html: '#tablaEstadistica', startY: 20 });
        doc.save("Reporte_Promedios.pdf");
    }
</script>
</body>
</html>
