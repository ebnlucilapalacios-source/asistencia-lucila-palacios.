<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA CONTROL E.B.N. LUCILA PALACIOS</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --azul: #0a2144; --naranja: #f39c12; --rojo: #850000; --verde: #1d6f42; 
            --celeste: #3498db; --gris: #f4f4f4; --blanco: #ffffff; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; color: #333; }
        header { background: var(--azul); color: white; text-align: center; padding: 15px; border-bottom: 5px solid var(--naranja); }
        .contenedor { max-width: 1300px; margin: auto; padding: 10px; }

        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .dash-card { background: white; padding: 12px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--azul); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .dash-card .valor { font-size: 1.5rem; font-weight: bold; color: var(--azul); display: block; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #ddd; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--naranja); color: white; }

        /* Fichas y Bloqueo */
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .ficha { background: white; padding: 12px; border-radius: 12px; border: 1px solid #ddd; text-align: center; position: relative; }
        
        /* Regla de Bloqueo solo para Vigilantes */
        .ficha.vigilante-bloqueado { opacity: 0.3; pointer-events: none; background: #eee !important; }
        .ficha.vigilante-bloqueado::after { content: "GRUPO NO ACTIVO"; position: absolute; top: 45%; left: 0; width: 100%; color: var(--rojo); font-weight: bold; font-size: 0.7rem; }
        
        .btn-check { width: 100%; padding: 6px; margin: 2px 0; border: 1px solid #eee; border-radius: 5px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        /* Colores de Fila */
        .row-asistencia { background-color: #d4edda !important; }
        .row-vacaciones { background-color: #d1e7ff !important; }
        .row-inasistencia { background-color: #f8d7da !important; }
        .row-retraso { background-color: #fff3cd !important; }

        .table-wrap { overflow-x: auto; background: white; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { background: var(--azul); color: white; padding: 10px; }
        td { padding: 8px; border: 1px solid #eee; text-align: center; }
        
        .sec-header { background: var(--naranja); color: white; padding: 8px 15px; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        .hidden { display: none; }
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<header>
    <h1>E.B.N. "LUCILA PALACIOS"</h1>
    <p>CONTROL DE ASISTENCIA Y ESTADÍSTICA 2026</p>
</header>

<div class="contenedor">
    <div class="dashboard">
        <div class="dash-card"><h4>Docentes</h4><span class="valor" id="dDoc">0</span></div>
        <div class="dash-card"><h4>Obreros</h4><span class="valor" id="dObr">0</span></div>
        <div class="dash-card"><h4>Admin.</h4><span class="valor" id="dAdm">0</span></div>
        <div class="dash-card"><h4>CNAE</h4><span class="valor" id="dCnae">0</span></div>
        <div class="dash-card"><h4>Vigilancia</h4><span class="valor" id="dVig">0</span></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="verTab('tabReg')">DIARIO</button>
        <button class="tab-btn" onclick="verTab('tabCons')">MENSUAL</button>
        <button class="tab-btn" onclick="verTab('tabNom')">NÓMINA</button>
    </div>

    <div id="tabReg" class="tab-content">
        <div style="background:white; padding:12px; border-radius:8px; margin-bottom:15px; display:flex; gap:15px; align-items:center; border: 2px solid var(--azul);">
            <b>Fecha:</b> <input type="date" id="fechaFiltro" onchange="dibujarPaseLista();">
            <b style="color: var(--rojo);">Vigilancia Activa:</b> 
            <select id="grupoVigActivo" onchange="dibujarPaseLista()" style="font-weight:bold; border: 2px solid var(--rojo);">
                <option value="Grupo I">VIGILANCIA GRUPO I</option>
                <option value="Grupo II">VIGILANCIA GRUPO II</option>
            </select>
        </div>
        
        <div id="fichasGrid" class="grid-fichas"></div>
        
        <div class="sec-header">REPORTE DEL DÍA</div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Nombre</th><th>Cargo</th><th>Estatus</th><th>Entrada/Salida</th><th>Obs.</th><th>Acción</th></tr></thead>
                <tbody id="bodyDia"></tbody>
            </table>
        </div>
    </div>

    <div id="tabCons" class="tab-content hidden">
        <div style="background:white; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; gap:15px;">
            <input type="month" id="mesReporte">
            <input type="number" id="diasHabiles" value="20" style="width:60px" title="Días hábiles escuela">
            <button onclick="procesarConsolidado()" style="background:var(--azul); color:white; border:none; padding:8px 15px; border-radius:5px;">CALCULAR</button>
        </div>
        <div class="table-wrap">
            <table id="tablaEstadistica">
                <thead><tr><th>Cargo</th><th>Nómina</th><th>Prom. Total</th><th>% Efec.</th></tr></thead>
                <tbody id="bodyConsCargo"></tbody>
            </table>
        </div>
    </div>

    <div id="tabNom" class="tab-content hidden">
        <div style="background:white; padding:15px; border-radius:10px; margin-bottom:15px;">
            <div style="display:grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap:8px;">
                <input type="text" id="nNombre" placeholder="NOMBRE COMPLETO" style="text-transform:uppercase">
                <select id="nCargo">
                    <option value="Docente">Docente</option>
                    <option value="Obrero">Obrero</option>
                    <option value="Administrativo">Administrativo</option>
                    <option value="CNAE (Cocinera)">CNAE (Cocinera)</option>
                    <option value="Vigilante">Vigilante</option>
                </select>
                <select id="nGrupo">
                    <option value="General">Escuela (L-V)</option>
                    <option value="Grupo I">Vig. Grupo I</option>
                    <option value="Grupo II">Vig. Grupo II</option>
                </select>
                <button onclick="agregarPersonal()" style="background:var(--verde); color:white; border:none; border-radius:5px;">GUARDAR</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Nombre</th><th>Cargo</th><th>Grupo</th><th>Acción</th></tr></thead>
                <tbody id="bodyNomina"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg", authDomain: "control-de-asistencia-d585e.firebaseapp.com", projectId: "control-de-asistencia-d585e", appId: "1:368890880546:web:a97ab4372dea536217207b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let nominaLocal = [];
    document.getElementById('fechaFiltro').value = new Date().toISOString().split('T')[0];

    db.collection("nomina_institucional").onSnapshot(snap => {
        nominaLocal = [];
        snap.forEach(doc => { let d = doc.data(); d.id = doc.id; nominaLocal.push(d); });
        renderizarNomina();
        dibujarPaseLista();
    });

    async function marcar(nombre, estatus) {
        const fecha = document.getElementById('fechaFiltro').value;
        const mes = fecha.substring(0,7);
        const p = nominaLocal.find(x => x.n === nombre);
        
        // ALERTA DE LÍMITES: 3 cada 30 días
        if(estatus === "INASISTENCIA" || estatus === "PERMISO PERSONAL") {
            const hist = await db.collection("asistencia_ebnlp_final")
                .where("n", "==", nombre).where("mes", "==", mes).where("e", "==", estatus).get();
            if(hist.size >= 3) {
                if(!confirm(`⚠️ ALERTA: ${nombre} ya tiene ${hist.size} registros de ${estatus} este mes. ¿Continuar?`)) return;
            }
        }

        let hE = "---", hS = "---";
        if(["ASISTENCIA", "RETRASO"].includes(estatus)) hE = prompt("Entrada:", "07:00");
        if(estatus === "VACACIONES") { hE = "VAC"; hS = "VAC"; }

        await db.collection("asistencia_ebnlp_final").add({
            n: nombre, f: fecha, e: estatus, hE, hS, c: p.c, mes, grupo: p.grupo, obs: prompt("Obs:") || ""
        });
        dibujarPaseLista();
    }

    function dibujarPaseLista() {
        const fecha = document.getElementById('fechaFiltro').value;
        const gActivo = document.getElementById('grupoVigActivo').value;
        
        db.collection("asistencia_ebnlp_final").where("f", "==", fecha).get().then(snap => {
            const marcados = {}; snap.forEach(d => marcados[d.data().n] = d.data());
            const cont = document.getElementById('fichasGrid'); cont.innerHTML = "";
            
            nominaLocal.forEach(p => {
                const div = document.createElement('div');
                div.className = "ficha";
                
                // Lógica de Bloqueo: Solo Vigilantes
                if(p.c === "Vigilante" && p.grupo !== gActivo) div.classList.add('vigilante-bloqueado');

                const m = marcados[p.n];
                if(!m) {
                    div.innerHTML = `<b>${p.n}</b><br>
                        <button class="btn-check" style="background:#d4edda" onclick="marcar('${p.n}','ASISTENCIA')">ASISTENCIA</button>
                        <button class="btn-check" style="background:#d1e7ff" onclick="marcar('${p.n}','VACACIONES')">VACACIONES</button>
                        <button class="btn-check" style="background:#fff3cd" onclick="marcar('${p.n}','RETRASO')">RETRASO</button>
                        <button class="btn-check" style="background:#f8d7da" onclick="marcar('${p.n}','INASISTENCIA')">FALTA</button>
                        <button class="btn-check" style="background:#fff" onclick="marcar('${p.n}','PERMISO PERSONAL')">P. PERSONAL</button>`;
                } else {
                    div.innerHTML = `<b>${p.n}</b><br><p style="color:green">✓ REGISTRADO</p><small>${m.e}</small>`;
                }
                cont.appendChild(div);
            });
            cargarTablaDiaria();
        });
    }

    function cargarTablaDiaria() {
        const fecha = document.getElementById('fechaFiltro').value;
        db.collection("asistencia_ebnlp_final").where("f", "==", fecha).onSnapshot(snap => {
            const b = document.getElementById('bodyDia'); b.innerHTML = "";
            let counts = {Docente:0, Obrero:0, Administrativo:0, "CNAE (Cocinera)":0, Vigilante:0};
            snap.forEach(doc => {
                const d = doc.data();
                if(d.e === "ASISTENCIA" || d.e === "RETRASO") counts[d.c]++;
                b.innerHTML += `<tr class="row-${d.e.toLowerCase()}"><td>${d.n}</td><td>${d.c}</td><td>${d.e}</td><td>${d.hE}/${d.hS}</td><td>${d.obs}</td><td><button onclick="db.collection('asistencia_ebnlp_final').doc('${doc.id}').delete()">🗑️</button></td></tr>`;
            });
            document.getElementById('dDoc').innerText = counts.Docente;
            document.getElementById('dObr').innerText = counts.Obrero;
            document.getElementById('dAdm').innerText = counts.Administrativo;
            document.getElementById('dCnae').innerText = counts["CNAE (Cocinera)"];
            document.getElementById('dVig').innerText = counts.Vigilante;
        });
    }

    async function procesarConsolidado() {
        const mes = document.getElementById('mesReporte').value;
        const diasH = parseFloat(document.getElementById('diasHabiles').value);
        const snap = await db.collection("asistencia_ebnlp_final").where("mes", "==", mes).get();
        const data = snap.docs.map(d => d.data());
        const b = document.getElementById('bodyConsCargo'); b.innerHTML = "";
        
        ["Docente", "Obrero", "Administrativo", "CNAE (Cocinera)", "Vigilante"].forEach(c => {
            const nomC = nominaLocal.filter(x => x.c === c);
            const asis = data.filter(x => x.c === c && (x.e === "ASISTENCIA" || x.e === "RETRASO")).length;
            let div = (c === "Vigilante") ? 15 : diasH;
            let prom = (asis / div).toFixed(2);
            let efec = nomC.length > 0 ? Math.round((prom / nomC.length) * 100) : 0;
            b.innerHTML += `<tr><td>${c}</td><td>${nomC.length}</td><td>${prom}</td><td>${efec}%</td></tr>`;
        });
    }

    function verTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        if(event) event.currentTarget.classList.add('active');
    }

    async function agregarPersonal() {
        await db.collection("nomina_institucional").add({
            n: document.getElementById('nNombre').value.toUpperCase(),
            c: document.getElementById('nCargo').value,
            grupo: document.getElementById('nGrupo').value
        });
        document.getElementById('nNombre').value = "";
    }

    function renderizarNomina() {
        const b = document.getElementById('bodyNomina'); b.innerHTML = "";
        nominaLocal.forEach(p => b.innerHTML += `<tr><td>${p.n}</td><td>${p.c}</td><td>${p.grupo}</td><td><button onclick="db.collection('nomina_institucional').doc('${p.id}').delete()">❌</button></td></tr>`);
    }
</script>
</body>
</html>
