<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal EBNLP</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            messagingSenderId: "368890880546",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.guardar = async (id, e) => {
            const h = new Date().toISOString().split('T')[0];
            await setDoc(doc(db, "asistencia_personal", h), { [id]: e }, { merge: true });
        };
        window.escuchar = (cb) => {
            const h = new Date().toISOString().split('T')[0];
            onSnapshot(doc(db, "asistencia_personal", h), (d) => cb(d.data()));
        };
    </script>
</head>
<body>
    <header style="background:#1a2a6c; color:white; padding:10px; text-align:center;">
        <img src="https://ebnlucilapalacios-source.github.io/asistencia-lucila-palacios/IMG_20260225_005025_993.png" width="60" style="border-radius:50%; background:white;">
        <h2>Registro de Personal</h2>
        <a href="index.html" style="color:white;">⬅ Volver al Menú</a>
    </header>
    <div id="lista" style="padding:20px; max-width:400px; margin:auto;"></div>
    <script>
        const p = [{id:1, n:"YANITZA GÓMEZ"}, {id:2, n:"MARÍA ACUÑA"}, {id:3, n:"KARELYS REYES"}];
        function render(d = {}) {
            const cont = document.getElementById('lista');
            cont.innerHTML = "";
            p.forEach(x => {
                const as = d[x.id] === 1;
                cont.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; padding:10px; background:white; border-radius:5px;">
                    <span>${x.n}</span>
                    <button onclick="guardar(${x.id}, ${as?0:1})" style="background:${as?'#27ae60':'#ccc'}; color:white; border:none; padding:5px 10px; border-radius:4px;">${as?'Listo':'Marcar'}</button>
                </div>`;
            });
        }
        window.escuchar(render);
    </script>
</body>
</html>
