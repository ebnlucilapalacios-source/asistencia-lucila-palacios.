<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.B.N. Lucila Palacios - Control de Especialistas</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 650px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #3498db; padding-bottom: 15px; }
        .logo { max-width: 120px; margin-bottom: 10px; }
        h1 { color: #2c3e50; font-size: 24px; margin: 5px 0; }
        h2 { color: #34495e; font-size: 18px; font-weight: normal; margin: 0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 7px; font-weight: bold; color: #34495e; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccd0d5; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 12px; font-weight: bold; transition: background 0.3s; }
        .btn-save { background: #27ae60; color: white; }
        .btn-save:hover { background: #219150; }
        .btn-pdf { background: #3498db; color: white; margin-top: 20px; }
        .btn-pdf:hover { background: #2980b9; }
        .bloques { display: none; gap: 15px; margin-top: 10px; background: #eaf2f8; padding: 15px; border-radius: 6px; border: 1px solid #baddf3; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input { width: auto; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="path/to/tu/logo_lucila_palacios.png" alt="Logo Lucila Palacios" class="logo">
        <h1>E.B.N. Lucila Palacios</h1>
        <h2>Control de Asistencia - Especialistas</h2>
    </div>
    
    <div class="form-group">
        <label>Especialista</label>
        <select id="especialista">
            <option value="Inglés|Femenino">Docente Inglés (F)</option>
            <option value="Deporte I|Femenino">Deporte I Etapa (1º-3º) (F)</option>
            <option value="Deporte II|Masculino">Deporte II Etapa (4º-6º) (M)</option>
            <option value="Cultura|Masculino">Docente Cultura (M)</option>
            <option value="RPA|Femenino">Docente RPA (F)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Grado (1º - 6º)</label>
        <input type="number" id="grado" placeholder="Ej: 5" min="1" max="6">
    </div>

    <div class="form-group">
        <label>Matrícula (Alumnos Presentes)</label>
        <input type="number" id="matricula" placeholder="Ej: 38" min="20" max="38">
    </div>

    <div class="form-group">
        <label>Duración de Clase (Horario)</label>
        <select id="duracion" onchange="ajustarBloques()">
            <option value="45">45 Minutos</option>
            <option value="90">90 Minutos (Bloque Doble)</option>
        </select>
    </div>

    <div id="seccionBloques" class="bloques">
        <label style="margin-bottom: 10px; color: #2980b9;">Confirmación de Bloques (90 min)</label>
        <div class="checkbox-group">
            <input type="checkbox" id="b1" checked>
            <label for="b1" style="font-weight: normal; margin: 0;">Bloque 1 (45 min) dictado</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="b2" checked>
            <label for="b2" style="font-weight: normal; margin: 0;">Bloque 2 (45 min) dictado</label>
        </div>
    </div>

    <button class="btn btn-save" onclick="guardarAsistencia()">Guardar Asistencia Diaria</button>
    <button class="btn btn-pdf" onclick="generarReportePDF()">Descargar Reporte Mensual (PDF)</button>
</div>

<script>
    // 1. Configuración de Firebase (REEMPLAZA CON TUS DATOS DE TU REPO)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        projectId: "TU_PROYECTO_ID",
        appId: "TU_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function ajustarBloques() {
        const duracion = document.getElementById('duracion').value;
        document.getElementById('seccionBloques').style.display = duracion == "90" ? "block" : "none";
    }

    async function guardarAsistencia() {
        // ... (Lógica de guardado que ya definimos, ponderada por matrícula)
        const espData = document.getElementById('especialista').value.split('|');
        const matricula = parseInt(document.getElementById('matricula').value);
        const duracionProg = parseInt(document.getElementById('duracion').value);
        
        if (!matricula || matricula < 20 || matricula > 38) {
            alert("Por favor, ingresa una matrícula válida (20-38 alumnos).");
            return;
        }

        let minutosReales = 0;
        if(duracionProg === 45) {
            minutosReales = 45;
        } else {
            if(document.getElementById('b1').checked) minutosReales += 45;
            if(document.getElementById('b2').checked) minutosReales += 45;
        }

        const datos = {
            especialidad: espData[0],
            genero: espData[1],
            grado: document.getElementById('grado').value,
            alumnos: matricula,
            minutosProgramados: duracionProg,
            minutosEfectivos: minutosReales,
            // Impacto = minutos * alumnos (Esto da el promedio real)
            impactoReal: minutosReales * matricula,
            impactoProgramado: duracionProg * matricula,
            fecha: new Date().toLocaleDateString(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("asistencias_especialistas").add(datos);
            alert(`¡Asistencia guardada! Efectividad Real: ${((minutosReales/duracionProg)*100).toFixed(0)}%`);
        } catch (e) {
            console.error("Error al guardar en Firebase:", e);
        }
    }

    async function generarReportePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // 1. Encabezado con el Logo y Datos de la Escuela
        // Debes convertir tu logo a Base64 para incluirlo directamente en el PDF
        // Reemplaza 'DATA_IMAGE_BASE64' con el código Base64 de tu logo
        const logoBase64 = 'DATA_IMAGE_BASE64'; 
        if (logoBase64 !== 'DATA_IMAGE_BASE64') {
            doc.addImage(logoBase64, 'PNG', 14, 10, 25, 25);
        }
        
        doc.setFontSize(18);
        doc.setFont("helvetica", "bold");
        doc.text("E.B.N. Lucila Palacios", 45, 20);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text("Fundada en 1972 - San Félix, Edo. Bolívar", 45, 26);
        doc.text("Control de Estado y Asistencia - Especialistas", 45, 31);

        doc.setDrawColor(52, 152, 219); // Azul Lucila Palacios
        doc.line(14, 38, 196, 38);

        // 2. Título del Reporte
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text("REPORTE ESTADÍSTICO MENSUAL", 14, 48);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`Mes: ${new Date().toLocaleString('default', { month: 'long' })}`, 14, 54);

        // 3. Tabla de Datos (AQUÍ DEBES RECUPERAR DATOS DE FIREBASE)
        // Por ahora, pondremos datos de ejemplo para visualizar el reporte.
        const cabecera = [['Especialidad', 'Grados', 'Alumnos Totales', 'Tiempo Real', 'Efectividad Real']];
        const cuerpo = [
            ['Inglés', '1º a 6º', '450', '900 min', '95%'],
            ['Deporte I', '1º a 3º', '210', '720 min', '98%'],
            ['Deporte II', '4º a 6º', '230', '720 min', '89% (Parcial)']
        ];

        doc.autoTable({
            startY: 60,
            head: cabecera,
            body: cuerpo,
            theme: 'striped',
            headStyles: { fillColor: [52, 152, 219] }, // Azul Lucila Palacios
            styles: { cellPadding: 3, fontSize: 9 }
        });

        // 4. Pie de página y Disgregación por Género (Concepto)
        doc.setFontSize(11);
        doc.setFont("helvetica", "bold");
        const finalY = doc.lastAutoTable.finalY || 60;
        doc.text("Resumen Disgregado por Género (Efectividad Real)", 14, finalY + 15);
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.text("Femenino: 96.5% de Efectividad Real", 14, finalY + 22);
        doc.text("Masculino: 91.2% de Efectividad Real", 14, finalY + 27);

        doc.save("Reporte_Mensual_Lucila_Palacios.pdf");
    }
</script>

</body>
</html>
