<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGA Móvil - Lucila Palacios</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { 
            --blue-lp: #003399; 
            --gold-lp: #ffcc00; 
            --bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        /* Contenedor adaptado a pantallas pequeñas */
        .mobile-card { 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            overflow: hidden;
            border-top: 10px solid var(--blue-lp);
        }

        .header { 
            text-align: center; 
            padding: 20px 15px; 
            background: #fff;
        }

        .logo { width: 80px; height: auto; margin-bottom: 10px; }

        h1 { font-size: 1.4rem; margin: 0; color: var(--blue-lp); }
        p { font-size: 0.9rem; color: #666; margin: 5px 0 0; }

        .content { padding: 20px; }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #333;
            font-size: 1rem;
        }

        /* Inputs grandes para dedos (fácil de tocar) */
        select, input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            font-size: 16px; /* Evita que el iPhone haga zoom automático */
            background-color: #fff;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: var(--blue-lp);
            outline: none;
        }

        /* Botones táctiles potentes */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: transform 0.1s, opacity 0.3s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-save { background-color: var(--blue-lp); color: white; }
        .btn-pdf { background-color: #333; color: white; }

        .footer-info {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            margin-top: 10px;
            padding-bottom: 20px;
        }

        /* Estilo para el campo de matrícula variable */
        .variable-badge {
            background: #fff3cd;
            color: #856404;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-top: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="mobile-card">
    <div class="header">
        <img src="421692.png" alt="Logo LP" class="logo">
        <h1>E.B.N. Lucila Palacios</h1>
        <p>Control de Especialistas</p>
    </div>

    <div class="content">
        <div class="form-group">
            <label>Especialista</label>
            <select id="esp">
                <option value="Ingles">Inglés (15 M / 10 T)</option>
                <option value="Cultura">Cultura (Todos)</option>
                <option value="RPA">RPA (Grupos)</option>
                <option value="Deporte I">Deporte I (1-3)</option>
                <option value="Deporte II">Deporte II (4-6)</option>
                <option value="Aula">Aula Integrada</option>
            </select>
        </div>

        <div class="form-group">
            <label>Turno</label>
            <select id="turno">
                <option value="Mañana">Mañana</option>
                <option value="Tarde">Tarde</option>
            </select>
        </div>

        <div class="form-group">
            <label>Grado / Sección</label>
            <input type="text" id="grado_sec" placeholder="Ej: 5to C">
        </div>

        <div class="form-group">
            <label>Matrícula Real (Hoy)</label>
            <input type="number" id="mat" placeholder="¿Cuántos asistieron?">
            <div class="variable-badge">Matrícula dinámica (2-6 grado)</div>
        </div>

        <div class="form-group">
            <label>Tiempo</label>
            <select id="min">
                <option value="45">45 Minutos</option>
                <option value="90">90 Minutos</option>
                <option value="0">Inasistencia</option>
            </select>
        </div>

        <button class="btn btn-save" onclick="guardar()">GUARDAR REGISTRO</button>
        <button class="btn btn-pdf" onclick="descargarPDF()">PDF REPORTE</button>
    </div>
    
    <div class="footer-info">
        E.B.N. Lucila Palacios • San Félix • 1972
    </div>
</div>

<script>
    // Configuración de Firebase
    const firebaseConfig = { apiKey: "TU_API_KEY", projectId: "TU_PROYECTO", appId: "TU_APP_ID" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function guardar() {
        const mat = parseInt(document.getElementById('mat').value);
        if (!mat) { alert("Ingresa la asistencia real"); return; }

        const data = {
            esp: document.getElementById('esp').value,
            turno: document.getElementById('turno').value,
            clase: document.getElementById('grado_sec').value,
            asistencia: mat,
            tiempo: parseInt(document.getElementById('min').value),
            fecha: new Date().toLocaleDateString(),
            impacto: mat * parseInt(document.getElementById('min').value)
        };

        try {
            await db.collection("asistencias_lp").add(data);
            alert("¡Guardado correctamente!");
            document.getElementById('mat').value = "";
        } catch(e) { alert("Error al guardar"); }
    }

    function descargarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("Reporte Lucila Palacios", 105, 20, {align: "center"});
        doc.autoTable({
            startY: 30,
            head: [['Docente', 'Turno', 'Alumnos', 'Impacto']],
            body: [[document.getElementById('esp').value, document.getElementById('turno').value, 'Variable', 'Real']],
            headStyles: { fillColor: [0, 51, 153] }
        });
        doc.save("Asistencia_LP_Movil.pdf");
    }
</script>

</body>
</html>
