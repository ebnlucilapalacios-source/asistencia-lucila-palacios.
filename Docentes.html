<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBN LUCILA PALACIOS - Control Estadístico</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);
        const CLAVE_ESPECIAL = "LUCILA2026"; 
        const USUARIO_ADMIN = "admin_lucila";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", grado: "", alumnos: [], asistencias: {}, feriados: [] };

        // --- ACCESO Y REGISTRO ---
        window.mostrarRegistro = (v) => { 
            document.getElementById('loginForm').style.display = v ? 'none' : 'block';
            document.getElementById('registerForm').style.display = v ? 'block' : 'none';
        };

        window.registrarCuenta = async () => {
            const cEspecial = document.getElementById('regClaveEspecial').value;
            if(cEspecial !== CLAVE_ESPECIAL) return alert("Clave Institucional Incorrecta");
            const u = document.getElementById('regUser').value.toLowerCase().trim();
            const p = document.getElementById('regPass').value;
            if(!u || !p) return alert("Faltan datos");
            await setDoc(doc(dbCloud, "docentes_db", u), { 
                docente: document.getElementById('regNombre').value.toUpperCase(), 
                pass: p, grado: document.getElementById('regGrado').value, 
                seccion: document.getElementById('regSeccion').value.toUpperCase(), 
                alumnos: [], asistencias: {}, feriados: [] 
            });
            alert("Registrado."); window.mostrarRegistro(false);
        };

        window.login = async () => {
            const u = document.getElementById('loginUser').value.toLowerCase().trim();
            const p = document.getElementById('loginPass').value;
            const snap = await getDoc(doc(dbCloud, "docentes_db", u));
            if (snap.exists() && snap.data().pass === p) {
                window.usuarioActual = u;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (u === USUARIO_ADMIN) document.getElementById('adminPanel').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", u), (s) => { window.db = s.data(); window.render(); });
            } else alert("Error de acceso");
        };

        // --- CONSOLIDADO ESTADÍSTICO (DIRECCIÓN) ---
        window.consolidadoMensual = async () => {
            const fSel = document.getElementById('fechaSeleccionada').value;
            const mesRef = new Date(fSel + "T00:00:00").getMonth();
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            
            let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                            <b style="color:var(--morado)">CONSOLIDADO ESTADÍSTICO MENSUAL</b>
                            <button onclick="generarPDF()" class="btn-pdf">PDF</button>
                        </div>
                        <table class="tabla-admin" id="tablaConsolidado">
                        <thead>
                            <tr>
                                <th rowspan="2">GRADO/SEC</th>
                                <th colspan="3">MATRÍCULA</th>
                                <th colspan="3">PROM. ASISTENCIA</th>
                                <th rowspan="2">% EFIC.</th>
                            </tr>
                            <tr>
                                <th>H</th><th>V</th><th>T</th>
                                <th>H</th><th>V</th><th>T</th>
                            </tr>
                        </thead><tbody>`;

            let TotalesEscuela = { mH:0, mV:0, mT:0, pH:0, pV:0, pT:0, secciones:0 };

            snap.forEach(docSnap => {
                const d = docSnap.data(); if(docSnap.id === USUARIO_ADMIN || !d.alumnos) return;
                const activos = d.alumnos.filter(a => !a.retirado);
                const mH = activos.filter(a => a.genero === 'F').length;
                const mV = activos.filter(a => a.genero === 'M').length;
                const mT = activos.length;

                let sumH=0, sumV=0, dias=0;
                Object.keys(d.asistencias).forEach(f => {
                    const fo = new Date(f + "T00:00:00");
                    if(fo.getMonth() === mesRef && fo.getDay()!==0 && fo.getDay()!==6 && !d.feriados?.includes(f)) {
                        dias++; 
                        activos.forEach(a => { 
                            if(d.asistencias[f][a.id] === 1) a.genero === 'F' ? sumH++ : sumV++; 
                        });
                    }
                });

                const promH = dias > 0 ? (sumH / dias) : 0;
                const promV = dias > 0 ? (sumV / dias) : 0;
                const promT = promH + promV;
                const efec = mT > 0 ? (promT / mT * 100).toFixed(1) : 0;

                TotalesEscuela.mH += mH; TotalesEscuela.mV += mV; TotalesEscuela.mT += mT;
                TotalesEscuela.pH += promH; TotalesEscuela.pV += promV; TotalesEscuela.pT += promT;
                TotalesEscuela.secciones++;

                html += `<tr>
                    <td>${d.grado}${d.seccion}</td>
                    <td>${mH}</td><td>${mV}</td><td>${mT}</td>
                    <td>${promH.toFixed(1)}</td><td>${promV.toFixed(1)}</td><td>${promT.toFixed(1)}</td>
                    <td>${efec}%</td>
                </tr>`;
            });

            const efecGlobal = TotalesEscuela.mT > 0 ? (TotalesEscuela.pT / TotalesEscuela.mT * 100).toFixed(1) : 0;

            html += `<tr style="background:#eee; font-weight:bold;">
                <td>TOTAL ESCUELA</td>
                <td>${TotalesEscuela.mH}</td><td>${TotalesEscuela.mV}</td><td>${TotalesEscuela.mT}</td>
                <td>${TotalesEscuela.pH.toFixed(1)}</td><td>${TotalesEscuela.pV.toFixed(1)}</td><td>${TotalesEscuela.pT.toFixed(1)}</td>
                <td>${efecGlobal}%</td>
            </tr></tbody></table>`;
            
            document.getElementById('adminOutput').innerHTML = html;
        };

        window.generarPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); // Paisaje para que quepa la tabla
            doc.setFontSize(14);
            doc.text("EBN LUCILA PALACIOS - CONSOLIDADO MENSUAL", 14, 15);
            doc.autoTable({ html: '#tablaConsolidado', startY: 25, theme: 'grid', styles: { fontSize: 8 } });
            doc.save("Consolidado_Estadistico.pdf");
        };

        // --- LÓGICA DE ASISTENCIA Y RENDER (Docente) ---
        window.render = () => {
            const fSel = document.getElementById('fechaSeleccionada').value;
            const fObj = new Date(fSel + "T00:00:00");
            const esFeriado = window.db.feriados?.includes(fSel);
            const esFinde = (fObj.getDay() === 0 || fObj.getDay() === 6);
            
            document.getElementById('docenteTxt').innerText = window.db.docente || "";
            document.getElementById('gradoSeccionTxt').innerText = `${window.db.grado || ""} ${window.db.seccion || ""}`;

            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";
            const activos = window.db.alumnos.filter(a => !a.retirado);

            if (esFeriado || esFinde) {
                lista.innerHTML = `<div style="text-align:center; padding:20px; color:var(--rojo); font-weight:bold;">⚠️ DÍA NO LABORABLE</div>`;
            } else {
                activos.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[fSel] && window.db.asistencias[fSel][a.id]) || 0;
                    let c = "#ccc", t = "F"; if(est===1){c="var(--exito)"; t="P";} if(est===2){c="var(--morado)"; t="J";}
                    lista.innerHTML += `<div class="alumno-fila"><div class="bola-gen ${a.genero}"></div><div style="flex-grow:1">${a.nombre}</div><button onclick="marcar(${a.id})" class="btn-check" style="background:${c}">${t}</button><button onclick="retirarAlumno(${a.id})" class="btn-x">✖</button></div>`;
                });
            }
            // (Aquí va el código del reporte individual que ya teníamos...)
        };

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f]={};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id]+1)%3 || 1;
            setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), window.db);
        };

        window.logout = () => location.reload();
    </script>

    <style>
        :root { --azul: #002147; --exito: #28a745; --morado: #6f42c1; --rojo: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
        header { background: var(--azul); color: white; padding: 12px; display: flex; justify-content: space-between; border-bottom: 4px solid #f39c12; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-pdf { background: var(--rojo); color: white; border: none; padding: 5px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .tabla-admin { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; text-align: center; }
        .tabla-admin th, .tabla-admin td { border: 1px solid #ddd; padding: 5px; }
        .tabla-admin th { background: #f8f9fa; color: var(--azul); }
        .alumno-fila { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .bola-gen { width: 10px; height: 10px; border-radius: 50%; }
        .bola-gen.F { background: #ff85a2; } .bola-gen.M { background: #3498db; }
        .btn-check { width: 38px; height: 34px; border: none; color: white; border-radius: 4px; }
        input, select { width: 100%; padding: 10px; margin: 4px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="authSection" style="text-align:center; padding: 50px 20px;">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" width="80">
    <h2 style="color:var(--azul)">SISTEMA LUCILA PALACIOS</h2>
    
    <div id="loginForm" class="card" style="max-width:320px; margin:auto">
        <input type="text" id="loginUser" placeholder="Usuario">
        <input type="password" id="loginPass" placeholder="Clave">
        <button onclick="login()" style="background:var(--azul); color:white; padding:12px; width:100%; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">ENTRAR</button>
        <p onclick="mostrarRegistro(true)" style="font-size:12px; color:var(--morado); cursor:pointer; margin-top:10px;">Registrar nueva cuenta docente</p>
    </div>

    <div id="registerForm" class="card" style="max-width:320px; margin:auto; display:none;">
        <h4>Nuevo Docente</h4>
        <input type="text" id="regNombre" placeholder="Nombre y Apellido">
        <div style="display:flex; gap:5px;">
            <input type="text" id="regGrado" placeholder="Grado" style="width:50%"><input type="text" id="regSeccion" placeholder="Sec" style="width:50%">
        </div>
        <input type="text" id="regUser" placeholder="Usuario nuevo">
        <input type="password" id="regPass" placeholder="Contraseña">
        <input type="password" id="regClaveEspecial" placeholder="Clave Institucional">
        <button onclick="registrarCuenta()" style="background:var(--exito); color:white; padding:12px; width:100%; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">REGISTRAR</button>
        <p onclick="mostrarRegistro(false)" style="font-size:11px; cursor:pointer; margin-top:10px;">Volver al inicio</p>
    </div>
</div>

<div id="appContent" style="display:none;">
    <header>
        <b>EBN LUCILA PALACIOS</b>
        <button onclick="logout()" style="background:var(--rojo); color:white; border:none; padding:5px 10px; border-radius:4px; font-size:11px; cursor:pointer;">SALIR</button>
    </header>

    <div class="container">
        <div id="adminPanel" class="card" style="display:none; border:2px solid var(--morado);">
            <button onclick="consolidadoMensual()" style="background:var(--morado); color:white; padding:12px; border:none; width:100%; border-radius:6px; font-weight:bold; cursor:pointer;">VER CONSOLIDADO MENSUAL</button>
            <div id="adminOutput"></div>
        </div>

        <div class="card">
            <b>Docente:</b> <span id="docenteTxt"></span> | <span id="gradoSeccionTxt"></span>
            <input type="date" id="fechaSeleccionada" value="2026-03-05" onchange="window.render()" style="margin-top:10px;">
        </div>

        <div class="card">
            <div id="listaAsistencia"></div>
        </div>
        <div id="reporteDocente"></div>
    </div>
</div>

</body>
</html>
