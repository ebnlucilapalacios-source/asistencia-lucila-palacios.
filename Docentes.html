<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBN LUCILA PALACIOS - Control Total</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);
        const USUARIO_ADMIN = "admin_lucila";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", grado: "", alumnos: [], asistencias: {}, feriados: [] };

        const calcularEdad = (f) => {
            if(!f) return 0;
            const hoy = new Date();
            const cumple = new Date(f);
            let edad = hoy.getFullYear() - cumple.getFullYear();
            if (hoy.getMonth() < cumple.getMonth() || (hoy.getMonth() === cumple.getMonth() && hoy.getDate() < cumple.getDate())) edad--;
            return edad;
        };

        // --- ACCESO ---
        window.login = async () => {
            const u = document.getElementById('loginUser').value.toLowerCase().trim();
            const p = document.getElementById('loginPass').value;
            const snap = await getDoc(doc(dbCloud, "docentes_db", u));
            if (snap.exists() && snap.data().pass === p) {
                window.usuarioActual = u;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (u === USUARIO_ADMIN) document.getElementById('adminPanel').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", u), (s) => { window.db = s.data(); window.render(); });
            } else alert("Datos incorrectos");
        };

        // --- LÓGICA DE ALUMNOS (INGRESOS/EGRESOS) ---
        window.agregarAlumno = async () => {
            const n = document.getElementById('nom').value.toUpperCase();
            const nac = document.getElementById('nac').value;
            const fechaHoy = document.getElementById('fechaSeleccionada').value;
            if(!n || !nac) return alert("Faltan datos");
            
            const nuevo = {
                id: Date.now(),
                nombre: n,
                genero: document.getElementById('gen').value,
                nacimiento: nac,
                retirado: false,
                fechaIngreso: fechaHoy, // Registro de Ingreso
                fechaEgreso: null
            };
            window.db.alumnos.push(nuevo);
            await window.save();
            document.getElementById('nom').value = "";
        };

        window.retirarAlumno = async (id) => {
            if(confirm("¿Confirmar retiro del alumno?")){
                const a = window.db.alumnos.find(x => x.id === id);
                if(a) {
                    a.retirado = true;
                    a.fechaEgreso = document.getElementById('fechaSeleccionada').value; // Registro de Egreso
                    await window.save();
                }
            }
        };

        // --- RENDERIZADO Y REPORTE ---
        window.render = () => {
            const fSel = document.getElementById('fechaSeleccionada').value;
            const fObj = new Date(fSel + "T00:00:00");
            const mesAct = fObj.getMonth();
            const anioAct = fObj.getFullYear();
            
            document.getElementById('docenteTxt').innerText = window.db.docente || "No asignado";
            document.getElementById('gradoSeccionTxt').innerText = `${window.db.grado || ""} ${window.db.seccion || ""}`;

            // Lista de asistencia (solo alumnos activos)
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";
            const activos = window.db.alumnos.filter(a => !a.retirado);

            activos.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(a => {
                const est = (window.db.asistencias[fSel] && window.db.asistencias[fSel][a.id]) || 0;
                let c = "#ccc", t = "F"; 
                if(est===1){c="var(--exito)"; t="P";} 
                if(est===2){c="var(--morado)"; t="J";}
                
                lista.innerHTML += `
                <div class="alumno-fila">
                    <div class="bola-gen ${a.genero}"></div>
                    <div style="flex-grow:1">${a.nombre}</div>
                    <button onclick="marcar(${a.id})" class="btn-check" style="background:${c}">${t}</button>
                    <button onclick="retirarAlumno(${a.id})" class="btn-x">✖</button>
                </div>`;
            });

            // ESTADÍSTICAS REPORTE (Fiel a la imagen)
            let sH=0, sV=0, diasH=0, edades={};
            activos.forEach(al => {
                const e = calcularEdad(al.nacimiento);
                if(!edades[e]) edades[e]={F:0, M:0}; edades[e][al.genero]++;
            });

            Object.keys(window.db.asistencias).forEach(fecha => {
                const d = new Date(fecha + "T00:00:00");
                if(d.getMonth() === mesAct && d.getFullYear() === anioAct && d.getDay()!==0 && d.getDay()!==6 && !window.db.feriados?.includes(fecha)) {
                    diasH++;
                    activos.forEach(a => { if(window.db.asistencias[fecha][a.id]===1) a.genero==='F'?sH++:sV++; });
                }
            });

            const pH = diasH>0 ? (sH/diasH) : 0; 
            const pV = diasH>0 ? (sV/diasH) : 0;
            const efic = activos.length>0 ? (((pH+pV)/activos.length)*100).toFixed(0) : 0;

            const ingMes = window.db.alumnos.filter(a => a.fechaIngreso && new Date(a.fechaIngreso+"T00:00:00").getMonth() === mesAct);
            const egrMes = window.db.alumnos.filter(a => a.retirado && a.fechaEgreso && new Date(a.fechaEgreso+"T00:00:00").getMonth() === mesAct);

            let tEd = ""; 
            Object.keys(edades).sort((a,b)=>a-b).forEach(e => { 
                tEd += `<tr><td>${e}a</td><td>${edades[e].F}</td><td>${edades[e].M}</td><td>${edades[e].F+edades[e].M}</td></tr>`; 
            });

            document.getElementById('reporteDocente').innerHTML = `
                <div class="reporte-card">
                    <h2>ESTADÍSTICA MENSUAL</h2>
                    <div class="circulo-eficiencia"><b>${efic}%</b><br><small>Efic.</small></div>
                    <div class="grid-promedios">
                        <div>H: <b>${pH.toFixed(1)}</b></div>
                        <div>V: <b>${pV.toFixed(1)}</b></div>
                        <div>TOTAL: <b>${(pH+pV).toFixed(1)}</b></div>
                    </div>
                    <table class="tabla-911">
                        <thead><tr><th>Edad</th><th>H</th><th>V</th><th>T</th></tr></thead>
                        <tbody>${tEd}</tbody>
                        <tfoot style="background:#eee"><tr><td>TOTAL</td><td>${activos.filter(a=>a.genero==='F').length}</td><td>${activos.filter(a=>a.genero==='M').length}</td><td>${activos.length}</td></tr></tfoot>
                    </table>
                    <div class="movimientos-reporte">
                        <b>INGRESOS:</b> ${ingMes.map(a=>a.nombre).join(', ') || 'Sin movimientos'}<br>
                        <b>EGRESOS:</b> ${egrMes.map(a=>a.nombre).join(', ') || 'Sin movimientos'}
                    </div>
                    <button onclick="window.print()" class="btn-print no-print">IMPRIMIR REPORTE</button>
                </div>`;
        };

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f]={};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id]+1)%3 || 1;
            window.save();
        };

        window.save = async () => { await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), window.db); };
    </script>

    <style>
        :root { --azul: #002147; --exito: #28a745; --morado: #6f42c1; --rojo: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
        header { background: var(--azul); color: white; padding: 15px; text-align: center; border-bottom: 4px solid #f39c12; }
        .container { max-width: 450px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Reporte Estilo Imagen */
        .reporte-card { background: white; padding: 20px; border: 1px solid #ccc; text-align: center; border-radius: 10px; }
        .circulo-eficiencia { width: 85px; height: 85px; border: 6px solid var(--azul); border-radius: 50%; margin: 15px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; }
        .grid-promedios { display: flex; justify-content: space-around; background: #f8f9fa; padding: 10px; margin: 15px 0; border-radius: 5px; font-size: 13px; }
        .tabla-911 { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tabla-911 th, .tabla-911 td { border: 1px solid #ddd; padding: 6px; }
        .movimientos-reporte { text-align: left; font-size: 11px; margin-top: 15px; border-top: 1px dashed #aaa; padding-top: 10px; color: #555; }
        
        /* Interfaz */
        .alumno-fila { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .bola-gen { width: 10px; height: 10px; border-radius: 50%; }
        .bola-gen.F { background: #ff85a2; } .bola-gen.M { background: #3498db; }
        .btn-check { width: 40px; height: 35px; border: none; color: white; font-weight: bold; border-radius: 5px; }
        .btn-x { background: none; border: none; color: var(--rojo); cursor: pointer; font-size: 16px; }
        .btn-print { background: var(--azul); color: white; width: 100%; padding: 12px; border: none; font-weight: bold; margin-top: 15px; border-radius: 5px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="authSection" style="text-align:center; padding: 50px 20px;">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" width="100">
    <h2 style="color:var(--azul)">LUCILA PALACIOS</h2>
    <div class="card" style="max-width:300px; margin:auto">
        <input type="text" id="loginUser" placeholder="Usuario">
        <input type="password" id="loginPass" placeholder="Clave">
        <button onclick="login()" style="background:var(--azul); color:white; padding:12px; width:100%; border:none; border-radius:5px; font-weight:bold;">ENTRAR</button>
    </div>
</div>

<div id="appContent" style="display:none;">
    <header class="no-print">
        <b>EBN LUCILA PALACIOS</b>
    </header>

    <div class="container">
        <div class="card no-print">
            <b>Docente:</b> <span id="docenteTxt"></span><br>
            <b>Grado/Sección:</b> <span id="gradoSeccionTxt"></span>
        </div>

        <div class="card no-print">
            <input type="date" id="fechaSeleccionada" value="2026-03-05" onchange="window.render()">
        </div>

        <div class="card no-print">
            <h4 style="margin:0 0 10px 0">+ Nuevo Ingreso</h4>
            <input type="text" id="nom" placeholder="Nombres Completos">
            <div style="display:flex; gap:5px;">
                <select id="gen" style="width:40%"><option value="F">Hembra</option><option value="M">Varón</option></select>
                <input type="date" id="nac" style="width:60%">
            </div>
            <button onclick="agregarAlumno()" style="background:var(--exito); color:white; border:none; padding:10px; width:100%; border-radius:5px; font-weight:bold; margin-top:5px;">REGISTRAR INGRESO</button>
        </div>

        <div class="card">
            <div id="listaAsistencia"></div>
        </div>

        <div id="reporteDocente"></div>
    </div>
</div>

</body>
</html>
