<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control Estadístico - Lucila Palacios</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        // CONFIGURACIÓN
        const CODIGO_ESCUELA = "LUCILA2026";
        const USUARIO_ADMIN = "admin_lucila";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", alumnos: [], asistencias: {}, feriados: [] };

        // --- AUTENTICACIÓN ---
        window.mostrarRegistro = (esReg) => {
            document.getElementById('authTitle').innerText = esReg ? "Registro Nuevo Docente" : "Acceso Docente";
            document.getElementById('regExtra').style.display = esReg ? "block" : "none";
            document.getElementById('btnEntrar').style.display = esReg ? "none" : "block";
            document.getElementById('btnRegistrar').style.display = esReg ? "block" : "none";
            document.getElementById('toggleText').innerText = esReg ? "Volver al Inicio" : "¿No tienes cuenta? Regístrate";
        };

        window.crearCuenta = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const nom = document.getElementById('regNombreCompleto').value;
            if (document.getElementById('escuelaCode').value !== CODIGO_ESCUELA) return alert("Código incorrecto");

            const docRef = doc(dbCloud, "docentes_db", user);
            await setDoc(docRef, { docente: nom, pass: pass, seccion: "", alumnos: [], asistencias: {}, feriados: [] });
            alert("Cuenta creada con éxito.");
            location.reload();
        };

        window.login = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const docSnap = await getDoc(doc(dbCloud, "docentes_db", user));

            if (docSnap.exists() && docSnap.data().pass === pass) {
                window.usuarioActual = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (user === USUARIO_ADMIN) document.getElementById('adminPanelBtn').style.display = 'block';
                
                onSnapshot(doc(dbCloud, "docentes_db", user), (s) => {
                    window.db = s.data();
                    window.render();
                });
            } else { alert("Usuario o Clave incorrecta"); }
        };

        // --- PANEL DE ADMINISTRADOR (DESGLOSE POR GRADO) ---
        window.generarReporteGlobal = async () => {
            const resDiv = document.getElementById('resultadosGlobales');
            resDiv.style.display = 'block';
            resDiv.innerHTML = "⌛ Analizando matrícula escolar...";
            
            let tH=0, tV=0, tP=0;
            const hoy = new Date().toISOString().split('T')[0];
            let htmlTabla = `<table style="width:100%; font-size:11px;">
                <tr style="background:#eee;"><th>Grado/Sec</th><th>H</th><th>V</th><th>Total</th><th>Pres.</th><th>%</th></tr>`;

            const querySnapshot = await getDocs(collection(dbCloud, "docentes_db"));
            querySnapshot.forEach(doc => {
                const d = doc.data();
                if (doc.id === USUARIO_ADMIN || !d.alumnos) return;

                const h = d.alumnos.filter(a => a.genero === 'F').length;
                const v = d.alumnos.filter(a => a.genero === 'M').length;
                const total = h + v;
                let pres = 0;
                if (d.asistencias && d.asistencias[hoy]) {
                    pres = Object.values(d.asistencias[hoy]).filter(s => s === 1).length;
                }

                tH += h; tV += v; tP += pres;
                const porc = total > 0 ? ((pres / total) * 100).toFixed(0) : 0;

                htmlTabla += `<tr>
                    <td style="text-align:left;">${d.seccion || doc.id}</td>
                    <td>${h}</td><td>${v}</td><td><b>${total}</b></td>
                    <td>${pres}</td><td style="color:${porc < 75 ? 'red' : 'green'}">${porc}%</td>
                </tr>`;
            });

            const totalEscuela = tH + tV;
            const porcGlobal = totalEscuela > 0 ? ((tP / totalEscuela) * 100).toFixed(1) : 0;

            resDiv.innerHTML = `
                <div style="background:var(--azul); color:white; padding:10px; border-radius:5px; margin-bottom:10px;">
                    <b>Matrícula:</b> ${totalEscuela} (H:${tH} V:${tV}) | <b>Asistencia:</b> ${porcGlobal}%
                </div>
                ${htmlTabla}</table>
                <button onclick="window.print()" style="margin-top:10px; font-size:10px;">Imprimir Consolidado</button>`;
        };

        // --- LÓGICA DOCENTE ---
        window.render = () => {
            const fecha = document.getElementById('fechaSeleccionada').value || new Date().toISOString().split('T')[0];
            document.getElementById('displayFecha').innerText = fecha;
            document.getElementById('docente').value = window.db.docente || "";
            document.getElementById('seccion').value = window.db.seccion || "";

            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";

            if(!window.db.feriados.includes(fecha)) {
                window.db.alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[fecha] && window.db.asistencias[fecha][a.id]) || 0;
                    let c = "#ccc", t = "F";
                    if(est === 1) { c = "var(--exito)"; t = "P"; }
                    if(est === 2) { c = "var(--morado)"; t = "J"; }

                    lista.innerHTML += `<div class="student-item">
                        <img src="${a.foto || 'https://via.placeholder.com/40'}" style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                        <div style="flex-grow:1"><b>${a.nombre}</b> <br> <small style="color:red; cursor:pointer;" onclick="eliminarAlumno(${a.id})">Eliminar</small></div>
                        <button onclick="marcar(${a.id})" style="width:40px; background:${c}; color:white; border:none; border-radius:5px; font-weight:bold;">${t}</button>
                    </div>`;
                });
            } else { lista.innerHTML = "<p style='color:red; text-align:center;'>DÍA FERIADO</p>"; }
            actualizarTablasInternas();
        };

        window.agregarAlumno = () => {
            const nom = document.getElementById('newNombre').value.toUpperCase();
            const nac = document.getElementById('newNac').value;
            const gen = document.getElementById('newGen').value;
            const file = document.getElementById('newFoto').files[0];
            if(!nom || !nac) return alert("Llenar datos");

            const save = (f="") => {
                window.db.alumnos.push({ id: Date.now(), nombre: nom, genero: gen, nacimiento: nac, foto: f });
                window.saveToCloud(window.db);
                document.getElementById('newNombre').value = "";
            };

            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 150; canvas.height = 150;
                        canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                        save(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else { save(); }
        };

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f] = {};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id] + 1) % 3 || 1;
            window.saveToCloud(window.db);
        };

        window.eliminarAlumno = (id) => {
            if(confirm("¿Retirar alumno?")) {
                window.db.alumnos = window.db.alumnos.filter(a => a.id !== id);
                window.saveToCloud(window.db);
            }
        };

        window.saveToCloud = async (data) => {
            await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), data);
        };

        window.actualizarPerfil = () => {
            window.db.docente = document.getElementById('docente').value;
            window.db.seccion = document.getElementById('seccion').value;
            window.saveToCloud(window.db);
        };

        function actualizarTablasInternas() {
            let h=0, v=0;
            window.db.alumnos.forEach(a => { a.genero === 'F' ? h++ : v++; });
            document.getElementById('resumenSeccion').innerHTML = `Matrícula: ${window.db.alumnos.length} (H: ${h} V: ${v})`;
        }

        window.logout = () => location.reload();
        window.toggleFeriado = () => {
            const f = document.getElementById('fechaSeleccionada').value;
            const idx = window.db.feriados.indexOf(f);
            idx === -1 ? window.db.feriados.push(f) : window.db.feriados.splice(idx, 1);
            window.saveToCloud(window.db);
        };

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('fechaSeleccionada').value = new Date().toISOString().split('T')[0];
        });
    </script>

    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --naranja: #f39c12; --gris: #f4f7f6; --exito: #27ae60; --oro: #f1c40f; --morado: #8e44ad; --rojo: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); }
        header { background: linear-gradient(135deg, var(--azul), var(--celeste)); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--naranja); }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid var(--azul); }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--exito); color: white; font-weight: bold; border: none; cursor: pointer; }
        .student-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { border: 1px solid #eee; padding: 5px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="authSection" style="max-width: 350px; margin: 60px auto; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;">
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios./main/IMG_20260225_005025_993.png" style="width: 70px;">
    <h2 id="authTitle">Acceso Docente</h2>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Contraseña">
    <div id="regExtra" style="display:none;">
        <input type="text" id="regNombreCompleto" placeholder="Nombre y Apellido">
        <input type="password" id="escuelaCode" placeholder="Código de la Escuela">
    </div>
    <button onclick="login()" id="btnEntrar" class="btn-main">Entrar</button>
    <button onclick="crearCuenta()" id="btnRegistrar" class="btn-main" style="display:none; background: var(--morado);">Registrar</button>
    <p id="toggleText" style="cursor:pointer; color: var(--azul); font-size: 13px;" onclick="mostrarRegistro(true)">¿No tienes cuenta? Regístrate</p>
</div>

<div id="appContent" style="display: none;">
    <header>
        <button onclick="logout()" class="no-print" style="width:auto; float:right; background:var(--rojo); color:white; font-size:10px;">Salir</button>
        <h2 style="margin:0;">E.B.N. LUCILA PALACIOS</h2>
    </header>

    <div class="container">
        <div id="adminPanelBtn" class="card" style="display:none; background: #f9f9f9; border-color: var(--oro);">
            <h3 style="margin:0;">📊 Panel de Dirección</h3>
            <button onclick="generarReporteGlobal()" style="background: var(--azul); color:white;">Generar Estadística Global</button>
            <div id="resultadosGlobales" style="margin-top:10px;"></div>
        </div>

        <div class="card no-print">
            <input type="text" id="docente" onchange="actualizarPerfil()" placeholder="Docente">
            <input type="text" id="seccion" onchange="actualizarPerfil()" placeholder="Ej: 1er Grado Sección A">
            <div id="resumenSeccion" style="font-weight: bold; color: var(--celeste); margin-top:5px;"></div>
        </div>

        <div class="card no-print">
            <h4>➕ Nuevo Alumno</h4>
            <input type="text" id="newNombre" placeholder="Apellidos y Nombres">
            <div style="display:flex; gap:5px;">
                <select id="newGen"><option value="F">H</option><option value="M">V</option></select>
                <input type="date" id="newNac">
            </div>
            <input type="file" id="newFoto" accept="image/*">
            <button onclick="agregarAlumno()" class="btn-main">Registrar en Matrícula</button>
        </div>

        <div class="card">
            <h3>📅 Pase de Lista</h3>
            <input type="date" id="fechaSeleccionada" onchange="window.render()">
            <button onclick="toggleFeriado()" class="no-print" style="background:var(--rojo); color:white; font-size:12px;">🚩 Marcar como Feriado</button>
            <p style="font-size: 13px;">Fecha: <b id="displayFecha"></b></p>
            <div id="listaAsistencia"></div>
        </div>
    </div>
</div>

</body>
</html>
