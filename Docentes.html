<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadística Lucila Palacios</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
            authDomain: "control-de-asistencia-d585e.firebaseapp.com",
            projectId: "control-de-asistencia-d585e",
            storageBucket: "control-de-asistencia-d585e.firebasestorage.app",
            appId: "1:368890880546:web:a97ab4372dea536217207b"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);

        const CODIGO_ESCUELA = "LUCILA2026";
        const USUARIO_ADMIN = "admin_lucila";

        window.usuarioActual = null;
        window.db = { docente: "", seccion: "", alumnos: [], asistencias: {}, feriados: [] };

        window.mostrarRegistro = (esReg) => {
            document.getElementById('authTitle').innerText = esReg ? "Registro Nuevo Docente" : "Acceso Docente";
            document.getElementById('regExtra').style.display = esReg ? "block" : "none";
            document.getElementById('btnEntrar').style.display = esReg ? "none" : "block";
            document.getElementById('btnRegistrar').style.display = esReg ? "block" : "none";
            document.getElementById('toggleText').innerText = esReg ? "Volver" : "¿No tienes cuenta? Regístrate";
        };

        window.crearCuenta = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const nom = document.getElementById('regNombreCompleto').value;
            if (document.getElementById('escuelaCode').value !== CODIGO_ESCUELA) return alert("Código incorrecto");
            await setDoc(doc(dbCloud, "docentes_db", user), { docente: nom, pass: pass, seccion: "", alumnos: [], asistencias: {}, feriados: [] });
            alert("Cuenta creada."); location.reload();
        };

        window.login = async () => {
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;
            const docSnap = await getDoc(doc(dbCloud, "docentes_db", user));
            if (docSnap.exists() && docSnap.data().pass === pass) {
                window.usuarioActual = user;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                if (user === USUARIO_ADMIN) document.getElementById('adminPanelBtn').style.display = 'block';
                onSnapshot(doc(dbCloud, "docentes_db", user), (s) => { window.db = s.data(); window.render(); });
            } else { alert("Datos incorrectos"); }
        };

        // --- PANEL ADMIN ---
        window.generarReporteGlobal = async () => {
            const resDiv = document.getElementById('resultadosGlobales');
            resDiv.innerHTML = "⌛ Cargando...";
            let tH=0, tV=0, tP=0;
            const hoy = new Date().toISOString().split('T')[0];
            let html = `<table><tr style="background:#eee"><th>Sección</th><th>H</th><th>V</th><th>Tot</th><th>P</th><th>%</th></tr>`;
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            snap.forEach(doc => {
                const d = doc.data();
                if (doc.id === USUARIO_ADMIN || !d.alumnos) return;
                const h = d.alumnos.filter(a => a.genero === 'F').length;
                const v = d.alumnos.filter(a => a.genero === 'M').length;
                const tot = h + v;
                let pres = d.asistencias[hoy] ? Object.values(d.asistencias[hoy]).filter(s => s === 1).length : 0;
                tH += h; tV += v; tP += pres;
                const porc = tot > 0 ? ((pres / tot) * 100).toFixed(0) : 0;
                html += `<tr><td>${d.seccion || doc.id}</td><td>${h}</td><td>${v}</td><td>${tot}</td><td>${pres}</td><td>${porc}%</td></tr>`;
            });
            resDiv.innerHTML = `<div class="resumen-admin">Total Escuela: ${tP}/${tH+tV}</div>${html}</table>`;
        };

        window.generarConsolidadoMensual = async () => {
            const resDiv = document.getElementById('resultadosGlobales');
            resDiv.innerHTML = "⌛ Calculando Mes...";
            const hoy = new Date();
            let html = `<table><tr style="background:#eee"><th>Sección</th><th>Matrícula</th><th>Días</th><th>% Mes</th></tr>`;
            const snap = await getDocs(collection(dbCloud, "docentes_db"));
            snap.forEach(doc => {
                const d = doc.data();
                if (doc.id === USUARIO_ADMIN || !d.alumnos) return;
                const mat = d.alumnos.length;
                let asis = 0, dias = 0;
                Object.keys(d.asistencias).forEach(f => {
                    const fD = new Date(f + "T00:00:00");
                    if (fD.getMonth() === hoy.getMonth()) {
                        asis += Object.values(d.asistencias[f]).filter(s => s === 1).length;
                        dias++;
                    }
                });
                const prom = (dias > 0 && mat > 0) ? ((asis / (mat * dias)) * 100).toFixed(1) : 0;
                html += `<tr><td>${d.seccion || doc.id}</td><td>${mat}</td><td>${dias}</td><td><b>${prom}%</b></td></tr>`;
            });
            resDiv.innerHTML = `<div class="resumen-admin" style="background:var(--morado)">Consolidado: ${hoy.toLocaleString('es',{month:'long'})}</div>${html}</table>`;
        };

        // --- DOCENTE ---
        window.render = () => {
            const fecha = document.getElementById('fechaSeleccionada').value || new Date().toISOString().split('T')[0];
            document.getElementById('displayFecha').innerText = fecha;
            document.getElementById('docente').value = window.db.docente || "";
            document.getElementById('seccion').value = window.db.seccion || "";
            const lista = document.getElementById('listaAsistencia');
            lista.innerHTML = "";
            if(!window.db.feriados.includes(fecha)) {
                window.db.alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(a => {
                    const est = (window.db.asistencias[fecha] && window.db.asistencias[fecha][a.id]) || 0;
                    let c = "#ccc", t = "F";
                    if(est === 1) { c = "var(--exito)"; t = "P"; }
                    if(est === 2) { c = "var(--morado)"; t = "J"; }
                    lista.innerHTML += `<div class="student-item">
                        <div style="width:10px; height:10px; border-radius:50%; background:${a.genero==='F'?'#ff99cc':'#99ccff'}"></div>
                        <div style="flex-grow:1"><b>${a.nombre}</b> <br> <small style="color:red" onclick="eliminarAlumno(${a.id})">Eliminar</small></div>
                        <button onclick="marcar(${a.id})" style="width:40px; background:${c}; color:white; border:none; border-radius:5px; font-weight:bold;">${t}</button>
                    </div>`;
                });
            } else { lista.innerHTML = "<p style='color:red; text-align:center;'>DÍA FERIADO</p>"; }
            let h=0, v=0; window.db.alumnos.forEach(a => { a.genero === 'F' ? h++ : v++; });
            document.getElementById('resumenSeccion').innerHTML = `Matrícula: ${window.db.alumnos.length} (H: ${h} V: ${v})`;
        };

        window.agregarAlumno = () => {
            const nom = document.getElementById('newNombre').value.toUpperCase();
            if(!nom) return;
            window.db.alumnos.push({ id: Date.now(), nombre: nom, genero: document.getElementById('newGen').value });
            window.saveToCloud(window.db);
            document.getElementById('newNombre').value = "";
        };

        window.marcar = (id) => {
            const f = document.getElementById('fechaSeleccionada').value;
            if(!window.db.asistencias[f]) window.db.asistencias[f] = {};
            window.db.asistencias[f][id] = (window.db.asistencias[f][id] + 1) % 3 || 1;
            window.saveToCloud(window.db);
        };

        window.eliminarAlumno = (id) => { if(confirm("¿Eliminar?")) { window.db.alumnos = window.db.alumnos.filter(a => a.id !== id); window.saveToCloud(window.db); } };
        window.saveToCloud = async (data) => { await setDoc(doc(dbCloud, "docentes_db", window.usuarioActual), data); };
        window.actualizarPerfil = () => { window.db.docente = document.getElementById('docente').value; window.db.seccion = document.getElementById('seccion').value; window.saveToCloud(window.db); };
        window.logout = () => location.reload();
        window.toggleFeriado = () => {
            const f = document.getElementById('fechaSeleccionada').value;
            const idx = window.db.feriados.indexOf(f);
            idx === -1 ? window.db.feriados.push(f) : window.db.feriados.splice(idx, 1);
            window.saveToCloud(window.db);
        };
        document.addEventListener("DOMContentLoaded", () => { document.getElementById('fechaSeleccionada').value = new Date().toISOString().split('T')[0]; });
    </script>

    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --naranja: #f39c12; --gris: #f4f7f6; --exito: #27ae60; --morado: #8e44ad; --rojo: #e74c3c; }
        body { font-family: sans-serif; margin: 0; background: var(--gris); }
        header { background: var(--azul); color: white; padding: 15px; text-align: center; }
        .container { max-width: 450px; margin: auto; padding: 10px; }
        .card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-main { background: var(--exito); color: white; font-weight: bold; border: none; }
        .student-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 11px; }
        th, td { border: 1px solid #eee; padding: 4px; }
        .resumen-admin { background: var(--azul); color: white; padding: 5px; border-radius: 4px; margin-bottom: 5px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="authSection" style="max-width: 300px; margin: 80px auto; padding: 20px; background: white; border-radius: 10px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
    <h3>Lucila Palacios</h3>
    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Clave">
    <div id="regExtra" style="display:none;">
        <input type="text" id="regNombreCompleto" placeholder="Nombre Docente">
        <input type="password" id="escuelaCode" placeholder="Código Escuela">
    </div>
    <button onclick="login()" id="btnEntrar" class="btn-main">Entrar</button>
    <button onclick="crearCuenta()" id="btnRegistrar" class="btn-main" style="display:none; background: var(--morado);">Registrar</button>
    <p id="toggleText" style="cursor:pointer; color: var(--azul); font-size: 12px;" onclick="mostrarRegistro(true)">¿No tienes cuenta? Regístrate</p>
</div>

<div id="appContent" style="display: none;">
    <header>
        <button onclick="logout()" style="width:auto; float:right; background:var(--rojo); color:white; font-size:10px; border:none; padding:5px 10px;">Salir</button>
        <h4 style="margin:0;">LUCILA PALACIOS</h4>
    </header>

    <div class="container">
        <div id="adminPanelBtn" class="card" style="display:none; background: #f0f0f0;">
            <b>DIRECCIÓN:</b>
            <div style="display:flex; gap:5px;">
                <button onclick="generarReporteGlobal()">Hoy</button>
                <button onclick="generarConsolidadoMensual()" style="background:var(--morado); color:white;">Mensual</button>
            </div>
            <div id="resultadosGlobales"></div>
        </div>

        <div class="card">
            <input type="text" id="docente" onchange="actualizarPerfil()" placeholder="Nombre Docente">
            <input type="text" id="seccion" onchange="actualizarPerfil()" placeholder="Grado y Sección">
            <div id="resumenSeccion" style="font-size:12px; font-weight:bold; color:var(--celeste);"></div>
        </div>

        <div class="card">
            <b>+ Nuevo Alumno</b>
            <input type="text" id="newNombre" placeholder="Apellidos y Nombres">
            <select id="newGen"><option value="F">Hembra</option><option value="M">Varón</option></select>
            <button onclick="agregarAlumno()" class="btn-main">Guardar</button>
        </div>

        <div class="card">
            <input type="date" id="fechaSeleccionada" onchange="window.render()">
            <button onclick="toggleFeriado()" style="background:var(--rojo); color:white; font-size:11px;">🚩 Feriado</button>
            <p style="font-size: 12px;">Fecha: <b id="displayFecha"></b></p>
            <div id="listaAsistencia"></div>
        </div>
    </div>
</div>

</body>
</html>
