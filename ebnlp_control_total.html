<style>
    .matricula-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
        background: #fff;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border-left: 5px solid var(--naranja);
    }
    .matricula-card { text-align: center; }
    .matricula-card span { font-size: 0.8rem; color: #666; display: block; }
    .matricula-card b { font-size: 1.2rem; color: var(--azul); }
    
    /* Estilo para que el PDF no corte las tablas */
    @media print {
        .admin-section, button { display: none !important; }
    }
</style>

<div class="container" id="reporteArea">
    <header>
        <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" 
             alt="Logo EBNLP" style="width: 100px; height: auto;">
        <h2 style="margin:0; color:var(--azul);">E.B.N. "LUCILA PALACIOS"</h2>
        <p style="margin:0; font-weight:bold;">SISTEMA DE GESTIÓN DE PERSONAL</p>
    </header>

    <h3 style="color: var(--azul); border-bottom: 2px solid var(--naranja); padding-bottom: 5px;">📋 Matrícula Total de Personal</h3>
    <div id="matriculaTotal" class="matricula-container">
        </div>

    <div class="stats-grid">
        <div class="stat-card"><p>ESPERADOS HOY</p><h2 id="totalP">0</h2></div>
        <div class="stat-card" style="border-color:var(--verde);"><p>PRESENTES</p><h2 id="countPres">0</h2></div>
        <div class="stat-card" style="border-color:var(--naranja);"><p>% ASISTENCIA</p><h2 id="percAsis">0%</h2></div>
    </div>

    <div class="grid">
        <div class="side">
            <div class="card">
                <h3>📥 Registrar Asistencia</h3>
                <label>Fecha:</label>
                <input type="date" id="fecReg" onchange="procesar()">
                <label>Personal:</label>
                <select id="selPers"></select>
                <label>Estatus:</label>
                <select id="selEst">
                    <option value="Asistencia">Asistencia</option>
                    <option value="Falta Injustificada">Falta</option>
                    <option value="Permiso">Permiso</option>
                    <option value="Reposo">Reposo</option>
                </select>
                <button onclick="registrar()" style="background:var(--verde);">💾 GUARDAR</button>
                <button onclick="generarReportePDF()" style="background:var(--rojo); margin-top:10px;">📄 DESCARGAR PDF</button>
            </div>

            <div class="card">
                <h3>📊 Resumen Diario</h3>
                <table>
                    <thead><tr><th>Cargo</th><th>Esp.</th><th>%</th></tr></thead>
                    <tbody id="resumenCargos"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3 style="text-align:center;">Lista de Control del Día</h3>
            <div style="overflow-x:auto;">
                <table id="tablaMaestra">
                    <thead><tr><th>Nombre</th><th>Función</th><th>Estatus</th></tr></thead>
                    <tbody id="tablaCuerpo"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ... (Tu URL_NUBE e inicial se mantienen igual) ...

    function actualizarMatriculaTotal() {
        let conteo = { "Directivo":0, "Docente":0, "Administrativo":0, "Obrero":0, "Cocinera":0, "Vigilante":0 };
        
        nomina.forEach(p => {
            let cargoLimpio = p.cargo.includes("Vigilante") ? "Vigilante" : p.cargo;
            if(conteo[cargoLimpio] !== undefined) conteo[cargoLimpio]++;
        });

        const matDiv = document.getElementById('matriculaTotal');
        matDiv.innerHTML = "";
        let totalTotal = 0;

        for (let cargo in conteo) {
            totalTotal += conteo[cargo];
            matDiv.innerHTML += `
                <div class="matricula-card">
                    <span>${cargo}</span>
                    <b>${conteo[cargo]}</b>
                </div>`;
        }
        matDiv.innerHTML += `
            <div class="matricula-card" style="border-left: 1px solid #ddd; margin-left: 10px;">
                <span>TOTAL</span>
                <b style="color:var(--rojo)">${totalTotal}</b>
            </div>`;
    }

    // Modificamos ligeramente tu función procesar() para incluir el conteo
    function procesar() {
        actualizarMatriculaTotal();
        const fechaVal = document.getElementById('fecReg').value;
        const hoy = new Date(fechaVal + "T00:00:00");
        const diaSemana = hoy.getDay(); 
        const inicioRef = new Date("2024-01-01T00:00:00");
        const dias = Math.floor((hoy - inicioRef) / 86400000);
        const grupoActivo = (dias % 2 === 0) ? "Vigilante-B" : "Vigilante-A";

        const tbody = document.getElementById('tablaCuerpo');
        const rbody = document.getElementById('resumenCargos');
        const sel = document.getElementById('selPers');

        tbody.innerHTML = ""; rbody.innerHTML = ""; sel.innerHTML = "";

        let totales = { "Directivo":0, "Docente":0, "Administrativo":0, "Obrero":0, "Cocinera":0, "Vigilante":0 };
        let presentes = { "Directivo":0, "Docente":0, "Administrativo":0, "Obrero":0, "Cocinera":0, "Vigilante":0 };
        let esperadosHoy = 0;

        nomina.forEach((p, i) => {
            sel.innerHTML += `<option value="${i}">${p.nombre}</option>`;
            const reg = db.registros.find(r => r.nombre === p.nombre && r.fec === fechaVal);
            let laboraHoy = true;
            let cargoLimpio = p.cargo.includes("Vigilante") ? "Vigilante" : p.cargo;

            if(p.cargo.includes("Vigilante")) {
                if(p.cargo !== grupoActivo) laboraHoy = false;
            } else if(diaSemana === 0 || diaSemana === 6) laboraHoy = false;

            if(laboraHoy) { totales[cargoLimpio]++; esperadosHoy++; }

            let estTxt = reg ? reg.est : (laboraHoy ? "Pendiente" : "Libre");
            let clase = !laboraHoy ? "no-toca" : (reg && reg.est === "Asistencia" ? "asistio" : "");
            if(reg && reg.est === "Asistencia" && laboraHoy) presentes[cargoLimpio]++;

            tbody.innerHTML += `<tr class="${clase}"><td>${p.nombre}</td><td>${p.cargo}</td><td>${estTxt}</td></tr>`;
        });

        let tPres = 0;
        for(let c in totales) {
            tPres += presentes[c];
            if(totales[c] > 0) {
                let perc = ((presentes[c]/totales[c])*100).toFixed(0);
                rbody.innerHTML += `<tr><td>${c}</td><td>${totales[c]}</td><td style="font-weight:bold;">${perc}%</td></tr>`;
            }
        }

        document.getElementById('totalP').innerText = esperadosHoy;
        document.getElementById('countPres').innerText = tPres;
        document.getElementById('percAsis').innerText = esperadosHoy > 0 ? ((tPres/esperadosHoy)*100).toFixed(0) + "%" : "0%";
    }

    function generarReportePDF() {
        const elemento = document.getElementById('reporteArea');
        const opt = {
            margin: 10,
            filename: `Reporte_Asistencia_${document.getElementById('fecReg').value}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true }, // Importante para cargar el logo
            jsPDF: { unit: 'mm', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(elemento).save();
    }
    
    // Al cargar la página
    document.getElementById('fecReg').valueAsDate = new Date();
    procesar();
</script>
