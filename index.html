<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú EBNLP</title>
    <style>
        :root { --azul: #1a2a6c; --naranja: #f39c12; --gris: #f4f7f6; }
        body { font-family: sans-serif; background: var(--gris); margin: 0; text-align: center; }
        header { background: var(--azul); color: white; padding: 30px 10px; border-bottom: 5px solid var(--naranja); }
        .logo-circulo { width: 100px; height: 100px; background: white; border-radius: 50%; display: inline-block; margin-bottom: 10px; border: 3px solid var(--naranja); overflow: hidden; }
        .logo-circulo img { width: 100%; height: 100%; object-fit: cover; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .btn-card { display: block; background: white; margin-bottom: 20px; padding: 25px; border-radius: 15px; text-decoration: none; color: var(--azul); box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 8px solid #27ae60; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo-circulo"><img src="IMG_20260225_005025_993.png"></div>
        <h1>E.B.N. "LUCILA PALACIOS"</h1>
    </header>
    <div class="container">
        <a href="personal.html" class="btn-card">📝 Registro de Personal</a>
        <a href="estadisticas.html" class="btn-card" style="border-top-color: #2980b9;">📊 Control de Alumnos</a>
    </div>
</body>
</html>
