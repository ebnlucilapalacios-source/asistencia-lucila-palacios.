<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP - Consola Maestra</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --azul-d: #0c234a; --azul-v: #1a2a6c; --naranja: #f39c12; --verde: #27ae60; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 80px; }
        header { background: linear-gradient(to bottom, var(--azul-d), var(--azul-v)); color: white; text-align: center; padding: 20px; border-bottom: 5px solid var(--naranja); }
        .logo { height: 60px; margin-bottom: 10px; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 2px solid #ddd; z-index: 1000; height: 65px; }
        .nav-btn { flex: 1; text-align: center; display: flex; flex-direction: column; justify-content: center; color: #666; font-size: 10px; font-weight: bold; text-decoration: none; }
        .nav-btn.active { color: var(--azul-v); background: #f0f4ff; border-top: 4px solid var(--azul-v); }
        .nav-btn span { font-size: 20px; }

        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-left: 8px solid var(--azul-v); }
        
        /* Tabla Detallada */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f9fa; color: var(--azul-d); text-transform: uppercase; font-size: 9px; }
        
        .badge { padding: 4px 6px; border-radius: 4px; font-weight: bold; font-size: 9px; }
        .bg-asis { background: #e6ffed; color: #27ae60; }
        .bg-falta { background: #fff1f0; color: #e74c3c; }
        .bg-permiso { background: #fff7e6; color: #d48806; }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" class="logo">
    <h2 style="margin:0;">DIRECCIÓN EBNLP</h2>
</header>

<div id="secPersonal" class="section active">
    <div class="card">
        <h3>👥 Datos Completos del Personal</h3>
        <input type="date" id="filtroFec" onchange="cargarDataPersonalCompleta()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-bottom:10px;">
    </div>
    
    <div class="card">
        <div class="table-container">
            <table id="tablaCompleta">
                <thead>
                    <tr>
                        <th>Trabajador</th>
                        <th>Cargo</th>
                        <th>Estado</th>
                        <th>Registrado el</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div id="secAlumnos" class="section">
    <div class="card" style="border-left-color: var(--verde);">
        <h3>🎓 Registro de Alumnos</h3>
        <div id="tablaAlumnos">Cargando...</div>
    </div>
</div>

<nav>
    <a href="#" class="nav-btn active" onclick="tab('secPersonal', this)"><span>👥</span>PERSONAL</a>
    <a href="#" class="nav-btn" onclick="tab('secAlumnos', this)"><span>🎓</span>ALUMNOS</a>
    <a href="estadistica.html" class="nav-btn"><span>📊</span>REPORTES</a>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // FUNCIÓN PARA VER TODO LO DE PERSONAL.HTML
    function cargarDataPersonalCompleta() {
        const fec = document.getElementById('filtroFec').value;
        db.collection("asistencia_personal").where("fec", "==", fec).onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const r = doc.data();
                
                // Color del badge según estatus
                let cls = 'bg-asis';
                if(r.est.includes("Inasistencia") || r.est.includes("Falta")) cls = 'bg-falta';
                if(r.est.includes("Permiso")) cls = 'bg-permiso';

                // Formatear fecha de registro (si existe)
                let hora = r.actualizado ? new Date(r.actualizado.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '---';

                html += `
                <tr>
                    <td><b>${r.nombre}</b></td>
                    <td><small>${r.cargo || 'No asignado'}</small></td>
                    <td><span class="badge ${cls}">${r.est}</span></td>
                    <td>${hora}</td>
                </tr>`;
            });
            document.getElementById('cuerpoTabla').innerHTML = html || "<tr><td colspan='4'>Sin registros para esta fecha</td></tr>";
        });
    }

    // Lógica Alumnos
    function cargarDataAlumnos() {
        db.collection("alumnos").onSnapshot(snap => {
            let html = "<table><tr><th>Alumno</th><th>Sección</th></tr>";
            snap.forEach(doc => {
                const a = doc.data();
                html += `<tr><td>${a.nombre}</td><td>${a.seccion || 'S/N'}</td></tr>`;
            });
            document.getElementById('tablaAlumnos').innerHTML = html + "</table>";
        });
    }

    document.getElementById('filtroFec').valueAsDate = new Date();
    cargarDataPersonalCompleta();
    cargarDataAlumnos();
</script>
</body>
</html>
