<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirección - EBNLP</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --azul: #0c234a; --naranja: #f39c12; --gris: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 80px; }
        
        /* Encabezado con Logo Corregido */
        header { 
            background: linear-gradient(to bottom, #0c234a, #1a2a6c); 
            color: white; 
            text-align: center; 
            padding: 25px 10px; 
            border-bottom: 5px solid var(--naranja); 
        }
        .logo-circulo {
            background: white;
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--naranja);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .logo-img { 
            width: 85px; 
            height: auto;
        }

        /* Estilos de Tarjetas y Tablas */
        .container { padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 8px solid var(--azul); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f9fa; color: var(--azul); font-size: 10px; text-transform: uppercase; }

        /* Navegación */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; z-index: 1000; }
        .nav-btn { flex: 1; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #666; font-size: 11px; text-decoration: none; font-weight: bold; }
        .nav-btn.active { color: #1a2a6c; background: #f0f4ff; border-top: 4px solid #1a2a6c; }
    </style>
</head>
<body>

<header>
    <div class="logo-circulo">
        <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" 
             class="logo-img" alt="Escudo EBNLP">
    </div>
    <h2 style="margin:0;">E.B.N. "LUCILA PALACIOS"</h2>
    <p style="margin:5px 0 0; font-size:11px; opacity:0.8;">Panel Maestro de Dirección</p>
</header>

<div class="container">
    <div class="card" id="vistaPersonal">
        <h3>👥 Asistencia del Personal</h3>
        <div id="tablaPersonal">Cargando datos...</div>
    </div>

    <div class="card" style="border-left-color: #27ae60;">
        <h3>🎓 Registro de Estudiantes</h3>
        <div id="tablaAlumnos">Cargando matrícula...</div>
    </div>
</div>

<nav>
    <a href="index.html" class="nav-btn active"><span>🏠</span>INICIO</a>
    <a href="personal.html" class="nav-btn"><span>👥</span>PERSONAL</a>
    <a href="estadistica.html" class="nav-btn"><span>📊</span>REPORTES</a>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Cargar datos de Personal
    db.collection("asistencia_personal").onSnapshot(snap => {
        let html = "<table><tr><th>Trabajador</th><th>Cargo</th><th>Estatus</th></tr>";
        snap.forEach(doc => {
            const d = doc.data();
            html += `<tr><td><b>${d.nombre}</b></td><td>${d.cargo || '---'}</td><td>${d.est}</td></tr>`;
        });
        document.getElementById('tablaPersonal').innerHTML = html + "</table>";
    });

    // Cargar datos de Alumnos
    db.collection("alumnos").onSnapshot(snap => {
        let html = "<table><tr><th>Alumno</th><th>Sección</th></tr>";
        snap.forEach(doc => {
            const a = doc.data();
            html += `<tr><td>${a.nombre}</td><td>${a.seccion || 'S/N'}</td></tr>`;
        });
        document.getElementById('tablaAlumnos').innerHTML = html + "</table>";
    });
</script>
</body>
</html>
