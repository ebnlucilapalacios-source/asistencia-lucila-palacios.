<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBNLP - Sistema Integrado</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --azul-personal: #1a2a6c; 
            --verde-alumnos: #27ae60; 
            --naranja: #f39c12; 
            --rojo: #e74c3c;
            --gris-fondo: #f4f7f6; 
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris-fondo); padding-bottom: 70px; transition: background 0.3s; }
        
        /* Cabecera dinámica */
        header { text-align: center; padding: 10px; background: white; border-bottom: 4px solid var(--naranja); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { height: 50px; }
        header h3 { margin: 5px 0 0; font-size: 16px; color: #333; }

        /* Contenedores de Sección */
        .section { display: none; padding: 15px; animation: slideIn 0.3s ease-out; }
        .section.active { display: block; }

        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Estilo para PERSONAL (Azul) */
        #secPersonal .card { border-left: 6px solid var(--azul-personal); }
        #secPersonal h3 { color: var(--azul-personal); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        #secPersonal .btn-save { background: var(--azul-personal); }

        /* Estilo para ALUMNOS (Verde) */
        #secEstudiantes .card { border-left: 6px solid var(--verde-alumnos); }
        #secEstudiantes h3 { color: var(--verde-alumnos); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        #secEstudiantes .btn-save { background: var(--verde-alumnos); }

        /* Tarjetas y Tablas */
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f9fa; color: #666; font-size: 10px; text-transform: uppercase; }
        
        /* Inputs y Botones */
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 12px; color: #555; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; }
        .btn-save { color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; }
        
        /* Menú de Navegación Inferior */
        nav { background: #fff; display: flex; position: fixed; bottom: 0; width: 100%; z-index: 1000; border-top: 1px solid #ddd; }
        .nav-btn { flex: 1; text-align: center; padding: 12px 0; color: #888; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-btn .icon { font-size: 20px; display: block; margin-bottom: 2px; }
        
        /* Estados activos del menú */
        .nav-btn.active-pers { color: var(--azul-personal); border-top: 3px solid var(--azul-personal); background: #f0f4ff; }
        .nav-btn.active-alum { color: var(--verde-alumnos); border-top: 3px solid var(--verde-alumnos); background: #f0fff4; }

        .tag-estatus { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .tag-asis { background: #e6ffed; color: #27ae60; }
        .tag-falta { background: #fff1f0; color: #e74c3c; }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/ebnlucilapalacios-source/asistencia-lucila-palacios/main/IMG_20260225_005025_993.png" class="logo">
    <h3>E.B.N. "LUCILA PALACIOS"</h3>
</header>

<div id="secPersonal" class="section active">
    <div class="card">
        <h3>🏢 Control de Personal</h3>
        <label>Seleccionar Fecha:</label>
        <input type="date" id="fecPers" onchange="cargarPersonal()">
        
        <label>Nombre del Trabajador:</label>
        <select id="selPers"></select>
        
        <label>Estado de Asistencia:</label>
        <select id="estPers">
            <option value="Asistencia">Asistencia ✅</option>
            <option value="Inasistencia">Inasistencia ❌</option>
            <option value="Permiso">Permiso 📝</option>
            <option value="Reposo">Reposo 🏥</option>
        </select>
        <button class="btn-save" onclick="guardarPersonal()">SINCRONIZAR PERSONAL</button>
    </div>
    
    <div class="card">
        <h4>Resumen Diario</h4>
        <div id="tablaPersArea">Cargando...</div>
    </div>
</div>

<div id="secEstudiantes" class="section">
    <div class="card">
        <h3>🎒 Estadísticas Estudiantiles</h3>
        <div id="statsAlumnos" style="font-size: 18px; text-align: center; padding: 10px;">Cargando matrícula...</div>
    </div>
    
    <div class="card">
        <h4>Lista de Alumnos en la Nube</h4>
        <div id="tablaAlumnosArea"></div>
    </div>
</div>

<nav>
    <div id="btnP" class="nav-btn active-pers" onclick="ver('secPersonal', this, 'pers')">
        <span class="icon">👥</span>PERSONAL
    </div>
    <div id="btnA" class="nav-btn" onclick="ver('secEstudiantes', this, 'alum')">
        <span class="icon">🎓</span>ALUMNOS
    </div>
</nav>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAERrG77MB-PVjHFWZ2vAaBmfYCc-zNazg",
        authDomain: "control-de-asistencia-d585e.firebaseapp.com",
        projectId: "control-de-asistencia-d585e",
        appId: "1:368890880546:web:a97ab4372dea536217207b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const nominaRaw = `Yanitza Malave,Directivo;María Muñoz,Directivo;Karelys Yanez,Directivo;Dayana Jiménez,Docente;Lorraine Brito,Docente;Rosa Nacaratto,Docente;Neviss Guerra,Docente;Rusmary Larez,Docente;Génesis Morillo,Docente;Yunequi Valdez,Docente;Junior San Vicente,Docente;Yulimar Aguanes,Docente;Luisa Jimenez,Docente;Yomaira Cáceres,Docente;Ana David,Docente;Eliday Salazar,Docente;Roselba Terán,Docente;Yorvis Bolivar,Docente;Yubiry Martinez,Docente;Dalia Luces,Docente;Joleth Guzmán,Docente;Angel Figuera,Docente;Francelis Montaño,Docente;Gaudy Rodríguez,Docente;Magloris Fernández,Docente;Glenis Salazar,Docente;Margoris Rodríguez,Docente;Luisa Sosa,Docente;Milvida Torres,Docente;Gladys Salcedo,Docente;Yanitza Alexander,Docente;Andreina Flores,Docente;Nelida Castellanos,Docente;Onexis Rocca,Docente;Justina Fernández,Docente;Leosmary Loroño,Docente;José Shijan Brito,Docente;Mayerlin Chacon,Docente;Norelis Pérez,Obrero;Gilda Villarroel,Obrero;Ana Figuera,Obrero;Marleny Serrano,Obrero;Ruth Campos,Obrero;Dayana García,Obrero;Luisana Quintana,Obrero;Carlos Castillo,Obrero;Edgar Martinez,Obrero;Jonathan Cedeño,Obrero;Luis Figueroa,Obrero;Junior Morgado,Obrero;Naileth Vargas,Obrero;Yoelis Solorzano,Obrero;Yelitza Medina,Obrero;Evelyn Carmona,Obrero;Danielys Campos,Obrero;Jeanmaikol Díaz,Obrero;Karen Yanez,Obrero;Raiza Vallenilla,Cocinera;Genesis Camero,Cocinera;Irma Jaramillo,Cocinera;Dovelis Conde,Cocinera;Yureima Pimentel,Cocinera;Rosa Rivero,Cocinera;Marcia Guzmán,Cocinera;Osmil Sanabria,Vigilante;Daher Cardier,Vigilante;Pedro González,Vigilante;Moisés Romero,Vigilante;Cesar Suárez,Vigilante;Juan Vargas,Vigilante;Guillermo Albornoz,Vigilante;Darwin Aguilera,Vigilante;Joseyver López,Vigilante`;
    
    let nomina = nominaRaw.split(';').map(p => ({nombre: p.split(',')[0], cargo: p.split(',')[1]}));

    function ver(id, btn, tipo) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.remove('active-pers', 'active-alum');
        });
        
        document.getElementById(id).classList.add('active');
        if(tipo === 'pers') btn.classList.add('active-pers');
        else btn.classList.add('active-alum');
    }

    async function guardarPersonal() {
        const nombre = document.getElementById('selPers').value;
        const fec = document.getElementById('fecPers').value;
        const est = document.getElementById('estPers').value;
        const p = nomina.find(n => n.nombre === nombre);
        
        try {
            await db.collection("asistencia_personal").doc(`${nombre}_${fec}`).set({
                nombre, cargo: p.cargo, fec, est, fecha_registro: new Date()
            });
            alert("✅ Registro guardado en la nube");
        } catch(e) { alert("❌ Error de conexión"); }
    }

    function cargarPersonal() {
        const fec = document.getElementById('fecPers').value;
        db.collection("asistencia_personal").where("fec", "==", fec).onSnapshot(snap => {
            let html = `<table><tr><th>Trabajador</th><th>Estatus</th></tr>`;
            snap.forEach(doc => {
                const r = doc.data();
                let clase = r.est === 'Asistencia' ? 'tag-asis' : 'tag-falta';
                html += `<tr><td><b>${r.nombre}</b><br><small>${r.cargo}</small></td>
                         <td><span class="tag-estatus ${clase}">${r.est}</span></td></tr>`;
            });
            document.getElementById('tablaPersArea').innerHTML = html + `</table>`;
        });
    }

    function cargarAlumnos() {
        db.collection("alumnos_db").doc("registro_master").onSnapshot(doc => {
            if(doc.exists()){
                const d = doc.data();
                document.getElementById('statsAlumnos').innerHTML = `<b>Matrícula:</b> ${d.alumnos.length} <small>Alumnos</small>`;
                let html = `<table><tr><th>Alumno</th><th>Género</th></tr>`;
                d.alumnos.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(a => {
                    html += `<tr><td>${a.nombre}</td><td>${a.genero}</td></tr>`;
                });
                document.getElementById('tablaAlumnosArea').innerHTML = html + `</table>`;
            }
        });
    }

    // Inicialización
    document.getElementById('fecPers').valueAsDate = new Date();
    nomina.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(p => {
        document.getElementById('selPers').innerHTML += `<option value="${p.nombre}">${p.nombre}</option>`;
    });
    cargarPersonal();
    cargarAlumnos();
</script>
</body>
</html>
