<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.B.N. Lucila Palacios - Control de Asistencia</title>
    <link rel="icon" type="image/png" href="Imagen_20260225_005025_993.png">
    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --naranja: #f39c12; --gris: #f8f9f9; --exito: #27ae60; --peligro: #c0392b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); color: #333; padding-bottom: 50px; }
        header { background: var(--azul); color: white; padding: 20px 15px; text-align: center; border-bottom: 4px solid var(--naranja); display: flex; flex-direction: column; align-items: center; }
        #logoEscuela { width: 90px; height: 90px; border-radius: 50%; background: white; padding: 3px; border: 2px solid var(--naranja); margin-bottom: 8px; object-fit: contain; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 4px solid var(--celeste); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--celeste); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-check { width: 90px; padding: 8px; font-size: 0.7rem; border-radius: 20px; border: none; font-weight: bold; }
        .presente { background: var(--exito); color: white; }
        .ausente { background: #ebedef; color: #7f8c8d; }
        .student-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; gap: 10px; }
        .info-student { flex-grow: 1; }
        .progress-container { background: #e0e0e0; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.5s; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; background: linear-gradient(90deg, var(--celeste), var(--exito)); }
        .honor-card { background: #fff3e0; border-left: 5px solid var(--naranja); padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <img src="Imagen_20260225_005025_993.png" id="logoEscuela" alt="Logo">
    <h1 style="margin:0; font-size: 1.2rem;">E.B.N. "LUCILA PALACIOS"</h1>
    <p id="labelAula" style="margin:5px 0 0; font-size:0.8rem; opacity:0.9;">Cargando...</p>
</header>

<div class="container">
    <details class="card">
        <summary style="cursor:pointer; font-weight:bold; color:var(--celeste);">⚙️ Configuración y Matrícula</summary>
        <input type="text" id="gradoSec" placeholder="Ej: 1er Grado Sección A">
        <button onclick="guardarAula()">Guardar Aula</button>
        <hr>
        <input type="text" id="nomAlu" placeholder="Nombre del Alumno">
        <select id="genAlu"><option value="F">Hembra (F)</option><option value="M">Varón (M)</option></select>
        <button onclick="registrarAlumno()" style="background:var(--exito);">Inscribir Alumno</button>
    </details>

    <div class="card">
        <h3 style="margin-top:0;">📅 Control de Asistencia</h3>
        <label style="font-size:0.8rem; color:#666;">Consultar fecha:</label>
        <input type="date" id="calendarioConsulta" onchange="cambiarFecha()">
        <div class="progress-container"><div id="barraProgreso" class="progress-bar">0%</div></div>
        <input type="text" id="buscador" placeholder="🔍 Buscar por nombre..." oninput="actualizarUI()">
        <button onclick="marcarTodos()" style="background:var(--naranja); margin-bottom:10px;">✅ Marcar todos Presente</button>
        <div id="listaAlumnos"></div>
    </div>

    <div class="card">
        <div id="cuadroHonor" class="honor-card">🏆 <strong>Cuadro de Honor:</strong> Sin datos</div>
        <button onclick="verEstadistica()" style="background:var(--azul); margin-top:15px;">📊 Estadística por Género</button>
        <button onclick="descargarExcel()" style="background:var(--celeste); margin-top:10px;">📥 Descargar Reporte (Excel)</button>
    </div>
</div>

<script>
    let alumnos = JSON.parse(localStorage.getItem('lp_alumnos_v3')) || [];
    let asistencias = JSON.parse(localStorage.getItem('lp_asistencias_v3')) || {};
    let aulaActual = localStorage.getItem('lp_aula_v3') || "Sin Grado";
    let fechaConsulta = new Date().toISOString().split('T')[0];

    function registrarAlumno() {
        const n = document.getElementById('nomAlu').value.trim();
        const g = document.getElementById('genAlu').value;
        if(!n) return alert("Escribe el nombre");
        alumnos.push({ id: Date.now(), nombre: n, genero: g, grado: aulaActual });
        localStorage.setItem('lp_alumnos_v3', JSON.stringify(alumnos));
        document.getElementById('nomAlu').value = "";
        actualizarUI();
    }

    function marcar(id) {
        if(!asistencias[fechaConsulta]) asistencias[fechaConsulta] = {};
        asistencias[fechaConsulta][id] = !asistencias[fechaConsulta][id];
        localStorage.setItem('lp_asistencias_v3', JSON.stringify(asistencias));
        actualizarUI();
    }

    function marcarTodos() {
        if(!asistencias[fechaConsulta]) asistencias[fechaConsulta] = {};
        alumnos.filter(a => a.grado === aulaActual).forEach(a => { asistencias[fechaConsulta][a.id] = true; });
        localStorage.setItem('lp_asistencias_v3', JSON.stringify(asistencias));
        actualizarUI();
    }

    function actualizarUI() {
        const lista = document.getElementById('listaAlumnos');
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        lista.innerHTML = "";
        let pres = 0;
        const filtrados = alumnos.filter(a => a.grado === aulaActual && a.nombre.toLowerCase().includes(busqueda));

        filtrados.forEach(a => {
            const estaP = asistencias[fechaConsulta] && asistencias[fechaConsulta][a.id];
            if(estaP) pres++;
            lista.innerHTML += `<div class="student-item">
                <div class="info-student"><strong>${a.nombre}</strong><br><small>${a.genero==='F'?'Hembra':'Varón'}</small></div>
                <button onclick="marcar(${a.id})" class="btn-check ${estaP?'presente':'ausente'}">${estaP?'PRESENTE':'FALTA'}</button>
            </div>`;
        });

        const totalGrado = alumnos.filter(a => a.grado === aulaActual).length;
        const porc = totalGrado > 0 ? ((pres / totalGrado) * 100).toFixed(0) : 0;
        document.getElementById('barraProgreso').style.width = porc + "%";
        document.getElementById('barraProgreso').innerText = porc + "%";
        actualizarHonor();
    }

    function actualizarHonor() {
        if (alumnos.length === 0) return;
        let conteo = {};
        Object.keys(asistencias).forEach(f => {
            Object.keys(asistencias[f]).forEach(id => { if(asistencias[f][id]) conteo[id] = (conteo[id]||0) + 1; });
        });
        let mejorId = Object.keys(conteo).reduce((a, b) => conteo[a] > conteo[b] ? a : b, null);
        if(mejorId) {
            let alu = alumnos.find(a => a.id == mejorId);
            document.getElementById('cuadroHonor').innerHTML = `🏆 <strong>Cuadro de Honor:</strong> ${alu.nombre} (${conteo[mejorId]} asistencias)`;
        }
    }

    function verEstadistica() {
        let hTot = alumnos.filter(a => a.grado === aulaActual && a.genero === 'F').length;
        let vTot = alumnos.filter(a => a.grado === aulaActual && a.genero === 'M').length;
        let hPres = 0, vPres = 0;
        alumnos.filter(a => a.grado === aulaActual).forEach(a => {
            if(asistencias[fechaConsulta] && asistencias[fechaConsulta][a.id]) {
                if(a.genero === 'F') hPres++; else vPres++;
            }
        });
        alert(`Estadística de hoy:\n\nHembras: ${hPres} de ${hTot} (${hTot>0?((hPres/hTot)*100).toFixed(1):0}%)\nVarones: ${vPres} de ${vTot} (${vTot>0?((vPres/vTot)*100).toFixed(1):0}%)`);
    }

    function cambiarFecha() { fechaConsulta = document.getElementById('calendarioConsulta').value; actualizarUI(); }
    function guardarAula() { const g = document.getElementById('gradoSec').value.trim(); if(g) { localStorage.setItem('lp_aula_v3', g); location.reload(); } }
    function descargarExcel() {
        let csv = "\ufeffFecha,Nombre,Genero,Estado\n";
        Object.keys(asistencias).sort().forEach(f => {
            alumnos.filter(a => a.grado === aulaActual).forEach(a => {
                csv += `${f},${a.nombre},${a.genero},${asistencias[f][a.id]?'Presente':'Ausente'}\n`;
            });
        });
        const b = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
        const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = "Asistencia_Lucila_Palacios.csv"; l.click();
    }

    document.getElementById('calendarioConsulta').value = fechaConsulta;
    document.getElementById('labelAula').innerText = aulaActual + " • E.B.N. Lucila Palacios";
    actualizarUI();
</script>
</body>
</html>
