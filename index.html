<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.B.N. Lucila Palacios - Gestión Escolar</title>
    
    <link rel="icon" type="image/png" href="Imagen_20260225_005025_993.png">

    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --naranja: #f39c12; --gris: #f8f9f9; --exito: #27ae60; --peligro: #c0392b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); color: #333; }
        
        header { background: var(--azul); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--naranja); position: sticky; top: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        #logoEscuela { width: 85px; height: 85px; border-radius: 50%; background: white; padding: 3px; border: 2px solid var(--naranja); margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); object-fit: contain; }
        
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 4px solid var(--celeste); }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--celeste); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-registro { background: var(--exito); }
        
        .student-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; gap: 10px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--celeste); }
        .info-student { flex-grow: 1; }
        .btn-check { width: 85px; padding: 8px; font-size: 0.7rem; border-radius: 20px; }
        .presente { background: var(--exito); }
        .ausente { background: #ebedef; color: #7f8c8d; }

        .progress-container { background: #e0e0e0; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.5s; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; background: linear-gradient(90deg, var(--celeste), var(--exito)); }
    </style>
</head>
<body>

<header>
    <img src="Imagen_20260225_005025_993.png" id="logoEscuela" alt="Escudo EBN Lucila Palacios">
    <h1 style="margin:0; font-size: 1.1rem;">E.B.N. "LUCILA PALACIOS"</h1>
    <p id="labelAula" style="font-size: 0.7rem; opacity:0.9; margin:2px;">Cargando...</p>
</header>

<div class="container">
    <details class="card">
        <summary style="cursor:pointer; color:var(--celeste); font-weight:bold;">⚙️ Configuración y Matrícula</summary>
        <div style="margin-top:15px;">
            <input type="text" id="gradoSec" placeholder="Grado y Sección (Ej: 1ero A)">
            <button onclick="guardarAula()">Guardar Aula Actual</button>
            <hr>
            <h3>Inscribir Alumno</h3>
            <input type="text" id="nomAlu" placeholder="Nombre y Apellido">
            <select id="genAlu"><option value="M">Masculino</option><option value="F">Femenino</option></select>
            <input type="date" id="fechaNac">
            <input type="file" id="fotoAlu" accept="image/*" capture="user">
            <button onclick="registrarAlumno()" class="btn-registro">Guardar Alumno</button>
        </div>
    </details>

    <div class="card">
        <h3>📅 Control Diario</h3>
        <input type="date" id="calendarioConsulta" onchange="cambiarFechaConsulta()">
        <div class="progress-container"><div id="barraProgreso" class="progress-bar">0%</div></div>
        <div id="listaAlumnos"></div>
    </div>

    <div class="card">
        <button onclick="descargarExcel()" style="background:var(--celeste);">📥 Descargar Reporte (Excel)</button>
    </div>
</div>

<script>
    let alumnos = JSON.parse(localStorage.getItem('lp_alumnos_v2')) || [];
    let asistencias = JSON.parse(localStorage.getItem('lp_asistencias_v2')) || {};
    let aulaActual = localStorage.getItem('lp_aula_v2') || "Sin Grado";
    let fechaConsulta = new Date().toISOString().split('T')[0];

    function registrarAlumno() {
        const n = document.getElementById('nomAlu').value.trim();
        const g = document.getElementById('genAlu').value;
        const f = document.getElementById('fechaNac').value;
        const file = document.getElementById('fotoAlu').files[0];

        if(!n || !f) return alert("Complete los datos");

        const guardar = (foto) => {
            alumnos.push({ id: Date.now(), nombre: n, genero: g, nacimiento: f, foto: foto || '', grado: aulaActual });
            localStorage.setItem('lp_alumnos_v2', JSON.stringify(alumnos));
            location.reload();
        };

        if(file) { const r = new FileReader(); r.onloadend = () => guardar(r.result); r.readAsDataURL(file); }
        else guardar(null);
    }

    function marcar(id) {
        if(!asistencias[fechaConsulta]) asistencias[fechaConsulta] = {};
        asistencias[fechaConsulta][id] = !asistencias[fechaConsulta][id];
        localStorage.setItem('lp_asistencias_v2', JSON.stringify(asistencias));
        actualizarUI();
    }

    function actualizarUI() {
        const lista = document.getElementById('listaAlumnos');
        lista.innerHTML = "";
        let pres = 0;
        const alumnosGrado = alumnos.filter(a => a.grado === aulaActual);

        alumnosGrado.forEach(a => {
            const estaP = asistencias[fechaConsulta] && asistencias[fechaConsulta][a.id];
            if(estaP) pres++;

            lista.innerHTML += `
                <div class="student-item">
                    <img src="${a.foto || 'https://via.placeholder.com/50'}" class="avatar">
                    <div class="info-student"><strong>${a.nombre}</strong></div>
                    <button onclick="marcar(${a.id})" class="btn-check ${estaP?'presente':'ausente'}">${estaP?'PRESENTE':'FALTA'}</button>
                </div>`;
        });

        const porc = alumnosGrado.length > 0 ? ((pres / alumnosGrado.length) * 100).toFixed(0) : 0;
        document.getElementById('barraProgreso').style.width = porc + "%";
        document.getElementById('barraProgreso').innerText = porc + "%";
    }

    function guardarAula() {
        const g = document.getElementById('gradoSec').value.trim();
        if(g) { localStorage.setItem('lp_aula_v2', g); location.reload(); }
    }

    function descargarExcel() {
        let csv = "\ufeffFecha,Grado,Nombre,Estado\n";
        Object.keys(asistencias).forEach(f => {
            alumnos.forEach(a => {
                const est = asistencias[f][a.id] ? "Presente" : "Ausente";
                csv += `${f},${a.grado},${a.nombre},${est}\n`;
            });
        });
        const b = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
        const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = "Reporte.csv"; l.click();
    }

    document.getElementById('calendarioConsulta').value = fechaConsulta;
    document.getElementById('labelAula').innerText = aulaActual + " • E.B.N. Lucila Palacios";
    actualizarUI();
</script>
</body>
</html>
