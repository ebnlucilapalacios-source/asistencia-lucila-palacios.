<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docente - Lucila Palacios</title>
    <link rel="icon" type="image/png" href="IMG_20260225_005025_993.png">
    <style>
        :root { --azul: #1a2a6c; --celeste: #154360; --naranja: #f39c12; --gris: #f8f9f9; --exito: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); padding-bottom: 30px; }
        header { background: var(--azul); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--naranja); display: flex; flex-direction: column; align-items: center; }
        #logoEscuela { width: 85px; height: 85px; border-radius: 50%; background: white; padding: 3px; border: 2px solid var(--naranja); object-fit: contain; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 4px solid var(--celeste); }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-asis { width: 60px; height: 40px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .student-card { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<header>
    <img src="IMG_20260225_005025_993.png" id="logoEscuela" alt="Escudo">
    <h1 style="font-size: 1.2rem; margin: 8px 0 0;">E.B.N. "LUCILA PALACIOS"</h1>
</header>
<div class="container">
    <div class="card">
        <h3>👤 Configurar Aula</h3>
        <input type="text" id="profe" placeholder="Docente">
        <input type="text" id="aula" placeholder="Grado y Sección">
        <button onclick="guardarConfig()" style="background:var(--celeste); color:white;">Guardar</button>
    </div>
    <div class="card">
        <h3>📝 Registro</h3>
        <input type="text" id="nomAlu" placeholder="Nombre">
        <select id="genAlu"><option value="F">F (Hembra)</option><option value="M">M (Varón)</option></select>
        <input type="date" id="fechaNac">
        <button onclick="registrar()" style="background:var(--exito); color:white;">Inscribir</button>
    </div>
    <div class="card">
        <h3>📅 Asistencia: <span id="fHoy"></span></h3>
        <div id="listaAsistencia"></div>
        <button onclick="exportar()" style="background:var(--naranja); color:white; margin-top:20px;">📤 Enviar a Dirección</button>
    </div>
</div>
<script>
    let d = JSON.parse(localStorage.getItem('ebn_v7')) || { profe: "", aula: "", alumnos: [], asistencias: {} };
    let hoy = new Date().toISOString().split('T')[0];
    document.getElementById('fHoy').innerText = hoy;

    function guardarConfig() { d.profe = document.getElementById('profe').value; d.aula = document.getElementById('aula').value; localStorage.setItem('ebn_v7', JSON.stringify(d)); alert("Guardado"); }
    function registrar() { 
        const n = document.getElementById('nomAlu').value; 
        const g = document.getElementById('genAlu').value;
        const f = document.getElementById('fechaNac').value;
        if(!n || !d.aula) return alert("Faltan datos");
        d.alumnos.push({ id: Date.now(), nombre: n, genero: g, nacimiento: f, seccion: d.aula, docente: d.profe });
        localStorage.setItem('ebn_v7', JSON.stringify(d));
        document.getElementById('nomAlu').value = ""; dibujar();
    }
    function marcar(id) {
        if(!d.asistencias[hoy]) d.asistencias[hoy] = {};
        d.asistencias[hoy][id] = !d.asistencias[hoy][id];
        localStorage.setItem('ebn_v7', JSON.stringify(d)); dibujar();
    }
    function dibujar() {
        const lista = document.getElementById('listaAsistencia'); lista.innerHTML = "";
        d.alumnos.forEach(a => {
            const asis = d.asistencias[hoy] && d.asistencias[hoy][a.id];
            lista.innerHTML += `<div class="student-card">
                <div style="flex-grow:1"><b>${a.nombre}</b></div>
                <button onclick="marcar(${a.id})" class="btn-asis" style="background:${asis?'#27ae60':'#ccc'}">${asis?'P':'F'}</button>
            </div>`;
        });
    }
    function exportar() {
        const b = new Blob([JSON.stringify(d)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b);
        a.download = `Reporte_${d.aula}_${hoy}.json`; a.click();
    }
    document.getElementById('profe').value = d.profe; document.getElementById('aula').value = d.aula; dibujar();
</script>
</body>
</html>
